<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BESH BINGO</title>
    <style>
        :root { --gold: #f1c40f; --bg: #0f172a; --blue: #1e293b; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        
        /* Registration Overlay */
        #reg-screen { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        input { width: 80%; padding: 15px; border-radius: 10px; border: none; margin: 10px 0; font-size: 1.2rem; }

        /* Stats Bar */
        .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: var(--blue); padding: 15px; border-radius: 15px; border: 1px solid var(--gold); margin-bottom: 10px; }
        .stats-bar div { text-align: center; font-size: 0.8rem; }
        .stats-bar span { display: block; font-size: 1.2rem; color: var(--gold); font-weight: bold; }

        /* Action Buttons */
        .actions { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-act { flex: 1; padding: 10px; background: #27ae60; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        .withdraw { background: #c0392b; }

        /* Timer and Lobby */
        #timer-box { text-align: center; margin: 30px 0; }
        #timer { font-size: 5rem; font-weight: 900; color: white; text-shadow: 0 0 20px rgba(255,255,255,0.3); }
        .status-msg { color: var(--gold); font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; }

        .grid-store { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; max-height: 250px; overflow-y: auto; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 15px; }
        .t-num { background: #334155; padding: 15px 0; border-radius: 10px; text-align: center; cursor: pointer; font-weight: bold; }
        .t-num.selected { background: var(--gold); color: black; box-shadow: 0 0 15px var(--gold); }
        .t-num.bought { background: #000; color: #444; text-decoration: line-through; pointer-events: none; }

        /* Game Board */
        .bingo-header { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; text-align: center; font-weight: 900; font-size: 1.5rem; color: var(--gold); margin-bottom: 5px; }
        .bingo-card { background: #E0E5B6; padding: 8px; border-radius: 10px; margin-top: 15px; }
        .card-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; background: #444; border: 2px solid #444; }
        .cell { background: white; height: 45px; display: flex; align-items: center; justify-content: center; color: #333; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        .cell.marked { background: #e74c3c !important; color: white; position: relative; }
        .cell.marked::after { content: '✔'; position: absolute; font-size: 0.7rem; top: 2px; right: 2px; color: white; }

        #active-num-circle { width: 80px; height: 80px; border: 5px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 2.5rem; font-weight: bold; background: var(--blue); }
    </style>
</head>
<body>

    <div id="reg-screen">
        <h2 style="color:var(--gold)">BESH BINGO</h2>
        <p>ለመጀመር ስልክ ቁጥርዎን ያስገቡ</p>
        <input type="tel" id="phone-input" placeholder="09xxxxxxxx" maxlength="10">
        <button class="btn-act" onclick="register()" style="width:80%; padding:15px; background:var(--gold); color:black;">ግባ / Register</button>
    </div>

    <div class="stats-bar">
        <div>WALLET <span id="balance">0</span></div>
        <div>WIN (80%) <span id="prize">0</span></div>
        <div>PLAYERS <span id="p-count">0</span></div>
    </div>

    <div class="actions">
        <button class="btn-act" onclick="alert('Admin ያነጋግሩ')">DEPOSIT</button>
        <button class="btn-act withdraw" onclick="alert('Admin ያነጋግሩ')">WITHDRAW</button>
    </div>

    <div id="lobby-ui">
        <div id="timer-box">
            <div id="status-text" class="status-msg">ካርቴላ ይምረጡ</div>
            <div id="timer">30</div>
        </div>
        <div class="grid-store" id="picker"></div>
        <button id="buy-btn" onclick="buyTicket()" disabled style="width:100%; padding:20px; margin-top:15px; background:var(--gold); border:none; border-radius:15px; font-weight:bold; font-size:1.2rem; color:black;">ካርቴላ ይግዙ (10 ብር)</button>
    </div>

    <div id="game-ui" style="display:none;">
        <div id="active-num-circle">?</div>
        <div class="bingo-header"><div>B</div><div>I</div><div>N</div><div>G</div><div>O</div></div>
        <div id="my-cards"></div>
        <button id="win-btn" onclick="claimWin()" style="display:none; width:100%; padding:20px; background:var(--gold); color:black; font-weight:bold; margin-top:20px; border-radius:15px; font-size:1.5rem;">🎊 BINGO! 🎊</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let phone = localStorage.getItem('bingo_phone');
        let selectedNum = null, myMarked = new Set([0]), lastTickJSON = "";

        if(phone) document.getElementById('reg-screen').style.display = 'none';

        function register() {
            const val = document.getElementById('phone-input').value;
            if(val.length >= 10) {
                phone = val;
                localStorage.setItem('bingo_phone', val);
                document.getElementById('reg-screen').style.display = 'none';
            }
        }

        // 500 ካርቴላዎች
        const picker = document.getElementById('picker');
        for(let i=1; i<=500; i++) picker.innerHTML += `<div class="t-num" id="tn-${i}" onclick="selectNum(${i})">${i}</div>`;

        function selectNum(n) {
            if(selectedNum) document.getElementById(`tn-${selectedNum}`).classList.remove('selected');
            selectedNum = n;
            document.getElementById(`tn-${n}`).classList.add('selected');
            document.getElementById('buy-btn').disabled = false;
        }

        function update() {
            if(!phone) return;
            fetch('/get_status').then(r=>r.json()).then(d=>{
                document.getElementById('timer').innerText = d.timer;
                document.getElementById('prize').innerText = d.win_prize;
                document.getElementById('p-count').innerText = d.player_count;

                if(d.sub_status === "open") {
                    document.getElementById('status-text').innerText = "ምዝገባ ክፍት ነው";
                    document.getElementById('lobby-ui').style.display = 'block';
                    document.getElementById('game-ui').style.display = 'none';
                } else if(d.sub_status === "closed") {
                    document.getElementById('status-text').innerText = "ጨዋታው ሊጀምር ነው...";
                    document.getElementById('status-text').style.color = "#e74c3c";
                } else {
                    document.getElementById('lobby-ui').style.display = 'none';
                    document.getElementById('game-ui').style.display = 'block';
                    if(d.drawn_numbers.length > 0) document.getElementById('active-num-circle').innerText = d.drawn_numbers[d.drawn_numbers.length-1];
                }
            });

            fetch('/user_data/'+phone).then(r=>r.json()).then(d=>{
                document.getElementById('balance').innerText = d.balance;
                let tStr = JSON.stringify(d.tickets);
                if(lastTickJSON !== tStr) {
                    lastTickJSON = tStr;
                    let h = '';
                    d.tickets.forEach(t => {
                        h += `<div class="bingo-card"><div class="card-grid">`;
                        t.forEach(row => row.forEach(n => {
                            h += `<div class="cell ${n===0||myMarked.has(n)?'marked':''}" onclick="mark(${n})">${n===0?'FREE':n}</div>`;
                        }));
                        h += `</div></div>`;
                    });
                    document.getElementById('my-cards').innerHTML = h;
                }
            });
        }

        function buyTicket() {
            fetch('/join_game', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, ticket_num: selectedNum})})
            .then(r=>r.json()).then(d=> { if(d.success) tg.showAlert("ተገዝቷል!"); else alert(d.msg); });
        }

        function mark(n) {
            if(n === 0) return;
            if(myMarked.has(n)) myMarked.delete(n); else myMarked.add(n);
            update();
            if(myMarked.size >= 5) document.getElementById('win-btn').style.display = 'block';
        }

        setInterval(update, 1000);
    </script>
</body>
</html>
