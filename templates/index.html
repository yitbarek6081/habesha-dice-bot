<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 5px; }
        .header { display: flex; justify-content: space-around; background: #1e293b; padding: 10px; border-bottom: 2px solid #f1c40f; margin-bottom: 10px; }
        .stat { font-size: 0.8rem; font-weight: bold; color: #f1c40f; }
        .lobby-bar { background: rgba(241, 196, 15, 0.1); padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .board { display: grid; grid-template-columns: repeat(10, 1fr); gap: 3px; background: #1e293b; padding: 5px; border-radius: 8px; margin-bottom: 10px; }
        .b-cell { font-size: 0.6rem; padding: 4px; background: #334155; color: #64748b; border-radius: 2px; }
        .b-cell.drawn { background: #ef4444; color: white; box-shadow: 0 0 5px #ef4444; }
        .ticket { background: #f1c40f; padding: 10px; border-radius: 10px; display: flex; flex-direction: column; gap: 8px; }
        .t-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; padding: 4px; border-radius: 6px; }
        .t-cell { background: white; color: black; height: 40px; display: flex; align-items: center; justify-content: center; font-weight: 900; border-radius: 4px; font-size: 1.1rem; }
        .t-cell.marked { background: #22c55e; color: white; text-decoration: line-through; }
        .winner-row { background: rgba(34, 197, 94, 0.5); border: 3px solid #22c55e; box-shadow: 0 0 15px #22c55e; animation: pulse 0.5s infinite; }
        @keyframes pulse { 50% { opacity: 0.6; } }
        .win-btn { background: #22c55e; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 10px; }
        #overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; flex-direction:column; justify-content:center; align-items:center; z-index:100; }
    </style>
</head>
<body>
    <div id="overlay"><h1 id="win-msg" style="color:#f1c40f;">🏆 WINNER!</h1><p id="win-amt" style="font-size:1.5rem;"></p></div>
    
    <div class="header">
        <div id="bal" class="stat">Balance: 0.00</div>
        <div id="pot" class="stat">POT: 0</div>
        <div id="tmr" class="stat">Time: 20s</div>
    </div>

    <div id="lobby-ui" class="lobby-bar">
        <div id="join-sec"><button onclick="join()" style="background:#f1c40f; border:none; padding:10px 20px; border-radius:5px; font-weight:bold;">JOIN (10 ETB)</button></div>
        <div id="dis-sec" style="display:none;"><span style="color:#22c55e;">ገብተዋል ✅</span> <button onclick="disjoin()" style="background:#ef4444; color:white; border:none; padding:5px; border-radius:4px;">DISJOIN</button></div>
    </div>

    <div class="board" id="brd"></div>
    <div class="ticket">
        <div class="t-row" id="row-0"></div>
        <div class="t-row" id="row-1"></div>
        <div class="t-row" id="row-2"></div>
    </div>
    <button class="win-btn" onclick="checkWin()">WIN 🏆</button>

    <script>
        const tg = window.Telegram.WebApp;
        let phone = "";
        while(!phone) phone = prompt("እባክዎ የስልክ ቁጥርዎን ያስገቡ (ለምሳሌ: 0911223344):");

        const brd = document.getElementById('brd');
        for(let i=1; i<=90; i++) brd.innerHTML += `<div class="b-cell" id="b-${i}">${i}</div>`;

        fetch('/get_ticket').then(r => r.json()).then(data => {
            data.ticket.forEach((row, i) => {
                const rDiv = document.getElementById(`row-${i}`);
                row.forEach(n => {
                    const c = document.createElement('div'); c.className='t-cell'; c.innerText=n;
                    c.onclick=()=>{c.classList.toggle('marked'); tg.HapticFeedback.impactOccurred('light');};
                    rDiv.appendChild(c);
                });
            });
        });

        function update() {
            fetch('/get_status').then(r => r.json()).then(data => {
                document.getElementById('tmr').innerText = "Time: " + data.timer + "s";
                document.getElementById('pot').innerText = "POT: " + data.pot + " ETB";
                if(data.status === "winner_display") {
                    document.getElementById('overlay').style.display = 'flex';
                    document.getElementById('win-msg').innerText = data.winner_info.name + " WON!";
                    document.getElementById('win-amt').innerText = data.winner_info.amount.toFixed(2) + " ETB";
                    document.getElementById(`row-${data.winner_info.row}`).classList.add('winner-row');
                } else if(data.status === "lobby") {
                    document.getElementById('overlay').style.display = 'none';
                    document.querySelectorAll('.t-row').forEach(r => r.classList.remove('winner-row'));
                } else {
                    data.drawn.forEach(n => document.getElementById(`b-${n}`).classList.add('drawn'));
                }
            });
            fetch('/user_data/' + phone).then(r => r.json()).then(data => {
                document.getElementById('bal').innerText = "Balance: " + data.balance.toFixed(2) + " ETB";
                document.getElementById('join-sec').style.display = data.is_joined ? 'none' : 'block';
                document.getElementById('dis-sec').style.display = data.is_joined ? 'block' : 'none';
            });
        }

        function join() {
            fetch('/join_game', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, name:tg.initDataUnsafe.user.first_name})})
            .then(r=>r.json()).then(d=>{ if(!d.success) alert(d.msg); });
        }

        function disjoin() {
            fetch('/disjoin_game', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone})});
        }

        function checkWin() {
            for(let i=0; i<3; i++) {
                if(document.getElementById(`row-${i}`).querySelectorAll('.t-cell.marked').length === 5) {
                    fetch('/win', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, name:tg.initDataUnsafe.user.first_name, row:i})});
                    return;
                }
            }
            alert("መስመር አልሞላም!");
        }
        setInterval(update, 1000);
    </script>
</body>
</html>
