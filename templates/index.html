<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Casino Tombola</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #f1c40f; --bg: #0f172a; --card: #1e293b; --neon-green: #2ecc71; --slate: #94a3b8; }
        body { background: radial-gradient(circle at top, #1e293b, #0f172a); color: #f8fafc; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; user-select: none; }
        
        .header { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); padding: 15px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-around; sticky; top: 0; z-index: 100; }
        .stat { display: flex; flex-direction: column; }
        .stat small { font-size: 0.7rem; color: var(--slate); text-transform: uppercase; }
        .stat b { font-size: 1.1rem; color: var(--gold); }

        /* Big Number Animation */
        .draw-zone { margin: 25px auto; width: 140px; height: 140px; background: var(--card); border: 6px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 40px rgba(241, 196, 15, 0.4); }
        .big-num { font-size: 5rem; font-weight: 900; color: var(--gold); text-shadow: 0 0 15px rgba(241, 196, 15, 0.6); animation: pop 0.4s ease-out; }
        @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .board { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; padding: 12px; background: rgba(0,0,0,0.3); margin: 10px; border-radius: 15px; }
        .b-cell { font-size: 0.7rem; padding: 8px 0; background: #334155; border-radius: 5px; color: #64748b; font-weight: bold; transition: 0.3s; }
        .b-cell.drawn { background: linear-gradient(135deg, #ef4444, #991b1b); color: white; transform: scale(1.1); box-shadow: 0 0 8px #ef4444; }

        .btn-giant { background: linear-gradient(to bottom, var(--gold), #d4ac0d); color: #000; width: 90%; padding: 18px; border-radius: 20px; font-size: 1.4rem; font-weight: 900; border: none; margin: 20px 0; box-shadow: 0 6px 0 #9a7d0a; cursor: pointer; }
        .btn-giant:active { transform: translateY(4px); box-shadow: 0 2px 0 #9a7d0a; }

        .ticket-card { background: var(--card); margin: 15px; padding: 20px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); }
        .t-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 10px; }
        .t-cell { background: #f1f5f9; color: #1e293b; height: 55px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.5rem; border-radius: 12px; box-shadow: 0 4px 0 #cbd5e1; }
        .t-cell.marked { background: var(--neon-green) !important; color: white !important; transform: translateY(3px); box-shadow: none; }
    </style>
</head>
<body onclick="enableAudio()">

    <div class="header">
        <div class="stat"><small>Balance</small><b id="bal">0.00</b></div>
        <div class="stat"><small>Timer</small><b id="tmr">20s</b></div>
        <div class="stat"><small>Pot</small><b id="pot">0</b></div>
    </div>

    <div class="draw-zone"><div id="active-num" class="big-num">?</div></div>

    <div id="join-box"><button onclick="joinGame()" class="btn-giant">JOIN GAME (10 ETB)</button></div>

    <div id="brd" class="board"></div>

    <div id="ticket-area" class="ticket-card" style="display:none">
        <h3 style="color:var(--gold); margin-top:0;">የእርስዎ ቲኬት</h3>
        <div id="t-container"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let phone = localStorage.getItem('u_phone');
        let drawnNumbers = [];
        let audioEnabled = false;

        function enableAudio() { if(!audioEnabled) { window.speechSynthesis.speak(new SpeechSynthesisUtterance("")); audioEnabled = true; } }

        function speak(n) {
            if(!audioEnabled) return;
            const msg = new SpeechSynthesisUtterance("ቁጥር " + n);
            msg.lang = 'am-ET';
            msg.rate = 1.0;
            window.speechSynthesis.speak(msg);
        }

        if(!phone) { phone = prompt("ስልክ ያስገቡ:"); if(phone) localStorage.setItem('u_phone', phone.trim()); }
        for(let i=1; i<=90; i++) document.getElementById('brd').innerHTML += `<div class="b-cell" id="b-${i}">${i}</div>`;

        function update() {
            fetch('/get_status').then(r => r.json()).then(d => {
                document.getElementById('tmr').innerText = d.status === "lobby" ? d.timer + "s" : "LIVE";
                document.getElementById('pot').innerText = d.pot + " ETB";
                
                if(d.drawn_numbers.length > 0) {
                    let last = d.drawn_numbers[d.drawn_numbers.length - 1];
                    let box = document.getElementById('active-num');
                    if(box.innerText != last) {
                        box.innerText = last;
                        speak(last); // ድምፅ ማውጫ
                        document.getElementById(`b-${last}`).classList.add('drawn');
                    }
                }
                if(d.status === "lobby") {
                    document.getElementById('join-box').style.display = 'block';
                    document.getElementById('ticket-area').style.display = 'none';
                    document.getElementById('active-num').innerText = "?";
                    document.querySelectorAll('.b-cell').forEach(c => c.classList.remove('drawn'));
                }
            });

            if(phone) {
                fetch('/user_data/' + phone).then(r => r.json()).then(d => {
                    document.getElementById('bal').innerText = d.balance.toFixed(2);
                    if(d.is_joined && d.ticket) {
                        document.getElementById('join-box').style.display = 'none';
                        document.getElementById('ticket-area').style.display = 'block';
                        renderTicket(d.ticket);
                    }
                });
            }
        }

        function renderTicket(ticket) {
            document.getElementById('t-container').innerHTML = ticket.map(row => `
                <div class="t-row">${row.map(n => `<div class="t-cell ${drawnNumbers.includes(n)?'marked':''}" onclick="mark(${n})">${n}</div>`).join('')}</div>
            `).join('');
        }

        function mark(n) { if(drawnNumbers.includes(n)) update(); }
        function joinGame() { fetch('/join_game', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, name:tg.initDataUnsafe.user?.first_name||"Player"})}); }

        setInterval(update, 1000);
        tg.expand();
    </script>
</body>
</html>
