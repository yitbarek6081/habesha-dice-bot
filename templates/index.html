<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Casino Tombola</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --gold: #f1c40f;
            --bg: #0f172a;
            --card: #1e293b;
            --neon-green: #2ecc71;
            --neon-red: #e74c3c;
            --text-slate: #94a3b8;
        }

        body { 
            background: radial-gradient(circle at top, #1e293b, #0f172a); 
            color: #f8fafc; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 0;
            overflow-x: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Header Section */
        .header { 
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px; 
            border-bottom: 2px solid var(--gold); 
            display: flex; 
            justify-content: space-around; 
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .stat-box { display: flex; flex-direction: column; }
        .label { font-size: 0.65rem; color: var(--text-slate); text-transform: uppercase; letter-spacing: 1px; }
        .value { font-size: 1.1rem; font-weight: 800; color: var(--gold); }

        /* Big Number Zone */
        .draw-zone {
            margin: 20px auto;
            width: 120px;
            height: 120px;
            background: var(--card);
            border: 4px solid var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(241, 196, 15, 0.3);
            position: relative;
        }

        .big-num { 
            font-size: 4rem; 
            font-weight: 900; 
            color: var(--gold); 
            text-shadow: 0 0 15px rgba(241, 196, 15, 0.5);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        @keyframes popIn { 
            0% { transform: scale(0.3); opacity: 0; } 
            100% { transform: scale(1); opacity: 1; } 
        }

        /* Action Buttons */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 15px;
        }

        .btn-action {
            border: none;
            padding: 12px 22px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            color: white;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }

        .btn-action:active { transform: translateY(2px); box-shadow: none; }

        /* Board 1-90 */
        .board { 
            display: grid; 
            grid-template-columns: repeat(10, 1fr); 
            gap: 4px; 
            padding: 12px;
            background: rgba(0,0,0,0.2);
            margin: 10px;
            border-radius: 15px;
        }

        .b-cell { 
            font-size: 0.7rem; 
            padding: 8px 0; 
            background: #334155; 
            border-radius: 5px; 
            color: #64748b;
            font-weight: bold;
            transition: 0.3s;
        }

        .b-cell.drawn { 
            background: linear-gradient(135deg, #ef4444, #991b1b); 
            color: white; 
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.5);
            transform: scale(1.05);
        }

        /* Ticket Design */
        .ticket-card {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            margin: 20px 12px;
            padding: 20px;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .t-row { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 10px; 
            margin-bottom: 10px; 
        }

        .t-cell { 
            background: #f1f5f9; 
            color: #1e293b; 
            height: 60px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 900; 
            font-size: 1.6rem; 
            border-radius: 15px; 
            cursor: pointer;
            box-shadow: 0 5px 0 #cbd5e1;
            transition: 0.1s;
        }

        .t-cell.marked { 
            background: linear-gradient(135deg, var(--neon-green), #16a34a) !important; 
            color: white !important; 
            transform: translateY(4px);
            box-shadow: 0 1px 0 #14532d;
        }

        /* Large Join/Bingo Button */
        .btn-giant { 
            background: linear-gradient(to bottom, var(--gold), #d4ac0d); 
            color: #000; 
            width: 90%; 
            padding: 20px; 
            border-radius: 20px; 
            font-size: 1.4rem; 
            font-weight: 900; 
            border: none; 
            margin: 20px 0;
            box-shadow: 0 6px 0 #9a7d0a;
            cursor: pointer;
        }

        .btn-giant:active { transform: translateY(4px); box-shadow: 0 2px 0 #9a7d0a; }

        /* Modal */
        .modal-overlay { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.85); 
            z-index: 1000; 
            backdrop-filter: blur(5px);
        }

        .modal-content { 
            background: var(--card); 
            margin: 25% auto; 
            padding: 30px; 
            width: 80%; 
            border-radius: 25px; 
            border: 2px solid var(--gold); 
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="stat-box">
            <span class="label">Balance</span>
            <span id="bal" class="value">0.00 ETB</span>
        </div>
        <div class="stat-box">
            <span id="timer-label" class="label">⌛ Timer</span>
            <span id="tmr" class="value">20s</span>
        </div>
        <div class="stat-box">
            <span class="label">Reward</span>
            <span id="pot" class="value">0 ETB</span>
        </div>
    </div>

    <div class="draw-zone">
        <div id="active-num" class="big-num">?</div>
    </div>

    <div class="btn-group">
        <button onclick="showPay()" class="btn-action" style="background: var(--neon-green);">💰 DEPOSIT</button>
        <button onclick="requestWithdraw()" class="btn-action" style="background: #3b82f6;">💸 WITHDRAW</button>
    </div>

    <div id="p-count" style="color: var(--gold); font-weight: bold; margin-bottom: 5px;">👤 ተጫዋቾች: 0</div>

    <div id="join-box">
        <button onclick="joinGame()" class="btn-giant">JOIN GAME (10 ETB)</button>
    </div>

    <div id="brd" class="board"></div>

    <div id="ticket-area" class="ticket-card" style="display:none">
        <h3 style="margin-top:0; color:var(--gold);">የእርስዎ ቲኬት (ቁጥሮቹን ይንኩ)</h3>
        <div id="t-container"></div>
        <button id="win-btn" onclick="claimWin()" class="btn-giant" style="background: var(--neon-green); box-shadow: 0 6px 0 #14532d; display: none;">BINGO! 🏆</button>
    </div>

    <div id="payModal" class="modal-overlay">
        <div class="modal-content">
            <h2 style="color: var(--gold); margin-top: 0;">ገንዘብ ያስገቡ</h2>
            <button onclick="sendPay('CBE')" style="background: #5d2d91; color: white; width: 100%; padding: 15px; margin: 8px 0; border: none; border-radius: 12px; font-weight: bold;">CBE Birr</button>
            <button onclick="sendPay('Tele')" style="background: #ed1c24; color: white; width: 100%; padding: 15px; margin: 8px 0; border: none; border-radius: 12px; font-weight: bold;">Telebirr</button>
            <p onclick="closePay()" style="cursor: pointer; color: var(--text-slate); margin-top: 15px; font-weight: bold;">ዝጋ</p>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let phone = localStorage.getItem('u_phone');
        let myTicket = null;
        let drawnNumbers = [];

        if(!phone) {
            phone = prompt("ለመጫወት ስልክ ቁጥርዎን ያስገቡ:");
            if(phone) localStorage.setItem('u_phone', phone.trim());
        }

        // Initialize Board
        for(let i=1; i<=90; i++) {
            document.getElementById('brd').innerHTML += `<div class="b-cell" id="b-${i}">${i}</div>`;
        }

        function update() {
            fetch('/get_status').then(r => r.json()).then(d => {
                document.getElementById('p-count').innerText = d.winner ? "🏆 Winner: " + d.winner : "👤 ተጫዋቾች: " + d.players_count;
                document.getElementById('pot').innerText = d.pot + " ETB";
                
                if(d.status === "lobby") {
                    document.getElementById('tmr').innerText = d.timer + "s";
                    document.getElementById('timer-label').innerText = "⌛ Timer";
                    document.getElementById('active-num').innerText = "?";
                    document.querySelectorAll('.b-cell').forEach(c => c.classList.remove('drawn'));
                    document.getElementById('join-box').style.display = 'block';
                    document.getElementById('ticket-area').style.display = 'none';
                    myTicket = null;
                } else {
                    document.getElementById('tmr').innerText = "LIVE";
                    document.getElementById('timer-label').innerText = "🔴 Status";
                    document.getElementById('join-box').style.display = 'none';
                    
                    drawnNumbers = d.drawn_numbers;
                    if(drawnNumbers.length > 0) {
                        let last = drawnNumbers[drawnNumbers.length - 1];
                        let box = document.getElementById('active-num');
                        if(box.innerText != last) {
                            box.innerText = last;
                            document.getElementById(`b-${last}`).classList.add('drawn');
                            tg.HapticFeedback.impactOccurred('medium');
                        }
                    }
                }
            });

            if(phone && !myTicket) {
                fetch('/user_data/' + phone).then(r => r.json()).then(d => {
                    document.getElementById('bal').innerText = d.balance.toFixed(2) + " ETB";
                    if(d.is_joined) {
                        myTicket = d.ticket;
                        document.getElementById('ticket-area').style.display = 'block';
                        document.getElementById('win-btn').style.display = 'block';
                        renderTicket();
                    }
                });
            }
        }

        function renderTicket() {
            document.getElementById('t-container').innerHTML = myTicket.map(row => `
                <div class="t-row">${row.map(n => `<div class="t-cell" id="c-${n}" onclick="userMark(${n})">${n}</div>`).join('')}</div>
            `).join('');
        }

        function userMark(n) {
            if(drawnNumbers.includes(n)) {
                let el = document.getElementById(`c-${n}`);
                if(!el.classList.contains('marked')) {
                    el.classList.add('marked');
                    tg.HapticFeedback.impactOccurred('light');
                }
            } else {
                tg.HapticFeedback.notificationOccurred('error');
                alert("ይህ ቁጥር ገና አልወጣም!");
            }
        }

        function claimWin() {
            let marked = document.querySelectorAll('.t-cell.marked').length;
            if(marked < 15) { alert("ሁሉንም 15 ቁጥሮች መንካት አለብዎት!"); return; }
            
            fetch('/win', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({phone})
            }).then(r => r.json()).then(d => {
                if(d.success) alert("BINGO! 🏆 አሸንፈዋል!");
                else alert("ገና ነዎት፣ በትክክል ያብሩ!");
            });
        }

        function showPay() { document.getElementById('payModal').style.display = "block"; }
        function closePay() { document.getElementById('payModal').style.display = "none"; }
        
        function sendPay(method) {
            let amt = prompt(method + " ያስገቡት የብር መጠን:");
            if(amt) {
                fetch('/request_action', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({type: method, phone, amount: amt})
                });
                alert("ጥያቄዎ ተልኳል!"); closePay();
            }
        }

        function requestWithdraw() {
            let amt = prompt("የሚወጣው የብር መጠን:");
            if(amt) fetch('/request_action', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({type: 'Withdraw', phone, amount: amt})
            });
        }

        function joinGame() {
            fetch('/join_game', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({phone, name: tg.initDataUnsafe.user?.first_name || "Player"})
            }).then(() => update());
        }

        setInterval(update, 1000);
        tg.expand();
        tg.ready();
    </script>
</body>
</html>
