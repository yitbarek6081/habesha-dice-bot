<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BESH BINGO - PREMIUM</title>
    <style>
        :root { --gold: #ffcc00; --bg: #050a18; --red: #ff3e3e; --green: #00ff88; --orange: #ff8800; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 0; }
        .header-banner { background: #1e293b; padding: 15px 0; border-bottom: 3px solid var(--gold); position: sticky; top: 0; z-index: 100; }
        .stats { display: flex; justify-content: space-around; background: rgba(255,255,255,0.05); padding: 10px; margin: 10px; border-radius: 12px; }
        .stats b { display: block; font-size: 1.1rem; color: var(--gold); }
        .grid-500 { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; max-height: 160px; overflow-y: auto; background: #000; padding: 10px; margin: 10px; border-radius: 10px; }
        .t-box { background: #fff; color: #000; font-size: 0.75rem; padding: 8px 0; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .t-box.mine { background: var(--gold); border: 2px solid white; }
        .t-box.sold { background: #333; color: #666; }
        #ball-circle { width: 75px; height: 75px; background: radial-gradient(circle, #fff, var(--gold)); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 900; margin: 15px auto; box-shadow: 0 0 20px var(--gold); }
        .main-board { border: 1px solid #333; height: 350px; overflow-y: auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; padding: 5px; background: #000; border-radius: 10px; }
        .ball-dot { font-size: 0.7rem; background: #111; padding: 5px; color: #444; border: 1px solid #222; }
        .ball-dot.active { background: var(--gold); color: #000; font-weight: bold; }
        .bingo-card { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; background: #444; padding: 4px; }
        .cell { background: #fff; color: #000; height: 42px; display: flex; align-items: center; justify-content: center; font-weight: 900; cursor: pointer; }
        .cell.selected { background: var(--gold) !important; border: 2px solid #b45309; }
        .cell.free { background: var(--red) !important; color: white; font-size: 0.6rem; }
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:2000; flex-direction:column; align-items:center; justify-content:center; }
        .btn-main { padding: 12px; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin: 5px; }
        .btn-deposit { background: var(--green); color: #000; width: 45%; }
        .btn-withdraw { background: var(--orange); color: #fff; width: 45%; }
    </style>
</head>
<body>
    <audio id="win-horn" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" preload="auto"></audio>
    <div class="header-banner"><h1>BESH BINGO</h1></div>
    <div class="stats">
        <div>BALANCE<b id="balance">0 ETB</b></div>
        <div>PLAYERS<b id="p-count">0</b></div>
        <div>JACKPOT<b id="prize">0 ETB</b></div>
    </div>
    <div id="lobby-ui">
        <button class="btn-main btn-deposit" onclick="openM('dep-m')">📥 DEPOSIT</button>
        <button class="btn-main btn-withdraw" onclick="openM('with-m')">📤 WITHDRAW</button>
        <div id="timer" style="font-size: 3rem; color: var(--gold);">30</div>
        <div class="grid-500" id="ticket-area"></div>
    </div>
    <div id="game-ui" style="display:none;">
        <div id="ball-circle">--</div>
        <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 5px; padding: 10px;">
            <div class="main-board" id="main-board"></div>
            <div>
                <div id="card-area"></div>
                <button onclick="claim()" style="width:100%; padding:15px; background:var(--red); color:white; font-weight:900; border-radius:10px; margin-top:10px;">BINGO!</button>
            </div>
        </div>
    </div>
    <div id="dep-m" class="modal">
        <div style="background:#1e293b; padding:20px; border-radius:15px; width:80%;">
            <h2>DEPOSIT</h2>
            <p>Telebirr: <b>0945880474</b></p>
            <input type="number" id="da" placeholder="Amount" style="width:90%; padding:10px; margin:5px;">
            <input type="text" id="di" placeholder="Transaction ID" style="width:90%; padding:10px; margin:5px;">
            <button class="btn-main" style="background:var(--green); width:100%;" onclick="subD()">SUBMIT</button>
            <button onclick="closeM('dep-m')" style="color:#888; background:none; border:none; margin-top:10px;">CLOSE</button>
        </div>
    </div>

    <div id="result-ui" class="modal">
        <h1 style="color:var(--gold); font-size:3rem;">BINGO!</h1>
        <div id="winner-info" style="font-size:2rem;"></div>
    </div>

    <script>
        let phone = localStorage.getItem('phone') || prompt("ስልክ ቁጥር:");
        let username = localStorage.getItem('username') || prompt("ስም:");
        localStorage.setItem('phone', phone); localStorage.setItem('username', username);

        let lastBall = null;
        let validBalls = [];

        function speak(text) {
            const msg = new SpeechSynthesisUtterance();
            msg.text = text.split('').join(' ');
            window.speechSynthesis.speak(msg);
        }

        function update() {
            fetch(`/get_status?phone=${phone}`).then(r=>r.json()).then(d=>{
                document.getElementById('balance').innerText = d.balance.toFixed(0) + " ETB";
                document.getElementById('prize').innerText = Math.floor(d.pot * 0.8) + " ETB";
                document.getElementById('p-count').innerText = d.active_players;
                document.getElementById('timer').innerText = d.timer;
                validBalls = d.valid_to_mark.map(b => parseInt(b.substring(1)));

                if(d.status === "lobby") {
                    document.getElementById('lobby-ui').style.display='block';
                    document.getElementById('game-ui').style.display='none';
                    document.getElementById('result-ui').style.display='none';
                    renderTickets(d.sold_tickets);
                } else if(d.status === "playing") {
                    document.getElementById('lobby-ui').style.display='none';
                    document.getElementById('game-ui').style.display='block';
                    document.getElementById('ball-circle').innerText = d.current_ball;
                    if(d.current_ball !== lastBall) { speak(d.current_ball); lastBall = d.current_ball; }
                    renderMainBoard(d.drawn_balls);
                    if(d.my_cards.length > 0 && !document.getElementById('card-area').innerHTML) {
                        d.my_cards.forEach((c, i) => renderCard(c, i));
                    }
                } else if(d.status === "result") {
                    document.getElementById('result-ui').style.display='flex';
                    document.getElementById('winner-info').innerText = d.winner;
                }
            });
        }

        function renderTickets(sold) {
            const area = document.getElementById('ticket-area');
            if(!area.children.length) {
                for(let i=1; i<=500; i++) {
                    let div=document.createElement('div'); div.className='t-box'; div.innerText=i; div.id='t-'+i;
                    area.appendChild(div);
                }
            }
            for(let i=1; i<=500; i++) {
                let box = document.getElementById('t-'+i);
                if(sold[i]) {
                    box.className = (sold[i] === phone) ? 't-box mine' : 't-box sold';
                    box.onclick = (sold[i] === phone) ? () => refund(i) : null;
                } else {
                    box.className='t-box'; box.onclick=()=>buy(i);
                }
            }
        }

        function buy(n) { fetch('/buy_specific_ticket', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, ticket_num:n, username})}).then(update); }
        function refund(n) { fetch('/cancel_ticket', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, ticket_num:n})}).then(update); }

        function renderCard(card, idx) {
            const grid = document.createElement('div'); grid.className='bingo-card';
            card.forEach((n, i) => {
                const cell = document.createElement('div'); cell.className = (i===12)?"cell free selected":"cell";
                cell.innerText = (i===12)?"FREE":n;
                if(i!==12) cell.onclick = () => {
                    if(validBalls.includes(n)) cell.classList.toggle('selected');
                    else alert("አልፎበታል! መቁረጥ የሚቻለው የቅርብ 3 ኳሶችን ብቻ ነው።");
                };
                grid.appendChild(cell);
            });
            document.getElementById('card-area').appendChild(grid);
        }

        function renderMainBoard(drawn) {
            const board = document.getElementById('main-board');
            if(!board.children.length) {
                for(let i=1; i<=75; i++) {
                    let d=document.createElement('div'); d.className='ball-dot'; d.id='b-'+i; d.innerText=i;
                    board.appendChild(d);
                }
            }
            drawn.forEach(b => {
                let el = document.getElementById('b-'+b.substring(1));
                if(el) el.classList.add('active');
            });
        }

        function openM(id) { document.getElementById(id).style.display='flex'; }
        function closeM(id) { document.getElementById(id).style.display='none'; }
        function claim() { fetch('/claim_bingo', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone})}).then(r=>r.json()).then(d=> {if(!d.success) alert(d.msg)}); }
        
        setInterval(update, 2000);
    </script>
</body>
</html>
