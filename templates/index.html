<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BESH BINGO - PREMIUM</title>
    <style>
        :root { --gold: #ffcc00; --bg: #050a18; --red: #ff3e3e; --green: #00ff88; --orange: #ff8800; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 0; overflow-x: hidden; width: 100vw; }
        
        /* Sticky Header */
        .header-section { position: sticky; top: 0; z-index: 1000; background: var(--bg); border-bottom: 2px solid var(--gold); }
        .header-banner { padding: 10px 0; }
        .header-banner h1 { margin: 0; font-size: 1.5rem; color: var(--gold); letter-spacing: 2px; }
        
        .stats { display: flex; justify-content: space-around; background: rgba(255,255,255,0.05); padding: 8px; margin: 5px 10px; border-radius: 10px; }
        .stats b { display: block; font-size: 1rem; color: var(--gold); }
        
        .action-bar { display: flex; justify-content: center; gap: 5px; padding: 5px 10px; }
        .btn-main { flex: 1; padding: 10px 2px; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; font-size: 0.7rem; transition: 0.2s; }
        .btn-deposit { background: var(--green); color: #000; }
        .btn-withdraw { background: var(--orange); color: white; }
        .btn-voice { background: #334155; color: white; }

        /* Lobby UI */
        #timer { font-size: 2.2rem; font-weight: 900; color: var(--gold); margin: 5px 0; }
        .grid-500 { 
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; 
            max-height: 250px; overflow-y: auto; background: #000; 
            padding: 10px; margin: 10px; border-radius: 8px; 
        }
        .t-box { background: #fff; color: #000; font-size: 0.85rem; padding: 10px 0; font-weight: bold; border-radius: 4px; border-bottom: 3px solid #ccc; }
        .t-box.mine { background: var(--gold); border: 2px solid white; animation: pulse 1.5s infinite; }
        .t-box.sold { background: #222; color: #555; border-bottom: none; }

        /* Game Board */
        .game-layout { display: grid; grid-template-columns: 1fr 2fr; gap: 8px; padding: 10px; }
        .main-board { border: 1px solid #333; height: 350px; overflow-y: auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; padding: 5px; background: #000; border-radius: 8px; }
        .ball-dot { font-size: 0.7rem; background: #111; padding: 5px; color: #444; border-radius: 3px; }
        .ball-dot.active { background: var(--gold); color: #000; font-weight: bold; }
        
        .bingo-card { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; background: #444; padding: 3px; border-radius: 4px; }
        .cell { background: #fff; color: #000; height: 35px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.9rem; }
        .cell.selected { background: var(--gold) !important; border: 1px solid #b45309; }
        .cell.free { background: var(--red) !important; color: white; font-size: 0.6rem; }

        /* Winner Overlay */
        #winner-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.9);
            z-index: 5000; flex-direction: column; justify-content: center; align-items: center;
        }
        .congrats-text { font-size: 2.5rem; color: var(--gold); font-weight: 900; animation: bounce 0.5s infinite alternate; }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.1); } }

        /* Modals */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: flex-start; padding-top: 50px; }
        .modal-content { background: #1e293b; padding: 20px; border-radius: 12px; width: 85%; max-width: 320px; border: 1px solid var(--gold); }
        input { padding: 12px; margin: 10px 0; width: 100%; border-radius: 8px; border: none; font-size: 1rem; box-sizing: border-box; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <audio id="win-horn" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" preload="auto"></audio>

    <div id="winner-overlay">
        <div class="congrats-text">🏆 CONGRATS! 🏆</div>
        <div id="win-name" style="font-size: 2rem; color: white; margin: 15px 0;"></div>
        <div style="color: var(--green); font-size: 1.2rem;">እንኳን ደስ ያለህ/ሽ!</div>
    </div>

    <div class="header-section">
        <div class="header-banner"><h1>BESH BINGO</h1></div>
        <div class="stats">
            <div>BALANCE<b id="balance">0 ETB</b></div>
            <div>PLAYERS<b id="p-count">0</b></div>
            <div>JACKPOT<b id="prize">0 ETB</b></div>
        </div>
        <div class="action-bar">
            <button class="btn-main btn-deposit" onclick="openM('dep-m')">📥 DEPOSIT</button>
            <button id="voice-btn" class="btn-main btn-voice" onclick="toggleVoice()">🔇 VOICE OFF</button>
            <button class="btn-main btn-withdraw" onclick="openM('with-m')">📤 WITHDRAW</button>
        </div>
    </div>

    <div id="lobby-ui">
        <div id="timer">30</div>
        <div class="grid-500" id="ticket-area"></div>
    </div>

    <div id="game-ui" style="display:none;">
        <div id="ball-circle" style="width:70px; height:70px; background:radial-gradient(circle, #fff, var(--gold)); color:#000; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.8rem; font-weight:900; margin:10px auto; border:3px solid #1e293b;">--</div>
        <div class="game-layout">
            <div class="main-board" id="main-board"></div>
            <div>
                <div id="card-area"></div>
                <button id="bingo-btn" onclick="claim()" style="width:100%; padding:10px; background:var(--red); color:white; font-weight:900; border-radius:10px; border:none; margin-top:10px;">BINGO!</button>
            </div>
        </div>
    </div>

    <div id="with-m" class="modal"><div class="modal-content">
        <h2 style="color:var(--orange);">WITHDRAW</h2>
        <input type="number" id="wa" placeholder="Amount (min 20)">
        <button class="btn-main btn-withdraw" style="width:100%" onclick="subW()">CONFIRM</button>
        <button onclick="closeM('with-m')" style="color:#888; background:none; border:none; margin-top:10px;">CLOSE</button>
    </div></div>

    <div id="dep-m" class="modal"><div class="modal-content">
        <h2 style="color:var(--green);">DEPOSIT</h2>
        <p style="font-size:0.9rem;">Telebirr: <b style="color:var(--gold)" onclick="copyNum('0945880474')">0945880474</b></p>
        <input type="number" id="da" placeholder="Amount">
        <input type="text" id="di" placeholder="Transaction ID">
        <button class="btn-main btn-deposit" style="width:100%" onclick="subD()">SUBMIT</button>
        <button onclick="closeM('dep-m')" style="color:#888; background:none; border:none; margin-top:10px;">CLOSE</button>
    </div></div>

    <div id="result-ui" class="modal">
        <h1 style="color:var(--gold); font-size:3rem;">BINGO!</h1>
        <div id="winner-info" style="font-size:1.5rem; color:white;"></div>
    </div>

    <script>
        let phone = localStorage.getItem('phone') || prompt("ስልክ ቁጥር ያስገቡ:");
        let username = localStorage.getItem('username') || prompt("የተጫዋች ስም ያስገቡ:");
        if(!phone || !username) location.reload();
        localStorage.setItem('phone', phone); localStorage.setItem('username', username);

        let currentCardData = null, announced = false, lastBall = "--", isVoiceOn = false;

        function toggleVoice() {
            isVoiceOn = !isVoiceOn;
            const btn = document.getElementById('voice-btn');
            btn.innerText = isVoiceOn ? "🔊 VOICE ON" : "🔇 VOICE OFF";
            btn.style.background = isVoiceOn ? "var(--green)" : "#334155";
            if(isVoiceOn) { 
                let u = new SpeechSynthesisUtterance("Voice On"); 
                u.volume = 0.5; 
                window.speechSynthesis.speak(u); 
            }
        }

        function speak(text) {
            if(!isVoiceOn || !window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            let msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US'; msg.rate = 0.8;
            window.speechSynthesis.speak(msg);
        }

        function openM(id) { document.getElementById(id).style.display='flex'; }
        function closeM(id) { document.getElementById(id).style.display='none'; }
        function copyNum(n) { navigator.clipboard.writeText(n); alert("Copied: " + n); }

        function update() {
            fetch(`/get_status?phone=${phone}`).then(r=>r.json()).then(d=>{
                document.getElementById('balance').innerText = d.balance.toFixed(0) + " ETB";
                document.getElementById('prize').innerText = Math.floor(d.pot * 0.8) + " ETB";
                document.getElementById('p-count').innerText = d.active_players;
                document.getElementById('timer').innerText = d.timer;

                if(d.status === "lobby") {
                    document.getElementById('lobby-ui').style.display='block';
                    document.getElementById('game-ui').style.display='none';
                    document.getElementById('result-ui').style.display='none';
                    document.getElementById('winner-overlay').style.display='none';
                    currentCardData = null; announced = false;
                    renderTickets(d.sold_tickets);
                } else if(d.status === "playing") {
                    document.getElementById('lobby-ui').style.display='none';
                    document.getElementById('game-ui').style.display='block';
                    document.getElementById('ball-circle').innerText = d.current_ball;
                    if(d.current_ball !== lastBall && d.current_ball !== "--") {
                        speak(d.current_ball.charAt(0) + " " + d.current_ball.substring(1));
                        lastBall = d.current_ball;
                    }
                    renderMainBoard(d.drawn_balls);
                    if(d.my_cards.length > 0 && !currentCardData) {
                        currentCardData = d.my_cards;
                        document.getElementById('card-area').innerHTML = "";
                        d.my_cards.forEach((c, i) => renderCard(c, i));
                    }
                } else if(d.status === "result") {
                    // አሸናፊውን ለ 3 ሰከንድ አሳይ
                    if(!announced) {
                        const overlay = document.getElementById('winner-overlay');
                        document.getElementById('win-name').innerText = d.winner;
                        overlay.style.display = 'flex';
                        document.getElementById('win-horn').play();
                        announced = true;
                        setTimeout(() => { overlay.style.display = 'none'; }, 3000);
                    }
                    document.getElementById('result-ui').style.display='flex';
                    document.getElementById('winner-info').innerText = d.winner + " 🏆";
                }
            }).catch(e => console.log("Update error"));
        }

        function renderTickets(sold) {
            const area = document.getElementById('ticket-area');
            if(area.children.length === 0) {
                for(let i=1; i<=500; i++) {
                    let div = document.createElement('div');
                    div.className = 't-box'; div.innerText = i; div.id = 't-'+i;
                    area.appendChild(div);
                }
            }
            for(let i=1; i<=500; i++) {
                let box = document.getElementById('t-'+i);
                if(sold[i]) {
                    box.className = (sold[i] === phone) ? 't-box mine' : 't-box sold';
                    box.onclick = (sold[i] === phone) ? () => refund(i) : null;
                } else {
                    box.className = 't-box';
                    box.onclick = () => buy(i);
                }
            }
        }

        function buy(n) {
            if(document.querySelectorAll('.t-box.mine').length >= 2) return alert("ከ 2 በላይ አይፈቀድም");
            fetch('/buy_specific_ticket', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, ticket_num:String(n), username})}).then(update);
        }

        function refund(n) {
            if(confirm("ካርተላ ቁጥር " + n + " ይመለስ?")) {
                fetch('/cancel_ticket', {
                    method:'POST', 
                    headers:{'Content-Type':'application/json'}, 
                    body:JSON.stringify({phone: phone, ticket_num: String(n)}) 
                }).then(r=>r.json()).then(res => {
                    if(res.success) { alert("ብር ተመልሷል!"); update(); }
                    else { alert("መመለስ አይቻልም!"); }
                });
            }
        }

        function renderMainBoard(drawn) {
            const board = document.getElementById('main-board');
            if(board.children.length === 0) {
                for(let i=1; i<=75; i++) {
                    let d = document.createElement('div');
                    d.className = 'ball-dot'; d.id = 'b-'+i; d.innerText = i;
                    board.appendChild(d);
                }
            }
            document.querySelectorAll('.ball-dot').forEach(el => el.classList.remove('active'));
            drawn.forEach(b => {
                let num = b.substring(1);
                let el = document.getElementById('b-'+num);
                if(el) el.classList.add('active');
            });
        }

        function renderCard(card, idx) {
            const wrap = document.createElement('div');
            wrap.style.marginBottom = "10px";
            wrap.innerHTML = `<div style="display:grid;grid-template-columns:repeat(5,1fr);background:var(--orange);font-weight:900;font-size:0.7rem;padding:2px;"><div>B</div><div>I</div><div>N</div><div>G</div><div>O</div></div>`;
            const grid = document.createElement('div');
            grid.className = 'bingo-card';
            card.forEach((n, i) => {
                const cell = document.createElement('div');
                cell.className = (i === 12) ? "cell free selected" : "cell";
                cell.innerText = (i === 12) ? "FREE" : n;
                if(i !== 12) cell.onclick = () => cell.classList.toggle('selected');
                grid.appendChild(cell);
            });
            wrap.appendChild(grid);
            document.getElementById('card-area').appendChild(wrap);
        }

        function claim() {
            fetch('/claim_bingo', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone})})
            .then(r=>r.json()).then(d=>{ if(!d.success) alert(d.msg); });
        }

        function subD() {
            let a = document.getElementById('da').value, i = document.getElementById('di').value;
            if(!a || !i) return alert("ሙሉ መረጃ ያስገቡ");
            fetch('/request_deposit', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, amount:a, transaction_id:i})});
            closeM('dep-m'); alert("ተልኳል");
        }

        function subW() {
            let a = document.getElementById('wa').value;
            if(!a || a < 20) return alert("ቢያንስ 20");
            fetch('/withdraw', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, amount:a})})
            .then(() => { closeM('with-m'); alert("ተልኳል"); update(); });
        }

        setInterval(update, 2000); update();
    </script>
</body>
</html>
