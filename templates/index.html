<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BESH BINGO - SECURE PREMIUM</title>
    <style>
        :root { --gold: #ffcc00; --bg: #050a18; --red: #ff3e3e; --green: #00ff88; --orange: #ff8800; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; text-align: center; margin: 0; padding: 0; overflow-x: hidden; width: 100vw; }
        
        #auth-ui { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; box-sizing: border-box; background: radial-gradient(circle at center, #1e293b, #050a18); }
        .auth-card { background: rgba(255, 255, 255, 0.03); border: 2px solid var(--gold); border-radius: 20px; padding: 30px 20px; width: 100%; max-width: 360px; box-sizing: border-box; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .auth-card h2 { color: var(--gold); margin-top: 0; font-size: 1.6rem; letter-spacing: 1px; }
        .auth-card p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 20px; }
        .input-group { width: 100%; text-align: left; margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.85rem; color: var(--gold); margin-bottom: 5px; font-weight: bold; }
        .auth-input { padding: 14px; width: 100%; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); box-sizing: border-box; font-size: 1rem; background: #fff; color: #000; font-weight: bold; }
        .btn-login { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--green), #00cc6a); color: #000; border: none; border-radius: 10px; font-weight: 900; font-size: 1.1rem; cursor: pointer; text-transform: uppercase; margin-top: 10px; box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3); }

        .header-banner { background: linear-gradient(145deg, #1e293b, #050a18); padding: 15px 0; border-bottom: 3px solid var(--gold); position: sticky; top: 0; z-index: 100; }
        .header-banner h1 { margin: 0; font-size: 1.8rem; color: var(--gold); letter-spacing: 3px; }
        
        .stats { display: flex; justify-content: space-around; background: rgba(255,255,255,0.05); padding: 10px; margin: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .stats b { display: block; font-size: 1.1rem; color: var(--gold); }
        
        .action-bar { display: flex; justify-content: center; gap: 6px; padding: 5px 10px; }
        .btn-main { flex: 1; padding: 12px 5px; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; }
        .btn-deposit { background: var(--green); color: #000; }
        .btn-withdraw { background: var(--orange); color: white; }
        .btn-how-to { background: #3b82f6; color: white; }
        
        .mini-refresh-btn { background: #475569; color: white; border: none; padding: 5px 10px; border-radius: 5px; font-size: 0.75rem; font-weight: bold; cursor: pointer; margin: 5px auto; display: block; }
        .mini-refresh-btn:active { background: var(--gold); color: black; }

        .timer-container { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 15px auto; width: 90%; max-width: 400px; background: rgba(255, 255, 255, 0.02); padding: 8px 15px; border-radius: 15px; }
        #timer { font-size: 2.5rem; font-weight: 900; color: var(--gold); }
        .buy-notice { font-size: 1.1rem; font-weight: 900; color: var(--green); background: rgba(0, 255, 136, 0.1); padding: 10px 15px; border-radius: 10px; border: 2px dashed var(--green); }

        .ball-section-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; margin: 15px auto; }
        #ball-circle { width: 75px; height: 75px; background: radial-gradient(circle, #fff, var(--gold)); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: 900; border: 4px solid #1e293b; }
        #ball-prep-countdown { font-size: 1.1rem; font-weight: 900; color: var(--orange); background: rgba(255, 136, 0, 0.15); padding: 10px 15px; border-radius: 10px; }

        .grid-500 { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; max-height: 160px; overflow-y: auto; background: #000; padding: 10px; margin: 10px; border-radius: 10px; }
        .t-box { background: #fff; color: #000; font-size: 0.75rem; padding: 8px 0; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .t-box.mine { background: var(--gold) !important; color: #000 !important; box-shadow: inset 0 0 0 2px #ffffff; }
        .t-box.sold { background: #333; color: #666; cursor: not-allowed; }

        .game-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 5px; }
        .board-container { border: 1px solid #333; background: rgba(0,0,0,0.8); border-radius: 10px; padding: 4px; display: flex; flex-direction: column; }
        .board-header { display: grid; grid-template-columns: repeat(5, 1fr); background: var(--gold); color: #000; font-weight: 900; font-size: 0.85rem; padding: 4px 0; border-radius: 5px; }
        .main-board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; flex: 1; }
        .board-column { display: flex; flex-direction: column; gap: 2px; }
        .ball-dot { font-size: 0.65rem; background: #111; padding: 3px 0; color: #444; border-radius: 2px; }
        .ball-dot.active { background: var(--gold); color: #000; font-weight: bold; }
        
        .bingo-card { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; background: #444; padding: 4px; max-width: 300px; margin: 0 auto; }
        .cell { background: #fff; color: #000; height: 30px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.8rem; }
        .cell.selected { background: var(--gold) !important; }
        .cell.free { background: var(--red) !important; color: white; font-size: 0.6rem; }
        
        #bingo-btn { width: 90%; padding: 12px; background: var(--red); color: white; font-size: 1.2rem; font-weight: 900; border-radius: 15px; border: 2px solid white; margin: 10px auto; display: block; cursor: pointer; }
        
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:2000; flex-direction:column; align-items:center; justify-content:center; padding: 20px; }
        .modal-content { background: #1e293b; padding: 20px; border-radius: 15px; width: 92%; max-width: 360px; }
        input { padding: 12px; margin: 10px 0; width: 100%; border-radius: 8px; border: none; box-sizing: border-box; font-size: 1rem; }

        .winner-modal { display: none; position: fixed; inset: 0; background: rgba(5,10,24,0.98); z-index: 3000; flex-direction: column; align-items: center; justify-content: center; }
        .winner-box { background: #ffffff; color: #1e293b; width: 92%; max-width: 360px; border-radius: 28px; padding: 25px 20px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); border: 4px solid var(--gold); text-align: center; }
        .winner-name-text { font-size: 1.8rem; font-weight: 900; color: #10b981; }
        .prize-pool-card { background: #f1f5f9; border-radius: 20px; padding: 10px; margin: 15px auto; }
        .prize-pool-card b { font-size: 1.8rem; color: #10b981; }
        .winner-card-section { background: #ffffff; border-radius: 24px; padding: 15px; margin-top: 15px; }
        .winner-card-info-row { display: flex; justify-content: space-between; font-weight: 800; margin-bottom: 10px; }
        .winner-grid-modern { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; background: #f8fafc; padding: 8px; border-radius: 16px; }
        .w-cell-modern { background: #ffffff; color: #a0aec0; height: 35px; display: flex; align-items: center; justify-content: center; font-weight: 800; border-radius: 10px; border: 1px solid #e2e8f0; }
        .w-cell-modern.drawn { background: #e2e8f0; color: #475569; }
        .w-cell-modern.hit-line { background: #ff3e3e !important; color: #ffffff !important; border-color: #ff3e3e; font-weight: 900; box-shadow: 0 0 10px #ff3e3e; transform: scale(1.05); }
        .w-cell-modern.free { background: var(--gold); color: #1e293b; }
        .next-round-bar { background: var(--gold); color: #000; font-weight: 900; padding: 6px; width: 92%; max-width: 360px; margin-top: 15px; border-radius: 20px; }
    </style>
</head>
<body>

    <div id="auth-ui">
        <div class="auth-card">
            <h2>ተመዝገብ</h2>
            <div class="input-group">
                <label>የተጫዋች ስም</label>
                <input type="text" id="reg-username" class="auth-input" placeholder="ስምዎን ያስገቡ...">
            </div>
            <div class="input-group">
                <label>የስልክ ቁጥር</label>
                <input type="tel" id="reg-phone" class="auth-input" placeholder="09...">
            </div>
            <button class="btn-login" onclick="registerUser()">🚀 ወደ ጨዋታው ግባ</button>
        </div>
    </div>

    <div id="main-app-content" style="display: none;">
        <div class="header-banner"><h1>BESH BINGO</h1></div>
        
        <div class="stats">
            <div>BALANCE<b id="balance">0 ETB</b></div>
            <div>PLAYERS<b id="p-count">0</b></div>
            <div>በሽ-ደራሽ<b id="prize">0 ETB</b></div>
        </div>

        <div id="lobby-ui">
            <div class="action-bar">
                <button class="btn-main btn-deposit" onclick="openM('dep-m')">📥 DEPOSIT</button>
                <button class="btn-main btn-how-to" onclick="openM('guide-m')">📖 GUIDE</button>
                <button class="btn-main btn-withdraw" onclick="openM('with-m')">📤 WITHDRAW</button>
            </div>
            
            <div class="timer-container">
                <div id="timer">45</div>
                <div class="buy-notice">🎟️ ካርቴላ (10 ETB)</div>
            </div>
            <button class="mini-refresh-btn" onclick="update()">🔄 አድስ</button>
            <div class="grid-500" id="ticket-area"></div>
        </div>

        <div id="game-ui" style="display:none;">
            <div class="ball-section-wrapper">
                <div class="ball-row">
                    <div id="ball-circle">--</div>
                    <div id="ball-prep-countdown" style="display:none;">ዝግጅት፦ 3</div>
                </div>
            </div>

            <div class="game-layout">
                <div class="board-container">
                    <div class="board-header"><div>B</div><div>I</div><div>N</div><div>G</div><div>O</div></div>
                    <div class="main-board" id="main-board"></div>
                    <button class="mini-refresh-btn" onclick="update()">🔄 አድስ</button>
                </div>
                <div>
                    <div id="card-area"></div>
                    <button id="bingo-btn" onclick="claim()">BINGO!</button>
                    <button class="mini-refresh-btn" onclick="update()">🔄 ካርቴላ አድስ</button>
                </div>
            </div>
        </div>
    </div>

    <div id="guide-m" class="modal"><div class="modal-content"><h2>📖 መመሪያ</h2><p>ካርቴላ ለመግዛት ቁጥሮቹን ይጫኑ። መስመር ሲሞላ ፈጥነው BINGO ይጫኑ!</p><button class="btn-main" style="background:var(--red); color:white; width:100%;" onclick="closeM('guide-m')">እሺ</button></div></div>
    <div id="with-m" class="modal"><div class="modal-content"><h2>WITHDRAW</h2><input type="number" id="wa" placeholder="Amount"><button class="btn-main btn-withdraw" style="width:100%" onclick="subW()">CONFIRM</button><button onclick="closeM('with-m')">CLOSE</button></div></div>
    <div id="dep-m" class="modal"><div class="modal-content"><h2>DEPOSIT</h2><p>Send to: <b>0945880474</b></p><input type="number" id="da" placeholder="Amount"><input type="text" id="di" placeholder="Transaction ID"><button class="btn-main btn-deposit" style="width:100%" onclick="subD()">SUBMIT</button><button onclick="closeM('dep-m')">CLOSE</button></div></div>

    <div id="result-ui" class="winner-modal">
        <div class="winner-box">
            <div style="font-size:3rem;">🏆</div>
            <div class="winner-name-text" id="w-player-name">---</div>
            <div class="prize-pool-card"><span>የሽልማት ልክ</span><br><b id="w-prize-pool">0 ETB</b></div>
            <div class="winner-card-section">
                <div class="winner-card-info-row">
                    <div style="color:#2563eb;" id="w-card-number">CARD #--</div>
                    <div style="color:#10b981;">WINNER CARD</div>
                </div>
                <div class="winner-grid-modern" id="w-grid-cells"></div>
            </div>
        </div>
        <div class="next-round-bar">ቀጣይ ዙር፦ <span id="w-next-timer">10s</span></div>
    </div>

    <script>
        let phone = localStorage.getItem('phone');
        let username = localStorage.getItem('username');
        let last_sync_time = Date.now();
        let clientBalance = 0;
        let isProcessingBuy = false;

        window.onload = function() {
            if (phone && username) { showGameUI(); }
            setInterval(checkAppSync, 3000);
            setInterval(update, 2000);
        }

        function checkAppSync() {
            if (Date.now() - last_sync_time > 8000) {
                update();
            }
            last_sync_time = Date.now();
        }

        function registerUser() {
            let inputName = document.getElementById('reg-username').value.trim();
            let inputPhone = document.getElementById('reg-phone').value.trim().replace(/[^0-9]/g, '');
            if (inputName.length < 2 || inputPhone.length < 9) return alert("እባክዎ መረጃውን በትክክል ያስገቡ!");
            
            fetch('/register_or_login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone: inputPhone, username: inputName })
            }).then(r => r.json()).then(data => {
                if(data.success) {
                    localStorage.setItem('phone', inputPhone);
                    localStorage.setItem('username', inputName);
                    phone = inputPhone; username = inputName;
                    showGameUI();
                }
            });
        }

        function showGameUI() {
            document.getElementById('auth-ui').style.display = 'none';
            document.getElementById('main-app-content').style.display = 'block';
            initTicketsOnce();
            update();
        }

        function openM(id) { document.getElementById(id).style.display='flex'; }
        function closeM(id) { document.getElementById(id).style.display='none'; }

        function initTicketsOnce() {
            const area = document.getElementById('ticket-area');
            if(area && area.children.length === 0) {
                for(let i=1; i<=500; i++) {
                    let div = document.createElement('div'); div.className='t-box'; div.innerText=i; div.id='t-'+i;
                    area.appendChild(div);
                }
            }
        }

        function update() {
            if (!phone) return;
            last_sync_time = Date.now();
            
            fetch(`/get_status?phone=${phone}`).then(r => r.json()).then(d => {
                clientBalance = d.balance;
                document.getElementById('balance').innerText = d.balance + " ETB";
                document.getElementById('prize').innerText = Math.floor(d.pot * 0.8) + " ETB";
                document.getElementById('p-count').innerText = d.active_players;
                document.getElementById('timer').innerText = d.timer;

                if (d.status === "lobby") {
                    document.getElementById('lobby-ui').style.display='block';
                    document.getElementById('game-ui').style.display='none';
                    document.getElementById('result-ui').style.display='none';
                    document.getElementById('main-board').innerHTML="";
                    document.getElementById('card-area').innerHTML="";
                    if(!isProcessingBuy) renderTickets(d.sold_tickets);
                } 
                else if (d.status === "playing") {
                    document.getElementById('lobby-ui').style.display='none';
                    document.getElementById('game-ui').style.display='block';
                    document.getElementById('result-ui').style.display='none';
                    
                    if(d.ball_timer > 0) {
                        document.getElementById('ball-prep-countdown').style.display='block';
                        document.getElementById('ball-prep-countdown').innerText = `⏳ ዝግጅት፦ ${d.ball_timer}`;
                    } else {
                        document.getElementById('ball-prep-countdown').style.display='none';
                    }
                    document.getElementById('ball-circle').innerText = d.current_ball;
                    renderMainBoard(d.drawn_balls);
                    
                    if (d.my_cards && d.my_cards.length > 0 && document.getElementById('card-area').children.length === 0) {
                        d.my_cards.forEach((card, idx) => renderCard(card, idx));
                    }
                } 
                else if (d.status === "result") {
                    document.getElementById('result-ui').style.display='flex';
                    document.getElementById('w-player-name').innerText = d.winner;
                    document.getElementById('w-prize-pool').innerText = Math.floor(d.pot * 0.8) + " ETB";
                    document.getElementById('w-card-number').innerText = `CARD #${d.winning_ticket_num}`;
                    document.getElementById('w-next-timer').innerText = d.timer + "s";
                    
                    const gridCells = document.getElementById('w-grid-cells');
                    gridCells.innerHTML = "";
                    if (d.winning_card) {
                        let winLineSet = new Set(d.winning_line || []);
                        d.winning_card.forEach((n, idx) => {
                            let cell = document.createElement('div');
                            cell.className = "w-cell-modern";
                            cell.innerText = n;
                            if (idx === 12 || n === "FREE") {
                                cell.className += " free";
                                cell.innerText = "★";
                            }
                            if (winLineSet.has(idx)) {
                                cell.className += " hit-line";
                            }
                            gridCells.appendChild(cell);
                        });
                    }
                }
            }).catch(()=>{});
        }

        function renderTickets(sold) {
            for(let i=1; i<=500; i++) {
                let box = document.getElementById('t-'+i); if(!box) continue;
                if(sold[i]) {
                    box.className = (sold[i] === phone) ? 't-box mine' : 't-box sold';
                    box.onclick = (sold[i] === phone) ? () => refund(i) : null;
                } else {
                    box.className = 't-box'; box.onclick = () => buy(i);
                }
            }
        }

        function buy(n) {
            if(isProcessingBuy) return;
            isProcessingBuy = true;
            fetch('/buy_specific_ticket', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body:JSON.stringify({phone: phone, ticket_num: n})
            }).then(() => { isProcessingBuy = false; update(); }).catch(() => isProcessingBuy = false);
        }

        function refund(n) {
            if(confirm("ይህንን ካርቴላ መሰረዝ ይፈልጋሉ?")) {
                fetch('/cancel_ticket', {
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({phone: phone, ticket_num: n})
                }).then(update);
            }
        }

        function renderMainBoard(drawn) {
            const board = document.getElementById('main-board');
            if(board.children.length === 0) {
                for(let col=0; col<5; col++) {
                    let colDiv = document.createElement('div'); colDiv.className = 'board-column';
                    let start = col * 15 + 1;
                    for(let i=start; i<=start+14; i++) {
                        let d = document.createElement('div'); d.className = 'ball-dot'; d.id = 'b-' + i; d.innerText = i;
                        colDiv.appendChild(d);
                    }
                    board.appendChild(colDiv);
                }
            }
            drawn.forEach(b => {
                let num = parseInt(b.replace(/[^0-9]/g, ''));
                let el = document.getElementById('b-'+num);
                if(el) el.className = 'ball-dot active';
            });
        }

        function renderCard(card, cardIdx) {
            const wrap = document.createElement('div');
            wrap.style.marginBottom = "15px";
            wrap.innerHTML = `<div style="display:grid;grid-template-columns:repeat(5,1fr);background:var(--orange);font-weight:900;padding:5px;font-size:0.8rem;border-radius:5px 5px 0 0;"><div>B</div><div>I</div><div>N</div><div>G</div><div>O</div></div>`;
            const grid = document.createElement('div'); grid.className='bingo-card';
            
            card.forEach((n, i) => {
                const cell = document.createElement('div');
                cell.className = "cell"; cell.innerText = n;
                if(i === 12) { cell.className += " free selected"; cell.innerText = "FREE"; }
                grid.appendChild(cell);
            });
            wrap.appendChild(grid);
            document.getElementById('card-area').appendChild(wrap);
        }

        function claim() {
            fetch('/claim_bingo', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body:JSON.stringify({phone: phone})
            }).then(r => r.json()).then(d => { if(!d.success) alert(d.msg); update(); });
        }

        function subD() {
            let amt = document.getElementById('da').value;
            let tid = document.getElementById('di').value;
            fetch('/request_deposit', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body:JSON.stringify({phone: phone, amount: amt, transaction_id: tid})
            }).then(() => { closeM('dep-m'); alert("ተልኳል!"); });
        }

        function subW() {
            let amt = document.getElementById('wa').value;
            fetch('/request_withdrawal', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body:JSON.stringify({phone: phone, amount: amt})
            }).then(r => r.json()).then(d => { alert(d.msg); closeM('with-m'); update(); });
        }
    </script>
</body>
</html>
