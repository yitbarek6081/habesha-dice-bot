<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BESH BINGO</title>
    <style>
        :root { --gold: #ffcc00; --bg: #050a18; --red: #ff3e3e; --green: #00ff88; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; margin: 0; overflow-x: hidden; }
        .stats { display: flex; justify-content: space-around; background: #1e293b; padding: 10px; margin: 5px; border-radius: 8px; border-bottom: 2px solid var(--gold); }
        .stats b { color: var(--gold); display: block; }
        .grid-500 { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; max-height: 200px; overflow-y: auto; background: #000; padding: 10px; margin: 10px; border-radius: 8px; }
        .t-box { background: white; color: black; font-size: 0.7rem; padding: 8px 0; border-radius: 4px; font-weight: bold; }
        .t-box.mine { background: var(--gold); border: 2px solid white; }
        .t-box.sold { background: #333; color: #666; }
        .bingo-card { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; background: #444; padding: 5px; border-radius: 0 0 8px 8px; }
        .cell { background: white; color: black; height: 45px; display: flex; align-items: center; justify-content: center; font-weight: 900; }
        .cell.selected { background: var(--gold); }
        .cell.free { background: var(--red); color: white; font-size: 0.6rem; }
        #ball-circle { width: 80px; height: 80px; background: radial-gradient(circle, #fff, var(--gold)); color: black; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 900; margin: 20px auto; border: 4px solid #1e293b; }
        .btn-main { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 30%; }
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:1000; flex-direction:column; align-items:center; justify-content:center; }
        input { padding: 12px; margin: 10px 0; width: 80%; border-radius: 5px; border: none; }
    </style>
</head>
<body>
    <div class="stats">
        <div>BALANCE<b id="balance">0 ETB</b></div>
        <div>PLAYERS<b id="p-count">0</b></div>
        <div>PRIZE<b id="prize">0 ETB</b></div>
    </div>

    <div id="lobby-ui">
        <h2 id="timer" style="font-size: 3rem; color: var(--gold);">30</h2>
        <div style="margin-bottom: 10px;">
            <button class="btn-main" style="background:var(--green);" onclick="openM('dep-m')">DEPOSIT</button>
            <button class="btn-main" style="background:#ff8800; color:white;" onclick="openM('with-m')">WITHDRAW</button>
        </div>
        <div class="grid-500" id="ticket-area"></div>
    </div>

    <div id="game-ui" style="display:none;">
        <div id="ball-circle">--</div>
        <div id="card-area" style="padding: 10px; max-width: 350px; margin: auto;"></div>
        <button id="bingo-btn" onclick="claim()" style="width:90%; padding:15px; background:var(--red); color:white; font-size:1.5rem; font-weight:900; border-radius:10px; margin-top:10px;">BINGO!</button>
    </div>

    <div id="dep-m" class="modal">
        <div style="background:#1e293b; padding:20px; border-radius:15px; width:85%;">
            <h3>DEPOSIT</h3>
            <p>Telebirr: <b>0945880474</b></p>
            <input type="number" id="da" placeholder="Amount">
            <input type="text" id="di" placeholder="Transaction ID">
            <button class="btn-main" style="width:100%; background:var(--green);" onclick="subD()">SUBMIT</button>
            <button onclick="closeM('dep-m')" style="background:none; color:white; border:none; margin-top:10px;">CLOSE</button>
        </div>
    </div>

    <script>
        let phone = localStorage.getItem('phone') || prompt("Phone Number:");
        let username = localStorage.getItem('username') || prompt("Username:");
        localStorage.setItem('phone', phone); localStorage.setItem('username', username);

        function openM(id) { document.getElementById(id).style.display='flex'; }
        function closeM(id) { document.getElementById(id).style.display='none'; }

        function update() {
            fetch(`/get_status?phone=${phone}`).then(r=>r.json()).then(d=>{
                document.getElementById('balance').innerText = d.balance + " ETB";
                document.getElementById('prize').innerText = Math.floor(d.pot * 0.8) + " ETB";
                document.getElementById('p-count').innerText = d.active_players;
                document.getElementById('timer').innerText = d.timer;

                if(d.status === "lobby") {
                    document.getElementById('lobby-ui').style.display='block';
                    document.getElementById('game-ui').style.display='none';
                    renderTickets(d.sold_tickets);
                } else {
                    document.getElementById('lobby-ui').style.display='none';
                    document.getElementById('game-ui').style.display='block';
                    document.getElementById('ball-circle').innerText = d.current_ball;
                    if(d.my_cards.length > 0 && document.getElementById('card-area').innerHTML === "") {
                        d.my_cards.forEach(c => renderCard(c));
                    }
                }
                if(d.status === "result") alert("Winner: " + d.winner);
            });
        }

        function renderTickets(sold) {
            const area = document.getElementById('ticket-area');
            if(area.children.length === 0) {
                for(let i=1; i<=500; i++) {
                    let div=document.createElement('div'); div.className='t-box';
                    div.innerText=i; div.id='t-'+i; div.onclick=()=>buy(i);
                    area.appendChild(div);
                }
            }
            for(let i=1; i<=500; i++) {
                let box = document.getElementById('t-'+i);
                if(sold[i]) box.className = (sold[i] === phone) ? 't-box mine' : 't-box sold';
                else box.className = 't-box';
            }
        }

        function renderCard(card) {
            const grid = document.createElement('div'); grid.className='bingo-card';
            card.forEach((n, i) => {
                const cell = document.createElement('div');
                cell.className = (i === 12) ? "cell free" : "cell";
                cell.innerText = (i === 12) ? "FREE" : n;
                cell.onclick = () => cell.classList.toggle('selected');
                grid.appendChild(cell);
            });
            document.getElementById('card-area').appendChild(grid);
        }

        function buy(n) { fetch('/buy_specific_ticket', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, ticket_num:n, username})}).then(update); }
        function subD() {
            let amt=document.getElementById('da').value, tid=document.getElementById('di').value;
            fetch('/request_deposit', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, amount:amt, transaction_id:tid})});
            closeM('dep-m'); alert("Request Sent!");
        }
        function claim() { fetch('/claim_bingo', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone})}).then(r=>r.json()).then(d=>{ if(!d.success) alert(d.msg); }); }

        setInterval(update, 2000);
    </script>
</body>
</html>
