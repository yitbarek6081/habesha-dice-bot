    <style>
        :root {
            --gold: #f1c40f;
            --bg: #0f172a;
            --card: #1e293b;
            --neon-green: #2ecc71;
            --neon-red: #e74c3c;
            --text-slate: #94a3b8;
        }

        body { 
            background: radial-gradient(circle at top, #1e293b, #0f172a); 
            color: #f8fafc; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 0;
            overflow-x: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Header Section */
        .header { 
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px; 
            border-bottom: 2px solid var(--gold); 
            display: flex; 
            justify-content: space-around; 
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .stat-box { display: flex; flex-direction: column; }
        .label { font-size: 0.65rem; color: var(--text-slate); text-transform: uppercase; letter-spacing: 1px; }
        .value { font-size: 1.1rem; font-weight: 800; color: var(--gold); }

        /* Big Number Zone */
        .draw-zone {
            margin: 20px auto;
            width: 120px;
            height: 120px;
            background: var(--card);
            border: 4px solid var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(241, 196, 15, 0.3);
            position: relative;
        }

        .big-num { 
            font-size: 4rem; 
            font-weight: 900; 
            color: var(--gold); 
            text-shadow: 0 0 15px rgba(241, 196, 15, 0.5);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        @keyframes popIn { 
            0% { transform: scale(0.3); opacity: 0; } 
            100% { transform: scale(1); opacity: 1; } 
        }

        /* Action Buttons */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 15px;
        }

        .btn-action {
            border: none;
            padding: 12px 22px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            color: white;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }

        .btn-action:active { transform: translateY(2px); box-shadow: none; }

        /* Board 1-90 */
        .board { 
            display: grid; 
            grid-template-columns: repeat(10, 1fr); 
            gap: 4px; 
            padding: 12px;
            background: rgba(0,0,0,0.2);
            margin: 10px;
            border-radius: 15px;
        }

        .b-cell { 
            font-size: 0.7rem; 
            padding: 8px 0; 
            background: #334155; 
            border-radius: 5px; 
            color: #64748b;
            font-weight: bold;
            transition: 0.3s;
        }

        .b-cell.drawn { 
            background: linear-gradient(135deg, #ef4444, #991b1b); 
            color: white; 
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.5);
            transform: scale(1.05);
        }

        /* Ticket Design */
        .ticket-card {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            margin: 20px 12px;
            padding: 20px;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .t-row { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 10px; 
            margin-bottom: 10px; 
        }

        .t-cell { 
            background: #f1f5f9; 
            color: #1e293b; 
            height: 60px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 900; 
            font-size: 1.6rem; 
            border-radius: 15px; 
            cursor: pointer;
            box-shadow: 0 5px 0 #cbd5e1;
            transition: 0.1s;
        }

        .t-cell.marked { 
            background: linear-gradient(135deg, var(--neon-green), #16a34a) !important; 
            color: white !important; 
            transform: translateY(4px);
            box-shadow: 0 1px 0 #14532d;
        }

        /* Large Join/Bingo Button */
        .btn-giant { 
            background: linear-gradient(to bottom, var(--gold), #d4ac0d); 
            color: #000; 
            width: 90%; 
            padding: 20px; 
            border-radius: 20px; 
            font-size: 1.4rem; 
            font-weight: 900; 
            border: none; 
            margin: 20px 0;
            box-shadow: 0 6px 0 #9a7d0a;
            cursor: pointer;
        }

        .btn-giant:active { transform: translateY(4px); box-shadow: 0 2px 0 #9a7d0a; }

        /* Modal */
        .modal-overlay { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.85); 
            z-index: 1000; 
            backdrop-filter: blur(5px);
        }
