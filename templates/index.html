<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BESH BINGO - SECURE PREMIUM</title>
    <style>
        :root { --gold: #ffcc00; --bg: #050a18; --red: #ff3e3e; --green: #00ff88; --orange: #ff8800; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; text-align: center; margin: 0; padding: 0; overflow-x: hidden; width: 100vw; }
        
        #auth-ui {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            background: radial-gradient(circle at center, #1e293b, #050a18);
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid var(--gold);
            border-radius: 20px;
            padding: 30px 20px;
            width: 100%;
            max-width: 360px;
            box-sizing: border-box;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .auth-card h2 { color: var(--gold); margin-top: 0; font-size: 1.6rem; letter-spacing: 1px; }
        .auth-card p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 20px; }
        .input-group { width: 100%; text-align: left; margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.85rem; color: var(--gold); margin-bottom: 5px; font-weight: bold; }
        .auth-input { padding: 14px; width: 100%; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); box-sizing: border-box; font-size: 1rem; background: #fff; color: #000; font-weight: bold; }
        .auth-input:focus { border-color: var(--gold); outline: none; }
        .btn-login { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--green), #00cc6a); color: #000; border: none; border-radius: 10px; font-weight: 900; font-size: 1.1rem; cursor: pointer; text-transform: uppercase; margin-top: 10px; box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3); transition: 0.2s; }
        .btn-login:disabled { background: #555; cursor: not-allowed; opacity: 0.6; box-shadow: none; }
        .btn-login:active { transform: scale(0.98); }

        .header-banner { background: linear-gradient(145deg, #1e293b, #050a18); padding: 15px 0; border-bottom: 3px solid var(--gold); position: sticky; top: 0; z-index: 100; }
        .header-banner h1 { margin: 0; font-size: 1.8rem; color: var(--gold); letter-spacing: 3px; }
        
        .stats { display: flex; justify-content: space-around; background: rgba(255,255,255,0.05); padding: 10px; margin: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .stats b { display: block; font-size: 1.1rem; color: var(--gold); }
        
        .action-bar { display: flex; justify-content: center; gap: 6px; padding: 5px 10px; }
        .btn-main { flex: 1; padding: 12px 5px; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; transition: 0.3s; }
        .btn-deposit { background: var(--green); color: #000; }
        .btn-withdraw { background: var(--orange); color: white; }
        .btn-how-to { background: #3b82f6; color: white; border: 1px solid #60a5fa; }

        .timer-container { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 15px auto; width: 90%; max-width: 400px; background: rgba(255, 255, 255, 0.02); padding: 8px 15px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.05); }
        #timer { font-size: 2.5rem; font-weight: 900; color: var(--gold); text-align: center; line-height: 1; }
        .buy-notice { font-size: 1.1rem; font-weight: 900; color: var(--green); background: rgba(0, 255, 136, 0.1); padding: 10px 15px; border-radius: 10px; border: 2px dashed var(--green); text-align: center; min-width: 160px; box-sizing: border-box; letter-spacing: 0.5px; }

        /* 🎟️ የተስተካከለ የካርቴላ መምረጫ ቦታ (Ticket Area Layout Fix) */
        .grid-500 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; max-height: 380px; overflow-y: auto; background: #000; padding: 12px; margin: 15px auto; border-radius: 10px; box-sizing: border-box; width: 92%; max-width: 400px; border: 1px solid #222; }
        .t-box { background: #fff; color: #000; font-size: 0.9rem; padding: 12px 0; font-weight: bold; border-radius: 6px; cursor: pointer; box-sizing: border-box; border: 1px solid transparent; text-align: center; }
        .t-box.mine { background: var(--gold) !important; color: #000 !important; box-shadow: inset 0 0 0 2px #ffffff; font-weight: 900; }
        .t-box.sold { background: #222 !important; color: #555 !important; cursor: not-allowed; border: 1px solid #333; }

        .game-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 5px; box-sizing: border-box; }
        .board-container { border: 1px solid #333; background: rgba(0,0,0,0.8); border-radius: 10px; padding: 4px; display: flex; flex-direction: column; }
        .board-header { display: grid; grid-template-columns: repeat(5, 1fr); background: var(--gold); color: #000; font-weight: 900; font-size: 0.85rem; padding: 4px 0; border-radius: 5px; margin-bottom: 4px; }
        .main-board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; flex: 1; }
        .board-column { display: flex; flex-direction: column; gap: 2px; }
        .ball-dot { font-size: 0.65rem; background: #111; padding: 3px 0; color: #444; border-radius: 2px; text-align: center; font-weight: bold; }
        .ball-dot.active { background: var(--gold); color: #000; font-weight: bold; box-shadow: 0 0 3px var(--gold); }
        
        .bingo-card { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; background: #444; padding: 4px; border-radius: 0 0 5px 5px; max-width: 300px; margin: 0 auto; }
        .cell { background: #fff; color: #000; height: 30px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.8rem; cursor: pointer; }
        .cell.selected { background: var(--gold) !important; }
        .cell.free { background: var(--red) !important; color: white; font-size: 0.6rem; }
        
        #bingo-btn { width: 90%; padding: 12px; background: var(--red); color: white; font-size: 1.2rem; font-weight: 900; border-radius: 15px; border: 2px solid white; margin: 10px auto; display: block; cursor: pointer; transition: 0.2s; }
        #bingo-btn:disabled { background: #555 !important; border-color: #888 !important; color: #aaa !important; cursor: not-allowed; }
        
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:2000; flex-direction:column; align-items:center; justify-content:center; padding: 20px; }
        .modal-content { background: #1e293b; padding: 20px; border-radius: 15px; width: 92%; max-width: 360px; text-align: left; max-height: 85vh; overflow-y: auto; }
        input { padding: 12px; margin: 10px 0; width: 100%; border-radius: 8px; border: none; box-sizing: border-box; font-size: 1rem; color: #000; }

        .winner-modal { display: none; position: fixed; inset: 0; background: linear-gradient(180deg, rgba(5,10,24,0.98), rgba(30,41,59,0.98)); z-index: 3000; flex-direction: column; align-items: center; justify-content: center; padding: 15px; }
        .winner-box { background: #ffffff; color: #1e293b; width: 92%; max-width: 360px; border-radius: 28px; padding: 25px 20px; box-sizing: border-box; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 4px solid var(--gold); text-align: center; }
        .trophy-icon { font-size: 3rem; margin-bottom: 5px; animation: bounce 1s infinite alternate; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }
        .winner-name-text { font-size: 1.8rem; font-weight: 900; margin: 5px 0; color: #10b981; font-style: italic; }
        .winner-name-text span { color: #1e293b; font-style: normal; }
        .prize-pool-card { background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 20px; padding: 10px 15px; margin: 15px auto; width: 85%; }
        .prize-pool-card span { display: block; font-weight: 800; color: #64748b; letter-spacing: 1px; text-transform: uppercase; font-size: 0.9rem; border-bottom: 1px dashed rgba(255,255,255,0.2); padding-bottom: 2px; }
        .prize-pool-card b { font-size: 1.8rem; font-weight: 900; color: #10b981; }
    </style>
</head>
<body>

    <div id="auth-ui">
        <div class="auth-card">
            <h2>ተመዝገብ</h2>
            <p>ወደ ጨዋታው ለመግባት መረጃዎን ያስገቡ</p>
            <div class="input-group">
                <label>የተጫዋች ስም</label>
                <input type="text" id="reg-username" class="auth-input" placeholder="ስምዎን ያስገቡ...">
            </div>
            <div class="input-group">
                <label>የስልክ ቁጥር</label>
                <input type="tel" id="reg-phone" class="auth-input" placeholder="09... ወይም 07...">
            </div>
            <button id="auth-submit-btn" class="btn-login" onclick="registerUser()">🚀 ወደ ጨዋታው ግባ</button>
        </div>
    </div>

    <div id="main-app-content" style="display: none;">
        <audio id="win-horn" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" preload="auto"></audio>
        <div class="header-banner"><h1>BESH BINGO</h1></div>
        
        <div class="stats">
            <div>BALANCE<b id="balance">0 ETB</b></div>
            <div>PLAYERS<b id="p-count">0</b></div>
            <div>በሽ-ደራሽ<b id="prize">0 ETB</b></div>
        </div>

        <div id="lobby-ui">
            <div class="action-bar">
                <button class="btn-main btn-deposit" onclick="openM('dep-m')">📥 DEPOSIT</button>
                <button class="btn-main btn-how-to" onclick="openM('guide-m')">📖 HOW TO PLAY</button>
                <button class="btn-main btn-withdraw" onclick="openM('with-m')">📤 WITHDRAW</button>
            </div>
            
            <div class="timer-container">
                <div id="timer">30</div>
                <div class="buy-notice">🎟️ ካርቴላ ይግዙ (10 ETB)</div>
            </div>

            <div class="grid-500" id="ticket-area"></div>
        </div>

        <div id="game-ui" style="display:none;">
            <div class="ball-section-wrapper">
                <div id="start-alert-msg" class="game-start-alert" style="display:none;">🔴 ጨዋታው ሊጀምር ነው...</div>
                <div class="ball-row">
                    <div id="ball-circle">--</div>
                    <div id="ball-prep-countdown" style="display:none;">ዝግጅት፦ 3</div>
                </div>
            </div>

            <div class="game-layout">
                <div class="board-container">
                    <div class="board-header"><div>B</div><div>I</div><div>N</div><div>G</div><div>O</div></div>
                    <div class="main-board" id="main-board"></div>
                </div>
                <div>
                    <div id="card-area"></div>
                    <button id="bingo-btn" onclick="claim()">BINGO!</button>
                </div>
            </div>
        </div>
    </div>

    <div id="guide-m" class="modal"><div class="modal-content"><h2>📖 መመሪያ</h2><p>1. ካርቴላ ለመግዛት ነጭ ቁጥሮች ይጫኑ።<br>2. ቁጥሮች ሲሞሉ ፈጥነው BINGO ይጫኑ!</p><button class="btn-main" style="width:100%; background:var(--red);" onclick="closeM('guide-m')">እሺ</button></div></div>
    <div id="with-m" class="modal"><div class="modal-content" style="text-align:center;"><h2>WITHDRAW</h2><input type="number" id="wa" min="20" placeholder="Amount (ETB)"><button class="btn-main btn-withdraw" style="width:100%" onclick="subW()">CONFIRM</button><button onclick="closeM('with-m')" style="background:none; border:none; margin-top:15px; color:#fff;">CLOSE</button></div></div>
    <div id="dep-m" class="modal"><div class="modal-content" style="text-align:center;"><h2>DEPOSIT</h2><input type="number" id="da" min="10" placeholder="Amount (ETB)"><input type="text" id="di" placeholder="Transaction ID"><button class="btn-main btn-deposit" style="width:100%" onclick="subD()">SUBMIT</button><button onclick="closeM('dep-m')" style="background:none; border:none; margin-top:15px; color:#fff;">CLOSE</button></div></div>

    <script>
        let phone = localStorage.getItem('phone');
        let username = localStorage.getItem('username');
        let currentCardData = null, announced = false, lastBall = "--", clientBalance = 0;
        let isProcessingBuy = false;
        let ws = null;

        window.onload = function() {
            initTicketsOnce(); // መጀመሪያውኑ ሎቢው ባዶ እንዳይሆን ቁጥሮችን ይፍጠር
            if (phone && username) {
                showGameUI();
            } else {
                document.getElementById('auth-ui').style.display = 'flex';
                document.getElementById('main-app-content').style.display = 'none';
            }
        }

        function registerUser() {
            let inputName = document.getElementById('reg-username').value.trim();
            let inputPhone = document.getElementById('reg-phone').value.trim();
            if (inputName.length < 2) return alert("እባክዎ ስም ያስገቡ!");
            const cleanPhone = inputPhone.replace(/[^0-9]/g, '');
            if (cleanPhone.length < 9) return alert("ትክክለኛ ስልክ ያስገቡ!");

            localStorage.setItem('phone', cleanPhone);
            localStorage.setItem('username', inputName);
            phone = cleanPhone;
            username = inputName;
            showGameUI();
        }

        function showGameUI() {
            document.getElementById('auth-ui').style.display = 'none';
            document.getElementById('main-app-content').style.display = 'block';
            initTicketsOnce();
            connectWebSocket();
        }

        function connectWebSocket() {
            if (!phone) return;
            if (ws) { try { ws.close(); } catch(e) {} }
            
            const protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
            // 💡 ዩአርኤል ፓዝ ማስተካከያ (Connection Fix)
            const wsUrl = `${protocol}${window.location.host}/ws`;
            
            ws = new WebSocket(wsUrl);

            ws.onopen = function() {
                // ሲገናኝ ስልኩን በሜሴጅ መልክ ይላክ (ይህ ይበልጥ አስተማማኝ ነው)
                ws.send(JSON.stringify({ type: "register", phone: phone }));
            };

            ws.onmessage = function(event) {
                try {
                    let data = JSON.parse(event.data);
                    handleStatusUpdate(data);
                } catch (e) {
                    console.error("Data error:", e);
                }
            };

            ws.onclose = function() { setTimeout(connectWebSocket, 1500); };
            ws.onerror = function() { ws.close(); };
        }

        function handleStatusUpdate(d) {
            if (!d) return;
            
            // 💰 ባላንስ እና ሴኩሪቲ ማስተካከያ
            clientBalance = parseFloat(d.balance) || 0;
            document.getElementById('balance').innerText = clientBalance.toFixed(0) + " ETB";
            document.getElementById('p-count').innerText = parseInt(d.active_players) || 0;
            
            let potVal = Math.floor((parseFloat(d.pot) || 0) * 0.8);
            document.getElementById('prize').innerText = potVal + " ETB";
            
            // ⏱️ የሰዓት ቆጣሪ ማስተካከያ
            if(d.timer !== undefined) {
                document.getElementById('timer').innerText = d.timer;
            }
            
            if(d.status === "lobby" || !d.status) {
                document.getElementById('lobby-ui').style.display='block'; 
                document.getElementById('game-ui').style.display='none';
                initTicketsOnce(); 
                if (!isProcessingBuy && d.sold_tickets) { renderTickets(d.sold_tickets); }
            } else if(d.status === "playing") {
                document.getElementById('lobby-ui').style.display='none'; 
                document.getElementById('game-ui').style.display='block';
                document.getElementById('ball-circle').innerText = d.current_ball || "--";
                renderMainBoard(d.drawn_balls || []);
                if(d.my_cards && d.my_cards.length > 0 && !currentCardData) { 
                    currentCardData = d.my_cards; 
                    document.getElementById('card-area').innerHTML = "";
                    d.my_cards.forEach((c, i) => { if(Array.isArray(c)) renderCard(c, i); }); 
                }
            }
        }

        function initTicketsOnce() {
            const area = document.getElementById('ticket-area');
            if(area && area.children.length === 0) { 
                const fragment = document.createDocumentFragment();
                for(let i=1; i<=500; i++) { 
                    let div=document.createElement('div'); 
                    div.className='t-box'; 
                    div.innerText=i; 
                    div.id='t-'+i; 
                    div.onclick = () => buy(i);
                    fragment.appendChild(div); 
                } 
                area.appendChild(fragment);
            }
        }

        function renderTickets(sold) {
            const cleanPhone = String(phone);
            const dataObj = sold || {};
            for(let i=1; i<=500; i++) {
                let box = document.getElementById('t-'+i); 
                if(!box) continue;
                if(dataObj[i]) { 
                    if(String(dataObj[i]) === cleanPhone) {
                        box.className = 't-box mine';
                    } else {
                        box.className = 't-box sold';
                    }
                } else { 
                    box.className='t-box'; 
                }
            }
        }

        function buy(n) { 
            if (isProcessingBuy) return;
            if (document.querySelectorAll('.t-box.mine').length >= 2) return alert("ከ 2 ካርተላ በላይ መግዛት አይቻልም!");
            
            isProcessingBuy = true;
            fetch('/buy_specific_ticket', {
                method:'POST', headers:{'Content-Type':'application/json'}, 
                body:JSON.stringify({phone: phone, ticket_num: n, username: username})
            }).then(() => { isProcessingBuy = false; }).catch(() => { isProcessingBuy = false; }); 
        }

        function renderMainBoard(drawn) {
            const board = document.getElementById('main-board');
            if(board.children.length === 0) { 
                for(let col=0; col<5; col++) {
                    let colDiv = document.createElement('div'); colDiv.className = 'board-column';
                    let start = col * 15 + 1;
                    for(let i=start; i<=start+14; i++) {
                        let d = document.createElement('div'); d.className = 'ball-dot'; d.id = 'b-' + i; d.innerText = i;
                        colDiv.appendChild(d);
                    }
                    board.appendChild(colDiv);
                }
            }
            drawn.forEach(b => { let num = parseInt(String(b).replace(/[^0-9]/g, '')); if(num) { let el = document.getElementById('b-'+num); if(el) el.className = 'ball-dot active'; } });
        }

        function renderCard(card, cardIdx) {
            const wrap = document.createElement('div'); wrap.style.marginBottom="15px";
            wrap.innerHTML = `<div style="display:grid;grid-template-columns:repeat(5,1fr);background:var(--orange);font-weight:900;padding:5px;font-size:0.8rem;border-radius:5px 5px 0 0;"><div>B</div><div>I</div><div>N</div><div>G</div><div>O</div></div>`;
            const grid = document.createElement('div'); grid.className='bingo-card';
            card.forEach((n, i) => {
                const cell=document.createElement('div'); 
                if(i === 12 || parseInt(n) === 0) { cell.className="cell free"; cell.innerText="FREE"; } 
                else { cell.className = "cell"; cell.innerText=n; cell.onclick = () => cell.classList.toggle('selected'); }
                grid.appendChild(cell);
            });
            wrap.appendChild(grid); document.getElementById('card-area').appendChild(wrap);
        }

        function claim() { 
            fetch('/claim_bingo', { method:'POST', headers:{ 'Content-Type':'application/json' }, body:JSON.stringify({phone: phone}) }); 
        }
        function openM(id) { document.getElementById(id).style.display='flex'; }
        function closeM(id) { document.getElementById(id).style.display='none'; }
    </script>
</body>
</html>
