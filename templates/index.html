<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BESH BINGO</title>
    <style>
        :root { --gold: #f1c40f; --bg: #0f172a; --blue: #1e293b; --red: #e74c3c; --green: #2ecc71; --orange: #e67e22; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .stats { display: flex; justify-content: space-around; background: var(--blue); padding: 10px; border: 1px solid var(--gold); border-radius: 10px; margin-bottom: 10px; }
        .grid-500 { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; max-height: 180px; overflow-y: auto; background: #000; padding: 10px; border-radius: 8px; }
        .t-box { background: white; color: black; font-size: 0.7rem; padding: 8px 0; font-weight: bold; border-radius: 3px; cursor: pointer; }
        .t-box.sold { background: #475569; color: #94a3b8; }
        .t-box.mine { background: var(--gold); border: 2px solid white; }
        .bingo-card { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; background: #cbd5e1; padding: 4px; border-radius: 0 0 5px 5px; margin-bottom: 10px; }
        .cell { background: white; color: black; height: 40px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .cell.selected { background: var(--gold); border: 2px solid #b45309; }
        .main-board { border: 1px solid var(--gold); height: 350px; overflow-y: auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; padding: 5px; background: #020617; }
        .ball-dot { font-size: 0.7rem; background: #1e293b; padding: 4px; color: #64748b; border: 1px solid #334155; }
        .ball-dot.active { background: var(--gold); color: black; font-weight: bold; }
        .deposit-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; flex-direction:column; align-items:center; justify-content:center; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>
    <h2 style="color:var(--gold);">BESH BINGO</h2>
    <div class="stats">
        <div>ሂሳብ<br><span id="balance" style="color:var(--green);">0 ETB</span></div>
        <div>ተጫዋች<br><span id="p-count" style="color:cyan;">0</span></div>
        <div>ሽልማት<br><span id="prize" style="color:var(--gold);">0 ETB</span></div>
    </div>

    <div id="lobby-ui">
        <div style="font-size: 2.5rem; font-weight: 900; color: var(--gold);" id="timer">30</div>
        <div class="grid-500" id="ticket-area"></div>
        <button class="btn" style="background:var(--green); color:white; width:90%;" onclick="openDeposit()">ገንዘብ አስገባ (Deposit)</button>
    </div>

    <div id="game-ui" style="display:none;">
        <div id="ball-circle" style="font-size:2rem; margin:10px; color:var(--gold);">--</div>
        <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 8px;">
            <div class="main-board" id="main-board"></div>
            <div id="card-area"></div>
        </div>
        <button onclick="claim()" style="width:100%; padding:15px; background:var(--red); color:white; font-size:1.5rem; font-weight:900; border-radius:10px; margin-top:10px;">BINGO</button>
    </div>

    <div id="deposit-modal" class="deposit-modal">
        <h3>ገንዘብ ለማስገባት</h3>
        <p>በዚህ ቁጥር ይላኩ: <b id="admin-num">0945880474</b></p>
        <button class="btn" style="background:var(--gold); color:black;" onclick="copyNum()">ቁጥሩን ኮፒ አድርግ</button>
        <input type="number" id="dep-amt" placeholder="የላኩት መጠን" style="padding:10px; margin:5px; width:80%;">
        <input type="text" id="dep-id" placeholder="Transaction ID" style="padding:10px; margin:5px; width:80%;">
        <button class="btn" style="background:var(--green); color:white;" onclick="submitDep()">አረጋግጥ (Submit)</button>
        <button class="btn" style="background:var(--red); color:white;" onclick="closeDeposit()">ዝጋ</button>
    </div>

    <div id="result-ui" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; flex-direction:column; align-items:center; justify-content:center;">
        <h1 style="color:var(--gold); font-size:3.5rem;">BINGO!</h1>
        <div id="winner-info" style="font-size:1.8rem; color:white;"></div>
    </div>

    <script>
        let phone = localStorage.getItem('phone') || prompt("ስልክ:");
        let username = localStorage.getItem('username') || prompt("ስም:");
        localStorage.setItem('phone', phone); localStorage.setItem('username', username);

        function openDeposit() { document.getElementById('deposit-modal').style.display='flex'; }
        function closeDeposit() { document.getElementById('deposit-modal').style.display='none'; }
        function copyNum() { navigator.clipboard.writeText("0945880474"); alert("ቁጥሩ ኮፒ ተደርጓል!"); }
        
        function submitDep() {
            let amt = document.getElementById('dep-amt').value;
            let tid = document.getElementById('dep-id').value;
            if(amt && tid) {
                fetch('/request_deposit', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, amount:amt, transaction_id:tid})});
                alert("ጥያቄው ተልኳል!"); closeDeposit();
            }
        }

        function refund(n) {
            if(confirm(n + " ቁጥርን መመለስ ይፈልጋሉ?")) {
                fetch('/cancel_ticket', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, ticket_num:n})}).then(r=>r.json()).then(d=>{ if(d.success) alert("ተመልሷል!"); });
            }
        }

        function update() {
            fetch(`/get_status?phone=${phone}`).then(r=>r.json()).then(d=>{
                document.getElementById('balance').innerText = d.balance.toFixed(2) + " ETB";
                document.getElementById('p-count').innerText = d.active_players;
                document.getElementById('prize').innerText = Math.floor(d.pot * 0.8) + " ETB";
                document.getElementById('timer').innerText = d.timer;

                if(d.status === "lobby") {
                    document.getElementById('lobby-ui').style.display = 'block';
                    document.getElementById('game-ui').style.display = 'none';
                    document.getElementById('result-ui').style.display = 'none';
                    document.getElementById('main-board').innerHTML = ""; 
                    document.getElementById('card-area').innerHTML = "";
                    renderTickets(d.sold_tickets);
                } else if(d.status === "playing") {
                    document.getElementById('lobby-ui').style.display = 'none';
                    document.getElementById('game-ui').style.display = 'block';
                    document.getElementById('ball-circle').innerText = d.current_ball;
                    renderMainBoard(d.drawn_balls);
                    if(document.getElementById('card-area').innerHTML === "") d.my_cards.forEach(renderCard);
                } else if(d.status === "result") {
                    document.getElementById('result-ui').style.display = 'flex';
                    document.getElementById('winner-info').innerText = d.winner + " አሸንፏል!";
                }
            });
        }

        function renderTickets(sold) {
            const area = document.getElementById('ticket-area');
            if(area.children.length === 0) for(let i=1; i<=500; i++) { let div = document.createElement('div'); div.className='t-box'; div.innerText=i; area.appendChild(div); }
            for(let i=1; i<=500; i++) {
                let box = area.children[i-1];
                if(sold[i]) {
                    box.className = (sold[i] === phone) ? 't-box mine' : 't-box sold';
                    box.onclick = (sold[i] === phone) ? () => refund(i) : null;
                } else { box.className = 't-box'; box.onclick = () => buy(i); }
            }
        }

        function buy(n) { fetch('/buy_specific_ticket', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, ticket_num:n, username})}); }

        function renderMainBoard(drawn) {
            const board = document.getElementById('main-board');
            if(board.children.length === 0) for(let i=1; i<=75; i++) { let d = document.createElement('div'); d.className='ball-dot'; d.id='b-'+i; d.innerText=i; board.appendChild(d); }
            drawn.forEach(b => { let el = document.getElementById('b-'+b.substring(1)); if(el) el.classList.add('active'); });
        }

        function renderCard(card) {
            const grid = document.createElement('div'); grid.className = 'bingo-card';
            card.forEach((n, i) => {
                const cell = document.createElement('div'); cell.className = (i === 12) ? "cell free" : "cell";
                cell.innerText = (i === 12) ? "FREE" : n;
                cell.onclick = () => cell.classList.toggle('selected');
                grid.appendChild(cell);
            });
            document.getElementById('card-area').appendChild(grid);
        }

        function claim() { fetch('/claim_bingo', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone})}); }
        setInterval(update, 2000);
    </script>
</body>
</html>
