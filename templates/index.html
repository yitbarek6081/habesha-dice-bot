<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BESH BINGO</title>
    <style>
        :root { --gold: #f1c40f; --bg: #0f172a; --red: #e74c3c; --blue: #1e293b; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 10px; margin: 0; }
        
        /* Registration Screen */
        #reg-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .reg-input { width: 80%; padding: 15px; border-radius: 10px; border: 2px solid var(--gold); background: var(--blue); color: white; font-size: 1.2rem; margin-bottom: 15px; }

        .stats-bar { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; background: var(--blue); padding: 10px; border-radius: 10px; border: 1px solid var(--gold); margin-bottom: 10px; text-align: center; font-size: 0.7rem; }
        .stats-bar span { display: block; font-size: 1rem; color: var(--gold); font-weight: bold; }

        .welcome-msg { color: var(--gold); text-align: center; font-weight: bold; margin: 10px 0; }
        #timer { text-align:center; font-size:4rem; font-weight:900; margin: 10px 0; }

        .grid-store { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; max-height: 200px; overflow-y: auto; }
        .t-num { background: #334155; padding: 12px 0; border-radius: 5px; cursor: pointer; text-align: center; font-weight: bold; }
        .t-num.selected { background: var(--gold); color: black; }
        .t-num.bought { background: #000; color: #444; text-decoration: line-through; pointer-events: none; }

        /* Game Board Header */
        .bingo-header { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; text-align: center; font-weight: 900; font-size: 1.8rem; color: var(--gold); margin-bottom: 10px; }
        #active-num { width: 90px; height: 90px; border: 5px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 10px auto; font-size: 2.5rem; font-weight: bold; background: var(--blue); color: var(--gold); box-shadow: 0 0 15px var(--gold); }

        .bingo-card { background: #E0E5B6; padding: 5px; border-radius: 5px; margin-top: 10px; }
        .card-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1px; background: #333; }
        .cell { background: white; height: 40px; display: flex; align-items: center; justify-content: center; color: #333; font-weight: bold; cursor: pointer; }
        .cell.marked { background: var(--red) !important; color: white; }
        
        .buy-btn { width: 100%; padding: 18px; background: var(--gold); border: none; border-radius: 10px; font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div id="reg-screen">
        <h1 style="color:var(--gold)">BESH BINGO</h1>
        <p>ለመጀመር ስልክ ቁጥርዎን ያስገቡ</p>
        <input type="tel" id="phone-input" class="reg-input" placeholder="09xxxxxxxx">
        <button class="buy-btn" onclick="register()" style="width:80%">ግባ / Register</button>
    </div>

    <div class="stats-bar">
        <div>WALLET <span id="balance">0</span></div>
        <div>WIN (80%) <span id="prize">0</span></div>
        <div>PLAYERS <span id="p-count">0</span></div>
    </div>

    <div id="lobby">
        <div id="status-text" class="welcome-msg">ካርቴላ ይምረጡ</div>
        <div id="timer">30</div>
        <div class="grid-store" id="picker"></div>
        <button id="buy-btn" class="buy-btn" onclick="buyTicket()" disabled style="margin-top:10px;">ካርቴላ ግዛ (10 ብር)</button>
    </div>

    <div id="game" style="display:none;">
        <div id="active-num">?</div>
        <div class="bingo-header"><div>B</div><div>I</div><div>N</div><div>G</div><div>O</div></div>
        <div id="my-cards"></div>
        <button id="win-btn" onclick="claimWin()" style="display:none; width:100%; padding:15px; background:var(--gold); color:black; font-weight:bold; margin-top:10px; border-radius:10px;">🎊 BINGO! 🎊</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let phone = localStorage.getItem('bingo_phone');
        let selectedNum = null, myMarked = new Set([0]);

        if(phone) document.getElementById('reg-screen').style.display = 'none';

        function register() {
            const val = document.getElementById('phone-input').value;
            if(val.length >= 10) {
                phone = val;
                localStorage.setItem('bingo_phone', val);
                document.getElementById('reg-screen').style.display = 'none';
            }
        }

        const picker = document.getElementById('picker');
        for(let i=1; i<=500; i++) picker.innerHTML += `<div class="t-num" id="tn-${i}" onclick="selectNum(${i})">${i}</div>`;

        function selectNum(n) {
            if(selectedNum) document.getElementById(`tn-${selectedNum}`).classList.remove('selected');
            selectedNum = n; document.getElementById(`tn-${n}`).classList.add('selected');
            document.getElementById('buy-btn').disabled = false;
        }

        function update() {
            if(!phone) return;
            fetch('/get_status').then(r=>r.json()).then(d=>{
                document.getElementById('timer').innerText = d.timer;
                document.getElementById('prize').innerText = d.win_prize;
                document.getElementById('p-count').innerText = d.player_count;

                if(d.status === "lobby") {
                    document.getElementById('lobby').style.display='block';
                    document.getElementById('game').style.display='none';
                    if(d.sub_status === "closed") document.getElementById('status-text').innerText = "ጨዋታው ሊጀምር ነው...";
                    d.bought_numbers.forEach(n => {
                        let el = document.getElementById(`tn-${n}`);
                        if(el) el.classList.add('bought');
                    });
                } else {
                    document.getElementById('lobby').style.display='none';
                    document.getElementById('game').style.display='block';
                    if(d.drawn_numbers.length > 0) document.getElementById('active-num').innerText = d.drawn_numbers[d.drawn_numbers.length-1];
                }
            });

            fetch('/user_data/'+phone).then(r=>r.json()).then(d=>{
                document.getElementById('balance').innerText = d.balance;
                let h = '';
                d.tickets.forEach(t => {
                    h += `<div class="bingo-card"><div class="card-grid">`;
                    t.forEach(row => row.forEach(n => {
                        h += `<div class="cell ${n===0||myMarked.has(n)?'marked':''}" onclick="mark(${n})">${n===0?'FREE':n}</div>`;
                    }));
                    h += `</div></div>`;
                });
                document.getElementById('my-cards').innerHTML = h;
            });
        }

        function buyTicket() {
            fetch('/join_game', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, ticket_num: selectedNum})})
            .then(r=>r.json()).then(d=> { if(d.success) tg.showAlert("ተገዝቷል!"); else alert(d.msg); });
        }

        function mark(n) {
            if(n===0) return;
            if(myMarked.has(n)) myMarked.delete(n); else myMarked.add(n);
            document.getElementById('win-btn').style.display = myMarked.size >= 5 ? 'block' : 'none';
        }

        setInterval(update, 1000);
    </script>
</body>
</html>
