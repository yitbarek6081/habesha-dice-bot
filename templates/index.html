<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Tombola</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold: #f1c40f; --bg: #0f172a; --card: #1e293b; --green: #2ecc71; --blue: #3498db; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 20px; }
        
        .header { background: var(--card); padding: 10px 5px; display: grid; grid-template-columns: repeat(4, 1fr); border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 100; text-align: center; }
        .stat b { color: var(--gold); font-size: 0.95rem; display: block; }
        .stat small { font-size: 0.6rem; color: #94a3b8; text-transform: uppercase; }

        .draw-zone { margin: 15px auto; width: 85px; height: 85px; border: 4px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.8rem; font-weight: 900; color: var(--gold); background: var(--card); box-shadow: 0 0 15px rgba(241, 196, 15, 0.2); }

        .btn-row { display: flex; gap: 8px; padding: 0 12px; margin-bottom: 12px; }
        .btn-act { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: bold; color: white; font-size: 0.85rem; cursor: pointer; }

        .btn-join { width: 94%; margin: 0 3%; padding: 15px; background: var(--gold); color: black; border-radius: 10px; font-weight: 900; border: none; font-size: 1.1rem; cursor: pointer; }
        .btn-join:disabled { background: #475569; color: #94a3b8; cursor: not-allowed; }

        .game-container { display: flex; flex-wrap: wrap; gap: 15px; padding: 10px; justify-content: center; }
        .main-board-wrapper { flex: 1; min-width: 300px; max-width: 450px; }
        .board { display: grid; grid-template-columns: repeat(10, 1fr); gap: 3px; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 8px; }
        .b-cell { font-size: 0.65rem; padding: 6px 0; background: #334155; border-radius: 3px; color: #94a3b8; text-align: center; }
        .b-cell.drawn { background: #ef4444; color: white; font-weight: bold; }

        .ticket-wrapper { flex: 1; min-width: 300px; max-width: 400px; }
        .ticket-card { background: var(--card); padding: 15px; border-radius: 15px; border: 2px solid rgba(241, 196, 15, 0.2); }
        .t-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 10px; padding: 5px; border-radius: 8px; background: rgba(255,255,255,0.03); }
        
        /* እዚህ ጋር የቁጥሮቹን ቀለም መቀየር ትችላለህ */
        .t-cell { background: white; color: #0f172a; height: 55px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.5rem; border-radius: 8px; cursor: pointer; border-bottom: 4px solid #cbd5e1; }
        .t-cell.marked { background: var(--green) !important; color: white !important; border-bottom: none; transform: translateY(3px); }

        .win-btn { background: linear-gradient(135deg, var(--gold), #e67e22); color: black; width: 100%; padding: 18px; border-radius: 12px; font-size: 1.5rem; font-weight: 900; border: none; margin-top: 15px; display: none; animation: pulse 1.2s infinite; cursor: pointer; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .quick-links { margin-top: 30px; text-align: center; padding: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        .link-btn { text-decoration: none; padding: 10px 18px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; margin: 5px; display: inline-block; }
    </style>
</head>
<body onclick="enableAudio()">

    <div class="header">
        <div class="stat"><small>Wallet</small><b id="bal">0.00</b></div>
        <div class="stat"><small>Time</small><b id="timer-ui">Lobby</b></div>
        <div class="stat"><small>Pot</small><b id="pot">0</b></div>
        <div class="stat"><small>Players</small><b id="p-count">0</b></div>
    </div>

    <div id="active-num" class="draw-zone">?</div>

    <div class="btn-row">
        <button onclick="deposit()" class="btn-act" style="background:var(--green)">DEPOSIT</button>
        <button onclick="withdraw()" class="btn-act" style="background:var(--blue)">WITHDRAW</button>
    </div>

    <button id="join-btn" onclick="joinGame()" class="btn-join">JOIN GAME (10 ETB)</button>

    <div class="game-container">
        <div class="main-board-wrapper">
            <h4 style="text-align:center; color:#94a3b8;">GAME BOARD</h4>
            <div id="brd" class="board"></div>
        </div>

        <div id="ticket-area" class="ticket-wrapper" style="display:none">
            <h4 style="text-align:center; color:var(--gold);">YOUR TICKET (3 ROWS)</h4>
            <div class="ticket-card">
                <div id="t-container"></div>
                <button id="win-btn-el" onclick="claimWin()" class="win-btn">🎊 TOMBOLA! 🎊</button>
            </div>
        </div>
    </div>

    <div class="quick-links">
        <p style="color: #94a3b8; font-size: 0.8rem; margin-bottom: 12px;">እርዳታ ይፈልጋሉ ወይም ቤተሰባችንን ይቀላቀሉ?</p>
        
        <a href="https://t.me/TombolaEthiopia" target="_blank" class="link-btn" style="background: #24A1DE; color: white;">📢 JOIN GROUP</a>
        
        <a href="@TombolaEthiopia" target="_blank" class="link-btn" style="background: #34495e; color: white;">🛠 SUPPORT</a>
        
        <br><br>
        <button onclick="linkAccount()" style="background:none; border: 1px solid var(--gold); color: var(--gold); padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 0.75rem;">🔔 የማሳወቂያ ደውል አግብር (/link)</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const ADMIN_PHONE = "0945880474";
        let phone = localStorage.getItem('u_phone'), drawnNums = [], markedNums = [], myTicket = [], audioReady = false;

        function enableAudio() { audioReady = true; }
        function speak(n) { if(audioReady) { const m = new SpeechSynthesisUtterance("ቁጥር " + n); m.lang='am-ET'; window.speechSynthesis.speak(m); } }

        if(!phone) {
            let p = prompt("እንኳን ደህና መጡ! ስልክ ቁጥርዎን ያስገቡ:");
            if(p) { phone = p.trim(); localStorage.setItem('u_phone', phone); fetch('/register', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, name: tg.initDataUnsafe.user?.first_name || "Player"})}); }
        }

        for(let i=1; i<=90; i++) document.getElementById('brd').innerHTML += `<div class="b-cell" id="b-${i}">${i}</div>`;

        function update() {
            fetch('/get_status').then(r => r.json()).then(d => {
                document.getElementById('pot').innerText = d.pot + " ETB";
                document.getElementById('p-count').innerText = d.player_count;
                let timerUI = document.getElementById('timer-ui');
                
                if(d.status === "lobby") {
                    timerUI.innerText = d.player_count < 2 ? "Wait" : d.timer + "s";
                    if(drawnNums.length > 0 && d.drawn_numbers.length === 0) {
                        document.querySelectorAll('.b-cell').forEach(c => c.classList.remove('drawn'));
                        document.getElementById('active-num').innerText = "?";
                        markedNums = [];
                        document.getElementById('win-btn-el').style.display = 'none';
                    }
                } else { timerUI.innerText = "LIVE 🔴"; }

                drawnNums = d.drawn_numbers || [];
                if(drawnNums.length > 0) {
                    let last = drawnNums[drawnNums.length-1];
                    if(document.getElementById('active-num').innerText != last) {
                        document.getElementById('active-num').innerText = last; speak(last);
                        document.getElementById(`b-${last}`).classList.add('drawn');
                    }
                }
            });
            
            if(phone) fetch('/user_data/'+phone).then(r=>r.json()).then(d=>{
                if(d.error) return;
                document.getElementById('bal').innerText = d.balance.toFixed(2);
                if(d.is_joined) {
                    document.getElementById('ticket-area').style.display='block'; 
                    myTicket=d.ticket; renderTicket(d.ticket);
                    document.getElementById('join-btn').innerText = "JOINED ✅";
                    document.getElementById('join-btn').disabled = true;
                }
            });
        }

        function renderTicket(ticket) {
            let h = '';
            ticket.forEach((row, idx) => {
                h += `<div class="t-row" id="row-${idx}">`;
                row.forEach(n => h += `<div id="tc-${n}" class="t-cell ${markedNums.includes(n)?'marked':''}" onclick="mark(${n}, ${idx})">${n}</div>`);
                h += '</div>';
            });
            document.getElementById('t-container').innerHTML = h;
        }

        function mark(n, rowIdx) {
            if(drawnNums.includes(n)) {
                if(!markedNums.includes(n)) {
                    markedNums.push(n); document.getElementById(`tc-${n}`).classList.add('marked');
                    tg.HapticFeedback.impactOccurred('medium');
                    let rowNumbers = myTicket[rowIdx];
                    if(rowNumbers.every(num => markedNums.includes(num))) {
                        document.getElementById('win-btn-el').style.display = 'block';
                        tg.HapticFeedback.notificationOccurred('success');
                    }
                }
            } else { tg.showAlert("ይህ ቁጥር ገና አልወጣም!"); }
        }

        function linkAccount() {
            tg.showAlert("እባክዎ ቦቱ ላይ በመሄድ /link " + phone + " ብለው ይላኩ።");
            tg.close();
        }

        function deposit() {
            const el = document.createElement('textarea'); el.value = ADMIN_PHONE; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
            tg.showAlert("የአድሚን ስልክ ኮፒ ተደርጓል! ደረሰኙን እዚህ ያስገቡ።");
            let rec = prompt("የደረሰኝ SMS ኮድ:");
            if(rec) fetch('/request_action', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({type:'Deposit', phone, amount:'Pending', receipt: rec})});
        }

        function withdraw() {
            let amt = prompt("የሚወጣው መጠን:");
            if(amt) fetch('/request_action', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({type:'Withdraw', phone, amount: amt})});
        }

        function claimWin() {
            fetch('/claim_win', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone})})
            .then(r => r.json()).then(d => { if(d.success) { confetti(); tg.showAlert("እንኳን ደስ አለዎት! ቶምቦላ በልተዋል።"); document.getElementById('win-btn-el').style.display = 'none'; } });
        }

        function joinGame() {
            fetch('/join_game', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone})})
            .then(r => r.json()).then(d => { if(d.success) { update(); } else { tg.showAlert(d.message); } });
        }

        setInterval(update, 1000); tg.expand();
    </script>
</body>
</html>
