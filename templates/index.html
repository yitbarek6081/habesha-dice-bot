<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BESH BINGO - PREMIUM</title>
    <style>
        :root { --gold: #ffcc00; --bg: #050a18; --red: #ff3e3e; --green: #00ff88; --orange: #ff8800; --blue: #00d4ff; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 0; }
        .header { background: linear-gradient(145deg, #1e293b, #050a18); padding: 15px; border-bottom: 3px solid var(--gold); position: sticky; top: 0; z-index: 100; }
        .stats { display: flex; justify-content: space-around; background: rgba(255,255,255,0.05); padding: 10px; margin: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .stats b { display: block; font-size: 1.1rem; color: var(--gold); }
        
        /* BINGO Title on Ticket */
        .bingo-title { display: grid; grid-template-columns: repeat(5, 1fr); font-weight: 900; font-size: 1.5rem; padding: 10px 0; background: #1e293b; border-radius: 10px 10px 0 0; }
        .bingo-card { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; background: #333; padding: 5px; border-radius: 0 0 10px 10px; }
        .cell { background: #fff; color: #000; height: 50px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.2rem; border-radius: 4px; }
        .cell.selected { background: var(--gold) !important; color: #000; box-shadow: inset 0 0 8px rgba(0,0,0,0.4); }

        .grid-tickets { display: grid; grid-template-columns: repeat(auto-fill, minmax(55px, 1fr)); gap: 6px; max-height: 350px; overflow-y: auto; background: #000; padding: 10px; margin: 10px; border-radius: 12px; }
        .t-box { background: #fff; color: #000; padding: 15px 0; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .t-box.mine { background: var(--gold); animation: pulse 1.5s infinite; border: 2px solid #fff; }
        .t-box.sold { background: #222; color: #555; cursor: not-allowed; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(0.96); } 100% { transform: scale(1); } }
        
        .btn { padding: 12px; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; width: 48%; }
        .btn-dep { background: var(--green); } .btn-with { background: var(--orange); color: #fff; }
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:2000; align-items:center; justify-content:center; }
        .modal-content { background: #1e293b; padding: 25px; border-radius: 20px; width: 85%; }
    </style>
</head>
<body>
    <div class="header"><h2>BESH BINGO</h2></div>
    
    <div class="stats">
        <div>BALANCE<b id="balance">0 ETB</b></div>
        <div>PLAYERS<b id="p-count">0</b></div>
        <div>JACKPOT<b id="prize">0 ETB</b></div>
    </div>

    <div id="lobby-ui">
        <div style="padding: 10px; display: flex; justify-content: space-between;">
            <button class="btn btn-dep" onclick="openM('dep-m')">📥 DEPOSIT</button>
            <button class="btn btn-with" onclick="openM('with-m')">📤 WITHDRAW</button>
        </div>
        <div id="timer" style="font-size: 3.5rem; font-weight: 900; color: var(--gold);">30</div>
        <div class="grid-tickets" id="ticket-area"></div>
    </div>

    <div id="game-ui" style="display:none; padding: 15px;">
        <div id="ball-circle" style="width:85px; height:85px; background:radial-gradient(circle, #fff, var(--gold)); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:2.2rem; font-weight:900; color:#000; margin: 0 auto 20px; border: 5px solid #1e293b;">--</div>
        <div id="card-area"></div>
        <button id="bingo-btn" style="width:100%; padding:20px; background:var(--red); color:white; border-radius:15px; font-weight:900; font-size:1.6rem; margin-top:20px; border:none;" onclick="claim()">BINGO!</button>
    </div>

    <div id="dep-m" class="modal">
        <div class="modal-content">
            <h3 style="color:var(--green)">ገንዘብ ማስገቢያ</h3>
            <p>በዚህ ቁጥር በቴሌብር ይላኩ፦</p>
            <div style="background:#000; padding:15px; color:var(--gold); font-size:1.6rem; font-weight:900; border:2px dashed var(--gold); margin-bottom:15px;">0945880474</div>
            <input type="number" id="da" placeholder="መጠን (ETB)" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:none;">
            <input type="text" id="di" placeholder="Transaction ID" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:none;">
            <button class="btn btn-dep" style="width:100%" onclick="subD()">ጥያቄ ላክ</button>
            <button onclick="closeM('dep-m')" style="margin-top:15px; background:none; color:#888; border:none;">ዝጋ</button>
        </div>
    </div>

    <script>
        let phone = localStorage.getItem('phone') || prompt("ስልክ ቁጥር ያስገቡ:");
        let username = localStorage.getItem('username') || prompt("የተጫዋች ስም ያስገቡ:");
        if(!phone || !username) location.reload();
        localStorage.setItem('phone', phone); localStorage.setItem('username', username);

        function openM(id) { document.getElementById(id).style.display='flex'; }
        function closeM(id) { document.getElementById(id).style.display='none'; }

        function update() {
            fetch(`/get_status?phone=${phone}`).then(r=>r.json()).then(d=>{
                document.getElementById('balance').innerText = d.balance + " ETB";
                document.getElementById('p-count').innerText = d.active_players;
                document.getElementById('prize').innerText = d.pot + " ETB"; 
                document.getElementById('timer').innerText = d.timer;
                
                if(d.status === "lobby") {
                    document.getElementById('lobby-ui').style.display='block';
                    document.getElementById('game-ui').style.display='none';
                    document.getElementById('card-area').innerHTML = "";
                    renderTickets(d.sold_tickets);
                } else {
                    document.getElementById('lobby-ui').style.display='none';
                    document.getElementById('game-ui').style.display='block';
                    document.getElementById('ball-circle').innerText = d.current_ball;
                    if(d.my_cards.length > 0 && !document.getElementById('card-area').innerHTML) {
                        d.my_cards.forEach(c => renderCard(c));
                    }
                }
            });
        }

        function renderTickets(sold) {
            const area = document.getElementById('ticket-area');
            if(area.children.length === 0) {
                for(let i=1; i<=200; i++) {
                    let div=document.createElement('div'); div.className='t-box'; div.innerText=i; div.id='t-'+i; area.appendChild(div);
                }
            }
            for(let i=1; i<=200; i++) {
                let box = document.getElementById('t-'+i);
                if(sold[i]) {
                    box.className = (sold[i] === phone) ? 't-box mine' : 't-box sold';
                    box.onclick = (sold[i] === phone) ? () => refund(i) : null;
                } else {
                    box.className='t-box'; box.onclick=()=>buy(i);
                }
            }
        }

        function renderCard(card) {
            const wrap = document.createElement('div'); wrap.style.marginBottom = "30px";
            const head = document.createElement('div'); head.className = "bingo-title";
            const L = ['B','I','N','G','O'], C = ['#ff3e3e','#ffcc00','#00ff88','#ff8800','#00d4ff'];
            L.forEach((l, i) => { let s = document.createElement('span'); s.innerText = l; s.style.color = C[i]; head.appendChild(s); });
            wrap.appendChild(head);

            const grid = document.createElement('div'); grid.className = 'bingo-card';
            card.forEach((n, i) => {
                const cell = document.createElement('div'); cell.className = "cell";
                cell.innerText = (i===12) ? "FREE" : n;
                if(i===12) cell.classList.add('selected');
                cell.onclick = () => cell.classList.toggle('selected');
                grid.appendChild(cell);
            });
            wrap.appendChild(grid);
            document.getElementById('card-area').appendChild(wrap);
        }

        function buy(n) { fetch('/buy_specific_ticket', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, ticket_num:n, username})}).then(update); }
        function refund(n) { if(confirm(n + " ቁጥርን መመለስ ይፈልጋሉ?")) fetch('/cancel_ticket', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, ticket_num:n})}).then(update); }
        function subD() { fetch('/request_deposit', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, amount:document.getElementById('da').value, transaction_id:document.getElementById('di').value})}); closeM('dep-m'); alert("ጥያቄ ተልኳል!"); }
        function claim() { fetch('/claim_bingo', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone})}).then(r=>r.json()).then(d=> { if(!d.success) alert(d.msg); }); }

        setInterval(update, 2000); update();
    </script>
</body>
</html>
