<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BESH BINGO - PREMIUM</title>
    <style>
        :root { --gold: #ffcc00; --bg: #050a18; --red: #ff3e3e; --green: #00ff88; --orange: #ff8800; --card-white: #ffffff; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; text-align: center; margin: 0; padding: 0; overflow-x: hidden; width: 100vw; touch-action: manipulation; }
        
        /* Premium Header */
        .header-section { position: sticky; top: 0; z-index: 1000; background: var(--bg); border-bottom: 2px solid var(--gold); box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .stats { display: flex; justify-content: space-around; background: rgba(255,255,255,0.05); padding: 10px; margin: 5px 10px; border-radius: 12px; border: 1px solid rgba(255,204,0,0.2); }
        .stats div { font-size: 0.7rem; color: #aaa; }
        .stats b { display: block; font-size: 1.1rem; color: var(--gold); text-shadow: 0 0 10px rgba(255,204,0,0.3); }

        .btn-main { flex: 1; padding: 14px 2px; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; font-size: 0.8rem; transition: all 0.1s ease; box-shadow: 0 4px 0 rgba(0,0,0,0.3); }
        .btn-main:active { transform: translateY(2px); box-shadow: none; }
        .btn-deposit { background: linear-gradient(180deg, var(--green), #00cc6a); color: #000; }
        .btn-withdraw { background: linear-gradient(180deg, var(--orange), #e67a00); color: white; }
        
        /* Animations */
        @keyframes ballFlash { 0% { transform: scale(1); box-shadow: 0 0 0 var(--gold); } 50% { transform: scale(1.2); box-shadow: 0 0 20px var(--gold); } 100% { transform: scale(1); } }
        .new-ball { animation: ballFlash 0.5s ease-out; }

        /* Tickets Grid Optimized */
        .grid-500 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; max-height: 320px; overflow-y: auto; background: #000; padding: 12px; margin: 10px; border-radius: 12px; border: 1px solid #222; }
        .t-box { background: #fff; color: #000; font-size: 1rem; padding: 15px 0; font-weight: 900; border-radius: 8px; cursor: pointer; transition: 0.1s; border: 2px solid transparent; }
        .t-box.mine { background: var(--gold); border: 2px solid #fff; box-shadow: 0 0 15px rgba(255,204,0,0.5); }
        .t-box.sold { background: #1a1a1a; color: #444; pointer-events: none; }

        /* Bingo Card Styling */
        .card-wrapper { width: 170px; margin: 0 auto; background: #222; padding: 10px; border-radius: 15px; border: 2px solid var(--gold); }
        .bingo-card { display: grid; grid-template-columns: repeat(5, 30px); gap: 2px; justify-content: center; }
        .cell { width: 30px; height: 30px; background: #fff; color: #000; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1rem; border-radius: 4px; transition: 0.1s; }
        .cell.selected { background: var(--gold) !important; transform: scale(0.95); box-shadow: inset 0 0 8px rgba(0,0,0,0.3); }
        .cell.free { background: var(--red) !important; color: white; font-size: 0.5rem; }

        /* Modern Modals */
        .modal-content { background: #111827; border: 2px solid var(--gold); box-shadow: 0 0 30px rgba(0,0,0,1); }
        .copy-card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 2px dashed var(--gold); margin-bottom: 20px; }
    </style>
</head>
<body>
    <audio id="win-horn" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" preload="auto"></audio>
    
    <div id="winner-overlay">
        <div style="font-size:3.5rem; color:var(--gold); font-weight:900; text-shadow: 0 0 20px var(--gold);">🏆 BINGO! 🏆</div>
        <div id="win-name" style="font-size:2rem; color:white; margin:15px 0;"></div>
        <button class="btn-main" onclick="location.reload()" style="max-width:200px; background:var(--gold); color:#000;">አሪፍ ነው!</button>
    </div>

    <div class="header-section">
        <div style="padding:10px 0;"><h2 style="color:var(--gold); margin:0; letter-spacing:2px;">BESH BINGO</h2></div>
        <div class="stats">
            <div>BALANCE<b id="balance">0 ETB</b></div>
            <div>PLAYERS<b id="p-count">0</b></div>
            <div>JACKPOT<b id="prize">0 ETB</b></div>
        </div>
        <div class="action-bar">
            <button class="btn-main btn-deposit" onclick="openM('dep-m')">📥 DEPOSIT</button>
            <button id="voice-btn" class="btn-main" style="background:#374151; color:white" onclick="toggleVoice()">🔇 VOICE OFF</button>
            <button class="btn-main btn-withdraw" onclick="openM('with-m')">📤 WITHDRAW</button>
        </div>
    </div>

    <div id="lobby-ui">
        <div id="timer">30</div>
        <div class="grid-500" id="ticket-area"></div>
    </div>

    <div id="game-ui" style="display:none;">
        <div id="ball-circle" style="width:85px; height:85px; background:radial-gradient(circle at 30% 30%, #fff, var(--gold)); color:#000; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:2.2rem; font-weight:900; margin:15px auto; border:4px solid #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.4);">--</div>
        <div class="game-layout">
            <div id="main-board"></div>
            <div id="card-area"></div>
        </div>
    </div>

    <div id="dep-m" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--green);">DEPOSIT</h2>
            <div class="copy-card" onclick="fastCopy('0945880474', this)">
                <small style="color:#888;">ለቴሌብር ቁጥሩን ይንኩት (Click to copy)</small>
                <div style="font-size:1.8rem; color:var(--gold); font-weight:bold; margin:10px 0;">0945880474</div>
                <div id="copy-note" style="color:var(--green); font-size:0.8rem;">📋 ለመቅዳት ይጫኑ</div>
            </div>
            <input type="number" id="da" placeholder="የላኩት የብር መጠን">
            <input type="text" id="di" placeholder="የደረሰኝ ቁጥር (Transaction ID)">
            <button class="btn-main btn-deposit" style="width:100%; margin-top:10px;" onclick="subD()">ጥያቄ ላክ</button>
            <button onclick="closeM('dep-m')" style="color:#666; background:none; border:none; margin-top:20px; font-weight:bold;">ተመለስ</button>
        </div>
    </div>

    <div id="with-m" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--orange);">WITHDRAW</h2>
            <input type="number" id="wa" placeholder="የሚወጣ የብር መጠን">
            <input type="text" id="wp" placeholder="የቴሌብር ስልክ ቁጥር">
            <button class="btn-main btn-withdraw" style="width:100%;" onclick="alert('ጥያቄው ተልኳል! በ 30 ደቂቃ ውስጥ ይላክልዎታል')">ብር አውጣ</button>
            <button onclick="closeM('with-m')" style="color:#666; background:none; border:none; margin-top:20px; font-weight:bold;">ተመለስ</button>
        </div>
    </div>

    <script>
        let phone = localStorage.getItem('phone') || prompt("ስልክ ያስገቡ:");
        let username = localStorage.getItem('username') || prompt("ስም ያስገቡ:");
        localStorage.setItem('phone', phone); localStorage.setItem('username', username);
        let isVoiceOn = false;
        let lastBall = null;

        function openM(id) { document.getElementById(id).style.display='flex'; }
        function closeM(id) { document.getElementById(id).style.display='none'; }
        
        function fastCopy(num, el) {
            navigator.clipboard.writeText(num);
            document.getElementById('copy-note').innerText = "✅ ተቀድቷል (COPIED)";
            setTimeout(() => { document.getElementById('copy-note').innerText = "📋 ለመቅዳት ይጫኑ"; }, 2000);
        }

        function update() {
            fetch(`/get_status?phone=${phone}`).then(r=>r.json()).then(d=>{
                document.getElementById('balance').innerText = d.balance + " ETB";
                document.getElementById('prize').innerText = Math.floor(d.pot * 0.8) + " ETB";
                document.getElementById('p-count').innerText = d.active_players;
                document.getElementById('timer').innerText = d.timer;

                if(d.status === "lobby") {
                    document.getElementById('lobby-ui').style.display='block';
                    document.getElementById('game-ui').style.display='none';
                    renderTickets(d.sold_tickets);
                } else if(d.status === "playing") {
                    document.getElementById('lobby-ui').style.display='none';
                    document.getElementById('game-ui').style.display='block';
                    
                    if(d.current_ball !== lastBall) {
                        const bc = document.getElementById('ball-circle');
                        bc.innerText = d.current_ball;
                        bc.classList.remove('new-ball');
                        void bc.offsetWidth; // Trigger reflow
                        bc.classList.add('new-ball');
                        lastBall = d.current_ball;
                    }
                    
                    renderMainBoard(d.drawn_balls, d.current_ball);
                    if(d.my_cards.length > 0 && document.getElementById('card-area').children.length === 0) {
                        d.my_cards.forEach((c, i) => renderCard(c, i));
                    }
                }
            });
        }

        function renderTickets(sold) {
            const area = document.getElementById('ticket-area');
            if(area.children.length === 0) {
                const fragment = document.createDocumentFragment();
                for(let i=1; i<=500; i++) {
                    let div = document.createElement('div');
                    div.className = 't-box'; div.innerText = i; div.id = 't-'+i;
                    div.addEventListener('pointerdown', () => { if(!div.classList.contains('sold')) buy(i); });
                    fragment.appendChild(div);
                }
                area.appendChild(fragment);
            }
            // Update classes efficiently
            for(let i=1; i<=500; i++) {
                let box = document.getElementById('t-'+i);
                let owner = sold[String(i)];
                if(owner) {
                    box.className = (owner === phone) ? 't-box mine' : 't-box sold';
                } else {
                    box.className = 't-box';
                }
            }
        }

        function renderCard(card, cardIdx) {
            const area = document.getElementById('card-area');
            area.innerHTML = "";
            const wrapper = document.createElement('div');
            wrapper.className = 'card-wrapper';
            
            const grid = document.createElement('div'); 
            grid.className = 'bingo-card';
            card.forEach((n, i) => {
                const cell = document.createElement('div');
                cell.className = (i === 12) ? "cell free" : "cell";
                cell.innerText = (i === 12) ? "FREE" : n;
                cell.addEventListener('pointerdown', () => { if(i!==12) cell.classList.toggle('selected'); });
                grid.appendChild(cell);
            });
            
            const btn = document.createElement('button');
            btn.className = 'btn-claim'; btn.innerText = 'BINGO!';
            btn.style.width = "100%"; btn.style.marginTop = "15px";
            btn.onclick = () => fetch('/claim_bingo', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone})}).then(r=>r.json()).then(d=> { if(!d.success) alert("ቢንጎ አልሞላም!"); });

            wrapper.appendChild(grid);
            wrapper.appendChild(btn);
            area.appendChild(wrapper);
        }

        async function buy(n) {
            const res = await fetch('/buy_specific_ticket', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, ticket_num:String(n), username})});
            update();
        }

        function subD() {
            fetch('/request_deposit', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, amount:document.getElementById('da').value, transaction_id:document.getElementById('di').value})})
            .then(()=> { closeM('dep-m'); alert("ጥያቄ ተልኳል!"); });
        }

        setInterval(update, 1500); 
        update();
    </script>
</body>
</html>
