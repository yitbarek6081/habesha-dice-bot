<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BESH BINGO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #f1c40f; --bg: #0f172a; --blue: #1e293b; --red: #e74c3c; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .nav { display: flex; justify-content: space-around; background: var(--blue); padding: 10px; border-radius: 10px; border: 1px solid var(--gold); margin-bottom: 10px; font-size: 0.9rem; }
        .timer { font-size: 3rem; font-weight: 900; color: var(--gold); margin: 10px 0; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-bottom: 15px; }
        .cell { background: white; color: black; height: 45px; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 4px; font-size: 1rem; }
        .cell.selected { background: var(--gold); transform: scale(0.95); }
        .cell.free { background: var(--red); color: white; font-size: 0.6rem; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin: 5px 0; }
        .buy-btn { background: var(--gold); color: black; }
        .action-btn { background: #2ecc71; color: white; }
        #ball-display { font-size: 4rem; color: var(--gold); font-weight: 900; height: 80px; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>
    <div class="nav">
        <div>ሒሳብ: <br><span id="balance">0</span> ETB</div>
        <div>ሽልማት: <br><span id="prize">0</span> ETB</div>
    </div>

    <div id="lobby-ui">
        <div class="timer" id="timer">30</div>
        <div style="display: flex; gap: 10px;">
            <button class="btn buy-btn" onclick="buy(1)">1 ካርቴላ (10 ብር)</button>
            <button class="btn buy-btn" onclick="buy(2)">2 ካርቴላ (20 ብር)</button>
        </div>
        <button class="btn action-btn" onclick="deposit()">ገንዘብ አስገባ (Telebirr)</button>
        <button class="btn" style="background:#e67e22;" onclick="withdraw()">ገንዘብ አውጣ</button>
    </div>

    <div id="game-ui" style="display:none;">
        <div id="ball-display">--</div>
        <p id="observer-msg" style="display:none; color:#94a3b8;">የሚቀጥለውን ዙር ይጠብቁ...</p>
        <div id="card-area"></div>
        <button id="bingo-btn" class="btn" style="background:var(--red); color:white; display:none;" onclick="claim()">BINGO! 🎰</button>
    </div>

    <div id="result-ui" class="overlay" style="display:none;">
        <h1 style="color:var(--gold); font-size:3rem;">BINGO!</h1>
        <p id="winner-name" style="font-size:1.5rem;"></p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let phone = localStorage.getItem('phone') || prompt("ስልክ ቁጥር:");
        localStorage.setItem('phone', phone);

        function deposit() {
            const info = prompt("የቴሌብር ትራንዛክሽን ID ወይም የSMS መረጃ እዚህ ይለጥፉ:");
            if(info) fetch('/request_action', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({phone, type:'DEPOSIT', info})}).then(r=>r.json()).then(d=>tg.showAlert(d.msg));
        }

        function withdraw() {
            const amt = prompt("ማውጣት የሚፈልጉትን መጠን ያስገቡ:");
            if(amt) fetch('/request_action', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({phone, type:'WITHDRAW', info: amt + " ETB"})}).then(r=>r.json()).then(d=>tg.showAlert(d.msg));
        }

        function buy(count) {
            fetch('/buy_ticket', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({phone, count})})
            .then(r=>r.json()).then(d=> { if(!d.success) tg.showAlert(d.msg); });
        }

        function update() {
            fetch(`/get_status?phone=${phone}`).then(r=>r.json()).then(d=>{
                document.getElementById('balance').innerText = d.balance;
                document.getElementById('prize').innerText = Math.floor(d.pot * 0.8);
                document.getElementById('timer').innerText = d.timer;

                if(d.status === "playing") {
                    document.getElementById('lobby-ui').style.display = 'none';
                    document.getElementById('game-ui').style.display = 'block';
                    document.getElementById('ball-display').innerText = d.current_ball;
                    if(d.is_player) {
                        document.getElementById('bingo-btn').style.display = 'block';
                        if(document.getElementById('card-area').innerHTML === "") d.cards.forEach(renderCard);
                    } else { document.getElementById('observer-msg').style.display = 'block'; }
                } else if(d.status === "result") {
                    document.getElementById('game-ui').style.display = 'none';
                    document.getElementById('result-ui').style.display = 'flex';
                    document.getElementById('winner-name').innerText = "አሸናፊ: " + d.winner;
                } else {
                    document.getElementById('lobby-ui').style.display = 'block';
                    document.getElementById('game-ui').style.display = 'none';
                    document.getElementById('result-ui').style.display = 'none';
                    document.getElementById('card-area').innerHTML = "";
                    document.getElementById('observer-msg').style.display = 'none';
                }
            });
        }

        function renderCard(card) {
            const grid = document.createElement('div'); grid.className = 'grid';
            card.forEach((n, i) => {
                const cell = document.createElement('div');
                cell.className = (i === 12) ? "cell free" : "cell";
                cell.innerText = (i === 12) ? "FREE" : n;
                cell.onclick = () => cell.classList.toggle('selected');
                grid.appendChild(cell);
            });
            document.getElementById('card-area').appendChild(grid);
        }

        function claim() {
            fetch('/claim_bingo', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({phone})});
        }
        setInterval(update, 2000);
    </script>
</body>
</html>
