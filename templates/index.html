<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BESH BINGO - PREMIUM</title>
    <style>
        :root { --gold: #ffcc00; --bg: #050a18; --red: #ff3e3e; --green: #00ff88; --orange: #ff8800; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 0; overflow-x: hidden; width: 100vw; }
        .header-banner { background: linear-gradient(145deg, #1e293b, #050a18); padding: 15px 0; border-bottom: 3px solid var(--gold); position: sticky; top: 0; z-index: 100; }
        .header-banner h1 { margin: 0; font-size: 1.5rem; color: var(--gold); letter-spacing: 3px; }
        .stats { display: flex; justify-content: space-around; background: rgba(255,255,255,0.05); padding: 10px; margin: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .stats b { display: block; font-size: 1.1rem; color: var(--gold); }
        .action-bar { display: flex; justify-content: center; gap: 2px; padding: 5px 5px; }
        .btn-main { flex: 1; padding: 12px 5px; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; transition: 0.3s; }
        .btn-deposit { background: var(--green); color: #000; }
        .btn-withdraw { background: var(--orange); color: white; }
        #ball-circle { width: 75px; height: 75px; background: radial-gradient(circle, #fff, var(--gold)); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: 900; margin: 15px auto; border: 4px solid #1e293b; box-sizing: border-box; }
        .grid-500 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; max-height: 160px;width: 60%; overflow-y: auto; background: #000; padding: 10px; margin: 5px auto; border-radius: 5px; }
        .t-box { background: #fff; color: #000; font-size: 1rem; padding: 3px 0; font-weight: bold; border-radius: 3px; cursor: pointer; }
        .t-box.mine { background: var(--gold); border: 2px solid white; animation: pulse 1.5s infinite; }
        .t-box.sold { background: #333; color: #666; cursor: not-allowed; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .game-layout { display: grid; grid-template-columns: 1fr 2.2fr; gap: 10px; padding: 10px; box-sizing: border-box; }
        .main-board { border: 1px solid #333; height: 380px; overflow-y: auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; padding: 5px; background: rgba(0,0,0,0.8); border-radius: 10px; }
        .ball-dot { font-size: 0.7rem; background: #111; padding: 5px; color: #444; border-radius: 3px; }
        .ball-dot.active { background: var(--gold); color: #000; font-weight: bold; }
        .bingo-card { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; background: #444; padding: 2px; }
        .cell { background: #fff; color: #000; height: 40px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1rem; }
        .cell.selected { background: var(--gold) !important; border: 2px solid #b45309; }
        .cell.free { background: var(--red) !important; color: white; font-size: 0.6rem; }
        #bingo-btn { width: 80%; padding: 8px; background: var(--red); color: white; font-size: 1.2rem; font-weight: 900; border-radius: 20px; border: 2px solid white; margin: 10px auto; display: block; }
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:2000; flex-direction:column; align-items:center; justify-content:center; padding: 5px; }
        .modal-content { background: #1e293b; padding: 10px; border-radius: 10px; width: 60%; max-width: 200px; }
        input { padding: 10px; margin: 10px 0; width: 70%; border-radius: 10px; border: none; box-sizing: border-box; font-size: 1rem; }
        #timer { font-size: 2.5rem; font-weight: 900; color: var(--gold); }
    </style>
</head>
<body>
    <div class="header-banner"><h1>BESH BINGO</h1></div>
    <div class="stats">
        <div>BALANCE<b id="balance">0 ETB</b></div>
        <div>PLAYERS<b id="p-count">0</b></div>
        <div>JACKPOT<b id="prize">0 ETB</b></div>
    </div>
    <div id="lobby-ui">
        <div class="action-bar">
            <button class="btn-main btn-deposit" onclick="openM('dep-m')">📥 DEPOSIT</button>
            <button class="btn-main btn-withdraw" onclick="openM('with-m')">📤 WITHDRAW</button>
        </div>
        <div id="timer">30</div>
        <div class="grid-500" id="ticket-area"></div>
    </div>
    <div id="game-ui" style="display:none;">
        <div id="ball-circle">--</div>
        <div class="game-layout">
            <div class="main-board" id="main-board"></div>
            <div>
                <div id="card-area"></div>
                <button id="bingo-btn" onclick="claim()">BINGO!</button>
            </div>
        </div>
    </div>
    <div id="with-m" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--orange);">WITHDRAW</h2>
            <input type="number" id="wa" placeholder="Amount (ETB)">
            <button class="btn-main btn-withdraw" style="width:60%" onclick="subW()">CONFIRM WITHDRAW</button>
            <button onclick="closeM('with-m')" style="color:#94a3b8; background:none; border:none; margin-top:5px; cursor:pointer;">CLOSE</button>
        </div>
    </div>
    <div id="dep-m" class="modal">
       <div class="modal-content">
    <h2 style="color:var(--green);">DEPOSIT</h2>
    <p>Send Telebirr to: <br>
        <b id="copy-num" onclick="copyNumber()" style="color:var(--gold); font-size:1.1rem; cursor:pointer; border-bottom: 1px dashed var(--gold);">
            0945880474
        </b>
        <br><small id="copy-msg" style="color:var(--green); display:none; font-size:0.7rem;">Copied! ✅</small>
    </p>
    <input type="number" id="da" placeholder="Amount (ETB)">
    <input type="text" id="di" placeholder="Transaction ID">
    <button class="btn-main btn-deposit" style="width:80%" onclick="subD()">SUBMIT REQUEST</button>
    <button onclick="closeM('dep-m')" style="color:#94a3b8; background:none; border:none; margin-top:10px; cursor:pointer;">CLOSE</button>
</div>
    </div>
    <div id="result-ui" class="modal">
        <h1 style="color:var(--gold); font-size:3rem;">BINGO!</h1>
        <div id="winner-info" style="font-size:1.5rem;"></div>
    </div>

    <script>
        let phone = localStorage.getItem('phone') || prompt("ስልክ ቁጥር ያስገቡ:");
        let username = localStorage.getItem('username') || prompt("የተጫዋች ስም ያስገቡ:");
        if(!phone || !username) location.reload();
        localStorage.setItem('phone', phone); localStorage.setItem('username', username);

        let currentCardData = null, lastBall = "--";

        function openM(id) { document.getElementById(id).style.display='flex'; }
        function closeM(id) { document.getElementById(id).style.display='none'; }

        function update() {
            fetch(`/get_status?phone=${phone}`).then(r=>r.json()).then(d=>{
                document.getElementById('balance').innerText = d.balance.toFixed(0) + " ETB";
                document.getElementById('prize').innerText = Math.floor(d.pot * 0.8) + " ETB";
                document.getElementById('p-count').innerText = d.active_players;
                document.getElementById('timer').innerText = d.timer;
                if(d.status === "lobby") {
                    document.getElementById('lobby-ui').style.display='block'; document.getElementById('game-ui').style.display='none'; document.getElementById('result-ui').style.display='none';
                    document.getElementById('main-board').innerHTML=""; document.getElementById('card-area').innerHTML="";
                    currentCardData = null; lastBall = "--";
                    renderTickets(d.sold_tickets);
                } else if(d.status === "playing") {
                    document.getElementById('lobby-ui').style.display='none'; document.getElementById('game-ui').style.display='block';
                    document.getElementById('ball-circle').innerText = d.current_ball;
                    lastBall = d.current_ball;
                    renderMainBoard(d.drawn_balls);
                    if(d.my_cards.length > 0 && !currentCardData) { 
                        currentCardData = d.my_cards; 
                        document.getElementById('card-area').innerHTML = "";
                        d.my_cards.forEach((c, i) => renderCard(c, i)); 
                    }
                } else if(d.status === "result") {
                    document.getElementById('result-ui').style.display='flex';
                    document.getElementById('winner-info').innerText = d.winner + " 🏆";
                }
            }).catch(() => {});
        }

        function renderTickets(sold) {
            const area = document.getElementById('ticket-area');
            if(area.children.length === 0) { for(let i=1; i<=500; i++) { let div=document.createElement('div'); div.className='t-box'; div.innerText=i; div.id='t-'+i; area.appendChild(div); } }
            for(let i=1; i<=500; i++) {
                let box = document.getElementById('t-'+i);
                if(sold[i]) { box.className = (sold[i] === phone) ? 't-box mine' : 't-box sold'; box.onclick = (sold[i] === phone) ? () => refund(i) : null; }
                else { box.className='t-box'; box.onclick=()=>buy(i); }
            }
        }

        function buy(n) { fetch('/buy_specific_ticket', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, ticket_num:n, username})}).then(update); }
        function refund(n) { if(confirm("ሰርዝ?")) fetch('/cancel_ticket', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, ticket_num:n})}).then(update); }
        
        function renderMainBoard(drawn) {
            const board = document.getElementById('main-board');
            if(board.children.length === 0) { for(let i=1; i<=75; i++) { let d=document.createElement('div'); d.className='ball-dot'; d.id='b-'+i; d.innerText=i; board.appendChild(d); } }
            drawn.forEach(b => { let num = b.substring(1); let el = document.getElementById('b-'+num); if(el) el.classList.add('active'); });
        }

        function renderCard(card, cardIdx) {
            const wrap = document.createElement('div'); wrap.style.marginBottom="15px";
            wrap.innerHTML = `<div style="display:grid;grid-template-columns:repeat(5,1fr);background:var(--orange);font-weight:900;padding:5px;font-size:0.8rem;"><div>B</div><div>I</div><div>N</div><div>G</div><div>O</div></div>`;
            const grid = document.createElement('div'); grid.className='bingo-card';
            card.forEach((n, i) => {
                const cell=document.createElement('div');
                if(i === 12) { cell.className="cell free selected"; cell.innerText="FREE"; }
                else { cell.className="cell"; cell.innerText=n; cell.onclick = () => cell.classList.toggle('selected'); }
                grid.appendChild(cell);
            });
            wrap.appendChild(grid); document.getElementById('card-area').appendChild(wrap);
        }

        function claim() { fetch('/claim_bingo', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone})}).then(r=>r.json()).then(d=>{ if(!d.success) alert(d.msg); }); }
        function subD() {
            let amt=document.getElementById('da').value, tid=document.getElementById('di').value;
            if(!amt || !tid) return alert("ያስገቡ!");
            fetch('/request_deposit', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, amount:amt, transaction_id:tid})});
            closeM('dep-m'); alert("ጥያቄው ተልኳል!");
        }
        function subW() {
            let amt=document.getElementById('wa').value;
            if(!amt || amt < 20) return alert("ቢያንስ 20!");
            fetch('/withdraw', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, amount:amt})}).then(() => { closeM('with-m'); alert("ተልኳል!"); update(); });
        }

        setInterval(update, 2000); update();
    </script>
</body>
</html>
