<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BESH BINGO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socketio/4.0.1/socketio.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .bingo-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        .cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.1rem; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .cell-unmarked { background-color: #1e293b; color: #cbd5e1; border: 2px solid #334155; }
        .cell-marked { background-color: #e11d48; color: #ffffff; border: 2px solid #f43f5e; box-shadow: 0 0 12px rgba(225, 29, 72, 0.6); }
        .cell-free { background-color: #d97706; color: #ffffff; border: 2px solid #f59e0b; }
        .cell-winning { background-color: #22c55e !important; color: white !important; border: 2px solid #4ade80 !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        
        /* Side-by-Side Balls Styling */
        .recent-ball { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: bold; color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .ball-b { background: radial-gradient(circle at 30% 30%, #3b82f6, #1d4ed8); }
        .ball-i { background: radial-gradient(circle at 30% 30%, #ef4444, #b91c1c); }
        .ball-n { background: radial-gradient(circle at 30% 30%, #f59e0b, #b45309); }
        .ball-g { background: radial-gradient(circle at 30% 30%, #10b981, #047857); }
        .ball-o { background: radial-gradient(circle at 30% 30%, #a855f7, #6b21a8); }
        .opacity-50-ball { opacity: 0.50; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto">

    <!-- Auth Section -->
    <div id="auth-section" class="bg-slate-800 p-6 rounded-2xl shadow-xl mb-6">
        <h2 class="text-2xl font-bold text-center text-rose-500 mb-4">🎰 BESH BINGO</h2>
        <p class="text-sm text-slate-400 text-center mb-4">ለመጫወት ስም እና ስልክ ቁጥርዎን ያስገቡ</p>
        <input id="username-input" type="text" placeholder="የመጫወቻ ስም" class="w-full p-3 mb-3 bg-slate-900 border border-slate-700 rounded-lg focus:outline-none focus:border-rose-500 text-white">
        <input id="phone-input" type="text" placeholder="ስልክ ቁጥር (ምሳሌ፡ 0912345678)" class="w-full p-3 mb-4 bg-slate-900 border border-slate-700 rounded-lg focus:outline-none focus:border-rose-500 text-white">
        <button onclick="login()" class="w-full bg-rose-600 hover:bg-rose-700 p-3 font-bold rounded-lg transition">ግባ / ተመዝገብ</button>
    </div>

    <!-- Main Game Section (Hidden by default) -->
    <div id="game-section" class="hidden">
        
        <!-- Header Info -->
        <div class="flex justify-between items-center bg-slate-800 p-4 rounded-xl mb-4 shadow">
            <div>
                <p class="text-xs text-slate-400">ተጫዋች</p>
                <p id="player-display" class="font-bold text-rose-400">---</p>
            </div>
            <div class="text-right">
                <p class="text-xs text-slate-400">የአሁኑ ባላንስ</p>
                <p id="balance-display" class="font-bold text-green-400">0.00 ETB</p>
            </div>
        </div>

        <!-- Warning Notice -->
        <div class="bg-amber-950/40 border border-amber-800 text-amber-300 text-xs p-2 rounded-lg mb-4 text-center">
            ⚠️ <b>ማሳሰቢያ:</b> 2ኛው ኳስ አልቆ ወደ 3ኛው ከተገባ በኋላ የቆዩ ኳሶችን ማቅለም አይቻልም! ቢንጎ ሲሞላ ወዲያውኑ Claim ይጫኑ።
        </div>

        <!-- Status & Live Ball Section -->
        <div class="bg-slate-800 p-4 rounded-2xl shadow mb-4 text-center relative">
            <div id="status-badge" class="absolute top-3 left-3 bg-rose-600 text-[10px] uppercase font-bold px-2 py-1 rounded">LOBBY</div>
            <div class="text-xs text-slate-400 mt-2">ጠቅላላ መጫወቻ (POT)</div>
            <div id="pot-display" class="text-3xl font-extrabold text-yellow-400 mb-4">0 ETB</div>

            <!-- Side by Side Layout Container -->
            <div class="flex items-center justify-center gap-4 my-4">
                <!-- 3 Recent Small Balls on the Left (Side by Side) -->
                <div id="recent-balls-container" class="flex gap-2 items-center">
                    <!-- History balls render here -->
                </div>

                <!-- Main Current Large Ball Circle -->
                <div id="ball-circle" class="w-24 h-24 rounded-full bg-gradient-to-br from-slate-700 to-slate-900 border-4 border-slate-600 flex flex-col items-center justify-center shadow-lg flex-shrink-0">
                    <span id="ball-letter" class="text-xs text-slate-400 font-bold uppercase tracking-wider">BALL</span>
                    <span id="ball-number" class="text-3xl font-black text-white">--</span>
                </div>
            </div>

            <div id="timer-text" class="text-sm text-slate-300 font-medium mt-2">ቀጣይ ጨዋታ ለመጀመር፡ <span id="timer-display" class="text-rose-500 font-bold">30</span> ሰከንድ</div>
        </div>

        <!-- Ticket Purchase Area -->
        <div id="lobby-controls" class="bg-slate-800 p-4 rounded-2xl shadow mb-4">
            <h3 class="text-sm font-bold text-slate-300 mb-2 text-center">ለመጫወት የሚፈልጉትን የካርተላ ቁጥር ይምረጡ (1 ካርተላ 10 ETB)</h3>
            <div class="grid grid-cols-5 gap-2 mb-4">
                <script>
                    for(let i=1; i<=10; i++) {
                        document.write(`<button id="tbtn-${i}" onclick="toggleTicket(${i})" class="bg-slate-700 p-2 font-bold rounded-lg text-sm border border-slate-600 hover:bg-slate-600 transition">${i}</button>`);
                    }
                </script>
            </div>
        </div>

        <!-- Active Game Controls -->
        <div id="playing-controls" class="hidden mb-4">
            <button onclick="claimBingo()" class="w-full bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 p-4 font-black text-xl rounded-xl shadow-lg shadow-green-900/40 transition transform active:scale-95">🎉 ቢንጎ (CLAIM BINGO)</button>
        </div>

        <!-- Dynamic Bingo Cards Container -->
        <div id="my-cards-container" class="space-y-6"></div>

        <!-- Wallet Operations Grid -->
        <div class="grid grid-cols-2 gap-4 mt-6">
            <button onclick="showDeposit()" class="bg-slate-800 border border-slate-700 p-3 rounded-xl font-bold text-sm text-center hover:bg-slate-700 transition">💰 ብር አስገባ (Deposit)</button>
            <button onclick="showWithdraw()" class="bg-slate-800 border border-slate-700 p-3 rounded-xl font-bold text-sm text-center hover:bg-slate-700 transition">📤 ብር አውጣ (Withdraw)</button>
        </div>
    </div>

    <!-- Client Logic Scripts -->
    <script>
        const socket = io();
        let myPhone = "";
        let myUsername = "";
        let selectedTickets = new Set();
        let currentGameState = {};
        let localMarkedIndices = {}; 

        function login() {
            const u = document.getElementById("username-input").value.trim();
            const p = document.getElementById("phone-input").value.trim();
            if(!u || !p) return alert("እባክዎ ስም እና ስልክ በትክክል ያስገቡ!");
            
            myPhone = p;
            myUsername = u;

            fetch('/register_or_login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ phone: myPhone, username: myUsername })
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    document.getElementById("auth-section").classList.add("hidden");
                    document.getElementById("game-section").classList.remove("hidden");
                    document.getElementById("player-display").innerText = myUsername;
                    document.getElementById("balance-display").innerText = data.balance + " ETB";
                    refreshStatus();
                } else {
                    alert(data.msg);
                }
            });
        }

        function refreshStatus() {
            if(!myPhone) return;
            fetch(`/get_status?phone=${myPhone}`)
            .then(res => res.json())
            .then(state => {
                handleStateUpdate(state);
            });
        }

        socket.on('game_update', function(state) {
            if(!myPhone) return;
            handleStateUpdate(state);
        });

        function handleStateUpdate(state) {
            currentGameState = state;
            
            if(state.balances && state.balances[myPhone] !== undefined) {
                document.getElementById("balance-display").innerText = state.balances[myPhone] + " ETB";
            }

            document.getElementById("status-badge").innerText = state.status;
            document.getElementById("pot-display").innerText = state.pot + " ETB";

            if(state.status === "lobby") {
                document.getElementById("lobby-controls").classList.remove("hidden");
                document.getElementById("playing-controls").classList.add("hidden");
                document.getElementById("timer-text").innerHTML = `ቀጣይ ጨዋታ ለመጀመር፡ <span class="text-rose-500 font-bold">${state.timer}</span> ሰከንድ`;
                document.getElementById("ball-letter").innerText = "LOBBY";
                document.getElementById("ball-number").innerText = "--";
                document.getElementById("ball-circle").className = "w-24 h-24 rounded-full bg-slate-800 border-4 border-slate-600 flex flex-col items-center justify-center shadow-lg flex-shrink-0";
                
                for(let i=1; i<=10; i++) {
                    const btn = document.getElementById(`tbtn-${i}`);
                    if(state.sold_tickets[i]) {
                        if(state.sold_tickets[i] === myPhone) {
                            btn.className = "bg-rose-600 text-white p-2 font-bold rounded-lg text-sm border border-rose-500 shadow-md";
                        } else {
                            btn.className = "bg-slate-900 text-slate-600 p-2 font-bold rounded-lg text-sm border border-slate-800 cursor-not-allowed";
                            btn.disabled = true;
                        }
                    } else {
                        btn.className = "bg-slate-700 text-slate-200 p-2 font-bold rounded-lg text-sm border border-slate-600 hover:bg-slate-600";
                        btn.disabled = false;
                    }
                }
                localMarkedIndices = {}; 
                document.getElementById("recent-balls-container").innerHTML = ""; // ታሪክን ማጽዳት
            } 
            else if(state.status === "playing" || state.status === "result") {
                document.getElementById("lobby-controls").classList.add("hidden");
                document.getElementById("playing-controls").classList.remove("hidden");
                document.getElementById("timer-text").innerHTML = `የኳስ መውጫ ሰዓት፡ <span class="text-yellow-400 font-bold">${state.ball_timer}</span> ሰ`;
                
                if(state.current_ball && state.current_ball !== "--") {
                    const letter = state.current_ball.charAt(0);
                    const num = state.current_ball.substring(1);
                    document.getElementById("ball-letter").innerText = letter;
                    document.getElementById("ball-number").innerText = num;
                    
                    let colorClass = "from-slate-700 to-slate-900";
                    if(letter === 'B') colorClass = "from-blue-500 to-blue-700 border-blue-400";
                    if(letter === 'I') colorClass = "from-red-500 to-red-700 border-red-400";
                    if(letter === 'N') colorClass = "from-amber-500 to-amber-700 border-amber-400";
                    if(letter === 'G') colorClass = "from-emerald-500 to-emerald-700 border-emerald-400";
                    if(letter === 'O') colorClass = "from-purple-500 to-purple-700 border-purple-400";
                    document.getElementById("ball-circle").className = `w-24 h-24 rounded-full bg-gradient-to-br ${colorClass} border-4 flex flex-col items-center justify-center shadow-lg flex-shrink-0`;
                }

                if(state.status === "result") {
                    document.getElementById("timer-text").innerHTML = `ጨዋታው ተጠናቋል! አሸናፊ፦ <span class="text-green-400 font-bold">${state.winner}</span>`;
                }

                // --- 3 ትናንሽ ኳሶች ከዋናው ኳስ በስተግራ (Side-by-Side) ---
                const recentContainer = document.getElementById("recent-balls-container");
                recentContainer.innerHTML = "";
                if(state.drawn_balls && state.drawn_balls.length > 1) {
                    // የአሁኑን ዋና ኳስ ትተን ወደ ኋላ የወጡትን 3 ታሪክ ኳሶች እንወስዳለን
                    const historyBalls = state.drawn_balls.slice(0, -1).reverse().slice(0, 3).reverse();
                    
                    historyBalls.forEach((b, idx) => {
                        const bLetter = b.charAt(0).toLowerCase();
                        const ballDiv = document.createElement("div");
                        ballDiv.className = `recent-ball ball-${bLetter}`;
                        ballDiv.innerText = b;
                        
                        // 3 ኳሶች ሙሉ በሙሉ ሲሞሉ እና የመጀመሪያው ላይ ያለው (ከአሁኑ ኳስ ወደ ኋላ 3ኛው ኳስ) 50% ግልጽነት እንዲኖረው
                        if(historyBalls.length === 3 && idx === 0) {
                            ballDiv.classList.add("opacity-50-ball");
                        }
                        recentContainer.appendChild(ballDiv);
                    });
                }
            }

            renderMyCards(state);
        }

        function toggleTicket(num) {
            if(currentGameState.status !== "lobby") return;
            if(currentGameState.sold_tickets[num] && currentGameState.sold_tickets[num] !== myPhone) return;

            if(currentGameState.sold_tickets[num] === myPhone) {
                fetch('/cancel_ticket', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ phone: myPhone, ticket_num: num })
                }).then(res => res.json()).then(data => { if(!data.success) alert(data.msg); refreshStatus(); });
            } else {
                fetch('/buy_specific_ticket', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ phone: myPhone, ticket_num: num, username: myUsername })
                }).then(res => res.json()).then(data => { if(!data.success) alert(data.msg); refreshStatus(); });
            }
        }

        function renderMyCards(state) {
            const container = document.getElementById("my-cards-container");
            container.innerHTML = "";

            let myCards = {};
            if(state.all_cards) {
                for(let tNum in state.all_cards) {
                    if(state.sold_tickets[tNum] === myPhone) {
                        myCards[tNum] = state.all_cards[tNum];
                    }
                }
            }

            for(let tNum in myCards) {
                const cardData = myCards[tNum];
                if(!localMarkedIndices[tNum]) localMarkedIndices[tNum] = new Set();

                const cardWrapper = document.createElement("div");
                cardWrapper.className = "bg-slate-800 p-4 rounded-2xl shadow-lg border border-slate-700";
                
                const cardHeader = document.createElement("div");
                cardHeader.className = "flex justify-between items-center mb-3 border-b border-slate-700 pb-2";
                cardHeader.innerHTML = `<span class="text-xs text-slate-400">ካርተላ ቁጥር (Ticket): <b class="text-rose-400 text-sm">#${tNum}</b></span>
                                        <span class="text-[11px] bg-slate-900 text-slate-300 px-2 py-0.5 rounded font-bold">B  I  N  G  O</span>`;
                cardWrapper.appendChild(cardHeader);

                const grid = document.createElement("div");
                grid.className = "bingo-grid";

                cardData.forEach((val, idx) => {
                    const cell = document.createElement("div");
                    
                    if(idx === 12) {
                        cell.className = "cell cell-free text-xs";
                        cell.innerText = "★ FREE";
                    } else {
                        cell.innerText = val;
                        const isMarked = localMarkedIndices[tNum].has(idx);
                        cell.className = `cell ${isMarked ? 'cell-marked' : 'cell-unmarked'}`;
                        
                        cell.onclick = () => {
                            if(state.status !== "playing") return;

                            // ህግ ፍተሻ፡ ቁጥሩ የወጣ ኳስ መሆኑን ማረጋገጥ
                            let ballFound = false;
                            let matchedBallIndex = -1;

                            if(state.drawn_balls) {
                                for(let k=0; k<state.drawn_balls.length; k++) {
                                    let bNum = parseInt(state.drawn_balls[k].substring(1));
                                    if(bNum === parseInt(val)) {
                                        ballFound = true;
                                        matchedBallIndex = k;
                                        break;
                                    }
                                }
                            }

                            // ኳሱ ወጥቶ ከሆነ ግን ከተረሳ (ከሁለተኛው ኳስ አልፎ ወደ ሶስተኛው ከተገባ) ማስጠንቀቂያ መስጠት
                            if(ballFound && state.drawn_balls.length > 0) {
                                let totalDrawn = state.drawn_balls.length;
                                // ተጫዋቹ የአሁኑን የነቃውን (totalDrawn-1) ወይም ከእሱ በፊት የወጣውን 1 ኳስ (totalDrawn-2) ብቻ ነው መንካት የሚችለው
                                // ከዛ ወደ ኋላ ከቀረ (ማለትም ከ totalDrawn-2 በታች ከሆነ) አልፎታል ተብሎ ይታገዳል
                                if(matchedBallIndex < (totalDrawn - 2)) {
                                    alert("⚠️ አልፎሃል! ኳስ ካለፈ በኋላ ማቅለም አሸናፊ አያደርግም!");
                                    return; // ማርክ እንዳያደርግ መከልከል
                                }
                            }

                            // ማርክ የማድረጊያ መስመር
                            if(localMarkedIndices[tNum].has(idx)) {
                                localMarkedIndices[tNum].delete(idx);
                            } else {
                                localMarkedIndices[tNum].add(idx);
                            }
                            
                            const currentMarked = localMarkedIndices[tNum].has(idx);
                            cell.className = `cell ${currentMarked ? 'cell-marked' : 'cell-unmarked'}`;
                        };
                    }

                    if(state.status === "result" && state.winning_ticket_num === String(tNum) && state.winning_indices && state.winning_indices.includes(idx)) {
                        cell.classList.add("cell-winning");
                    }

                    grid.appendChild(cell);
                });

                cardWrapper.appendChild(grid);
                container.appendChild(cardWrapper);
            }
        }

        function claimBingo() {
            fetch('/claim_bingo', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ phone: myPhone })
            })
            .then(res => res.json())
            .then(data => {
                alert(data.msg || (data.success ? "🏆 እንኳን ደስ አለዎት! አሸንፈዋል!" : "ቢንጎ አልሞላም!"));
                refreshStatus();
            });
        }

        function showDeposit() {
            const amt = prompt("የሚያስገቡትን የገንዘብ መጠን ያስገቡ (ETB)፦");
            if(!amt || isNaN(amt)) return;
            const tx = prompt("የቴሌብር/ሲቢኢ ብር የትራንዛክሽን መታወቂያ (Txn ID) ያስገቡ፦");
            
            fetch('/request_deposit', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ phone: myPhone, amount: amt, transaction_id: tx })
            }).then(res => res.json()).then(data => { alert("የማስገባት ጥያቄዎ ለሊስትሮው ተልኳል፣ በቅርቡ ይረጋገጣል!"); });
        }

        function showWithdraw() {
            const amt = prompt("የሚያወጡትን የገንዘብ መጠን ያስገቡ (ETB)፦");
            if(!amt || isNaN(amt)) return;
            
            fetch('/request_withdrawal', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ phone: myPhone, amount: amt })
            }).then(res => res.json()).then(data => { alert(data.msg); refreshStatus(); });
        }
    </script>
</body>
</html>
