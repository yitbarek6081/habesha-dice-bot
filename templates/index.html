<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BESH BINGO</title>
    <style>
        :root { --gold: #ffcc00; --bg: #050a18; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 0; }
        .stats { display: flex; justify-content: space-around; background: #111827; padding: 10px; margin: 5px; border-radius: 10px; border: 1px solid #333; }
        .stats b { display: block; color: var(--gold); }
        .grid-500 { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; max-height: 150px; overflow-y: auto; background: #000; padding: 10px; margin: 10px; border-radius: 10px; }
        .t-box { background: #fff; color: #000; font-size: 0.7rem; padding: 8px 0; font-weight: bold; border-radius: 4px; }
        .t-box.mine { background: var(--gold); border: 2px solid white; box-shadow: 0 0 10px var(--gold); }
        .t-box.sold { background: #333; color: #666; }
        .cell { background: #fff; color: #000; height: 40px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.1rem; cursor: pointer; border: 1px solid #ccc; }
        .cell.selected { background: var(--gold) !important; border: 2px solid #b45309; }
        .cell.free { background: #ff3e3e !important; color: white; font-size: 0.6rem; }
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:2000; flex-direction:column; align-items:center; justify-content:center; }
        .copy-box { background: #1e293b; padding: 15px; border-radius: 10px; border: 1px solid var(--gold); cursor: pointer; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="stats">
        <div>BALANCE <b id="balance">0 ETB</b></div>
        <div>JACKPOT <b id="prize">0 ETB</b></div>
    </div>
    
    <div id="lobby-ui">
        <button onclick="openM('dep-m')" style="background:var(--gold); padding:10px 20px; border-radius:8px; font-weight:bold; margin-top:10px;">📥 DEPOSIT</button>
        <div id="timer" style="font-size: 2.5rem; font-weight: 900; color: var(--gold); margin: 10px;">30</div>
        <div class="grid-500" id="ticket-area"></div>
    </div>

    <div id="game-ui" style="display:none; padding:10px;">
        <div id="ball-circle" style="width:70px; height:70px; background:white; color:black; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.8rem; font-weight:bold; margin: 0 auto 10px;">--</div>
        <div id="card-area"></div>
        <button onclick="claim()" style="background:red; color:white; padding:15px; width:100%; border-radius:10px; font-weight:bold; margin-top:10px;">BINGO!</button>
    </div>

    <div id="dep-m" class="modal">
        <div style="background:#1e293b; padding:20px; border-radius:15px; width:80%;">
            <h2 style="color:var(--gold);">DEPOSIT</h2>
            <p>ቁጥሩን ሲነኩት ኮፒ ይደረጋል:</p>
            <div class="copy-box" onclick="copyNumber('0945880474')">
                <span style="font-size: 1.3rem; letter-spacing: 1px;">0945880474</span><br>
                <small style="color:#888;">(Click to Copy)</small>
            </div>
            <input type="number" id="da" placeholder="መጠን (Amount)" style="width:90%; padding:10px; margin-bottom:10px;">
            <input type="text" id="di" placeholder="Transaction ID" style="width:90%; padding:10px;">
            <button onclick="subD()" style="background:var(--gold); width:95%; padding:10px; margin-top:15px; border-radius:8px; font-weight:bold;">SUBMIT</button>
            <button onclick="closeM('dep-m')" style="color:#888; background:none; border:none; margin-top:15px;">CLOSE</button>
        </div>
    </div>

    <script>
        let phone = localStorage.getItem('phone') || prompt("ስልክ ቁጥር:");
        let username = localStorage.getItem('username') || prompt("ስም:");
        localStorage.setItem('phone', phone); localStorage.setItem('username', username);

        function openM(id) { document.getElementById(id).style.display='flex'; }
        function closeM(id) { document.getElementById(id).style.display='none'; }

        function copyNumber(num) {
            navigator.clipboard.writeText(num);
            alert("ቁጥሩ ኮፒ ተደርጓል: " + num);
        }

        function update() {
            fetch(`/get_status?phone=${phone}`).then(r => r.json()).then(d => {
                document.getElementById('balance').innerText = Math.floor(d.balance) + " ETB";
                document.getElementById('prize').innerText = Math.floor(d.pot * 0.8) + " ETB";
                document.getElementById('timer').innerText = d.timer;

                if(d.status === "lobby") {
                    document.getElementById('lobby-ui').style.display='block';
                    document.getElementById('game-ui').style.display='none';
                    renderTickets(d.sold_tickets);
                } else if(d.status === "playing") {
                    document.getElementById('lobby-ui').style.display='none';
                    document.getElementById('game-ui').style.display='block';
                    document.getElementById('ball-circle').innerText = d.current_ball;
                    if(document.getElementById('card-area').innerHTML === "" && d.my_cards.length > 0) renderCards(d.my_cards);
                }
            });
        }

        function renderCards(cards) {
            const area = document.getElementById('card-area'); area.innerHTML = "";
            let selections = JSON.parse(localStorage.getItem('mySelections') || '{}');
            cards.forEach((card, idx) => {
                let html = `<div style="display:grid; grid-template-columns:repeat(5,1fr); gap:2px; background:#444; padding:4px; border-radius:8px; margin-bottom:10px;">`;
                card.forEach((n, i) => {
                    let cellId = `c-${idx}-${i}`;
                    let isSel = (i === 12 || selections[cellId]) ? 'selected' : '';
                    html += `<div class="cell ${isSel}" id="${cellId}" onclick="toggleCell('${cellId}')">${n||'FREE'}</div>`;
                });
                area.innerHTML += html + `</div>`;
            });
        }

        function toggleCell(id) {
            let el = document.getElementById(id);
            if(el.innerText === "FREE") return;
            el.classList.toggle('selected');
            let selections = JSON.parse(localStorage.getItem('mySelections') || '{}');
            selections[id] = el.classList.contains('selected');
            localStorage.setItem('mySelections', JSON.stringify(selections));
        }

        function renderTickets(sold) {
            const area = document.getElementById('ticket-area');
            if(area.children.length === 0) for(let i=1; i<=500; i++) { 
                let div=document.createElement('div'); div.className='t-box'; div.innerText=i; div.id='t-'+i; area.appendChild(div); 
            }
            for(let i=1; i<=500; i++) {
                let box = document.getElementById('t-'+i);
                if(sold[i]) {
                    box.className = (sold[i] === phone) ? 't-box mine' : 't-box sold';
                    box.onclick = null;
                } else {
                    box.className = 't-box';
                    box.onclick = () => buy(i);
                }
            }
        }

        function buy(n) { fetch('/buy_specific_ticket', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, ticket_num:n, username})}).then(update); }
        function subD() {
            let amt = document.getElementById('da').value, tid = document.getElementById('di').value;
            if(amt && tid) fetch('/request_deposit', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, amount:amt, transaction_id:tid})}).then(() => { closeM('dep-m'); alert("ጥያቄው ተልኳል!"); });
        }
        function claim() { fetch('/claim_bingo', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone})}).then(r=>r.json()).then(d=>{ if(!d.success) alert(d.msg); }); }

        setInterval(update, 2000);
    </script>
</body>
</html>
