<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BESH BINGO</title>
    <style>
        :root { --gold: #f1c40f; --bg: #0f172a; --blue: #1e293b; --red: #e74c3c; --green: #2ecc71; --orange: #e67e22; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; overflow-x: hidden; }
        .stats { display: flex; justify-content: space-around; background: var(--blue); padding: 10px; border: 1px solid var(--gold); border-radius: 10px; margin-bottom: 10px; font-size: 0.8rem; }
        .grid-500 { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; max-height: 200px; overflow-y: auto; background: #000; padding: 10px; border-radius: 8px; border: 1px solid #334155; }
        .t-box { background: white; color: black; font-size: 0.7rem; padding: 8px 0; font-weight: bold; border-radius: 3px; cursor: pointer; }
        .t-box.sold { background: #475569; color: #94a3b8; }
        .t-box.mine { background: var(--gold); box-shadow: 0 0 8px var(--gold); }
        .header-cell { background: var(--blue); color: var(--gold); height: 30px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.1rem; border-radius: 2px; }
        .bingo-card { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; background: #cbd5e1; padding: 3px; margin-bottom: 15px; border-radius: 5px; border: 2px solid var(--gold); }
        .cell { background: white; color: black; height: 38px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.85rem; }
        .cell.selected { background: var(--gold); border: 1px solid #b45309; }
        .cell.free { background: var(--red); color: white; font-size: 0.5rem; }
        .bingo-btn { width: 100%; padding: 18px; background: var(--red); color: white; font-size: 1.6rem; font-weight: 900; border: 4px solid var(--gold); border-radius: 15px; margin-top: 10px; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .game-layout { display: grid; grid-template-columns: 1fr 2fr; gap: 10px; margin-top: 10px; }
        .main-board { border: 1px solid var(--gold); height: 320px; overflow-y: auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 5px; background: #020617; }
        .ball-dot { font-size: 0.6rem; background: #1e293b; padding: 3px; border-radius: 2px; color: #64748b; }
        .ball-dot.active { background: var(--gold); color: black; font-weight: bold; }
    </style>
</head>
<body>
    <div class="stats">
        <div>Wallet<br><span id="balance" style="color:var(--green); font-weight:bold;">0</span></div>
        <div>Players<br><span id="p-count">0</span></div>
        <div>Prize<br><span id="prize" style="color:var(--gold); font-weight:bold;">0</span></div>
    </div>

    <div id="lobby-ui">
        <p style="color: var(--gold); font-weight: bold; margin: 5px 0;">እንኳን ወደ BESH BINGO በሰላም መጡ!</p>
        <h2 id="status-msg" style="color:var(--gold); margin: 5px 0;">ካርቴላ ይምረጡ</h2>
        <div style="font-size: 2.8rem; font-weight: 900; text-shadow: 0 0 10px var(--gold);" id="timer">30</div>
        <div class="grid-500" id="ticket-area"></div>
        <div style="margin-top:10px;">@dicebetbetbot</div>
    </div>

    <div id="game-ui" style="display:none;">
        <div id="ball-circle" style="width:80px;height:80px;background:var(--gold);color:black;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:900;margin:0 auto; border: 4px solid white;">--</div>
        <div class="game-layout">
            <div class="main-board" id="main-board"></div>
            <div id="card-area"></div>
        </div>
        <button class="bingo-btn" onclick="claim()">BINGO</button>
    </div>

    <div id="result-ui" class="overlay" style="display:none;">
        <div style="background:var(--blue); padding:30px; border-radius:20px; border:4px solid var(--gold); text-align:center;">
            <h1 style="color:var(--gold); font-size:3rem; margin:0;">🏆 BINGO!</h1>
            <p id="winner-name" style="font-size:1.4rem; margin:20px 0;"></p>
            <button class="action-btn" style="background:var(--green); width:100%; padding:10px; color:white; font-weight:bold;" onclick="location.reload()">ተመለስ</button>
        </div>
    </div>

    <script>
        let phone = localStorage.getItem('phone') || prompt("ስልክ ያስገቡ:");
        if(phone) localStorage.setItem('phone', phone); else location.reload();

        async function update() {
            try {
                const res = await fetch(`/get_status?phone=${phone}`);
                const d = await res.json();
                document.getElementById('balance').innerText = (d.balance || 0).toFixed(2) + " ETB";
                document.getElementById('p-count').innerText = Object.keys(d.players).length;
                document.getElementById('prize').innerText = Math.floor(d.pot * 0.8) + " ETB";
                document.getElementById('timer').innerText = d.timer;

                if(d.status === "result" && d.winner) {
                    document.getElementById('result-ui').style.display = 'flex';
                    document.getElementById('winner-name').innerHTML = d.winner === phone ? "እርስዎ አሸንፈዋል!" : "አሸናፊ: " + d.winner;
                } else if(d.status === "playing") {
                    document.getElementById('lobby-ui').style.display = 'none';
                    document.getElementById('game-ui').style.display = 'block';
                    document.getElementById('result-ui').style.display = 'none';
                    document.getElementById('ball-circle').innerText = d.current_ball;
                    renderMainBoard(d.drawn_balls);
                    if(document.getElementById('card-area').innerHTML === "") d.my_cards.forEach(renderCard);
                } else {
                    document.getElementById('lobby-ui').style.display = 'block';
                    document.getElementById('game-ui').style.display = 'none';
                    document.getElementById('result-ui').style.display = 'none';
                    renderTickets(d.sold_tickets);
                    document.getElementById('card-area').innerHTML = "";
                }
            } catch(e) {}
        }

        function renderTickets(sold) {
            const area = document.getElementById('ticket-area');
            if(area.children.length === 0) {
                for(let i=1; i<=500; i++) {
                    let div = document.createElement('div'); div.className = 't-box'; div.innerText = i;
                    div.onclick = () => fetch('/buy_specific_ticket', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({phone, ticket_num: i})}).then(r=>r.json()).then(res=>{if(!res.success) alert(res.msg);});
                    area.appendChild(div);
                }
            }
            for(let i=1; i<=500; i++) {
                let box = area.children[i-1];
                if(sold && sold[i]) box.className = sold[i] === phone ? 't-box mine' : 't-box sold';
                else box.className = 't-box';
            }
        }

        function renderMainBoard(drawn) {
            const board = document.getElementById('main-board');
            if(board.children.length === 0) {
                for(let i=1; i<=75; i++) {
                    let d = document.createElement('div'); d.className='ball-dot'; d.id='b-'+i; d.innerText=i;
                    board.appendChild(d);
                }
            }
            if(drawn) drawn.forEach(b => { let el = document.getElementById('b-'+b.substring(1)); if(el) el.classList.add('active'); });
        }

        function renderCard(card) {
            const grid = document.createElement('div'); grid.className = 'bingo-card';
            ['B','I','N','G','O'].forEach(l => { 
                let h = document.createElement('div'); h.className='header-cell'; h.innerText=l; grid.appendChild(h); 
            });
            card.forEach((n, i) => {
                const cell = document.createElement('div');
                cell.className = (i === 12) ? "cell free" : "cell";
                cell.innerText = (i === 12) ? "FREE" : n;
                cell.onclick = () => cell.classList.toggle('selected');
                grid.appendChild(cell);
            });
            document.getElementById('card-area').appendChild(grid);
        }

        function claim() {
            fetch('/claim_bingo', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({phone})}).then(r=>r.json()).then(d=>{if(!d.success) alert(d.msg);});
        }
        setInterval(update, 2000);
    </script>
</body>
</html>
