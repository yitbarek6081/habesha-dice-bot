<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BESH BINGO</title>
    <style>
        :root { --gold: #f1c40f; --bg: #0f172a; --blue: #1e293b; --red: #e74c3c; --green: #2ecc71; --orange: #e67e22; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 5px; overflow-x: hidden; }
        .stats { display: flex; justify-content: space-around; background: var(--blue); padding: 8px; border: 1px solid var(--gold); border-radius: 10px; margin-bottom: 8px; font-size: 0.85rem; }
        .grid-500 { display: grid; grid-template-columns: repeat(10, 1fr); gap: 3px; max-height: 180px; overflow-y: auto; background: #000; padding: 5px; border-radius: 8px; }
        .t-box { background: white; color: black; font-size: 0.7rem; padding: 6px 0; font-weight: bold; border-radius: 3px; cursor: pointer; }
        .t-box.mine { background: var(--gold); border: 1.5px solid white; }
        .t-box.sold { background: #444; color: #888; }
        
        #card-area { display: flex; flex-direction: column; gap: 8px; }
        .bingo-header { display: grid; grid-template-columns: repeat(5, 1fr); background: var(--orange); font-weight: 900; color: white; border-radius: 6px 6px 0 0; font-size: 1rem; padding: 3px 0; }
        .bingo-card { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1.5px; background: #cbd5e1; padding: 3px; border-radius: 0 0 6px 6px; }
        .cell { background: white; color: black; height: 35px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.95rem; border-radius: 2px; }
        .cell.selected { background: var(--gold); border: 1.5px solid #b45309; }
        .cell.free { background: var(--red); color: white; font-size: 0.55rem; }

        .main-board { border: 1.5px solid var(--gold); height: 260px; overflow-y: auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 2.5px; padding: 4px; background: #020617; border-radius: 8px; }
        .ball-dot { font-size: 0.65rem; background: #1e293b; padding: 4px; color: #475569; border: 1px solid #334155; }
        .ball-dot.active { background: var(--gold); color: black; font-weight: bold; border-color: white; }
        
        #ball-circle { width: 70px; height: 70px; background: radial-gradient(circle, #fff, var(--gold)); color: black; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; font-weight: 900; margin: 5px auto; border: 4px solid var(--blue); }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; flex-direction:column; align-items:center; justify-content:center; }
        .btn { padding: 10px 18px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin: 4px; font-size: 0.9rem; }
        
        #bingo-container { position: sticky; bottom: 5px; width: 100%; padding: 5px; box-sizing: border-box; }
        #bingo-btn { width: 100%; padding: 12px; background: var(--red); color: white; font-size: 1.3rem; font-weight: 900; border-radius: 30px; border: 3px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div class="stats">
        <div>ሂሳብ: <span id="balance" style="color:var(--green);">0</span></div>
        <div>ተጫዋች: <span id="p-count" style="color:cyan;">0</span></div>
        <div>ሽልማት: <span id="prize" style="color:var(--gold);">0</span></div>
    </div>

    <div id="lobby-ui">
        <div style="font-size: 2.5rem; font-weight: 900; color: var(--gold);" id="timer">30</div>
        <div class="grid-500" id="ticket-area"></div>
        <div style="margin-top:10px;">
            <button class="btn" style="background:var(--green); color:white;" onclick="openM('dep-m')">ገንዘብ አስገባ</button>
            <button class="btn" style="background:var(--orange); color:white;" onclick="openM('with-m')">ገንዘብ አውጣ</button>
        </div>
    </div>

    <div id="game-ui" style="display:none;">
        <div id="ball-circle">--</div>
        <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 8px;">
            <div class="main-board" id="main-board"></div>
            <div id="card-area"></div>
        </div>
        <div id="bingo-container">
            <button id="bingo-btn" onclick="claim()">BINGO!</button>
        </div>
    </div>

    <div id="dep-m" class="modal">
        <h3 style="color:var(--gold);">ገንዘብ አስገባ</h3>
        <p>ቁጥር: <b id="admin-n">0945880474</b></p>
        <button class="btn" style="background:white;" onclick="copyN()">ኮፒ አድርግ</button>
        <input type="number" id="da" placeholder="መጠን" style="padding:10px; margin:5px; border-radius:5px; border:none;">
        <input type="text" id="di" placeholder="Transaction ID" style="padding:10px; margin:5px; border-radius:5px; border:none;">
        <button class="btn" style="background:var(--green); color:white;" onclick="subD()">ላክ</button>
        <button onclick="closeM('dep-m')" style="color:white; background:none; border:none; margin-top:15px;">ዝጋ</button>
    </div>

    <div id="with-m" class="modal">
        <h3 style="color:var(--gold);">ገንዘብ አውጣ</h3>
        <input type="number" id="wa" placeholder="መጠን" style="padding:10px; border-radius:5px; border:none;">
        <button class="btn" style="background:var(--orange); color:white;" onclick="subW()">አውጣ</button>
        <button onclick="closeM('with-m')" style="color:white; background:none; border:none; margin-top:15px;">ዝጋ</button>
    </div>

    <div id="result-ui" class="modal">
        <h1 style="color:var(--gold); font-size:3rem;">BINGO!</h1>
        <div id="winner-info" style="font-size:1.5rem; color:white;"></div>
    </div>

    <script>
        let phone = localStorage.getItem('phone') || prompt("ስልክ:");
        let username = localStorage.getItem('username') || prompt("ስም:");
        localStorage.setItem('phone', phone); localStorage.setItem('username', username);

        function openM(id) { document.getElementById(id).style.display='flex'; }
        function closeM(id) { document.getElementById(id).style.display='none'; }
        function copyN() { navigator.clipboard.writeText("0945880474"); alert("ኮፒ ተደርጓል!"); }

        function subD() {
            let amt = document.getElementById('da').value;
            let tid = document.getElementById('di').value;
            if(amt && tid) {
                fetch('/request_deposit', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, amount:amt, transaction_id:tid})});
                alert("ተልኳል!"); closeM('dep-m');
            }
        }

        function subW() {
            let amt = document.getElementById('wa').value;
            if(amt > 0) {
                fetch('/withdraw', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, amount:amt})})
                .then(r=>r.json()).then(d=>{ alert(d.success?"ተልኳል!":d.msg); closeM('with-m'); });
            }
        }

        function refund(n) {
            if(confirm(n + " ቁጥርን መመለስ ይፈልጋሉ?")) {
                fetch('/cancel_ticket', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, ticket_num:n})}).then(()=>update());
            }
        }

        function update() {
            fetch(`/get_status?phone=${phone}`).then(r=>r.json()).then(d=>{
                document.getElementById('balance').innerText = d.balance.toFixed(0) + " ETB";
                document.getElementById('prize').innerText = Math.floor(d.pot * 0.8) + " ETB";
                document.getElementById('p-count').innerText = d.active_players;
                document.getElementById('timer').innerText = d.timer;

                if(d.status === "lobby") {
                    document.getElementById('lobby-ui').style.display = 'block';
                    document.getElementById('game-ui').style.display = 'none';
                    document.getElementById('result-ui').style.display = 'none';
                    document.getElementById('main-board').innerHTML = ""; 
                    document.getElementById('card-area').innerHTML = "";
                    renderTickets(d.sold_tickets);
                } else if(d.status === "playing") {
                    document.getElementById('lobby-ui').style.display = 'none';
                    document.getElementById('game-ui').style.display = 'block';
                    document.getElementById('ball-circle').innerText = d.current_ball;
                    renderMainBoard(d.drawn_balls);
                    if(document.getElementById('card-area').innerHTML === "") d.my_cards.forEach(renderCard);
                } else if(d.status === "result") {
                    document.getElementById('result-ui').style.display = 'flex';
                    document.getElementById('winner-info').innerText = d.winner + " አሸንፏል!";
                }
            });
        }

        function renderTickets(sold) {
            const area = document.getElementById('ticket-area');
            if(area.children.length === 0) for(let i=1; i<=500; i++) { let div = document.createElement('div'); div.className='t-box'; div.innerText=i; area.appendChild(div); }
            for(let i=1; i<=500; i++) {
                let box = area.children[i-1];
                if(sold[i]) {
                    box.className = (sold[i] === phone) ? 't-box mine' : 't-box sold';
                    box.onclick = (sold[i] === phone) ? () => refund(i) : null;
                } else { box.className = 't-box'; box.onclick = () => buy(i); }
            }
        }

        function buy(n) { fetch('/buy_specific_ticket', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, ticket_num:n, username})}); }

        function renderMainBoard(drawn) {
            const board = document.getElementById('main-board');
            if(board.children.length === 0) for(let i=1; i<=75; i++) { let d = document.createElement('div'); d.className='ball-dot'; d.id='b-'+i; d.innerText=i; board.appendChild(d); }
            drawn.forEach(b => { let el = document.getElementById('b-'+b.substring(1)); if(el) el.classList.add('active'); });
        }

        function renderCard(card) {
            const wrap = document.createElement('div');
            wrap.innerHTML = `<div class="bingo-header"><div>B</div><div>I</div><div>N</div><div>G</div><div>O</div></div>`;
            const grid = document.createElement('div'); grid.className = 'bingo-card';
            card.forEach((n, i) => {
                const cell = document.createElement('div'); cell.className = (i === 12) ? "cell free" : "cell";
                cell.innerText = (i === 12) ? "FREE" : n;
                cell.onclick = () => cell.classList.toggle('selected');
                grid.appendChild(cell);
            });
            wrap.appendChild(grid); document.getElementById('card-area').appendChild(wrap);
        }

        function claim() { fetch('/claim_bingo', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone})}).then(r=>r.json()).then(d=>{ if(!d.success) alert(d.msg); }); }
        setInterval(update, 2000);
    </script>
</body>
</html>
