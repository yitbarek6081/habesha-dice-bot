<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BESH BINGO - PREMIUM</title>
    <style>
        :root { --gold: #ffcc00; --bg: #050a18; --red: #ff3e3e; --green: #00ff88; --orange: #ff8800; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; text-align: center; margin: 0; padding: 0; overflow-x: hidden; width: 100vw; }
        
        .header-banner { background: linear-gradient(145deg, #1e293b, #050a18); padding: 15px 0; border-bottom: 3px solid var(--gold); position: sticky; top: 0; z-index: 100; }
        .header-banner h1 { margin: 0; font-size: 1.8rem; color: var(--gold); letter-spacing: 3px; }
        
        .stats { display: flex; justify-content: space-around; background: rgba(255,255,255,0.05); padding: 10px; margin: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .stats b { display: block; font-size: 1.1rem; color: var(--gold); }
        
        .action-bar { display: flex; justify-content: center; gap: 6px; padding: 5px 10px; }
        .btn-main { flex: 1; padding: 12px 5px; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; transition: 0.3s; }
        .btn-deposit { background: var(--green); color: #000; }
        .btn-withdraw { background: var(--orange); color: white; }
        .btn-voice-off { background: var(--red); color: white; }
        .btn-voice-on { background: var(--green); color: #000; box-shadow: 0 0 10px var(--green); }

        #ball-circle { 
            width: 75px; height: 75px; 
            background: radial-gradient(circle, #fff, var(--gold)); 
            color: #000; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 1.8rem; font-weight: 900; 
            margin: 15px auto; border: 4px solid #1e293b;
            box-sizing: border-box;
        }

        .grid-500 { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; max-height: 200px; overflow-y: auto; background: #000; padding: 10px; margin: 10px; border-radius: 10px; }
        .t-box { background: #fff; color: #000; font-size: 0.75rem; padding: 8px 0; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .t-box.mine { background: var(--gold); border: 2px solid white; animation: pulse 1.5s infinite; }
        .t-box.sold { background: #333; color: #666; pointer-events: none; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .game-layout { display: grid; grid-template-columns: 1fr 2.2fr; gap: 10px; padding: 10px; box-sizing: border-box; }
        .main-board { border: 1px solid #333; height: 380px; overflow-y: auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; padding: 5px; background: rgba(0,0,0,0.8); border-radius: 10px; }
        .ball-dot { font-size: 0.7rem; background: #111; padding: 5px; color: #444; border-radius: 3px; }
        .ball-dot.active { background: var(--gold); color: #000; font-weight: bold; }
        
        .bingo-card { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; background: #444; padding: 4px; border-radius: 0 0 5px 5px; }
        .cell { background: #fff; color: #000; height: 40px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1rem; }
        .cell.selected { background: var(--gold) !important; border: 2px solid #b45309; }
        .cell.free { background: var(--red) !important; color: white; font-size: 0.6rem; }
        
        #bingo-btn { width: 90%; padding: 12px; background: var(--red); color: white; font-size: 1.2rem; font-weight: 900; border-radius: 15px; border: 2px solid white; margin: 10px auto; display: block; }
        
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:2000; flex-direction:column; align-items:center; justify-content:center; padding: 20px; }
        .modal-content { background: #1e293b; padding: 20px; border-radius: 15px; width: 90%; max-width: 350px; }
        input { padding: 12px; margin: 10px 0; width: 100%; border-radius: 8px; border: none; box-sizing: border-box; font-size: 1rem; }
        #timer { font-size: 3rem; font-weight: 900; color: var(--gold); text-shadow: 0 0 10px var(--gold); margin: 10px 0; }
    </style>
</head>
<body>
    <div class="header-banner"><h1>BESH BINGO</h1></div>
    
    <div class="stats">
        <div>BALANCE<b id="balance">0 ETB</b></div>
        <div>PLAYERS<b id="p-count">0</b></div>
        <div>JACKPOT<b id="prize">0 ETB</b></div>
    </div>

    <div id="lobby-ui">
        <div class="action-bar">
            <button class="btn-main btn-deposit" onclick="openM('dep-m')">📥 DEPOSIT</button>
            <button id="voice-btn" class="btn-main btn-voice-off" onclick="toggleVoice()">🔇 VOICE OFF</button>
            <button class="btn-main btn-withdraw" onclick="openM('with-m')">📤 WITHDRAW</button>
        </div>
        <div id="timer">30</div>
        <p style="font-size: 0.8rem; color: #888;">ካርተላ ይምረጡ (10 ETB)</p>
        <div class="grid-500" id="ticket-area"></div>
    </div>

    <div id="game-ui" style="display:none;">
        <div id="ball-circle">--</div>
        <div class="game-layout">
            <div class="main-board" id="main-board"></div>
            <div>
                <div id="card-area"></div>
                <button id="bingo-btn" onclick="claim()">BINGO!</button>
            </div>
        </div>
    </div>

    <div id="with-m" class="modal"><div class="modal-content"><h2 style="color:var(--orange);">WITHDRAW</h2><input type="number" id="wa" placeholder="Amount (ETB)"><button class="btn-main btn-withdraw" style="width:100%" onclick="subW()">CONFIRM</button><button onclick="closeM('with-m')" style="color:#ccc; background:none; border:none; margin-top:10px;">CLOSE</button></div></div>
    <div id="dep-m" class="modal"><div class="modal-content"><h2 style="color:var(--green);">DEPOSIT</h2><p>Telebirr: <b style="color:var(--gold);">0945880474</b></p><input type="number" id="da" placeholder="Amount"><input type="text" id="di" placeholder="Transaction ID"><button class="btn-main btn-deposit" style="width:100%" onclick="subD()">SUBMIT</button><button onclick="closeM('dep-m')" style="color:#ccc; background:none; border:none; margin-top:10px;">CLOSE</button></div></div>
    <div id="result-ui" class="modal"><h1 style="color:var(--gold); font-size:3rem;">BINGO!</h1><div id="winner-info" style="font-size:1.5rem; margin-bottom: 20px;"></div><button class="btn-main btn-deposit" onclick="location.reload()">OK</button></div>

    <script>
        let phone = localStorage.getItem('phone') || prompt("ስልክ ቁጥር ያስገቡ (e.g. 09...):");
        let username = localStorage.getItem('username') || prompt("የተጫዋች ስም ያስገቡ:");
        if(!phone || !username) location.reload();
        localStorage.setItem('phone', phone); localStorage.setItem('username', username);

        let currentCardData = null, lastBall = "--", isVoiceOn = false;

        function toggleVoice() {
            isVoiceOn = !isVoiceOn;
            const btn = document.getElementById('voice-btn');
            btn.innerText = isVoiceOn ? "🔊 VOICE ON" : "🔇 VOICE OFF";
            btn.className = isVoiceOn ? "btn-main btn-voice-on" : "btn-main btn-voice-off";
        }

        function speak(text) {
            if(!isVoiceOn) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US'; msg.rate = 0.9;
            window.speechSynthesis.speak(msg);
        }

        function openM(id) { document.getElementById(id).style.display='flex'; }
        function closeM(id) { document.getElementById(id).style.display='none'; }

        function update() {
            fetch(`/get_status?phone=${phone}`).then(r=>r.json()).then(d=>{
                document.getElementById('balance').innerText = d.balance + " ETB";
                document.getElementById('prize').innerText = Math.floor(d.pot * 0.8) + " ETB";
                document.getElementById('p-count').innerText = d.active_players;
                document.getElementById('timer').innerText = d.timer;

                if(d.status === "lobby") {
                    document.getElementById('lobby-ui').style.display='block';
                    document.getElementById('game-ui').style.display='none';
                    document.getElementById('result-ui').style.display='none';
                    renderTickets(d.sold_tickets);
                    currentCardData = null; lastBall = "--";
                } else if(d.status === "playing") {
                    document.getElementById('lobby-ui').style.display='none';
                    document.getElementById('game-ui').style.display='block';
                    document.getElementById('ball-circle').innerText = d.current_ball;
                    
                    if (d.current_ball !== lastBall && d.current_ball !== "--") {
                        speak(d.current_ball);
                        lastBall = d.current_ball;
                    }
                    renderMainBoard(d.drawn_balls);
                    if(d.my_cards.length > 0 && !currentCardData) {
                        currentCardData = d.my_cards;
                        document.getElementById('card-area').innerHTML = "";
                        d.my_cards.forEach((c, i) => renderCard(c, i));
                    }
                } else if(d.status === "result") {
                    document.getElementById('result-ui').style.display='flex';
                    document.getElementById('winner-info').innerText = "Winner: " + d.winner;
                }
            }).catch(e => console.log("Update Error"));
        }

        function renderTickets(sold) {
            const area = document.getElementById('ticket-area');
            if(area.children.length === 0) {
                for(let i=1; i<=500; i++) {
                    let div=document.createElement('div'); div.className='t-box'; div.innerText=i; div.id='t-'+i;
                    div.onclick = () => buy(i); area.appendChild(div);
                }
            }
            for(let i=1; i<=500; i++) {
                let box = document.getElementById('t-'+i);
                if(sold[i]) {
                    box.className = (sold[i] === phone) ? 't-box mine' : 't-box sold';
                    box.onclick = null;
                } else {
                    box.className = 't-box'; box.onclick = () => buy(i);
                }
            }
        }

        function buy(n) {
            fetch('/buy_specific_ticket', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body:JSON.stringify({phone, ticket_num:n, username})
            }).then(r=>r.json()).then(res => { if(!res.success) alert(res.msg); update(); });
        }

        function renderMainBoard(drawn) {
            const board = document.getElementById('main-board');
            if(board.children.length === 0) {
                for(let i=1; i<=75; i++) {
                    let d=document.createElement('div'); d.className='ball-dot'; d.id='b-'+i; d.innerText=i;
                    board.appendChild(d);
                }
            }
            drawn.forEach(b => {
                let num = b.replace(/[^0-9]/g, '');
                let el = document.getElementById('b-'+num);
                if(el) el.classList.add('active');
            });
        }

        function renderCard(card, idx) {
            const wrap = document.createElement('div'); wrap.style.marginBottom="10px";
            wrap.innerHTML = `<div style="background:var(--orange);font-weight:900;padding:2px;font-size:0.7rem;">CARD ${idx+1}</div>`;
            const grid = document.createElement('div'); grid.className='bingo-card';
            card.forEach((n, i) => {
                const cell=document.createElement('div');
                cell.className = (i === 12) ? "cell free selected" : "cell";
                cell.innerText = (i === 12) ? "FREE" : n;
                cell.onclick = () => cell.classList.toggle('selected');
                grid.appendChild(cell);
            });
            wrap.appendChild(grid); document.getElementById('card-area').appendChild(wrap);
        }

        function claim() {
            fetch('/claim_bingo', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body:JSON.stringify({phone})
            }).then(r=>r.json()).then(d => { if(!d.success) alert(d.msg); });
        }

        function subD() {
            let amt=document.getElementById('da').value, tid=document.getElementById('di').value;
            if(!amt || !tid) return alert("Please fill all fields");
            fetch('/request_deposit', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body:JSON.stringify({phone, amount:amt, transaction_id:tid})
            }).then(() => { closeM('dep-m'); alert("Deposit request sent to admin!"); });
        }

        function subW() {
            let amt = document.getElementById('wa').value;
            fetch('/withdraw', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body:JSON.stringify({phone, amount:amt})
            }).then(r=>r.json()).then(d => { if(d.success) { alert("Withdrawal request sent!"); closeM('with-m'); } else alert(d.msg); });
        }

        // በየሰከንዱ እንዲያድስ (Timer እንዲቆጥር)
        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
