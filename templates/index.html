<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BESH BINGO - FIXED DUAL-SYNC</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    
    <style>
        :root { 
            --gold: #ffcc00; 
            --bg: #050a18; 
            --red: #ff3e3e; 
            --green: #00ff88; 
            --orange: #ff8800; 
        }
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            width: 100vw; 
            height: 100vh; 
        }
        
        /* 🔄 የሪፍሬሽ በተን ስታይል - በጣም ትንሽ እና የማትረብሽ */
        .floating-refresh-btn {
            position: fixed;
            bottom: 12px;
            right: 12px;
            width: 28px;
            height: 28px;
            background: rgba(255, 204, 0, 0.2);
            border: 1px solid var(--gold);
            color: var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            cursor: pointer;
            z-index: 9999;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
            transition: 0.2s;
        }
        .floating-refresh-btn:active {
            transform: scale(0.9) rotate(60deg);
            background: rgba(255, 204, 0, 0.5);
        }

        #auth-ui {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            background: radial-gradient(circle at center, #1e293b, #050a18);
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid var(--gold);
            border-radius: 20px;
            padding: 30px 20px;
            width: 100%;
            max-width: 360px;
            box-sizing: border-box;
        }
        .input-group { width: 100%; text-align: left; margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.85rem; color: var(--gold); margin-bottom: 5px; font-weight: bold; }
        .auth-input { padding: 14px; width: 100%; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); box-sizing: border-box; font-size: 1rem; background: #fff; color: #000; font-weight: bold; }
        .btn-login { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--green), #00cc6a); color: #000; border: none; border-radius: 10px; font-weight: 900; font-size: 1.1rem; cursor: pointer; }

        #main-app-content { display: flex; flex-direction: column; height: 100vh; width: 100vw; box-sizing: border-box; overflow: hidden; }
        .header-banner { background: linear-gradient(145deg, #1e293b, #050a18); padding: 8px 0; border-bottom: 2px solid var(--gold); }
        .header-banner h1 { margin: 0; font-size: 1.3rem; color: var(--gold); letter-spacing: 2px; }
        
        .stats { display: flex; justify-content: space-around; background: rgba(255,255,255,0.05); padding: 6px; margin: 5px; border-radius: 8px; }
        .stats div { font-size: 0.75rem; color: #94a3b8; }
        .stats b { display: block; font-size: 0.95rem; color: var(--gold); }
        
        #lobby-ui { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
        .action-bar { display: flex; justify-content: center; gap: 6px; padding: 4px 8px; }
        .btn-main { flex: 1; padding: 10px 5px; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; font-size: 0.75rem; }
        .btn-deposit { background: var(--green); color: #000; }
        .btn-withdraw { background: var(--orange); color: white; }

        .timer-container { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 10px auto; width: 90%; background: rgba(255, 255, 255, 0.02); padding: 6px 12px; border-radius: 12px; }
        #timer { font-size: 2rem; font-weight: 900; color: var(--gold); }
        .buy-notice { font-size: 0.95rem; font-weight: 900; color: var(--green); background: rgba(0, 255, 136, 0.1); padding: 8px 12px; border-radius: 8px; border: 2px dashed var(--green); }

        .grid-500 { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; flex: 1; overflow-y: auto; background: #000; padding: 10px; margin: 5px 10px; border-radius: 10px; box-sizing: border-box; }
        .t-box { background: #fff; color: #000; font-size: 0.75rem; padding: 8px 0; font-weight: bold; border-radius: 4px; cursor: pointer; text-align: center; }
        .t-box.mine { background: var(--gold) !important; color: #000 !important; box-shadow: inset 0 0 0 2px #ffffff; }
        .t-box.sold { background: #333; color: #666; cursor: not-allowed; }

        #game-ui { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 5px; box-sizing: border-box; }
        .ball-row { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; margin-bottom: 5px; }
        #ball-circle { width: 55px; height: 55px; background: radial-gradient(circle, #fff, var(--gold)); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; font-weight: 900; }
        #recent-balls-container { display: flex; gap: 5px; }
        .recent-ball { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold; color: #000; background: #cbd5e1; }

        .game-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; flex: 1; overflow: hidden; }
        .board-container { border: 1px solid #333; background: rgba(0,0,0,0.8); border-radius: 8px; padding: 3px; display: flex; flex-direction: column; overflow: hidden; }
        .board-header { display: grid; grid-template-columns: repeat(5, 1fr); background: var(--gold); color: #000; font-weight: 900; font-size: 0.7rem; padding: 2px 0; }
        .main-board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1px; flex: 1; overflow: hidden; }
        .board-column { display: flex; flex-direction: column; gap: 1px; height: 100%; justify-content: space-between; }
        .ball-dot { font-size: 0.65rem; background: #111; color: #444; text-align: center; flex: 1; display: flex; align-items: center; justify-content: center; }
        .ball-dot.active { background: var(--gold); color: #000; font-weight: bold; }
        
        .player-side-area { display: flex; flex-direction: column; justify-content: space-between; height: 100%; overflow: hidden; }
        #card-area { flex: 1; display: flex; flex-direction: column; gap: 6px; overflow-y: auto; }
        .bingo-card { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; background: #444; padding: 4px; border-radius: 0 0 5px 5px; }
        .cell { background: #fff; color: #000; height: 33px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.85rem; cursor: pointer; border-radius: 3px; user-select: none; }
        .cell.selected { background: var(--gold) !important; color: #000 !important; }
        .cell.free { background: var(--red) !important; color: white; font-size: 0.65rem; }
        
        #bingo-btn { width: 100%; padding: 12px 0; background: var(--red); color: white; font-size: 1.1rem; font-weight: 900; border-radius: 10px; cursor: pointer; }
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:2000; flex-direction:column; align-items:center; justify-content:center; }
        .modal-content { background: #1e293b; padding: 20px; border-radius: 15px; width: 92%; max-width: 360px; }
        input { padding: 12px; margin: 10px 0; width: 100%; border-radius: 8px; box-sizing: border-box; }

        .winner-modal { display: none; position: fixed; inset: 0; background: rgba(5,10,24,0.98); z-index: 3000; flex-direction: column; align-items: center; justify-content: center; }
        .winner-box { background: #ffffff; color: #1e293b; width: 92%; max-width: 360px; border-radius: 28px; padding: 20px 15px; border: 4px solid var(--gold); text-align: center; }
        .winner-grid-modern { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; background: #f8fafc; padding: 6px; border-radius: 12px; }
        .w-cell-modern { background: #ffffff; color: #a0aec0; height: 28px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.8rem; border-radius: 8px; border: 1px solid #e2e8f0; }
        .w-cell-modern.drawn { background: #cbd5e1; color: #475569; }
        .w-cell-modern.hit { background: #ef4444 !important; color: #ffffff !important; font-weight: 900; }
        .w-cell-modern.free { background: var(--gold); color: #1e293b; }
    </style>
</head>
<body>

    <!-- 🔄 Floating Refresh Button -->
    <div class="floating-refresh-btn" onclick="triggerSoftRefresh()" title="Refresh connection">🔄</div>

    <div id="auth-ui">
        <div class="auth-card">
            <h2>ተመዝገብ</h2>
            <div class="input-group">
                <label>የተጫዋች ስም</label>
                <input type="text" id="reg-username" class="auth-input" placeholder="ስምዎን ያስገቡ...">
            </div>
            <div class="input-group">
                <label>የስልክ ቁጥር</label>
                <input type="tel" id="reg-phone" class="auth-input" placeholder="09... / 07... / 9... / 7...">
            </div>
            <button id="auth-submit-btn" class="btn-login" onclick="registerUser()">🚀 ወደ ጨዋታው ግባ</button>
        </div>
    </div>

    <div id="main-app-content" style="display: none;">
        <div class="header-banner"><h1>BESH BINGO</h1></div>
        
        <div class="stats">
            <div>BALANCE<b id="balance">0 ETB</b></div>
            <div>PLAYERS<b id="p-count">0</b></div>
            <div>በሽ-ደራሽ<b id="prize">0 ETB</b></div>
        </div>

        <div id="lobby-ui">
            <div class="action-bar">
                <button class="btn-main btn-deposit" onclick="openM('dep-m')">📥 DEPOSIT</button>
                <button class="btn-main btn-withdraw" onclick="openM('with-m')">📤 WITHDRAW</button>
            </div>
            <div class="timer-container">
                <div id="timer">30</div>
                <div class="buy-notice">🎟️ ካርቴላ ይግዙ (10 ETB)</div>
            </div>
            <div class="grid-500" id="ticket-area"></div>
        </div>

        <div id="game-ui" style="display:none;">
            <div class="ball-row">
                <div id="recent-balls-container"></div>
                <div id="ball-circle">--</div>
            </div>
            <div class="game-layout">
                <div class="board-container">
                    <div class="board-header"><div>B</div><div>I</div><div>N</div><div>G</div><div>O</div></div>
                    <div class="main-board" id="main-board"></div>
                </div>
                <div class="player-side-area">
                    <div id="card-area"></div>
                    <button id="bingo-btn" onclick="claim()">BINGO!</button>
                </div>
            </div>
        </div>
    </div>

    <div id="with-m" class="modal"><div class="modal-content"><input type="number" id="wa" placeholder="Amount (ETB)"><button class="btn-main btn-withdraw" onclick="subW()">CONFIRM</button><button onclick="closeM('with-m')">CLOSE</button></div></div>
    <div id="dep-m" class="modal"><div class="modal-content"><p>Send to: <b>0945880474</b></p><input type="number" id="da" placeholder="Amount"><input type="text" id="di" placeholder="Tx ID"><button class="btn-main btn-deposit" onclick="subD()">SUBMIT</button><button onclick="closeM('dep-m')">CLOSE</button></div></div>

    <div id="result-ui" class="winner-modal">
        <div class="winner-box">
            <h2 id="w-player-name">Player Won!</h2>
            <p>Prize: <b id="w-prize-pool">0 ETB</b></p>
            <div id="w-pattern-name" style="font-weight:900; color:var(--red);"></div>
            <div class="winner-grid-modern" id="w-grid-cells"></div>
        </div>
    </div>

    <script>
        let phone = localStorage.getItem('phone');
        let username = localStorage.getItem('username');
        let announced = false, clientBalance = 0;
        let isProcessingBuy = false, socket = null, latestDrawnBallsGlobal = []; 
        let cardsRendered = false; // በጨዋታ መሃል ካርዶች በየሰከንዱ ተደራርበው እንዳይሳሉ መከላከያ

        window.onload = function() {
            if (phone && username) { showGameUI(); }
        }

        function cleanPhoneStr(p) {
            if (!p) return "";
            let clean = String(p).replace(/[^0-9]/g, '');
            if (clean.startsWith("251") && clean.length > 9) { clean = clean.slice(3); }
            if (clean.startsWith("0") && clean.length > 1) { clean = clean.slice(1); }
            if (clean.length >= 9) { clean = clean.slice(-9); }
            return clean;
        }

        function phoneMatches(p1, p2) {
            return cleanPhoneStr(p1) === cleanPhoneStr(p2) && cleanPhoneStr(p1) !== "";
        }

        function getValueByPhone(dict, targetPhone) {
            if (!dict || !targetPhone) return null;
            let targetClean = cleanPhoneStr(targetPhone);
            for (let key in dict) {
                if (cleanPhoneStr(key) === targetClean) return dict[key];
            }
            return null;
        }

        function triggerSoftRefresh() {
            if (socket) {
                console.log("Soft refreshing connection...");
                socket.disconnect();
                setTimeout(() => {
                    socket.connect();
                    fetchBalanceOnly();
                }, 300);
            } else {
                window.location.reload();
            }
        }

        function registerUser() {
            let inputName = document.getElementById('reg-username').value.trim();
            let inputPhone = document.getElementById('reg-phone').value.trim();
            if (inputName.length < 2) return alert("እባክዎ ስም ያስገቡ!");
            
            const cleanPhone = cleanPhoneStr(inputPhone);
            if (cleanPhone.length < 9) return alert("እባክዎ ትክክለኛ ስልክ ያስገቡ!");

            fetch('/register_or_login', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone: cleanPhone, username: inputName })
            })
            .then(res => res.json()).then(data => {
                if (data.success) {
                    localStorage.setItem('phone', cleanPhone);
                    localStorage.setItem('username', inputName);
                    phone = cleanPhone; username = inputName;
                    showGameUI();
                } else { alert(data.msg); }
            });
        }

        function showGameUI() {
            document.getElementById('auth-ui').style.display = 'none';
            document.getElementById('main-app-content').style.display = 'flex'; 
            fetchBalanceOnly();
            initWebSocket();
        }

        function fetchBalanceOnly() {
            if (!phone) return;
            fetch(`/get_status?phone=${encodeURIComponent(phone)}`)
            .then(r => r.json()).then(d => {
                clientBalance = parseFloat(d.balance) || 0;
                document.getElementById('balance').innerText = clientBalance.toFixed(0) + " ETB";
            });
        }

        function initWebSocket() {
            socket = io(window.location.origin);

            socket.on('game_update', function(d) {
                let finalPrize = Math.floor((parseFloat(d.pot) || 0) * 0.8);
                document.getElementById('prize').innerText = finalPrize + " ETB";
                document.getElementById('p-count').innerText = parseInt(d.active_players) || 0;
                document.getElementById('timer').innerText = sanitizeText(d.timer);
                
                if (d.balances) {
                    let myBalance = getValueByPhone(d.balances, phone);
                    if (myBalance !== null) {
                        clientBalance = parseFloat(myBalance) || 0;
                        document.getElementById('balance').innerText = clientBalance.toFixed(0) + " ETB";
                    }
                }

                if(d.status === "lobby") {
                    document.getElementById('lobby-ui').style.display='flex'; document.getElementById('game-ui').style.display='none'; document.getElementById('result-ui').style.display='none';
                    document.getElementById('main-board').innerHTML=""; 
                    document.getElementById('card-area').innerHTML="";
                    cardsRendered = false; // ሎቢ ሲገባ ቀጣይ ጨዋታ ካርዶችን እንዲስል መፍቀድ
                    
                    if (announced) { localStorage.removeItem('marked_0'); localStorage.removeItem('marked_1'); announced = false; }
                    initTicketsOnce(); 
                    if (!isProcessingBuy) { renderTickets(d.sold_tickets || {}); }
                } 
                else if(d.status === "playing") {
                    document.getElementById('lobby-ui').style.display='none'; document.getElementById('game-ui').style.display='flex'; document.getElementById('result-ui').style.display='none';
                    document.getElementById('ball-circle').innerText = sanitizeText(d.current_ball);
                    
                    latestDrawnBallsGlobal = d.drawn_balls || [];
                    renderMainBoard(latestDrawnBallsGlobal);
                    
                    // ካርዶቹ አንዴ ብቻ እንዲሳሉ መከላከል (ይህ ነው ክሊክ ሲደረግ ሪፍሬሽ እንዳያደርግ የሚከለክለው)
                    if (!cardsRendered) {
                        let myCards = [];
                        if (d.sold_tickets) {
                            for (let ticketId in d.sold_tickets) {
                                if (phoneMatches(d.sold_tickets[ticketId], phone)) {
                                    if (d.all_cards && d.all_cards[ticketId]) {
                                        myCards.push({ id: String(ticketId), matrix: d.all_cards[ticketId] });
                                    }
                                }
                            }
                        }

                        const cardArea = document.getElementById('card-area');
                        if (cardArea && myCards.length > 0) {
                            cardArea.innerHTML = "";
                            myCards.forEach((cObj, i) => { renderCard(cObj.matrix, i); }); 
                            cardsRendered = true; 
                        }
                    }
                } 
                else if(d.status === "result") {
                    document.getElementById('result-ui').style.display='flex';
                    document.getElementById('w-player-name').innerText = sanitizeText(d.winner) + " Won!";
                    document.getElementById('w-prize-pool').innerText = finalPrize + " ETB";
                    document.getElementById('w-pattern-name').innerText = d.winning_line_name ? sanitizeText(d.winning_line_name) : "";
                }
            });
        }

        function sanitizeText(str) {
            if (!str) return '';
            return String(str).replace(/[&<>"']/g, function(m) {
                return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#x27;' }[m];
            }).trim();
        }

        function openM(id) { document.getElementById(id).style.display='flex'; }
        function closeM(id) { document.getElementById(id).style.display='none'; }

        function trackCell(cardId, cellVal, shouldSelect) {
            let key = `marked_${parseInt(cardId)}`;
            let list = JSON.parse(localStorage.getItem(key) || "[]");
            let val = parseInt(cellVal); if (isNaN(val)) return;
            
            let idx = list.indexOf(val);
            if (shouldSelect) {
                if (idx === -1) list.push(val);
            } else {
                if (idx > -1) list.splice(idx, 1);
            }
            localStorage.setItem(key, JSON.stringify(list));
        }

        // 🔄 በሁለቱም ካርተላ ላይ ተመሳሳይ ቁጥር ካለ ያለምንም ገጽ ሪፍሬሽ አብሮ ማቅለሚያ የላቀ ሎጂክ
        function handleCellClick(clickedNum, clickedCardIdx, cellElement) {
            let isSelecting = !cellElement.classList.contains('selected');
            
            let allCells = document.querySelectorAll('.cell');
            allCells.forEach(c => {
                let cellNum = parseInt(c.getAttribute('data-num'));
                if (cellNum === clickedNum) {
                    let parentCardIdx = parseInt(c.getAttribute('data-card-idx'));
                    if (isSelecting) {
                        c.classList.add('selected');
                        trackCell(parentCardIdx, clickedNum, true);
                    } else {
                        c.classList.remove('selected');
                        trackCell(parentCardIdx, clickedNum, false);
                    }
                }
            });
        }

        function initTicketsOnce() {
            const area = document.getElementById('ticket-area');
            if(area && area.children.length === 0) { 
                for(let i=1; i<=500; i++) { 
                    let div=document.createElement('div'); div.className='t-box'; div.innerText=i; div.id='t-'+i; area.appendChild(div); 
                } 
            }
        }

        function renderTickets(sold) {
            for(let i=1; i<=500; i++) {
                let box = document.getElementById('t-'+i); if(!box) continue;
                if(sold[i]) { 
                    const isMine = phoneMatches(sold[i], phone);
                    box.className = isMine ? 't-box mine' : 't-box sold'; 
                    box.onclick = isMine ? () => refund(i) : null; 
                } else { box.className='t-box'; box.onclick=()=>buy(i); }
            }
        }

        function buy(n) { 
            if (isProcessingBuy) return;
            if (document.querySelectorAll('.t-box.mine').length >= 2) return alert("ከ 2 ካርተላ በላይ መግዛት አይቻልም!");
            isProcessingBuy = true;
            fetch('/buy_specific_ticket', {
                method:'POST', headers:{'Content-Type':'application/json'}, 
                body:JSON.stringify({phone: phone, ticket_num: n, username: username})
            }).then(() => { isProcessingBuy = false; fetchBalanceOnly(); }).catch(() => { isProcessingBuy = false; }); 
        }

        function refund(n) { 
            if(confirm("መልሰው 10 ብር ይውሰዱ?")) {
                fetch('/cancel_ticket', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone: phone, ticket_num: n}) }).then(() => fetchBalanceOnly()); 
            }
        }
        
        function renderMainBoard(drawn) {
            const board = document.getElementById('main-board');
            if(board.children.length === 0) { 
                for(let col=0; col<5; col++) {
                    let colDiv = document.createElement('div'); colDiv.className = 'board-column';
                    let start = col * 15 + 1;
                    for(let i=start; i<=start+14; i++) {
                        let d = document.createElement('div'); d.className = 'ball-dot'; d.id = 'b-' + i; d.innerText = i;
                        colDiv.appendChild(d);
                    }
                    board.appendChild(colDiv);
                }
            }
            drawn.forEach(b => { let num = parseInt(String(b).replace(/[^0-9]/g, '')); if(!isNaN(num)) { let el = document.getElementById('b-'+num); if(el) el.className = 'ball-dot active'; } });
        }

        function renderCard(card, cardIdx) {
            const safeCardIdx = parseInt(cardIdx);
            const wrap = document.createElement('div'); wrap.style.width="100%";
            wrap.innerHTML = `<div style="display:grid;grid-template-columns:repeat(5,1fr);background:var(--orange);font-weight:900;padding:2px;font-size:0.7rem;text-align:center;"><div>B</div><div>I</div><div>N</div><div>G</div><div>O</div></div>`;
            const grid = document.createElement('div'); grid.className='bingo-card';
            let savedMarks = JSON.parse(localStorage.getItem(`marked_${safeCardIdx}`) || "[]");
            
            card.forEach((n, i) => {
                const cell=document.createElement('div'); let cleanVal = sanitizeText(n);
                if(i === 12 || parseInt(cleanVal) === 0) { 
                    cell.className="cell free selected"; cell.innerText="FREE"; 
                } else { 
                    let numVal = parseInt(cleanVal); 
                    cell.className = savedMarks.includes(numVal) ? "cell selected" : "cell"; 
                    cell.innerText=cleanVal; 
                    cell.setAttribute('data-num', numVal);
                    cell.setAttribute('data-card-idx', safeCardIdx);
                    
                    cell.onclick = () => {
                        let ballFound = false, matchedBallIndex = -1;
                        if (latestDrawnBallsGlobal) {
                            for (let k = 0; k < latestDrawnBallsGlobal.length; k++) {
                                if (parseInt(latestDrawnBallsGlobal[k].replace(/[^0-9]/g, '')) === numVal) {
                                    ballFound = true; matchedBallIndex = k; break;
                                }
                            }
                        }
                        if (ballFound && (latestDrawnBallsGlobal.length - 1 - matchedBallIndex) >= 3) {
                            return alert("⚠️ አልፎሃል! ቁጥሩ ከወጣ 3 ኳስ አልፎታል።");
                        }
                        handleCellClick(numVal, safeCardIdx, cell);
                    } 
                }
                grid.appendChild(cell);
            });
            wrap.appendChild(grid); document.getElementById('card-area').appendChild(wrap);
        }

        function claim() { 
            const activeMarks0 = JSON.parse(localStorage.getItem('marked_0') || "[]");
            const activeMarks1 = JSON.parse(localStorage.getItem('marked_1') || "[]");
            fetch('/claim_bingo', { 
                method:'POST', headers:{ 'Content-Type':'application/json' }, 
                body:JSON.stringify({phone: phone, marked_0: activeMarks0, marked_1: activeMarks1}) 
            }).then(r => r.json()).then(d=>{ if(!d.success) alert(sanitizeText(d.msg)); }); 
        }
        
        function subD() {
            let amt = parseInt(document.getElementById('da').value);
            let tid = sanitizeText(document.getElementById('di').value);
            fetch('/request_deposit', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone: phone, amount: amt, transaction_id: tid}) }).then(() => { closeM('dep-m'); alert("የዲፖዚት ጥያቄው ተልኳል!"); });
        }

        function subW() {
            let amt = parseInt(document.getElementById('wa').value);
            fetch('/request_withdrawal', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ phone: phone, amount: amt }) }).then(r => r.json()).then(res => { closeM('with-m'); alert(res.msg); fetchBalanceOnly(); });
        }
    </script>
</body>
</html>
