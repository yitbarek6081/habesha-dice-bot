<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BESH BINGO - PREMIUM</title>
    <style>
        :root { --gold: #ffcc00; --bg: #050a18; --red: #ff3e3e; --green: #00ff88; --orange: #ff8800; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 0; overflow-x: hidden; width: 100vw; touch-action: manipulation; }
        
        /* --- Header & Stats --- */
        .header-section { position: sticky; top: 0; z-index: 1000; background: var(--bg); border-bottom: 2px solid var(--gold); }
        .stats { display: flex; justify-content: space-around; background: rgba(255,255,255,0.05); padding: 8px; margin: 5px 10px; border-radius: 10px; }
        .stats b { display: block; font-size: 0.9rem; color: var(--gold); }
        .action-bar { display: flex; justify-content: center; gap: 5px; padding: 5px 10px; }
        .btn-main { flex: 1; padding: 12px 2px; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; font-size: 0.75rem; }
        .btn-deposit { background: var(--green); color: #000; }
        .btn-withdraw { background: var(--orange); color: white; }
        .btn-voice { background: #334155; color: white; }
        
        #timer { font-size: 2.5rem; font-weight: 900; color: var(--gold); margin: 5px 0; }

        /* --- Game Layout & Main Board --- */
        .game-layout { display: grid; grid-template-columns: 1fr 2fr; gap: 10px; padding: 10px; height: 380px; align-items: start; }
        .main-board { 
            border: 1px solid #333; height: 350px; overflow-y: auto; 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; 
            padding: 5px; background: #000; scroll-behavior: smooth; border-radius: 8px;
        }
        .ball-dot { font-size: 0.7rem; background: #111; padding: 5px; color: #444; border-radius: 3px; border: 1px solid #222; }
        .ball-dot.active { background: var(--gold); color: #000; font-weight: bold; }
        .ball-dot.last-called { background: #fff !important; color: #000; transform: scale(1.1); box-shadow: 0 0 10px var(--gold); z-index: 10; }

        /* --- EXACT 27x27 BINGO CARD --- */
        .card-wrapper { display: inline-block; width: 145px; margin: 0 auto; } /* Total width: (27*5) + (2*5 gaps) */
        
        .card-header-letters { display: grid; grid-template-columns: repeat(5, 27px); gap: 2px; margin-bottom: 2px; }
        .letter { background: var(--gold); color: #000; font-weight: 900; height: 20px; display: flex; align-items: center; justify-content: center; border-radius: 2px; font-size: 0.8rem; }
        
        .bingo-card { display: grid; grid-template-columns: repeat(5, 27px); grid-template-rows: repeat(5, 27px); gap: 2px; background: #444; padding: 2px; border-radius: 3px; }
        .cell { 
            background: #fff; color: #000; width: 27px; height: 27px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: 0.9rem; border-radius: 2px; cursor: pointer;
        }
        .cell.selected { background: var(--gold) !important; box-shadow: inset 0 0 4px rgba(0,0,0,0.5); }
        .cell.free { background: var(--red) !important; color: white; font-size: 0.4rem; font-weight: bold; }

        /* --- ALIGNED BINGO BUTTON --- */
        .btn-claim { 
            width: 145px; padding: 12px 0; background: var(--red); color: white; 
            font-weight: 900; border: none; border-radius: 8px; font-size: 1.1rem; 
            margin-top: 10px; cursor: pointer; box-shadow: 0 4px 0 #b32a2a; 
        }
        .btn-claim:active { transform: translateY(2px); box-shadow: 0 2px 0 #b32a2a; }

        /* --- Modals & Inputs --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 5000; align-items: flex-start; justify-content: center; padding-top: 15vh; }
        .modal-content { background: #1e293b; padding: 25px; border-radius: 20px; width: 85%; max-width: 340px; border: 2px solid var(--gold); }
        .modal-content input { padding: 14px; margin-bottom: 20px; width: 100%; border-radius: 8px; border: none; font-size: 16px; background: #000; color: white; }
        
        .copy-box { background: rgba(255,204,0,0.1); border: 1px dashed var(--gold); padding: 10px; margin-bottom: 15px; border-radius: 10px; cursor: pointer; }
        #toast { visibility: hidden; background: var(--green); color: #000; padding: 8px 15px; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); border-radius: 50px; font-weight: bold; z-index: 10000; }
        #toast.show { visibility: visible; }
        
        #winner-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>
    <audio id="win-horn" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" preload="auto"></audio>
    <div id="toast">ቁጥሩ ተገልብጧል!</div>

    <div id="winner-overlay">
        <div style="font-size:3rem; color:var(--gold); font-weight:900;">🏆 BINGO! 🏆</div>
        <div id="win-name" style="font-size:2rem; color:white; margin:15px 0;"></div>
    </div>

    <div class="header-section">
        <div style="padding:10px 0;"><h2 style="color:var(--gold); margin:0;">BESH BINGO</h2></div>
        <div class="stats">
            <div>BALANCE<b id="balance">0 ETB</b></div>
            <div>PLAYERS<b id="p-count">0</b></div>
            <div>JACKPOT<b id="prize">0 ETB</b></div>
        </div>
        <div class="action-bar">
            <button class="btn-main btn-deposit" onclick="openM('dep-m')">📥 DEPOSIT</button>
            <button id="voice-btn" class="btn-main btn-voice" onclick="toggleVoice()">🔇 VOICE OFF</button>
            <button class="btn-main btn-withdraw" onclick="openM('with-m')">📤 WITHDRAW</button>
        </div>
    </div>

    <div id="game-ui" style="display:block; padding-top: 10px;">
        <div id="ball-circle" style="width:60px; height:60px; background:radial-gradient(circle, #fff, var(--gold)); color:#000; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.8rem; font-weight:900; margin:0 auto 10px auto; border:3px solid #fff;">--</div>
        
        <div class="game-layout">
            <div class="main-board" id="main-board"></div>
            
            <div id="card-area">
                </div>
        </div>
    </div>

    <div id="dep-m" class="modal"><div class="modal-content">
        <h2 style="color:var(--green); margin-top:0;">DEPOSIT</h2>
        <div class="copy-box" onclick="copyToClipboard('0945880474')">
            <div style="font-size:0.7rem; color:var(--gold);">ለመገልበጥ ይጫኑ (Click to Copy)</div>
            <div style="font-size:1.2rem; font-weight:bold;">0945880474</div>
        </div>
        <input type="number" id="da" placeholder="መጠን (Amount)">
        <input type="text" id="di" placeholder="ትራንዛክሽን ቁጥር (Transaction ID)">
        <button class="btn-main btn-deposit" style="width:100%" onclick="subD()">SUBMIT</button>
        <button onclick="closeM('dep-m')" style="color:#888; background:none; border:none; margin-top:10px;">CLOSE</button>
    </div></div>

    <div id="with-m" class="modal"><div class="modal-content">
        <h2 style="color:var(--orange); margin-top:0;">WITHDRAW</h2>
        <input type="number" id="wa" placeholder="መጠን (Amount)">
        <button class="btn-main btn-withdraw" style="width:100%" onclick="subW()">CONFIRM</button>
        <button onclick="closeM('with-m')" style="color:#888; background:none; border:none; margin-top:10px;">CLOSE</button>
    </div></div>

    <script>
        // Existing logic (Phone/Username/Speech/Modals)
        let phone = localStorage.getItem('phone') || "0912345678"; 
        let isVoiceOn = false;

        function openM(id) { document.getElementById(id).style.display='flex'; }
        function closeM(id) { document.getElementById(id).style.display='none'; }
        
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                let t = document.getElementById("toast");
                t.className = "show"; setTimeout(() => t.className = "", 2000);
            });
        }

        function toggleVoice() {
            isVoiceOn = !isVoiceOn;
            document.getElementById('voice-btn').innerText = isVoiceOn ? "🔊 VOICE ON" : "🔇 VOICE OFF";
        }

        // --- Aligned Rendering Function ---
        function renderCard(card, cardIdx) {
            const wrapper = document.createElement('div');
            wrapper.className = 'card-wrapper';
            
            // Header
            const header = document.createElement('div');
            header.className = 'card-header-letters';
            ['B', 'I', 'N', 'G', 'O'].forEach(l => {
                let d = document.createElement('div'); d.className = 'letter'; d.innerText = l; header.appendChild(d);
            });
            wrapper.appendChild(header);

            // Grid
            const grid = document.createElement('div'); 
            grid.className = 'bingo-card';
            card.forEach((n, i) => {
                const cell = document.createElement('div');
                cell.className = (i === 12) ? "cell free selected" : "cell";
                cell.innerText = (i === 12) ? "FREE" : n;
                cell.onclick = () => { if(i!==12) cell.classList.toggle('selected'); };
                grid.appendChild(cell);
            });
            wrapper.appendChild(grid);

            // Aligned Button
            const claimBtn = document.createElement('button');
            claimBtn.className = 'btn-claim';
            claimBtn.innerText = 'BINGO!';
            claimBtn.onclick = () => alert("Claiming Bingo...");
            
            wrapper.appendChild(claimBtn);
            document.getElementById('card-area').appendChild(wrapper);
        }

        // Example Render for testing
        const demoCard = [1,2,3,4,5,16,17,18,19,20,31,32,0,34,35,46,47,48,49,50,61,62,63,64,65];
        renderCard(demoCard, 0);

        // Main Board Auto-Scroll Logic (Mock Drawn)
        function renderMainBoard(drawn, current) {
            const board = document.getElementById('main-board');
            board.innerHTML = '';
            for(let i=1; i<=75; i++) {
                let d = document.createElement('div'); 
                d.className = 'ball-dot'; 
                d.innerText = i;
                if(drawn.includes(i)) d.classList.add('active');
                if(i == current) {
                    d.classList.add('last-called');
                    setTimeout(() => d.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);
                }
                board.appendChild(d);
            }
        }
        renderMainBoard([1, 15, 27], 27);
    </script>
</body>
</html>
