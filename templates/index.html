<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BESH BINGO</title>
    <style>
        :root { --gold: #ffd700; --bg: #0b0e14; --card-bg: #1a1f29; --accent: #ff4757; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 5px; text-align: center; }
        .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 10px; }
        .stat-card { background: var(--card-bg); padding: 8px; border-radius: 8px; border-bottom: 2px solid var(--gold); }
        .stat-card b { font-size: 0.9rem; }
        
        /* 5x5 ካርቴላ ማስተካከያ (Medium Size) */
        .card-wrapper { width: 92%; max-width: 380px; margin: 15px auto; border-radius: 10px; overflow: hidden; background: #222; }
        .bingo-head { display: grid; grid-template-columns: repeat(5, 1fr); background: #333; color: var(--gold); padding: 10px 0; font-size: 1.4rem; font-weight: bold; }
        .bingo-body { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; background: #444; padding: 5px; }
        .cell { background: #fff; color: #000; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.3rem; border-radius: 4px; }
        .cell.marked { background: var(--gold); position: relative; }
        .cell.marked::after { content: 'X'; position: absolute; font-size: 2rem; color: rgba(0,0,0,0.2); }
        .cell.free { background: var(--accent); color: #fff; font-size: 0.7rem; }

        .ticket-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 3px; max-height: 200px; overflow-y: auto; background: #000; padding: 5px; }
        .t-box { background: #fff; color: #000; font-size: 0.7rem; padding: 8px 0; font-weight: bold; border-radius: 3px; cursor: pointer; }
        .t-box.sold { background: #444; color: #888; }
        .t-box.mine { background: var(--gold); }
        .mini-board { display: grid; grid-template-columns: repeat(15, 1fr); gap: 2px; background: #000; padding: 5px; margin: 10px 0; }
        .dot { font-size: 0.6rem; color: #444; padding: 2px; border-radius: 2px; }
        .dot.active { background: var(--gold); color: #000; }
        .bingo-btn { width: 90%; padding: 15px; background: var(--accent); color: #fff; font-size: 1.5rem; font-weight: 900; border-radius: 10px; border: 3px solid var(--gold); }
    </style>
</head>
<body>
    <div class="stats-bar">
        <div class="stat-card"><b>Wallet</b><br><span id="balance">0 ETB</span></div>
        <div class="stat-card"><b>Players</b><br><span id="p-count">0</span></div>
        <div class="stat-card"><b>Prize</b><br><span id="prize">0 ETB</span></div>
    </div>

    <div id="lobby-ui">
        <h2 id="timer" style="color:var(--gold); font-size:2rem;">30</h2>
        <div class="ticket-grid" id="ticket-area"></div>
        <button onclick="deposit()" style="margin-top:10px; padding:10px;">CASH IN</button>
    </div>

    <div id="game-ui" style="display:none;">
        <div id="ball-circle" style="font-size:2.5rem; color:var(--gold);">--</div>
        <div class="mini-board" id="main-board"></div>
        <div id="card-area"></div>
        <button class="bingo-btn" onclick="claim()">BINGO</button>
    </div>

    <div id="result-ui" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); flex-direction:column; align-items:center; justify-content:center;">
        <h1 style="color:var(--gold);">BINGO!</h1>
        <h2 id="winner-name">---</h2>
    </div>

    <script>
        let phone = localStorage.getItem('phone') || prompt("ስልክ:");
        let username = localStorage.getItem('username') || prompt("ስም:");
        localStorage.setItem('phone', phone); localStorage.setItem('username', username);

        let drawnSet = new Set();

        function update() {
            fetch(`/get_status?phone=${phone}`).then(r=>r.json()).then(d=>{
                document.getElementById('balance').innerText = d.balance.toFixed(1) + " ETB";
                document.getElementById('p-count').innerText = Object.keys(d.players).length;
                document.getElementById('prize').innerText = Math.floor(d.pot * 0.8) + " ETB";
                document.getElementById('timer').innerText = d.timer;

                if(d.status === "lobby") {
                    document.getElementById('lobby-ui').style.display='block';
                    document.getElementById('game-ui').style.display='none';
                    document.getElementById('result-ui').style.display='none';
                    renderTickets(d.sold_tickets);
                } else if(d.status === "playing") {
                    document.getElementById('lobby-ui').style.display='none';
                    document.getElementById('game-ui').style.display='block';
                    document.getElementById('ball-circle').innerText = d.current_ball;
                    drawnSet = new Set(d.drawn_balls.map(b => parseInt(b.substring(1))));
                    renderMainBoard(d.drawn_balls);
                    if(d.is_player && document.getElementById('card-area').innerHTML === "") {
                        d.my_cards.forEach(renderCard);
                    }
                } else if(d.status === "result") {
                    document.getElementById('result-ui').style.display='flex';
                    document.getElementById('winner-name').innerText = d.winner;
                }
            });
        }

        function renderTickets(sold) {
            const area = document.getElementById('ticket-area'); area.innerHTML = "";
            for(let i=1; i<=100; i++) {
                let d = document.createElement('div'); d.innerText = i;
                if(sold[i]) { d.className = (sold[i] === phone) ? 't-box mine' : 't-box sold'; }
                else { d.className = 't-box'; d.onclick = () => buy(i); }
                area.appendChild(d);
            }
        }

        function renderCard(card) {
            const wrap = document.createElement('div'); wrap.className='card-wrapper';
            const h = document.createElement('div'); h.className='bingo-head';
            ['B','I','N','G','O'].forEach(t=>{ let x=document.createElement('div'); x.innerText=t; h.appendChild(x); });
            wrap.appendChild(h);
            const b = document.createElement('div'); b.className='bingo-body';
            card.forEach((n, i) => {
                const c = document.createElement('div'); c.className = (i===12) ? 'cell free' : 'cell';
                c.innerText = (i===12) ? 'FREE' : n;
                c.onclick = () => { if(i!==12 && drawnSet.has(n)) c.classList.toggle('marked'); };
                b.appendChild(c);
            });
            wrap.appendChild(b);
            document.getElementById('card-area').appendChild(wrap);
        }

        function renderMainBoard(drawn) {
            const board = document.getElementById('main-board');
            if(board.children.length===0) {
                for(let i=1; i<=75; i++) {
                    let d = document.createElement('div'); d.className='dot'; d.id='b-'+i; d.innerText=i;
                    board.appendChild(d);
                }
            }
            drawn.forEach(b => { let el = document.getElementById('b-'+b.substring(1)); if(el) el.classList.add('active'); });
        }

        function buy(n) { fetch('/buy_specific_ticket', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({phone, ticket_num:n, username:username})}); }
        function claim() { fetch('/claim_bingo', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({phone})}).then(r=>r.json()).then(d=>{ if(!d.success) alert(d.msg); }); }
        function deposit() { let a=prompt("መጠን:"); let t=prompt("ID:"); if(a && t) fetch('/request_deposit', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, amount:a, transaction_id:t})}); }

        setInterval(update, 2000);
    </script>
</body>
</html>
