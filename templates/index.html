<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Tombola</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold: #f1c40f; --bg: #0f172a; --card: #1e293b; --green: #2ecc71; --blue: #3498db; --red: #e74c3c; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; overflow-x: hidden; }
        
        /* ማስተካከያ 1፡ የወጡ ቁጥሮች ማድመቂያ */
        .b-cell.drawn { 
            background: var(--gold) !important; 
            color: black !important; 
            font-weight: 900; 
            transform: scale(1.1); 
            box-shadow: 0 0 10px var(--gold);
        }

        #winner-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.98); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; text-align: center; }
        .congrats-text { font-size: 2.2rem; font-weight: 900; color: var(--gold); margin-bottom: 10px; animation: bounce 1s infinite; }
        .winner-name-big { font-size: 2rem; background: linear-gradient(90deg, #f1c40f, #e67e22); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .top-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; text-align: center; margin-bottom: 15px; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .stat-item small { display: block; color: #94a3b8; font-size: 0.65rem; }
        .stat-item b { color: var(--gold); font-size: 0.85rem; }
        .action-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 15px; }
        .btn-act { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid var(--gold); background: transparent; color: white; font-weight: bold; }
        .draw-circle { width: 65px; height: 65px; border: 4px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 900; background: var(--card); color: var(--gold); }
        
        .join-container { text-align: center; margin-bottom: 20px; }
        .btn-join-main { width: 85%; padding: 14px; border-radius: 30px; border: none; background: var(--gold); color: black; font-weight: 900; font-size: 1.1rem; cursor: pointer; }
        .btn-join-main.joined { background: var(--red); color: white; }

        .boards-grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 10px; }
        .board-box { background: var(--card); border: 1px solid #334155; border-radius: 12px; padding: 8px; min-height: 300px; }
        #brd { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; }
        .b-cell { font-size: 0.65rem; padding: 6px 0; background: #334155; border-radius: 3px; color: #94a3b8; text-align: center; }
        .b-cell.on-my-ticket { border: 1px solid var(--gold); color: var(--gold); }
        .t-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 8px; }
        .t-cell { background: white; color: #0f172a; height: 40px; display: flex; align-items: center; justify-content: center; font-weight: 900; border-radius: 5px; }
        .t-cell.marked { background: var(--green) !important; color: white !important; }
        .win-btn { background: linear-gradient(135deg, var(--gold), #e67e22); color: black; width: 100%; padding: 12px; border-radius: 10px; font-weight: 900; border: none; display: none; margin-top: 10px; }
    </style>
</head>
<body onclick="enableAudio()">

    <div id="winner-overlay">
        <div class="congrats-text">🎊 አሸናፊ! 🎊</div>
        <div id="big-winner-name" class="winner-name-big">---</div>
        <p style="color: #64748b;">ቀጣይ ጨዋታ በ5 ሰከንድ ውስጥ...</p>
    </div>

    <div class="top-stats">
        <div class="stat-item"><small>Wallet</small><b id="bal">0.00</b></div>
        <div class="stat-item"><small>Timer</small><b id="timer-ui">20s</b></div>
        <div class="stat-item"><small>Pot</small><b id="pot">0</b></div>
        <div class="stat-item"><small>Players</small><b id="p-count">0</b></div>
    </div>

    <div class="action-row">
        <button onclick="deposit()" class="btn-act">Deposit</button>
        <div id="active-num" class="draw-circle">?</div>
        <button onclick="withdraw()" class="btn-act">Withdraw</button>
    </div>

    <div class="join-container">
        <button id="join-btn" onclick="handleJoinAction()" class="btn-join-main">Join (10 Birr)</button>
        <div style="display: flex; gap: 8px; width: 85%; margin: 10px auto;">
            <button onclick="window.open('https://t.me/TombolaEthiopia', '_blank')" style="flex: 1; padding: 10px; border-radius: 12px; border: 1px solid var(--blue); background: transparent; color: var(--blue); font-size: 0.75rem; font-weight: bold;">👥 Group</button>
            <button onclick="shareInvite()" style="flex: 1; padding: 10px; border-radius: 12px; border: 1px solid var(--gold); background: transparent; color: var(--gold); font-size: 0.75rem; font-weight: bold;">🔗 Invite</button>
        </div>
    </div>

    <div class="boards-grid">
        <div class="board-box"><div id="brd"></div></div>
        <div class="board-box">
            <div id="t-container"></div>
            <button id="win-btn-el" onclick="claimWin()" class="win-btn">🎊 TOMBOLA!</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let phone = localStorage.getItem('u_phone'), drawnNums = [], markedNums = [], myTicket = [], audioReady = false, isJoined = false;

        function enableAudio() { audioReady = true; }
        function speak(n) { if(audioReady) { const m = new SpeechSynthesisUtterance(n.toString()); window.speechSynthesis.speak(m); } }

        const boardEl = document.getElementById('brd');
        for(let i=1; i<=90; i++) boardEl.innerHTML += `<div class="b-cell" id="b-${i}">${i}</div>`;

        function update() {
            fetch('/get_status').then(r => r.json()).then(d => {
                document.getElementById('pot').innerText = (d.pot * 0.8).toFixed(0) + " ETB";
                document.getElementById('p-count').innerText = d.player_count;
                document.getElementById('timer-ui').innerText = d.status === "lobby" ? d.timer + "s" : "LIVE 🔴";
                
                if(d.winner) {
                    document.getElementById('big-winner-name').innerText = d.winner;
                    document.getElementById('winner-overlay').style.display = 'flex';
                } else {
                    document.getElementById('winner-overlay').style.display = 'none';
                }

                drawnNums = d.drawn_numbers || [];
                drawnNums.forEach(n => {
                    let cell = document.getElementById(`b-${n}`);
                    if(cell && !cell.classList.contains('drawn')) {
                        cell.classList.add('drawn');
                        document.getElementById('active-num').innerText = n;
                        speak(n);
                    }
                });
            });

            if(phone) fetch('/user_data/'+phone).then(r=>r.json()).then(d=>{
                document.getElementById('bal').innerText = d.balance.toFixed(2);
                if(d.is_joined && !isJoined) {
                    isJoined = true; myTicket = d.ticket; renderTicket(d.ticket);
                    d.ticket.flat().forEach(n => document.getElementById(`b-${n}`).classList.add('on-my-ticket'));
                    document.getElementById('join-btn').innerText = "JOINED ✅";
                    document.getElementById('join-btn').classList.add('joined');
                }
            });
        }

        function shareInvite() {
            const text = encodeURIComponent("ኑ አብረን ቶምቦላ እንጫወት! 💰");
            window.open(`https://t.me/share/url?url=https://t.me/YOUR_BOT_USERNAME&text=${text}`, '_blank');
        }

        function renderTicket(t) {
            let h = '';
            t.forEach((row, rIdx) => {
                h += '<div class="t-row">';
                row.forEach(n => { h += `<div id="tc-${n}" class="t-cell" onclick="mark(${n}, ${rIdx})">${n}</div>`; });
                h += '</div>';
            });
            document.getElementById('t-container').innerHTML = h;
        }

        function mark(n, rIdx) {
            if(drawnNums.includes(n) && !markedNums.includes(n)) {
                markedNums.push(n); document.getElementById(`tc-${n}`).classList.add('marked');
                if(myTicket[rIdx].every(num => markedNums.includes(num))) document.getElementById('win-btn-el').style.display='block';
            }
        }

        function handleJoinAction() {
            fetch('/join_game', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone})})
            .then(r=>r.json()).then(d=> { if(d.success) update(); else alert("Error!"); });
        }

        function deposit() {
            let rec = prompt("SMS ያስገቡ:");
            if(rec) fetch('/request_action', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({type:'Deposit', phone, receipt:rec})});
        }

        function withdraw() {
            let amt = prompt("መጠን:");
            if(amt) fetch('/request_action', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({type:'Withdraw', phone, amount:amt})});
        }

        if(!phone) {
            let p = prompt("ስልክ ያስገቡ:");
            if(p) { phone = p.trim(); localStorage.setItem('u_phone', phone); fetch('/register', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, name: "Player"})}); }
        }

        setInterval(update, 1000); tg.expand();
    </script>
</body>
</html>
