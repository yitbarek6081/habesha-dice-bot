<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Tombola</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold: #f1c40f; --bg: #0f172a; --card: #1e293b; --green: #2ecc71; --blue: #3498db; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; padding-bottom: 30px; overflow-x: hidden; }
        
        .top-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; text-align: center; margin-bottom: 15px; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .stat-item small { display: block; color: #94a3b8; font-size: 0.65rem; text-transform: uppercase; }
        .stat-item b { color: var(--gold); font-size: 0.9rem; }

        .action-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 15px; }
        .btn-act { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid var(--gold); background: transparent; color: white; font-weight: bold; cursor: pointer; font-size: 0.8rem; transition: 0.3s; }
        .btn-act:active { background: var(--gold); color: black; }
        .draw-circle { width: 70px; height: 70px; border: 4px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: 900; background: var(--card); color: var(--gold); box-shadow: 0 0 15px rgba(241, 196, 15, 0.2); transition: transform 0.2s; }

        .join-container { text-align: center; margin-bottom: 20px; }
        .btn-join-main { width: 85%; padding: 14px; border-radius: 30px; border: none; background: var(--gold); color: black; font-weight: 900; font-size: 1.1rem; cursor: pointer; box-shadow: 0 4px 15px rgba(241, 196, 15, 0.3); }
        .btn-join-main:disabled { background: #475569; color: #94a3b8; cursor: not-allowed; box-shadow: none; }

        .boards-grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 10px; align-items: start; }
        .board-box { background: var(--card); border: 1px solid #334155; border-radius: 12px; padding: 8px; min-height: 320px; }
        .board-title { text-align: center; font-size: 0.75rem; color: var(--gold); margin-bottom: 8px; border-bottom: 1px solid #334155; padding-bottom: 5px; font-weight: bold; }

        #brd { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; }
        .b-cell { font-size: 0.65rem; padding: 6px 0; background: #334155; border-radius: 3px; color: #94a3b8; text-align: center; transition: 0.3s; }
        .b-cell.drawn { background: #ef4444; color: white; font-weight: bold; transform: scale(1.05); }
        .b-cell.on-my-ticket { border: 1px solid var(--gold); color: var(--gold); }

        /* እዚህ ጋር ነው የቲኬት ረድፎች የተስተካከሉት */
        .t-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 8px; }
        .t-cell { background: white; color: #0f172a; height: 42px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.1rem; border-radius: 5px; cursor: pointer; border-bottom: 3px solid #cbd5e1; position: relative; }
        .t-cell.match-found { border: 2px solid var(--gold); animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.7; } }
        
        .t-cell.marked { background: var(--green) !important; color: white !important; border-bottom: none; transform: translateY(2px); animation: none; }

        .win-btn { background: linear-gradient(135deg, var(--gold), #e67e22); color: black; width: 100%; padding: 12px; border-radius: 10px; font-size: 1rem; font-weight: 900; border: none; margin-top: 10px; display: none; animation: pulse 1.2s infinite; cursor: pointer; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .footer-link { margin-top: 25px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; text-align: center; }
        .footer-link a { color: #24A1DE; text-decoration: none; font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body onclick="enableAudio()">

    <div class="top-stats">
        <div class="stat-item"><small>Wallet</small><b id="bal">0.00</b></div>
        <div class="stat-item"><small>Time</small><b id="timer-ui">Lobby</b></div>
        <div class="stat-item"><small>Pot</small><b id="pot">0</b></div>
        <div class="stat-item"><small>Players</small><b id="p-count">0</b></div>
    </div>

    <div class="action-row">
        <button onclick="deposit()" class="btn-act">Deposit</button>
        <div id="active-num" class="draw-circle">?</div>
        <button onclick="withdraw()" class="btn-act">Withdraw</button>
    </div>

    <div class="join-container">
        <button id="join-btn" onclick="joinGame()" class="btn-join-main">Join (10 Birr)</button>
    </div>

    <div class="boards-grid">
        <div class="board-box">
            <div class="board-title">Game Board</div>
            <div id="brd"></div>
        </div>

        <div class="board-box">
            <div class="board-title">Tiket Board</div>
            <div id="t-container">
                <p style="font-size: 0.6rem; color: #64748b; text-align: center; margin-top: 20px;">ትኬት ለመቀበል መጀመሪያ ጌሙን ይቀላቀሉ</p>
            </div>
            <button id="win-btn-el" onclick="claimWin()" class="win-btn">🎊 TOMBOLA!</button>
        </div>
    </div>

    <div class="footer-link">
        <a href="https://t.me/TombolaEthiopia" target="_blank">● Join Telegram Group</a>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const ADMIN_PHONE = "0945880474";
        let phone = localStorage.getItem('u_phone'), drawnNums = [], markedNums = [], myTicket = [], audioReady = false;

        function enableAudio() { audioReady = true; }
        function speak(n) { if(audioReady) { const m = new SpeechSynthesisUtterance(n.toString()); m.lang='en-US'; window.speechSynthesis.speak(m); } }

        const boardEl = document.getElementById('brd');
        for(let i=1; i<=90; i++) boardEl.innerHTML += `<div class="b-cell" id="b-${i}">${i}</div>`;

        if(!phone) {
            let p = prompt("እንኳን ደህና መጡ! ስልክ ቁጥርዎን ያስገቡ (ለምሳሌ: 0912345678):");
            if(p && p.length >= 10) { phone = p.trim(); localStorage.setItem('u_phone', phone); fetch('/register', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, name: tg.initDataUnsafe.user?.first_name || "Player"})}); }
        }

        function update() {
            fetch('/get_status').then(r => r.json()).then(d => {
                document.getElementById('pot').innerText = d.pot + " ETB";
                document.getElementById('p-count').innerText = d.player_count;
                let timerUI = document.getElementById('timer-ui');
                
                if(d.status === "lobby") {
                    timerUI.innerText = d.player_count < 2 ? "Wait" : d.timer + "s";
                    if(drawnNums.length > 0 && d.drawn_numbers.length === 0) {
                        document.querySelectorAll('.b-cell').forEach(c => { c.classList.remove('drawn'); c.classList.remove('on-my-ticket'); });
                        document.getElementById('active-num').innerText = "?";
                        markedNums = [];
                        myTicket = [];
                        document.getElementById('t-container').innerHTML = '<p style="font-size: 0.6rem; color: #64748b; text-align: center; margin-top: 20px;">ትኬት ለመቀበል መጀመሪያ ጌሙን ይቀላቀሉ</p>';
                        document.getElementById('win-btn-el').style.display = 'none';
                        document.getElementById('join-btn').innerText = "Join (10 Birr)";
                        document.getElementById('join-btn').disabled = false;
                    }
                } else { timerUI.innerText = "LIVE 🔴"; }

                drawnNums = d.drawn_numbers || [];
                if(drawnNums.length > 0) {
                    let last = drawnNums[drawnNums.length-1];
                    if(document.getElementById('active-num').innerText != last) {
                        document.getElementById('active-num').innerText = last;
                        speak(last);
                        document.getElementById(`b-${last}`).classList.add('drawn');
                        
                        if(myTicket.flat().includes(last)) {
                            let cell = document.getElementById(`tc-${last}`);
                            if(cell && !markedNums.includes(last)) cell.classList.add('match-found');
                        }
                    }
                }
            });
            
            if(phone) fetch('/user_data/'+phone).then(r=>r.json()).then(d=>{
                if(d.error) return;
                document.getElementById('bal').innerText = d.balance.toFixed(2);
                if(d.is_joined && !myTicket.length) {
                    myTicket=d.ticket; 
                    renderTicket(d.ticket);
                    d.ticket.flat().forEach(n => document.getElementById(`b-${n}`).classList.add('on-my-ticket'));
                    document.getElementById('join-btn').innerText = "JOINED ✅";
                    document.getElementById('join-btn').disabled = true;
                }
            });
        }

        function renderTicket(ticket) {
            let h = '';
            // ቲኬቱ 3 ረድፎች ኖረውት እያንዳንዱ 5 ቁጥር ይይዛል
            ticket.forEach((row, idx) => {
                h += `<div class="t-row">`;
                row.forEach(n => {
                    let isDrawn = drawnNums.includes(n);
                    h += `<div id="tc-${n}" class="t-cell ${markedNums.includes(n)?'marked':''} ${isDrawn && !markedNums.includes(n)?'match-found':''}" onclick="mark(${n}, ${idx})">${n}</div>`;
                });
                h += '</div>';
            });
            document.getElementById('t-container').innerHTML = h;
        }

        function mark(n, rowIdx) {
            if(drawnNums.includes(n)) {
                if(!markedNums.includes(n)) {
                    markedNums.push(n); 
                    let el = document.getElementById(`tc-${n}`);
                    el.classList.remove('match-found');
                    el.classList.add('marked');
                    tg.HapticFeedback.impactOccurred('medium');
                    
                    // Row Win Check
                    if(myTicket[rowIdx].every(num => markedNums.includes(num))) {
                        document.getElementById('win-btn-el').style.display = 'block';
                        tg.HapticFeedback.notificationOccurred('success');
                    }
                }
            } else { 
                tg.showAlert("ይህ ቁጥር ገና አልወጣም!"); 
            }
        }

        function deposit() {
            const choice = confirm("ለመክፈል የሚከተሉትን ደረጃዎች ይከተሉ፡\n\n1. 'OK' ን በመጫን የአድሚን ስልክ ቁጥር (0945880474) ይቅዱ።\n2. ብር ከላኩ በኋላ 'Cancel' ን ተጭነው ደረሰኙን ያስገቡ።");
            if (choice) {
                const el = document.createElement('textarea'); el.value = ADMIN_PHONE; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
                tg.showAlert("ቁጥሩ ኮፒ ተደርጓል!");
            } else {
                let rec = prompt("የደረሰኝ SMS እዚህ ያስገቡ:");
                if (rec && rec.length > 5) {
                    fetch('/request_action', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ type: 'Deposit', phone: phone, amount: 'Pending', receipt: rec }) })
                    .then(() => tg.showAlert("ተልኳል!"));
                }
            }
        }

        function withdraw() {
            let amt = prompt("የሚወጣው መጠን:");
            if(amt) fetch('/request_action', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({type:'Withdraw', phone, amount: amt})})
            .then(() => tg.showAlert("ተልኳል!"));
        }

        function claimWin() {
            fetch('/claim_win', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone})})
            .then(r => r.json()).then(d => { if(d.success) { confetti(); tg.showAlert("እንኳን ደስ አለዎት!"); document.getElementById('win-btn-el').style.display = 'none'; } });
        }

        function joinGame() {
            fetch('/join_game', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone})})
            .then(r => r.json()).then(d => { if(d.success) { update(); } else { tg.showAlert("በቂ ባላንስ የሎትም!"); } });
        }

        setInterval(update, 1000); 
        tg.expand();
    </script>
</body>
</html>
