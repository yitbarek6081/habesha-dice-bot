<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BESH BINGO</title>
    <style>
        :root { --gold: #f1c40f; --bg: #0f172a; --blue: #1e293b; --red: #e74c3c; --green: #2ecc71; --orange: #e67e22; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .stats { display: flex; justify-content: space-around; background: var(--blue); padding: 10px; border: 1px solid var(--gold); border-radius: 10px; margin-bottom: 15px; font-size: 0.8rem; }
        
        .grid-500 { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; max-height: 400px; overflow-y: auto; background: #000; padding: 12px; border-radius: 8px; border: 1px solid #334155; }
        .t-box { background: white; color: black; font-size: 1rem; padding: 12px 0; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .t-box.sold { background: #475569; color: #94a3b8; cursor: not-allowed; }
        .t-box.mine { background: var(--gold); border: 2px solid white; animation: pulse 1.5s infinite; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .action-btn { padding: 15px; border-radius: 8px; border: none; color: white; font-weight: bold; cursor: pointer; }
        
        .bingo-header { display: grid; grid-template-columns: repeat(5, 1fr); background: var(--blue); color: var(--gold); font-weight: 900; font-size: 1.5rem; padding: 10px 0; border-radius: 8px 8px 0 0; }
        .bingo-card { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; background: #cbd5e1; padding: 5px; border-radius: 0 0 8px 8px; margin-bottom: 20px; }
        .cell { background: white; color: black; height: 60px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.4rem; border-radius: 4px; }
        .cell.selected { background: var(--gold); border: 3px solid #b45309; }
        .cell.free { background: var(--red); color: white; font-size: 0.8rem; }
        
        .bingo-btn { width: 100%; padding: 25px; background: var(--red); color: white; font-size: 2rem; font-weight: 900; border: 5px solid var(--gold); border-radius: 15px; cursor: pointer; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        #ball-circle { width: 100px; height: 100px; background: radial-gradient(circle at 30% 30%, #fff, var(--gold)); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: 900; margin: 20px auto; border: 5px solid #fff; }
    </style>
</head>
<body>
    <div class="stats">
        <div>Wallet<br><span id="balance" style="color:var(--green); font-weight:bold;">0 ETB</span></div>
        <div>Players<br><span id="p-count">0</span></div>
        <div>Prize<br><span id="prize" style="color:var(--gold); font-weight:bold;">0 ETB</span></div>
    </div>

    <div id="lobby-ui">
        <h1 style="color:var(--green); margin: 5px 0;">ካርቴላ ይምረጡ</h1>
        <div style="font-size: 3.5rem; font-weight: 900;" id="timer">30</div>
        <div class="grid-500" id="ticket-area"></div>
        <div class="btn-row">
            <button class="action-btn" style="background:var(--green)" onclick="deposit()">ገንዘብ አስገባ</button>
            <button class="action-btn" style="background:var(--orange)" onclick="withdraw()">ገንዘብ አውጣ</button>
        </div>
    </div>

    <div id="game-ui" style="display:none;">
        <div id="ball-circle">--</div>
        <div id="card-area"></div>
        <button class="bingo-btn" onclick="claim()">BINGO</button>
    </div>

    <div id="result-ui" class="overlay" style="display:none;">
        <h1 style="color:var(--gold); font-size:4rem;">BINGO!</h1>
        <div id="winner-name" style="font-size:2rem;"></div>
        <p>ቀጣይ ዙር በቅርቡ ይጀምራል...</p>
    </div>

    <script>
        let phone = localStorage.getItem('phone');
        let username = localStorage.getItem('username');

        if(!phone) {
            phone = prompt("ስልክ ቁጥር:");
            username = prompt("የተጫዋች ስም:");
            if(phone && username) { localStorage.setItem('phone', phone); localStorage.setItem('username', username); }
            else { location.reload(); }
        }

        async function deposit() {
            const admin = "0945880474";
            await navigator.clipboard.writeText(admin);
            alert("የአስተዳዳሪው ስልክ ቁጥር ("+admin+") ኮፒ ሆኗል!\n\nብር ከላኩ በኋላ መጠንና ID እዚህ ያስገቡ።");
            let amt = prompt("መጠን:");
            let tid = prompt("Transaction ID:");
            if(amt && tid) fetch('/request_deposit', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, amount:amt, transaction_id:tid})}).then(()=>alert("ጥያቄው ተልኳል!"));
        }

        function buy(n) {
            fetch('/buy_specific_ticket', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, ticket_num:n, username})})
            .then(r=>r.json()).then(d=>{ if(!d.success) alert(d.msg); });
        }

        function refund(n) {
            if(confirm(n + " ቁጥርን መመለስ ይፈልጋሉ?")) {
                fetch('/cancel_ticket', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, ticket_num:n})})
                .then(r=>r.json()).then(d=>{ if(d.success) alert("ብሩ ተመላሽ ሆኗል!"); else alert(d.msg); });
            }
        }

        function update() {
            fetch(`/get_status?phone=${phone}`).then(r=>r.json()).then(d=>{
                document.getElementById('balance').innerText = d.balance.toFixed(2) + " ETB";
                document.getElementById('p-count').innerText = Object.keys(d.players).length;
                document.getElementById('prize').innerText = Math.floor(d.pot * 0.8) + " ETB";
                document.getElementById('timer').innerText = d.timer;

                if(d.status === "lobby") {
                    document.getElementById('lobby-ui').style.display = 'block';
                    document.getElementById('game-ui').style.display = 'none';
                    document.getElementById('result-ui').style.display = 'none';
                    renderTickets(d.sold_tickets);
                } else if(d.status === "playing") {
                    document.getElementById('lobby-ui').style.display = 'none';
                    document.getElementById('game-ui').style.display = 'block';
                    document.getElementById('ball-circle').innerText = d.current_ball;
                    let area = document.getElementById('card-area');
                    if(d.is_player && area.innerHTML === "") d.my_cards.forEach(renderCard);
                } else if(d.status === "result") {
                    document.getElementById('result-ui').style.display = 'flex';
                    document.getElementById('winner-name').innerText = d.winner;
                    document.getElementById('card-area').innerHTML = "";
                }
            });
        }

        function renderTickets(sold) {
            const area = document.getElementById('ticket-area');
            if(area.children.length === 0) {
                for(let i=1; i<=500; i++) {
                    let div = document.createElement('div'); div.className = 't-box'; div.innerText = i;
                    div.onclick = () => buy(i); area.appendChild(div);
                }
            }
            for(let i=1; i<=500; i++) {
                let box = area.children[i-1];
                if(sold[i]) {
                    if(sold[i] === phone) { box.className = 't-box mine'; box.onclick = () => refund(i); }
                    else { box.className = 't-box sold'; box.onclick = null; }
                } else { box.className = 't-box'; box.onclick = () => buy(i); }
            }
        }

        function renderCard(card) {
            const wrap = document.createElement('div');
            const head = document.createElement('div'); head.className = 'bingo-header';
            ['B','I','N','G','O'].forEach(l => { let d=document.createElement('div'); d.innerText=l; head.appendChild(d); });
            const grid = document.createElement('div'); grid.className = 'bingo-card';
            card.forEach((n, i) => {
                let c = document.createElement('div');
                c.className = (i === 12) ? "cell free" : "cell";
                c.innerText = (i === 12) ? "FREE" : n;
                c.onclick = () => c.classList.toggle('selected');
                grid.appendChild(c);
            });
            wrap.appendChild(head); wrap.appendChild(grid);
            document.getElementById('card-area').appendChild(wrap);
        }

        function claim() {
            fetch('/claim_bingo', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone})})
            .then(r=>r.json()).then(d=>{ if(!d.success) alert(d.msg); });
        }
        setInterval(update, 2000);
    </script>
</body>
</html>
