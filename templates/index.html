<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BESH BINGO - PREMIUM</title>
    <style>
        :root { 
            --gold: #ffcc00; --bg: #050a18; --red: #ff3e3e; 
            --green: #00ff88; --orange: #ff8800; --glass: rgba(255, 255, 255, 0.07);
        }
        
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { 
            background: var(--bg); color: white; font-family: sans-serif; 
            text-align: center; margin: 0; padding: 0; overflow-x: hidden; width: 100vw; 
        }

        /* --- UI Components --- */
        .header-section { position: sticky; top: 0; z-index: 1000; background: var(--bg); border-bottom: 2px solid var(--gold); }
        .stats { display: flex; justify-content: space-around; background: var(--glass); padding: 8px; margin: 5px 10px; border-radius: 10px; }
        .stats b { display: block; font-size: 1rem; color: var(--gold); }
        .action-bar { display: flex; justify-content: center; gap: 5px; padding: 5px 10px; }
        
        .btn-main { flex: 1; padding: 12px 2px; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; font-size: 0.75rem; }
        .btn-deposit { background: var(--green); color: #000; }
        .btn-withdraw { background: var(--orange); color: white; }

        /* --- DEPOSIT NUMBER STYLING --- */
        .copy-box {
            background: #1e293b; border: 1px dashed var(--gold);
            padding: 10px; margin: 10px 0; border-radius: 8px;
            cursor: pointer; position: relative;
        }
        .copy-box:active { background: #334155; }
        .copy-label { font-size: 0.7rem; color: var(--gold); display: block; }
        .copy-num { font-size: 1.2rem; font-weight: bold; letter-spacing: 1px; }

        /* --- COMPACT BINGO CARD --- */
        .card-container { margin-bottom: 10px; max-width: 280px; margin-inline: auto; }
        .card-header-letters { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; }
        .letter { background: var(--gold); color: #000; font-weight: 900; padding: 3px 0; border-radius: 3px; font-size: 0.8rem; }
        .bingo-card { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; background: #333; padding: 2px; border-radius: 4px; }
        .cell { 
            background: #fff; color: #000; height: 32px; /* Reduced height */
            display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: 1rem; border-radius: 2px;
        }
        .cell.selected { background: var(--gold) !important; }
        .cell.free { background: var(--red) !important; color: white; font-size: 0.5rem; }

        /* --- MODAL INPUT SPACING --- */
        .modal-content input { 
            padding: 14px; 
            margin-bottom: 15px; /* Added more space between inputs */
            width: 100%; border-radius: 8px; border: 1px solid #444; 
            background: #0f172a; color: white; font-size: 16px; 
        }
        .modal-content h2 { margin-bottom: 20px; }

        /* --- OTHER UI --- */
        #timer { font-size: 2.5rem; font-weight: 900; color: var(--gold); }
        .grid-500 { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; max-height: 250px; overflow-y: auto; padding: 10px; }
        .t-box { flex: 0 0 18%; background: #fff; color: #000; font-size: 0.8rem; padding: 10px 0; font-weight: bold; border-radius: 5px; }
        .t-box.mine { background: var(--gold); border: 2px solid white; }
        .t-box.sold { background: #222; color: #555; pointer-events: none; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; align-items: center; justify-content: center; }
        .modal-content { background: #1e293b; padding: 25px; border-radius: 20px; width: 85%; max-width: 340px; }

        #toast { 
            visibility: hidden; min-width: 200px; background-color: var(--green); color: #000; 
            text-align: center; border-radius: 50px; padding: 10px; position: fixed; 
            z-index: 10000; bottom: 30px; left: 50%; transform: translateX(-50%); font-weight: bold;
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 1.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>
    <div id="toast">ቁጥሩ ተገልብጧል! (Copied)</div>

    <div class="header-section">
        <div style="padding:10px 0;"><h2 style="color:var(--gold); margin:0;">BESH BINGO</h2></div>
        <div class="stats">
            <div>ቀሪ ሂሳብ<b id="balance">0 ETB</b></div>
            <div>ተጫዋቾች<b id="p-count">0</b></div>
            <div>ሽልማት<b id="prize">0 ETB</b></div>
        </div>
        <div class="action-bar">
            <button class="btn-main btn-deposit" onclick="openM('dep-m')">📥 DEPOSIT</button>
            <button class="btn-main btn-withdraw" onclick="openM('with-m')">📤 WITHDRAW</button>
        </div>
    </div>

    <div id="lobby-ui">
        <div id="timer">30</div>
        <div class="grid-500" id="ticket-area"></div>
    </div>

    <div id="game-ui" style="display:none; padding:10px;">
        <div id="ball-circle" style="width:60px; height:60px; background:var(--gold); color:#000; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.8rem; font-weight:900; margin:10px auto;">--</div>
        <div id="card-area"></div>
        <button onclick="claim()" style="width:100%; max-width:280px; padding:15px; background:var(--red); color:white; font-weight:900; border:none; border-radius:10px; font-size:1.2rem; margin-top:5px;">BINGO!</button>
    </div>

    <div id="dep-m" class="modal"><div class="modal-content">
        <h2 style="color:var(--green);">DEPOSIT</h2>
        
        <div class="copy-box" onclick="copyToClipboard('0945880474')">
            <span class="copy-label">ለመላክ ቁጥሩን ይጫኑ (Click to copy)</span>
            <span class="copy-num">0945880474</span>
        </div>

        <input type="number" id="da" placeholder="መጠን (Amount)">
        <input type="text" id="di" placeholder="ትራንዛክሽን ቁጥር (Transaction ID)">
        
        <button class="btn-main btn-deposit" style="width:100%" onclick="subD()">ጥያቄ ላክ</button>
        <button onclick="closeM('dep-m')" style="color:#888; background:none; border:none; margin-top:15px;">ተመለስ</button>
    </div></div>

    <div id="with-m" class="modal"><div class="modal-content">
        <h2 style="color:var(--orange);">WITHDRAW</h2>
        <input type="number" id="wa" placeholder="የሚወጣው መጠን (Amount)">
        <button class="btn-main btn-withdraw" style="width:100%" onclick="subW()">ብር አውጣ</button>
        <button onclick="closeM('with-m')" style="color:#888; background:none; border:none; margin-top:15px;">ተመለስ</button>
    </div></div>

    <script>
        let phone = localStorage.getItem('phone') || prompt("ስልክ ያስገቡ:");
        let username = localStorage.getItem('username') || prompt("ስም ያስገቡ:");
        localStorage.setItem('phone', phone); localStorage.setItem('username', username);

        function openM(id) { document.getElementById(id).style.display='flex'; }
        function closeM(id) { document.getElementById(id).style.display='none'; }

        // --- AUTOMATIC COPY FUNCTION ---
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                let toast = document.getElementById("toast");
                toast.className = "show";
                setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 2000);
            });
        }

        function update() {
            fetch(`/get_status?phone=${phone}`).then(r=>r.json()).then(d=>{
                document.getElementById('balance').innerText = d.balance + " ETB";
                document.getElementById('prize').innerText = Math.floor(d.pot * 0.8) + " ETB";
                document.getElementById('p-count').innerText = d.active_players;
                document.getElementById('timer').innerText = d.timer;

                if(d.status === "lobby") {
                    document.getElementById('lobby-ui').style.display='block';
                    document.getElementById('game-ui').style.display='none';
                    renderTickets(d.sold_tickets);
                } else if(d.status === "playing") {
                    document.getElementById('lobby-ui').style.display='none';
                    document.getElementById('game-ui').style.display='block';
                    document.getElementById('ball-circle').innerText = d.current_ball;
                    if(d.my_cards.length > 0 && document.getElementById('card-area').children.length === 0) {
                        d.my_cards.forEach((c, i) => renderCard(c, i));
                    }
                }
            });
        }

        function renderTickets(sold) {
            const area = document.getElementById('ticket-area');
            if(area.children.length === 0) {
                for(let i=1; i<=500; i++) {
                    let div = document.createElement('div');
                    div.className = 't-box'; div.innerText = i; div.id = 't-'+i;
                    area.appendChild(div);
                }
            }
            for(let i=1; i<=500; i++) {
                let box = document.getElementById('t-'+i);
                let owner = sold[String(i)];
                if(owner) {
                    box.className = (owner === phone) ? 't-box mine' : 't-box sold';
                } else {
                    box.className = 't-box'; box.onclick = () => buy(i);
                }
            }
        }

        function renderCard(card, cardIdx) {
            const container = document.createElement('div');
            container.className = 'card-container';
            const header = document.createElement('div');
            header.className = 'card-header-letters';
            ['B', 'I', 'N', 'G', 'O'].forEach(l => {
                let d = document.createElement('div'); d.className = 'letter'; d.innerText = l; header.appendChild(d);
            });
            container.appendChild(header);
            const grid = document.createElement('div'); 
            grid.className = 'bingo-card';
            card.forEach((n, i) => {
                const cell = document.createElement('div');
                cell.className = (i === 12) ? "cell free" : "cell";
                cell.innerText = (i === 12) ? "FREE" : n;
                cell.onclick = () => { if(i!==12) cell.classList.toggle('selected'); };
                grid.appendChild(cell);
            });
            container.appendChild(grid);
            document.getElementById('card-area').appendChild(container);
        }

        function buy(n) { fetch('/buy_specific_ticket', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, ticket_num:String(n), username})}).then(update); }
        function claim() { fetch('/claim_bingo', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone})}).then(r=>r.json()).then(d=> { if(!d.success) alert("ቢንጎ አልሞላም!"); }); }
        function subD() { fetch('/request_deposit', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, amount:document.getElementById('da').value, transaction_id:document.getElementById('di').value})}).then(()=> { closeM('dep-m'); alert("ጥያቄው ተልኳል!"); }); }
        function subW() { fetch('/withdraw', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, amount:document.getElementById('wa').value})}).then(r=>r.json()).then(d => { if(d.success){ closeM('with-m'); alert("ጥያቄ ተልኳል!"); } else { alert("በቂ ብር የለዎትም!"); } }); }

        setInterval(update, 2000); update();
    </script>
</body>
</html>
