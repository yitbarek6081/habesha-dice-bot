<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 10px; margin: 0; }
        .lobby-bar { background: #1e293b; padding: 10px; border-radius: 12px; border: 2px solid #f1c40f; margin-bottom: 15px; }
        .main-layout { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; align-items: flex-start; }
        
        .board { flex: 1.2; min-width: 280px; background: #1e293b; padding: 10px; border-radius: 10px; display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; }
        .b-cell { font-size: 0.75rem; padding: 6px; background: #334155; border-radius: 4px; color: #94a3b8; transition: 0.3s; }
        .b-cell.drawn { background: #ef4444; color: white; font-weight: bold; transform: scale(1.1); box-shadow: 0 0 8px #ef4444; }

        .ticket { flex: 1; min-width: 280px; background: #f1c40f; padding: 12px; border-radius: 10px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .t-cell { background: white; color: black; height: 45px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.2rem; border-radius: 6px; cursor: pointer; }
        .t-cell.marked { background: #22c55e; color: white; text-decoration: line-through; }

        .win-btn { background: #22c55e; color: white; border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 1.1rem; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="lobby-ui" class="lobby-bar">
        <h3>Lobby (መመዝገቢያ)</h3>
        <div id="timer" style="font-size: 2.5rem; color: #f1c40f; font-weight: bold;">20</div>
        <button onclick="this.innerText='ተመዝግበዋል ✅'; this.disabled=true;" style="background:#f1c40f; border:none; padding:10px 20px; border-radius:6px; font-weight:bold; cursor:pointer; margin-top:5px;">JOIN</button>
    </div>

    <div class="main-layout">
        <div class="board" id="board"></div>
        <div class="ticket" id="ticket"></div>
    </div>
    <button class="win-btn" onclick="claimWin()">🏆 አሸነፍኩ! (BINGO)</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const b = document.getElementById('board');
        for(let i=1; i<=90; i++) b.innerHTML += `<div class="b-cell" id="b-${i}">${i}</div>`;

        fetch('/get_ticket').then(r => r.json()).then(data => {
            const t = document.getElementById('ticket');
            data.ticket.flat().forEach(num => {
                const c = document.createElement('div');
                c.className = 't-cell'; c.innerText = num;
                c.onclick = () => { c.classList.toggle('marked'); tg.HapticFeedback.impactOccurred('medium'); };
                t.appendChild(c);
            });
        });

        setInterval(() => {
            fetch('/game_status').then(r => r.json()).then(data => {
                if(data.status === "lobby") document.getElementById('timer').innerText = data.timer;
                if(data.status === "running") {
                    document.getElementById('lobby-ui').style.display = 'none';
                    data.drawn.forEach(n => document.getElementById(`b-${n}`).classList.add('drawn'));
                }
            });
        }, 1000);

        function claimWin() { tg.sendData("win"); tg.close(); }
    </script>
</body>
</html>
