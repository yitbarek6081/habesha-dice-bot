<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BESH BINGO - PREMIUM</title>
    <style>
        :root { --gold: #ffcc00; --bg: #050a18; --red: #ff3e3e; --green: #00ff88; --orange: #ff8800; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 0; overflow-x: hidden; width: 100vw; }
        .header-section { position: sticky; top: 0; z-index: 1000; background: var(--bg); border-bottom: 2px solid var(--gold); }
        .stats { display: flex; justify-content: space-around; background: rgba(255,255,255,0.05); padding: 8px; margin: 5px 10px; border-radius: 10px; }
        .stats b { display: block; font-size: 1rem; color: var(--gold); }
        .action-bar { display: flex; justify-content: center; gap: 5px; padding: 5px 10px; }
        .btn-main { flex: 1; padding: 10px 2px; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; font-size: 0.7rem; }
        .btn-deposit { background: var(--green); color: #000; }
        .btn-withdraw { background: var(--orange); color: white; }
        .btn-voice { background: #334155; color: white; }
        #timer { font-size: 2.2rem; font-weight: 900; color: var(--gold); margin: 5px 0; }
        .grid-500 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; max-height: 250px; overflow-y: auto; background: #000; padding: 10px; margin: 10px; border-radius: 8px; }
        .t-box { background: #fff; color: #000; font-size: 0.85rem; padding: 10px 0; font-weight: bold; border-radius: 4px; }
        .t-box.mine { background: var(--gold); border: 2px solid white; animation: pulse 1.5s infinite; }
        .t-box.sold { background: #222; color: #555; }
        .game-layout { display: grid; grid-template-columns: 1fr 2fr; gap: 8px; padding: 10px; }
        .main-board { border: 1px solid #333; height: 350px; overflow-y: auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; padding: 5px; background: #000; }
        .ball-dot { font-size: 0.7rem; background: #111; padding: 5px; color: #444; border-radius: 3px; }
        .ball-dot.active { background: var(--gold); color: #000; font-weight: bold; }
        .bingo-card { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; background: #444; padding: 3px; }
        .cell { background: #fff; color: #000; height: 35px; display: flex; align-items: center; justify-content: center; font-weight: 900; }
        .cell.selected { background: var(--gold) !important; }
        .cell.free { background: var(--red) !important; color: white; font-size: 0.6rem; }
        #winner-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; flex-direction: column; justify-content: center; align-items: center; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: flex-start; padding-top: 50px; }
        .modal-content { background: #1e293b; padding: 20px; border-radius: 12px; width: 85%; max-width: 320px; border: 1px solid var(--gold); }
        input { padding: 12px; margin: 10px 0; width: 100%; border-radius: 8px; border: none; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <audio id="win-horn" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" preload="auto"></audio>
    <div id="winner-overlay">
        <div style="font-size:2.5rem; color:var(--gold); font-weight:900;">🏆 CONGRATS! 🏆</div>
        <div id="win-name" style="font-size:2rem; color:white; margin:15px 0;"></div>
    </div>

    <div class="header-section">
        <div style="padding:10px 0;"><h1 style="color:var(--gold); margin:0;">BESH BINGO</h1></div>
        <div class="stats">
            <div>BALANCE<b id="balance">0 ETB</b></div>
            <div>PLAYERS<b id="p-count">0</b></div>
            <div>JACKPOT<b id="prize">0 ETB</b></div>
        </div>
        <div class="action-bar">
            <button class="btn-main btn-deposit" onclick="openM('dep-m')">📥 DEPOSIT</button>
            <button id="voice-btn" class="btn-main btn-voice" onclick="toggleVoice()">🔇 VOICE OFF</button>
            <button class="btn-main btn-withdraw" onclick="openM('with-m')">📤 WITHDRAW</button>
        </div>
    </div>

    <div id="lobby-ui">
        <div id="timer">30</div>
        <div class="grid-500" id="ticket-area"></div>
    </div>

    <div id="game-ui" style="display:none;">
        <div id="ball-circle" style="width:70px; height:70px; background:radial-gradient(circle, #fff, var(--gold)); color:#000; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.8rem; font-weight:900; margin:10px auto;">--</div>
        <div class="game-layout">
            <div class="main-board" id="main-board"></div>
            <div>
                <div id="card-area"></div>
                <button onclick="claim()" style="width:100%; padding:10px; background:var(--red); color:white; font-weight:900; border:none; margin-top:10px;">BINGO!</button>
            </div>
        </div>
    </div>

    <div id="dep-m" class="modal"><div class="modal-content">
        <h2 style="color:var(--green);">DEPOSIT</h2>
        <input type="number" id="da" placeholder="Amount">
        <input type="text" id="di" placeholder="Transaction ID">
        <button class="btn-main btn-deposit" style="width:100%" onclick="subD()">SUBMIT</button>
        <button onclick="closeM('dep-m')" style="color:#888; background:none; border:none;">CLOSE</button>
    </div></div>

    <div id="with-m" class="modal"><div class="modal-content">
        <h2 style="color:var(--orange);">WITHDRAW</h2>
        <input type="number" id="wa" placeholder="Amount">
        <button class="btn-main btn-withdraw" style="width:100%" onclick="subW()">CONFIRM</button>
        <button onclick="closeM('with-m')" style="color:#888; background:none; border:none;">CLOSE</button>
    </div></div>

    <script>
        let phone = localStorage.getItem('phone') || prompt("ስልክ ያስገቡ:");
        let username = localStorage.getItem('username') || prompt("ስም ያስገቡ:");
        localStorage.setItem('phone', phone); localStorage.setItem('username', username);

        let announced = false, isVoiceOn = false, lastBall = "--";

        function toggleVoice() {
            isVoiceOn = !isVoiceOn;
            document.getElementById('voice-btn').innerText = isVoiceOn ? "🔊 VOICE ON" : "🔇 VOICE OFF";
        }

        function speak(t) { if(isVoiceOn) { let m = new SpeechSynthesisUtterance(t); window.speechSynthesis.speak(m); } }

        function openM(id) { document.getElementById(id).style.display='flex'; }
        function closeM(id) { document.getElementById(id).style.display='none'; }

        function update() {
            fetch(`/get_status?phone=${phone}`).then(r=>r.json()).then(d=>{
                document.getElementById('balance').innerText = d.balance + " ETB";
                document.getElementById('prize').innerText = Math.floor(d.pot * 0.8) + " ETB";
                document.getElementById('p-count').innerText = d.active_players;
                document.getElementById('timer').innerText = d.timer;

                if(d.status === "lobby") {
                    document.getElementById('lobby-ui').style.display='block';
                    document.getElementById('game-ui').style.display='none';
                    document.getElementById('winner-overlay').style.display='none';
                    announced = false; renderTickets(d.sold_tickets);
                } else if(d.status === "playing") {
                    document.getElementById('lobby-ui').style.display='none';
                    document.getElementById('game-ui').style.display='block';
                    document.getElementById('ball-circle').innerText = d.current_ball;
                    if(d.current_ball !== lastBall) { speak(d.current_ball); lastBall = d.current_ball; }
                    renderMainBoard(d.drawn_balls);
                    if(d.my_cards.length > 0 && document.getElementById('card-area').children.length === 0) {
                        d.my_cards.forEach(c => renderCard(c));
                    }
                } else if(d.status === "result" && !announced) {
                    document.getElementById('win-name').innerText = d.winner;
                    document.getElementById('winner-overlay').style.display='flex';
                    document.getElementById('win-horn').play();
                    announced = true;
                    setTimeout(() => { document.getElementById('winner-overlay').style.display='none'; }, 3000);
                }
            });
        }

        function renderTickets(sold) {
            const area = document.getElementById('ticket-area');
            if(area.children.length === 0) {
                for(let i=1; i<=500; i++) {
                    let div = document.createElement('div');
                    div.className = 't-box'; div.innerText = i; div.id = 't-'+i;
                    area.appendChild(div);
                }
            }
            for(let i=1; i<=500; i++) {
                let box = document.getElementById('t-'+i);
                if(sold[i]) {
                    box.className = (sold[i] === phone) ? 't-box mine' : 't-box sold';
                    box.onclick = (sold[i] === phone) ? () => refund(i) : null;
                } else {
                    box.className = 't-box'; box.onclick = () => buy(i);
                }
            }
        }

        function buy(n) { fetch('/buy_specific_ticket', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, ticket_num:String(n), username})}).then(update); }
        function refund(n) { if(confirm("መመለስ?")) fetch('/cancel_ticket', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, ticket_num:String(n)})}).then(update); }

        function renderMainBoard(drawn) {
            const board = document.getElementById('main-board');
            if(board.children.length === 0) {
                for(let i=1; i<=75; i++) {
                    let d = document.createElement('div'); d.className = 'ball-dot'; d.id = 'b-'+i; d.innerText = i; board.appendChild(d);
                }
            }
            drawn.forEach(b => { let el = document.getElementById('b-'+b.substring(1)); if(el) el.classList.add('active'); });
        }

        function renderCard(card) {
            const grid = document.createElement('div'); grid.className = 'bingo-card';
            card.forEach((n, i) => {
                const cell = document.createElement('div');
                cell.className = (i === 12) ? "cell free selected" : "cell";
                cell.innerText = (i === 12) ? "FREE" : n;
                cell.onclick = () => cell.classList.toggle('selected');
                grid.appendChild(cell);
            });
            document.getElementById('card-area').appendChild(grid);
        }

        function claim() { fetch('/claim_bingo', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone})}).then(r=>r.json()).then(d=> { if(!d.success) alert("አልሞላም!"); }); }
        function subD() { fetch('/request_deposit', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, amount:document.getElementById('da').value, transaction_id:document.getElementById('di').value})}); closeM('dep-m'); alert("ተልኳል!"); }
        function subW() { fetch('/withdraw', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, amount:document.getElementById('wa').value})}).then(() => { closeM('with-m'); alert("ተልኳል!"); }); }

        setInterval(update, 2000); update();
    </script>
</body>
</html>
