<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BESH BINGO - PREMIUM</title>
    <style>
        :root { --gold: #ffcc00; --bg: #050a18; --red: #ff3e3e; --green: #00ff88; --orange: #ff8800; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 0; overflow-x: hidden; width: 100vw; touch-action: manipulation; }
        
        .header-section { position: sticky; top: 0; z-index: 1000; background: var(--bg); border-bottom: 2px solid var(--gold); }
        .stats { display: flex; justify-content: space-around; background: rgba(255,255,255,0.05); padding: 8px; margin: 5px 10px; border-radius: 10px; }
        .stats b { display: block; font-size: 1rem; color: var(--gold); }
        .action-bar { display: flex; justify-content: center; gap: 5px; padding: 5px 10px; }
        
        .btn-main { flex: 1; padding: 12px 2px; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; font-size: 0.75rem; transition: transform 0.1s; }
        .btn-main:active { transform: scale(0.95); }
        .btn-deposit { background: var(--green); color: #000; }
        .btn-withdraw { background: var(--orange); color: white; }
        
        #timer { font-size: 2.5rem; font-weight: 900; color: var(--gold); margin: 5px 0; }

        .grid-500 { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; max-height: 280px; overflow-y: auto; background: #000; padding: 10px; margin: 10px; border-radius: 8px; }
        .t-box { flex: 0 0 18%; background: #fff; color: #000; font-size: 0.9rem; padding: 12px 0; font-weight: bold; border-radius: 6px; text-align: center; cursor: pointer; transition: 0.1s; }
        .t-box:active { transform: scale(0.9); }
        .t-box.mine { background: var(--gold); border: 2px solid white; animation: pulse 1.5s infinite; }
        .t-box.sold { background: #222; color: #555; pointer-events: none; }

        .copy-box { background: rgba(255,204,0,0.1); padding: 15px; border-radius: 12px; border: 2px dashed var(--gold); margin-bottom: 15px; cursor: pointer; transition: 0.1s; position: relative; }
        .copy-box:active { transform: scale(0.96); background: rgba(255,204,0,0.2); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 5000; align-items: flex-start; justify-content: center; padding-top: 10vh; }
        .modal-content { background: #1e293b; padding: 25px; border-radius: 20px; width: 85%; max-width: 340px; border: 2px solid var(--gold); animation: slideIn 0.2s ease-out; }
        @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        input { padding: 12px; margin: 10px 0; width: 100%; border-radius: 8px; border: none; font-size: 16px; background: #0f172a; color: white; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <audio id="win-horn" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" preload="auto"></audio>
    
    <div class="header-section">
        <div style="padding:10px 0;"><h2 style="color:var(--gold); margin:0;">BESH BINGO</h2></div>
        <div class="stats">
            <div>BALANCE<b id="balance">0 ETB</b></div>
            <div>PLAYERS<b id="p-count">0</b></div>
            <div>DERASH<b id="prize">0 ETB</b></div>
        </div>
        <div class="action-bar">
            <button class="btn-main btn-deposit" onclick="openM('dep-m')">📥 DEPOSIT</button>
            <button id="voice-btn" class="btn-main" style="background:#334155; color:white" onclick="toggleVoice()">🔇 VOICE OFF</button>
            <button class="btn-main btn-withdraw" onclick="openM('with-m')">📤 WITHDRAW</button>
        </div>
    </div>

    <div id="lobby-ui">
        <div id="timer">30</div>
        <div class="grid-500" id="ticket-area"></div>
    </div>

    <div id="dep-m" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--green); margin-top:0;">DEPOSIT</h2>
            <div class="copy-box" onclick="fastCopy('0945880474', this)">
                <small style="color:#aaa; display:block; margin-bottom:3px;">በዚህ ቁጥር ቴሌ ብር ላይ ድፖዚት ያድርጉ</small>
                <strong style="font-size:1.3rem; color:var(--gold); letter-spacing:1px;">0945880474</strong>
                <div id="copy-status" style="font-size:0.8rem; color:var(--green); margin-top:5px; font-weight:bold;">📋 ለመቅዳት ይጫኑ</div>
            </div>
            <input type="number" id="da" placeholder="የብር መጠን (Amount)">
            <input type="text" id="di" placeholder="Transaction ID (ኮፒ አድርገው እዚህ ያስገቡ)">
            <button class="btn-main btn-deposit" style="width:100%; font-size:1rem; padding:15px;" onclick="subD()">ጥያቄ ላክ (SUBMIT)</button>
            <button onclick="closeM('dep-m')" style="color:#888; background:none; border:none; margin-top:15px; cursor:pointer;">ዝጋ (CLOSE)</button>
        </div>
    </div>

    <div id="game-ui" style="display:none;">
        <div id="ball-circle" style="width:75px; height:75px; background:radial-gradient(circle, #fff, var(--gold)); color:#000; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:2rem; font-weight:900; margin:10px auto; border:3px solid #fff;">--</div>
        <div class="game-layout" style="display: grid; grid-template-columns: 1fr 2.5fr; gap: 8px; padding: 10px;">
            <div id="main-board" style="border:1px solid #333; height:350px; overflow-y:auto; display:grid; grid-template-columns:repeat(3, 1fr); gap:3px; background:#000; padding:5px;"></div>
            <div>
                <div id="card-area"></div>
                <button onclick="claim()" style="width:100%; padding:15px; background:var(--red); color:white; font-weight:900; border:none; border-radius:10px; font-size:1.2rem; margin-top:5px;">BINGO!</button>
            </div>
        </div>
    </div>

    <script>
        let phone = localStorage.getItem('phone') || prompt("ስልክ ያስገቡ:");
        let username = localStorage.getItem('username') || prompt("ስም ያስገቡ:");
        localStorage.setItem('phone', phone); localStorage.setItem('username', username);

        let isVoiceOn = false;
        let lastBall = "--";
        let audioUnlocked = false;

        // --- MOBILE VOICE UNLOCK ---
        function unlockAudio() {
            if (audioUnlocked) return;
            const msg = new SpeechSynthesisUtterance("");
            window.speechSynthesis.speak(msg);
            audioUnlocked = true;
        }
        document.addEventListener('click', unlockAudio, { once: true });

        function toggleVoice() {
            isVoiceOn = !isVoiceOn;
            unlockAudio();
            const btn = document.getElementById('voice-btn');
            btn.innerText = isVoiceOn ? "🔊 VOICE ON" : "🔇 VOICE OFF";
            btn.style.background = isVoiceOn ? "var(--green)" : "#334155";
            if(isVoiceOn) speak("Voice On");
        }

        function speak(t) {
            if(isVoiceOn && window.speechSynthesis) {
                window.speechSynthesis.cancel();
                let m = new SpeechSynthesisUtterance(t);
                m.lang = 'en-US'; m.rate = 1.0;
                window.speechSynthesis.speak(m);
            }
        }

        function fastCopy(num, el) {
            const status = document.getElementById('copy-status');
            const textArea = document.createElement("textarea");
            textArea.value = num;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);

            status.innerText = "✅ ተቀድቷል! (COPIED)";
            status.style.color = "#fff";
            el.style.borderColor = "#00ff88";

            setTimeout(() => {
                status.innerText = "📋 ለመቅዳት ይጫኑ";
                status.style.color = "var(--green)";
                el.style.borderColor = "var(--gold)";
            }, 1500);
        }

        function openM(id) { document.getElementById(id).style.display='flex'; }
        function closeM(id) { document.getElementById(id).style.display='none'; }

        function update() {
            fetch(`/get_status?phone=${phone}`).then(r=>r.json()).then(d=>{
                document.getElementById('balance').innerText = d.balance + " ETB";
                document.getElementById('prize').innerText = Math.floor(d.pot * 0.8) + " ETB";
                document.getElementById('p-count').innerText = d.active_players;
                document.getElementById('timer').innerText = d.timer;

                if(d.status === "lobby") {
                    document.getElementById('lobby-ui').style.display='block';
                    document.getElementById('game-ui').style.display='none';
                    lastBall = "--";
                    renderTickets(d.sold_tickets);
                } else if(d.status === "playing") {
                    document.getElementById('lobby-ui').style.display='none';
                    document.getElementById('game-ui').style.display='block';
                    if(d.current_ball !== lastBall && d.current_ball !== "--") {
                        document.getElementById('ball-circle').innerText = d.current_ball;
                        speak(d.current_ball);
                        lastBall = d.current_ball;
                    }
                    renderMainBoard(d.drawn_balls);
                }
            });
        }

        // የተቀሩት ተግባራት (renderTickets, renderMainBoard ወዘተ) እዚህ ይቀጥላሉ...
        setInterval(update, 2000); update();
    </script>
</body>
</html>
