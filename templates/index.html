<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 0; }
        .header { background: #1e293b; padding: 15px; border-bottom: 3px solid #f1c40f; display: flex; justify-content: space-around; font-weight: bold; }
        .wallet-bar { background: #334155; padding: 10px; display: flex; justify-content: center; gap: 10px; }
        .btn-action { padding: 8px 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; }
        .btn-dep { background: #22c55e; } .btn-with { background: #3b82f6; }
        .p-info { background: #1e293b; padding: 10px; color: #f1c40f; font-weight: bold; }
        .board { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; padding: 5px; background: #1e293b; }
        .b-cell { font-size: 0.7rem; padding: 5px 0; background: #334155; border-radius: 2px; color: #94a3b8; }
        .b-cell.drawn { background: #ef4444; color: white; font-weight: bold; }
        #ticket-area { display: none; margin: 10px; padding: 10px; background: #1e293b; border-radius: 8px; border: 1px solid #475569; }
        .t-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 5px; }
        .t-cell { background: white; color: black; height: 50px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.3rem; border-radius: 5px; }
        .t-cell.marked { background: #22c55e !important; color: white; }
        .btn-main { background: #f1c40f; color: black; border: none; padding: 15px; border-radius: 8px; width: 90%; font-weight: bold; font-size: 1.1rem; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="header">
        <div id="bal">0.00 ETB</div>
        <div id="pot">POT: 0</div>
        <div id="tmr">20s</div>
    </div>
    <div class="wallet-bar">
        <button class="btn-action btn-dep" onclick="action('deposit')">DEPOSIT</button>
        <button class="btn-action btn-with" onclick="action('withdraw')">WITHDRAW</button>
    </div>
    <div class="p-info" id="p-count">👤 ተጫዋቾች: 0</div>
    <div id="join-box"><button onclick="join()" class="btn-main">JOIN GAME (10 ETB)</button></div>
    <div class="board" id="brd"></div>
    <div id="ticket-area">
        <div id="t-container"></div>
        <button id="win-btn" onclick="claimWin()" class="btn-main" style="display:none; background:#22c55e; color:white;">WIN 🏆</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let phone = localStorage.getItem('u_phone');
        let myTicket = null; let drawnNumbers = [];
        if(!phone) { phone = prompt("ስልክ ያስገቡ:"); if(phone) localStorage.setItem('u_phone', phone.trim()); }

        for(let i=1; i<=90; i++) document.getElementById('brd').innerHTML += `<div class="b-cell" id="b-${i}">${i}</div>`;

        function update() {
            fetch('/get_status').then(r => r.json()).then(data => {
                if(data.winner) { document.getElementById('p-count').innerText = "🏆 አሸናፊ: " + data.winner; return; }
                document.getElementById('p-count').innerText = "👤 ተጫዋቾች: " + data.players_count;
                document.getElementById('pot').innerText = "POT: " + data.pot;
                if(data.status === "lobby") {
                    document.getElementById('tmr').innerText = "⌛ " + data.timer + "s";
                    document.querySelectorAll('.b-cell').forEach(c => c.classList.remove('drawn'));
                    document.getElementById('ticket-area').style.display = 'none';
                    document.getElementById('join-box').style.display = 'block';
                    myTicket = null;
                } else {
                    document.getElementById('tmr').innerText = "🔴 LIVE";
                    drawnNumbers = data.drawn;
                    drawnNumbers.forEach(n => {
                        document.getElementById(`b-${n}`).classList.add('drawn');
                        let tCell = document.getElementById(`cell-${n}`);
                        if(tCell) tCell.classList.add('marked');
                    });
                    document.getElementById('join-box').style.display = 'none';
                }
            });
            if(phone && !myTicket) {
                fetch('/user_data/' + phone).then(r => r.json()).then(d => {
                    document.getElementById('bal').innerText = d.balance.toFixed(2) + " ETB";
                    if(d.is_joined) {
                        myTicket = d.ticket; renderTicket();
                        document.getElementById('ticket-area').style.display = 'block';
                        document.getElementById('win-btn').style.display = 'block';
                    }
                });
            }
        }

        function action(type) {
            let amt = prompt(type === 'deposit' ? "ምን ያህል ማስገባት ይፈልጋሉ?" : "ምን ያህል ማውጣት ይፈልጋሉ?");
            if(amt) {
                fetch('/request_action', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({type, phone, amount:amt})})
                .then(() => alert("ጥያቄዎ ተልኳል! አስተዳዳሪው ያረጋግጥልዎታል።"));
            }
        }

        function renderTicket() {
            document.getElementById('t-container').innerHTML = myTicket.map(row => `
                <div class="t-row">${row.map(n => `<div class="t-cell" id="cell-${n}">${n}</div>`).join('')}</div>
            `).join('');
        }
        function join() { fetch('/join_game', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, name: tg.initDataUnsafe.user?.first_name || "Player"})}).then(r => r.json()).then(d => { if(d.success) update(); else alert(d.msg); }); }
        function claimWin() { fetch('/win', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone})}).then(r => r.json()).then(d => { if(d.success) alert("አሸንፈዋል!"); }); }

        setInterval(update, 1000);
        tg.ready();
    </script>
</body>
</html>
