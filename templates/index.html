<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BESH BINGO</title>
    <style>
        :root { --gold: #f1c40f; --bg: #0f172a; --red: #e74c3c; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 10px; margin: 0; }
        .stats-bar { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; background: #1e293b; padding: 10px; border-radius: 10px; border: 1px solid var(--gold); margin-bottom: 10px; text-align: center; }
        .stats-bar span { display: block; font-size: 1.1rem; color: var(--gold); font-weight: bold; }
        .welcome-msg { color: var(--gold); text-align: center; font-weight: bold; margin: 10px 0; }
        .grid-store { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; max-height: 250px; overflow-y: auto; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; }
        .t-num { background: #334155; padding: 12px 0; border-radius: 8px; cursor: pointer; text-align: center; font-weight: bold; }
        .t-num.selected { background: var(--gold); color: black; }
        .t-num.bought { background: #000; color: #444; text-decoration: line-through; pointer-events: none; }
        .bingo-card { background: #E0E5B6; padding: 5px; border-radius: 5px; margin-top: 10px; }
        .card-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1px; background: #333; }
        .cell { background: white; height: 35px; display: flex; align-items: center; justify-content: center; color: #333; font-weight: bold; cursor: pointer; }
        .cell.marked { background: var(--red) !important; color: white; }
    </style>
</head>
<body>
    <div class="stats-bar">
        <div>WALLET <span id="balance">0</span></div>
        <div>WIN (80%) <span id="prize">0</span></div>
        <div>PLAYERS <span id="p-count">0</span></div>
    </div>

    <div id="lobby">
        <div class="welcome-msg">✨ እንኳን ወደ በሽ ቢንጎ በሰላም መጣችሁ! ✨</div>
        <div id="timer" style="text-align:center; font-size:4rem; font-weight:bold; margin: 10px 0;">30</div>
        <div class="grid-store" id="picker"></div>
        <button id="buy-btn" onclick="buyTicket()" disabled style="width:100%; padding:15px; margin-top:15px; background:var(--gold); border:none; border-radius:10px; font-weight:bold; color:black;">ካርቴላ ምረጥ</button>
    </div>

    <div id="game" style="display:none;">
        <div id="active-num" style="width:70px; height:70px; border:4px solid var(--gold); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:10px auto; font-size:2rem; font-weight:bold; background:#1e293b; color:var(--gold);">?</div>
        <div id="my-cards"></div>
        <button id="win-btn" onclick="claimWin()" style="display:none; width:100%; padding:15px; background:var(--gold); color:black; font-weight:bold; margin-top:10px; border-radius:10px;">🎊 BINGO! 🎊</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let phone = "0945880474", selectedNum = null, myMarked = new Set([0]);
        let lastTickJSON = "";

        const picker = document.getElementById('picker');
        for(let i=1; i<=500; i++) picker.innerHTML += `<div class="t-num" id="tn-${i}" onclick="selectNum(${i})">${i}</div>`;

        function selectNum(n) {
            if(selectedNum) document.getElementById(`tn-${selectedNum}`).classList.remove('selected');
            selectedNum = n; document.getElementById(`tn-${n}`).add('selected');
            document.getElementById('buy-btn').disabled = false;
            document.getElementById('buy-btn').innerText = `ካርቴላ #${n} ግዛ`;
        }

        function update() {
            fetch('/get_status').then(r=>r.json()).then(d=>{
                document.getElementById('timer').innerText = d.timer;
                document.getElementById('prize').innerText = d.win_prize;
                document.getElementById('p-count').innerText = d.player_count;
                if(d.status === "lobby") {
                    document.getElementById('lobby').style.display='block';
                    document.getElementById('game').style.display='none';
                    d.bought_numbers.forEach(n => {
                        let el = document.getElementById(`tn-${n}`);
                        if(el) el.classList.add('bought');
                    });
                } else {
                    document.getElementById('lobby').style.display='none';
                    document.getElementById('game').style.display='block';
                    if(d.drawn_numbers.length > 0) document.getElementById('active-num').innerText = d.drawn_numbers[d.drawn_numbers.length-1];
                }
            });

            fetch('/user_data/'+phone).then(r=>r.json()).then(d=>{
                document.getElementById('balance').innerText = d.balance;
                let tStr = JSON.stringify(d.tickets);
                if(lastTickJSON !== tStr) {
                    lastTickJSON = tStr;
                    let h = '';
                    d.tickets.forEach(t => {
                        h += `<div class="bingo-card"><div class="card-grid">`;
                        t.forEach(row => row.forEach(n => {
                            h += `<div id="c-${n}" class="cell ${n===0||myMarked.has(n)?'marked':''}" onclick="mark(${n})">${n===0?'FREE':n}</div>`;
                        }));
                        h += `</div></div>`;
                    });
                    document.getElementById('my-cards').innerHTML = h;
                }
            });
        }
        
        function buyTicket() {
            fetch('/join_game', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, ticket_num: selectedNum})})
            .then(r=>r.json()).then(d=> { if(d.success) tg.showAlert("ተገዝቷል!"); else alert(d.msg); });
        }

        function mark(n) {
            if(n===0) return;
            if(myMarked.has(n)) myMarked.delete(n); else myMarked.add(n);
            update(); // UI እንዲታደስ
        }

        setInterval(update, 1000);
    </script>
</body>
</html>
