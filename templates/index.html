<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BESH BINGO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #f1c40f; --bg: #0f172a; --blue: #1e293b; --red: #e74c3c; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .stats { display: flex; justify-content: space-around; background: var(--blue); padding: 10px; border: 1px solid var(--gold); border-radius: 10px; margin-bottom: 10px; font-size: 0.8rem; }
        .grid-500 { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; max-height: 250px; overflow-y: auto; background: #000; padding: 10px; border-radius: 8px; }
        .t-box { background: white; color: black; font-size: 0.7rem; padding: 8px 0; font-weight: bold; border-radius: 3px; }
        .t-box.sold { background: #475569; color: #94a3b8; }
        .t-box.mine { background: var(--gold); }
        .game-layout { display: grid; grid-template-columns: 1fr 2fr; gap: 10px; margin-top: 10px; }
        .main-board { border: 1px solid var(--gold); height: 350px; overflow-y: auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 5px; }
        .ball-dot { font-size: 0.6rem; background: #1e293b; padding: 3px; border-radius: 2px; }
        .ball-dot.active { background: var(--gold); color: black; }
        .bingo-card { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; background: #cbd5e1; padding: 3px; margin-bottom: 10px; }
        .cell { background: white; color: black; height: 35px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.8rem; }
        .cell.selected { background: var(--gold); }
        .cell.free { background: var(--red); color: white; font-size: 0.5rem; }
        .bingo-btn { width: 100%; padding: 15px; background: var(--red); color: white; font-size: 1.5rem; font-weight: bold; border: 3px solid var(--gold); border-radius: 12px; margin-top: 10px; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>
    <div class="stats">
        <div>Wallet: <br><span id="balance">0</span></div>
        <div>Player: <br><span id="p-count">0</span></div>
        <div>Win: <br><span id="prize">0</span></div>
    </div>

    <div id="lobby-ui">
        <h2 id="status-msg" style="color:var(--gold)">ካርቴላ ይምረጡ</h2>
        <div style="font-size: 2.5rem; font-weight: 900;" id="timer">30</div>
        <div class="grid-500" id="ticket-area"></div>
        <button class="bingo-btn" style="background:#2ecc71" onclick="deposit()">ገንዘብ አስገባ</button>
    </div>

    <div id="game-ui" style="display:none;">
        <div id="ball-circle" style="width:70px;height:70px;background:var(--gold);color:black;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:900;margin:0 auto;">--</div>
        <div class="game-layout">
            <div class="main-board" id="main-board"></div>
            <div id="card-area"></div>
        </div>
        <button id="bingo-btn" class="bingo-btn" onclick="claim()">BINGO</button>
    </div>

    <div id="result-ui" class="overlay" style="display:none;">
        <h1 style="color:var(--gold); font-size:3rem;">BINGO!</h1>
        <p id="winner-name" style="font-size:1.5rem;"></p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let phone = localStorage.getItem('phone') || prompt("ስልክ ቁጥር:");
        localStorage.setItem('phone', phone);

        function deposit() {
            let info = prompt("የቴሌብር ትራንዛክሽን ID ያስገቡ:");
            if(info) fetch('/request_action', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({phone, type:'DEPOSIT', info})});
        }

        function buy(n) {
            fetch('/buy_specific_ticket', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({phone, ticket_num: n})})
            .then(r=>r.json()).then(d=> { if(!d.success) alert(d.msg); });
        }

        function update() {
            fetch(`/get_status?phone=${phone}`).then(r=>r.json()).then(d=>{
                document.getElementById('balance').innerText = d.balance.toFixed(2);
                document.getElementById('p-count').innerText = Object.keys(d.players).length;
                document.getElementById('prize').innerText = Math.floor(d.pot * 0.8);
                document.getElementById('timer').innerText = d.timer;

                if(d.status === "lobby" || d.status === "preparing") {
                    document.getElementById('lobby-ui').style.display = 'block';
                    document.getElementById('game-ui').style.display = 'none';
                    document.getElementById('status-msg').innerText = d.status === "lobby" ? "ካርቴላ ይምረጡ" : "ሽያጭ ተዘግቷል!";
                    renderTickets(d.sold_tickets);
                } else if(d.status === "playing") {
                    document.getElementById('lobby-ui').style.display = 'none';
                    document.getElementById('game-ui').style.display = 'block';
                    document.getElementById('ball-circle').innerText = d.current_ball;
                    renderMainBoard(d.drawn_balls);
                    if(d.is_player && document.getElementById('card-area').innerHTML === "") d.my_cards.forEach(renderCard);
                } else if(d.status === "result") {
                    document.getElementById('result-ui').style.display = 'flex';
                    document.getElementById('winner-name').innerText = "አሸናፊ: " + d.winner;
                } else {
                    location.reload();
                }
            });
        }

        function renderTickets(sold) {
            const area = document.getElementById('ticket-area');
            if(area.children.length > 0) {
                for(let i=1; i<=500; i++) {
                    let box = area.children[i-1];
                    if(sold[i]) {
                        box.className = sold[i] === phone ? 't-box mine' : 't-box sold';
                        box.onclick = null;
                    }
                }
                return;
            }
            for(let i=1; i<=500; i++) {
                let div = document.createElement('div');
                div.className = 't-box'; div.innerText = i;
                if(!sold[i]) div.onclick = () => buy(i);
                area.appendChild(div);
            }
        }

        function renderMainBoard(drawn) {
            const board = document.getElementById('main-board');
            if(board.children.length === 0) {
                for(let i=1; i<=75; i++) {
                    let d = document.createElement('div'); d.className='ball-dot'; d.id='b-'+i; d.innerText=i;
                    board.appendChild(d);
                }
            }
            drawn.forEach(b => {
                let el = document.getElementById('b-'+b.substring(1));
                if(el) el.classList.add('active');
            });
        }

        function renderCard(card) {
            const container = document.getElementById('card-area');
            const grid = document.createElement('div'); grid.className = 'bingo-card';
            card.forEach((n, i) => {
                const cell = document.createElement('div');
                cell.className = (i === 12) ? "cell free" : "cell";
                cell.innerText = (i === 12) ? "FREE" : n;
                cell.onclick = () => cell.classList.toggle('selected');
                grid.appendChild(cell);
            });
            container.appendChild(grid);
        }

        function claim() { fetch('/claim_bingo', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({phone})}); }
        setInterval(update, 2000);
    </script>
</body>
</html>
