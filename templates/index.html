<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 5px; }
        .header { display: grid; grid-template-columns: repeat(3, 1fr); background: #1e293b; padding: 12px; border-bottom: 2px solid #f1c40f; }
        .phone-display { font-size: 0.7rem; color: #94a3b8; background: #1e293b; padding: 5px; }
        .board { display: grid; grid-template-columns: repeat(10, 1fr); gap: 3px; padding: 10px; }
        .b-cell { font-size: 0.6rem; padding: 5px; background: #334155; border-radius: 3px; color: #94a3b8; }
        .b-cell.drawn { background: #ef4444; color: white; box-shadow: 0 0 5px #ef4444; }
        .btn { background: #f1c40f; color: #0f172a; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="header">
        <div id="bal">BAL: 0.00</div>
        <div id="pot">POT: 0</div>
        <div id="tmr">⌛ 0s</div>
    </div>
    <div class="phone-display">
        Phone: <span id="u-phone">...</span> 
        <button onclick="changePhone()" style="background:none; border:none; color:#f1c40f; text-decoration:underline; font-size:0.7rem;">[ቀይር]</button>
    </div>

    <div id="join-area">
        <button onclick="join()" class="btn">JOIN GAME (10 ETB)</button>
    </div>

    <div class="board" id="brd"></div>

    <script>
        const tg = window.Telegram.WebApp;
        let phone = localStorage.getItem('user_phone');

        function cleanPhone(p) {
            if(!p) return null;
            let c = p.replace(/\s+/g, '').replace('+', '');
            if(c.startsWith('251')) c = '0' + c.substring(3);
            return c;
        }

        if(!phone || phone === "null") {
            let input = prompt("ስልክ ቁጥርዎን ያስገቡ (09...):");
            phone = cleanPhone(input);
            if(phone) localStorage.setItem('user_phone', phone);
        }

        function changePhone() {
            localStorage.removeItem('user_phone');
            location.reload();
        }

        const brd = document.getElementById('brd');
        for(let i=1; i<=90; i++) brd.innerHTML += `<div class="b-cell" id="b-${i}">${i}</div>`;

        function update() {
            document.getElementById('u-phone').innerText = phone;
            fetch('/get_status').then(r => r.json()).then(data => {
                document.getElementById('tmr').innerText = "⌛ " + data.timer + "s";
                document.getElementById('pot').innerText = "POT: " + data.pot;
                if(data.status === "lobby") document.querySelectorAll('.b-cell').forEach(c => c.classList.remove('drawn'));
                else data.drawn.forEach(n => document.getElementById(`b-${n}`).classList.add('drawn'));
            });

            if(phone) {
                fetch('/user_data/' + phone).then(r => r.json()).then(data => {
                    document.getElementById('bal').innerText = "BAL: " + data.balance.toFixed(2);
                    document.getElementById('join-area').style.display = data.is_joined ? 'none' : 'block';
                });
            }
        }
        function join() {
            fetch('/join_game', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone})})
            .then(r => r.json()).then(d => { if(!d.success) alert(d.msg); });
        }
        setInterval(update, 1000);
        tg.ready();
    </script>
</body>
</html>
