<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BESH BINGO - PREMIUM</title>
    <style>
        :root { --gold: #ffcc00; --bg: #050a18; --red: #ff3e3e; --green: #00ff88; --orange: #ff8800; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; text-align: center; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Header & Stats */
        .header-banner { background: linear-gradient(145deg, #1e293b, #050a18); padding: 15px 0; border-bottom: 3px solid var(--gold); box-shadow: 0 4px 15px rgba(0,0,0,0.5); position: sticky; top: 0; z-index: 100; }
        .header-banner h1 { margin: 0; font-size: 1.8rem; color: var(--gold); letter-spacing: 3px; text-shadow: 0 0 10px var(--gold); }
        .stats { display: flex; justify-content: space-around; background: rgba(255,255,255,0.05); padding: 10px; margin: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .stats b { display: block; font-size: 1.1rem; color: var(--gold); }

        /* Buttons */
        .action-bar { display: flex; justify-content: center; gap: 15px; padding: 5px 10px; }
        .btn-main { flex: 1; padding: 12px; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: transform 0.2s; }
        .btn-main:active { transform: scale(0.95); }
        .btn-deposit { background: linear-gradient(to bottom, #00ff88, #008844); color: #050a18; }
        .btn-withdraw { background: linear-gradient(to bottom, #ff8800, #cc6600); color: white; }

        /* Lobby Grid */
        .grid-500 { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; max-height: 160px; overflow-y: auto; background: #000; padding: 10px; margin: 10px; border-radius: 10px; border: 1px solid #222; }
        .t-box { background: #fff; color: #000; font-size: 0.75rem; padding: 8px 0; font-weight: bold; border-radius: 4px; transition: 0.3s; cursor: pointer; }
        .t-box.mine { background: var(--gold); border: 2px solid white; box-shadow: 0 0 10px var(--gold); animation: pulse 1.5s infinite; }
        .t-box.sold { background: #333; color: #666; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        /* Game UI */
        #ball-circle { width: 75px; height: 75px; background: radial-gradient(circle, #fff, var(--gold)); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 900; margin: 15px auto; border: 4px solid #1e293b; box-shadow: 0 0 20px var(--gold); }
        .game-layout { display: grid; grid-template-columns: 1fr 2.2fr; gap: 10px; padding: 10px; }
        .main-board { border: 1px solid #333; height: 400px; overflow-y: auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; padding: 5px; background: rgba(0,0,0,0.8); border-radius: 10px; scroll-behavior: smooth; }
        .ball-dot { font-size: 0.7rem; background: #111; padding: 5px; color: #444; border: 1px solid #222; border-radius: 3px; }
        .ball-dot.active { background: var(--gold); color: #000; font-weight: bold; transform: scale(1.1); }

        /* Card */
        .bingo-card { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; background: #444; padding: 4px; border-radius: 0 0 8px 8px; }
        .cell { background: #fff; color: #000; height: 42px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.1rem; cursor: pointer; transition: 0.2s; }
        .cell.selected { background: var(--gold) !important; border: 2px solid #b45309; }
        .cell.free { background: #ff3e3e !important; color: white; font-size: 0.6rem; }
        
        #bingo-btn { width: 85%; padding: 12px; background: linear-gradient(to right, #ff3e3e, #b91c1c); color: white; font-size: 1.3rem; font-weight: 900; border-radius: 15px; border: 2px solid white; margin: 15px auto; display: block; box-shadow: 0 5px 15px rgba(255,0,0,0.5); cursor: pointer; }

        /* Modals */
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.96); z-index:2000; flex-direction:column; align-items:center; justify-content:center; padding: 20px; }
        .modal-content { background: #1e293b; padding: 25px; border-radius: 20px; border: 1px solid var(--gold); width: 90%; max-width: 400px; }
        input { padding: 14px; margin: 10px 0; width: 100%; border-radius: 10px; border: none; font-size: 1rem; box-sizing: border-box; }
        
        #timer { font-size: 3rem; font-weight: 900; color: var(--gold); text-shadow: 0 0 15px rgba(255,204,0,0.5); }
    </style>
</head>
<body>
    <audio id="win-horn" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" preload="auto"></audio>

    <div class="header-banner"><h1>BESH BINGO</h1></div>

    <div class="stats">
        <div>BALANCE<b id="balance">0 ETB</b></div>
        <div>PLAYERS<b id="p-count">0</b></div>
        <div>JACKPOT<b id="prize">0 ETB</b></div>
    </div>

    <div id="lobby-ui">
        <div class="action-bar">
            <button class="btn-main btn-deposit" onclick="openM('dep-m')">📥 DEPOSIT</button>
            <button class="btn-main btn-withdraw" onclick="openM('with-m')">📤 WITHDRAW</button>
        </div>
        <div id="timer">30</div>
        <div class="grid-500" id="ticket-area"></div>
    </div>

    <div id="game-ui" style="display:none;">
        <div id="ball-circle">--</div>
        <div class="game-layout">
            <div class="main-board" id="main-board"></div>
            <div>
                <div id="card-area"></div>
                <button id="bingo-btn" onclick="claim()">BINGO!</button>
            </div>
        </div>
    </div>

    <div id="dep-m" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--gold); margin:0;">DEPOSIT</h2>
            <p>Send Telebirr to: <br><b style="font-size: 1.4rem; cursor: pointer; color:var(--gold);" onclick="copyNum('0945880474')">0945880474</b></p>
            <p style="font-size: 0.7rem; color: #888;">(Click number to copy)</p>
            <input type="number" id="da" placeholder="Amount (ETB)">
            <input type="text" id="di" placeholder="Transaction ID">
            <button class="btn-main btn-deposit" style="width:100%" onclick="subD()">SUBMIT REQUEST</button>
            <button onclick="closeM('dep-m')" style="background:none; border:none; color:#94a3b8; margin-top:20px; font-weight: bold;">CLOSE</button>
        </div>
    </div>

    <div id="with-m" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--orange); margin:0;">WITHDRAW</h2>
            <input type="number" id="wa" placeholder="Amount (ETB)">
            <button class="btn-main btn-withdraw" style="width:100%" onclick="subW()">CONFIRM WITHDRAW</button>
            <button onclick="closeM('with-m')" style="background:none; border:none; color:#94a3b8; margin-top:20px; font-weight: bold;">CLOSE</button>
        </div>
    </div>

    <div id="result-ui" class="modal">
        <h1 style="color:var(--gold); font-size:4rem; margin:0;">BINGO!</h1>
        <div id="winner-info" style="font-size:2rem; margin-top:10px;"></div>
        <p style="color: #888; margin-top: 20px;">Starting next game soon...</p>
    </div>

    <script>
        let phone = localStorage.getItem('phone') || prompt("ስልክ ቁጥር ያስገቡ:");
        let username = localStorage.getItem('username') || prompt("የተጫዋች ስም ያስገቡ:");
        if(!phone || !username) location.reload();
        localStorage.setItem('phone', phone); localStorage.setItem('username', username);

        let currentCardData = null; 
        let announced = false;
        let lastCalledBall = null;
        let validToMark = [];

        // 1. የድምፅ መጥሪያ (Voice Caller)
        function speakBall(ball) {
            if (!ball || ball === "--") return;
            const msg = new SpeechSynthesisUtterance();
            // ፊደሉን እና ቁጥሩን ለይቶ መጥራት (ለምሳሌ B-5)
            msg.text = ball.split('').join(' '); 
            msg.rate = 0.9;
            window.speechSynthesis.speak(msg);
        }

        function openM(id) { document.getElementById(id).style.display='flex'; }
        function closeM(id) { document.getElementById(id).style.display='none'; }
        function copyNum(n) { navigator.clipboard.writeText(n); alert("Number Copied: " + n); }

        function update() {
            fetch(`/get_status?phone=${phone}`).then(r=>r.json()).then(d=>{
                document.getElementById('balance').innerText = d.balance.toFixed(0) + " ETB";
                document.getElementById('prize').innerText = Math.floor(d.pot * 0.8) + " ETB"; // ለአሸናፊው 80% ብቻ ያሳያል
                document.getElementById('p-count').innerText = d.active_players;
                document.getElementById('timer').innerText = d.timer;
                validToMark = d.valid_to_mark || [];

                if(d.status === "lobby") {
                    document.getElementById('lobby-ui').style.display='block'; 
                    document.getElementById('game-ui').style.display='none'; 
                    document.getElementById('result-ui').style.display='none';
                    document.getElementById('main-board').innerHTML=""; 
                    document.getElementById('card-area').innerHTML="";
                    currentCardData = null; announced = false; 
                    localStorage.removeItem('mySelections');
                    renderTickets(d.sold_tickets);
                } else if(d.status === "playing") {
                    document.getElementById('lobby-ui').style.display='none'; 
                    document.getElementById('game-ui').style.display='block';
                    
                    // ድምፅ መጥራት
                    if(d.current_ball !== lastCalledBall) {
                        speakBall(d.current_ball);
                        lastCalledBall = d.current_ball;
                    }

                    document.getElementById('ball-circle').innerText = d.current_ball;
                    renderMainBoard(d.drawn_balls);
                    if(d.my_cards.length > 0 && !currentCardData) { 
                        currentCardData = d.my_cards; 
                        d.my_cards.forEach((c, i) => renderCard(c, i)); 
                    }
                } else if(d.status === "result") {
                    document.getElementById('result-ui').style.display='flex';
                    document.getElementById('winner-info').innerText = d.winner + " 🏆";
                    if(!announced) { document.getElementById('win-horn').play(); announced = true; }
                }
            }).catch(e => console.log("Connection Error"));
        }

        function renderTickets(sold) {
            const area = document.getElementById('ticket-area');
            if(area.children.length === 0) {
                for(let i=1; i<=500; i++) { 
                    let div=document.createElement('div'); div.className='t-box'; div.innerText=i; div.id='t-'+i;
                    area.appendChild(div); 
                }
            }
            for(let i=1; i<=500; i++) {
                let box = document.getElementById('t-'+i);
                if(sold[i]) {
                    box.className = (sold[i] === phone) ? 't-box mine' : 't-box sold';
                    // 4. አውቶማቲክ ሪፈንድ - የገዙትን ቁጥር መልሰው ሲጫኑ
                    box.onclick = (sold[i] === phone) ? () => refund(i) : null;
                } else { 
                    box.className='t-box'; 
                    box.onclick=()=>buy(i); 
                }
            }
        }

        function buy(n) { fetch('/buy_specific_ticket', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, ticket_num:n, username})}).then(update); }
        
        // አውቶማቲክ ሪፈንድ ተግባር
        function refund(n) { 
            fetch('/cancel_ticket', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, ticket_num:n})})
            .then(r => r.json())
            .then(d => {
                if(d.success) alert("10 ብር ወደ አካውንትዎ ተመልሷል!");
                update();
            });
        }

        function renderMainBoard(drawn) {
            const board = document.getElementById('main-board');
            if(board.children.length === 0) {
                for(let i=1; i<=75; i++) { 
                    let d=document.createElement('div'); d.className='ball-dot'; d.id='b-'+i; d.innerText=i; 
                    board.appendChild(d); 
                }
            }
            drawn.forEach(b => { 
                let num = b.substring(1);
                let el = document.getElementById('b-'+num); 
                if(el && !el.classList.contains('active')) {
                    el.classList.add('active');
                    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            });
        }

        function renderCard(card, cardIdx) {
            const wrap = document.createElement('div'); wrap.style.marginBottom="15px";
            wrap.innerHTML = `<div style="display:grid;grid-template-columns:repeat(5,1fr);background:var(--orange);font-weight:900;border-radius:8px 8px 0 0;padding:5px;font-size:0.9rem;border:1px solid #555;"><div>B</div><div>I</div><div>N</div><div>G</div><div>O</div></div>`;
            const grid = document.createElement('div'); grid.className='bingo-card'; grid.style.border="1px solid #555";
            
            let selections = JSON.parse(localStorage.getItem('mySelections') || '{}');
            
            card.forEach((n, i) => {
                const cell=document.createElement('div'); const cid=`c-${cardIdx}-${i}`;
                if(i === 12) { cell.className="cell free selected"; cell.innerText="FREE"; }
                else {
                    cell.className="cell"; cell.innerText=n;
                    if(selections[cid]) cell.classList.add('selected');
                    cell.onclick = () => { 
                        // 2. የ2-ኳስ ገደብ (የቅርብ 3 ኳሶች ብቻ - የአሁኑን ጨምሮ)
                        const isDrawn = validToMark.some(ball => parseInt(ball.substring(1)) === n);
                        if(isDrawn) {
                            cell.classList.toggle('selected'); 
                            selections[cid]=cell.classList.contains('selected'); 
                            localStorage.setItem('mySelections', JSON.stringify(selections)); 
                        } else {
                            alert("አልፎበታል! መቆረጥ የሚችለው የቅርብ 3 ኳሶች ብቻ ነው።");
                        }
                    };
                }
                grid.appendChild(cell);
            });
            wrap.appendChild(grid); document.getElementById('card-area').appendChild(wrap);
        }

        function claim() { 
            fetch('/claim_bingo', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone})})
            .then(r=>r.json()).then(d=>{ if(!d.success) alert(d.msg); }); 
        }

        function subD() {
            let amt=document.getElementById('da').value, tid=document.getElementById('di').value;
            if(!amt || !tid) return alert("እባክዎ መረጃውን በትክክል ይሙሉ!");
            fetch('/request_deposit', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, amount:amt, transaction_id:tid})});
            closeM('dep-m'); alert("ጥያቄዎ ተልኳል! በቅርቡ ይረጋገጥልዎታል።");
        }

        function subW() {
            let amt=document.getElementById('wa').value;
            if(!amt || amt < 50) return alert("ቢያንስ 50 ብር ማውጣት ይችላሉ!");
            fetch('/withdraw', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, amount:amt})})
            .then(()=> { closeM('with-m'); alert("የክፍያ ጥያቄዎ ተልኳል!"); });
        }

        setInterval(update, 2000);
        update();
    </script>
</body>
</html>
