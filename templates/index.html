<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BESH BINGO - SECURE PREMIUM</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        /* ቀድሞ የነበሩት ስታይሎችህ እንደተጠበቁ ናቸው... */
    </style>
</head>
<body>

    <div id="auth-ui">
        <div class="auth-card">
            <h2>በሽ ተመዝገብ</h2>
            <div class="input-group">
                <label>የተጫዋች ስም</label>
                <input type="text" id="reg-username" class="auth-input">
            </div>
            <div class="input-group">
                <label>የስልክ ቁጥር</label>
                <input type="tel" id="reg-phone" class="auth-input">
            </div>
            <button id="auth-submit-btn" class="btn-login" onclick="registerUser()">🚀 ወደ ጨዋታው ግባ</button>
        </div>
    </div>

    <div id="main-app-content" style="display: none;">
        </div>

    <script>
        const socket = io(); // WebSocket ግንኙነት መጀመር
        let phone = localStorage.getItem('phone');
        let username = localStorage.getItem('username');
        let currentCardData = null, announced = false, lastBall = "--", clientBalance = 0;
        let isProcessingBuy = false;

        window.onload = function() {
            if (phone && username) {
                showGameUI();
                socket.emit('join_game', phone); 
            } else {
                document.getElementById('auth-ui').style.display = 'flex';
            }
        }

        // 📡 WebSocket: አዲስ መረጃ ከሰርቨር ሲመጣ የሚቀበል
        socket.on('game_update', (d) => {
            clientBalance = parseFloat(d.balance) || 0;
            let finalPrize = Math.floor((parseFloat(d.pot) || 0) * 0.8);
            document.getElementById('balance').innerText = clientBalance.toFixed(0) + " ETB";
            document.getElementById('prize').innerText = finalPrize + " ETB";
            document.getElementById('p-count').innerText = parseInt(d.active_players) || 0;
            document.getElementById('timer').innerText = sanitizeText(d.timer);
            
            if(d.status === "lobby") {
                document.getElementById('lobby-ui').style.display='block'; 
                document.getElementById('game-ui').style.display='none';
                renderTickets(d.sold_tickets || {});
            } else if(d.status === "playing") {
                document.getElementById('lobby-ui').style.display='none'; 
                document.getElementById('game-ui').style.display='block';
                renderMainBoard(d.drawn_balls || []);
            } else if(d.status === "result") {
                // ... (የውጤት ሎጂክ እንደነበረ ይቆያል)
            }
        });

        // 🚀 የተለመዱ ተግባራት
        function registerUser() { 
            // ... (የምዝገባ ሎጂክህ) ...
            socket.emit('join_game', cleanPhone); 
        }

        function showGameUI() {
            document.getElementById('auth-ui').style.display = 'none';
            document.getElementById('main-app-content').style.display = 'block';
            // የድሮውን setInterval(update, 2000) አስወግደነዋል!
        }

        function subD() {
            let amt = parseInt(document.getElementById('da').value);
            let tid = document.getElementById('di').value;
            fetch('/request_deposit', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone: phone, amount: amt, transaction_id: tid}) })
            .then(() => { closeM('dep-m'); alert("ጥያቄዎ ተልኳል!"); });
        }

        function subW() {
            let amt = parseInt(document.getElementById('wa').value);
            fetch('/withdraw', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone: phone, amount: amt}) })
            .then(() => { closeM('with-m'); alert("የክፍያ ጥያቄዎ ተልኳል!"); });
        }
        
        // ... ሌሎች functions (buy, refund, render..., claim) እንዳሉ ይቆዩ ...
    </script>
</body>
</html>
