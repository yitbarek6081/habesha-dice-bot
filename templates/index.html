<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BESH BINGO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #f1c40f; --bg: #0f172a; --blue: #1e293b; --green: #2ecc71; --orange: #e67e22; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 10px; overflow-x: hidden; }
        #reg-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .reg-input { width: 80%; padding: 15px; border-radius: 12px; border: 2px solid var(--gold); background: var(--blue); color: white; text-align: center; margin-bottom: 20px; }
        .stats-bar { display: grid; grid-template-columns: 1fr 1fr 1fr; background: var(--blue); padding: 12px; border-radius: 12px; border: 1px solid var(--gold); margin-bottom: 10px; text-align: center; font-size: 0.8rem; }
        .stats-bar span { display: block; font-size: 1.1rem; color: var(--gold); font-weight: bold; }
        .action-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 15px; }
        .btn-side { flex: 1; padding: 10px; border-radius: 10px; border: none; font-weight: bold; color: white; cursor: pointer; height: 55px; }
        .dep-btn { background: var(--green); }
        .with-btn { background: var(--orange); }
        #timer { font-size: 3rem; font-weight: 900; min-width: 80px; text-align: center; }
        .bingo-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; background: #334155; padding: 8px; border-radius: 8px; margin-top: 10px; }
        .cell { background: white; color: black; height: 50px; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 5px; font-size: 1.1rem; cursor: pointer; }
        .cell.selected { background: var(--gold); color: black; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        .cell.free { background: #e74c3c; color: white; font-size: 0.7rem; }
        .buy-btn { width: 100%; padding: 18px; background: var(--gold); border: none; border-radius: 15px; font-weight: bold; font-size: 1.2rem; cursor: pointer; margin-top: 15px; color: black; }
        #ball-box { font-size: 4rem; font-weight: 900; color: var(--gold); text-align: center; margin: 20px 0; border: 4px solid var(--gold); border-radius: 50%; width: 120px; height: 120px; line-height: 120px; margin-left: auto; margin-right: auto; background: var(--blue); }
    </style>
</head>
<body>

    <div id="reg-screen">
        <h1 style="color:var(--gold);">BESH BINGO</h1>
        <input type="tel" id="phone-input" class="reg-input" placeholder="09..." maxlength="10">
        <button class="buy-btn" onclick="registerUser()" style="width:80%">ENTER</button>
    </div>

    <div class="stats-bar">
        <div>WALLET <span id="balance">0</span></div>
        <div>WIN (80%) <span id="prize">0</span></div>
        <div>PLAYERS <span id="p-count">0</span></div>
    </div>

    <div class="action-row">
        <button class="btn-side dep-btn" onclick="handleDeposit()">DEPOSIT<br>ማስገቢያ</button>
        <div id="timer">30</div>
        <button class="btn-side with-btn" onclick="handleWithdraw()">WITHDRAW<br>ማውጫ</button>
    </div>

    <div id="lobby-ui">
        <div id="ticket-info" style="text-align: center; margin-bottom: 10px;">የተገዛ ካርቴላ፡ <span id="my-tickets">0</span>/2</div>
        <button id="buy-btn" class="buy-btn" onclick="buyTicket()">ካርቴላ ግዛ (10 ብር)</button>
    </div>

    <div id="game-ui" style="display: none;">
        <div id="ball-box">--</div>
        <div class="bingo-grid" id="bingo-card-display"></div>
        <button id="bingo-claim-btn" class="buy-btn" style="background: #e74c3c; color: white;" onclick="claimBingo()">BINGO!</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        let userPhone = localStorage.getItem('bingo_phone');

        if(userPhone) document.getElementById('reg-screen').style.display = 'none';

        function registerUser() {
            const val = document.getElementById('phone-input').value;
            if(val.length >= 10) {
                userPhone = val;
                localStorage.setItem('bingo_phone', val);
                document.getElementById('reg-screen').style.display = 'none';
            }
        }

        function buyTicket() {
            fetch('/buy_ticket', {method:'POST', body: JSON.stringify({phone: userPhone}), headers:{'Content-Type':'application/json'}})
            .then(r => r.json()).then(d => { if(!d.success) tg.showAlert(d.msg); });
        }

        function update() {
            if(!userPhone) return;
            fetch('/get_status?phone=' + userPhone).then(r=>r.json()).then(d=>{
                document.getElementById('balance').innerText = d.balance;
                document.getElementById('prize').innerText = Math.floor(d.pot * 0.8);
                document.getElementById('p-count').innerText = d.player_count;
                document.getElementById('timer').innerText = d.timer;
                document.getElementById('my-tickets').innerText = d.my_ticket_count;

                if(d.status === "playing") {
                    document.getElementById('lobby-ui').style.display = 'none';
                    document.getElementById('game-ui').style.display = 'block';
                    document.getElementById('ball-box').innerText = d.current_ball || "--";
                    if(document.getElementById('bingo-card-display').innerHTML === "") {
                        renderCard(d.card);
                    }
                } else {
                    document.getElementById('lobby-ui').style.display = 'block';
                    document.getElementById('game-ui').style.display = 'none';
                    document.getElementById('bingo-card-display').innerHTML = "";
                }
            });
        }

        function renderCard(cardData) {
            const container = document.getElementById('bingo-card-display');
            container.innerHTML = "";
            cardData.forEach((num, i) => {
                const div = document.createElement('div');
                div.className = (i === 12) ? "cell free" : "cell";
                div.innerText = (i === 12) ? "FREE" : num;
                if(i === 12) div.classList.add('selected');
                div.onclick = () => div.classList.toggle('selected');
                container.appendChild(div);
            });
        }

        function claimBingo() {
            fetch('/claim_bingo', {method:'POST', body: JSON.stringify({phone: userPhone}), headers:{'Content-Type':'application/json'}})
            .then(r=>r.json()).then(d=> tg.showAlert(d.msg));
        }

        setInterval(update, 2000);
    </script>
</body>
</html>
