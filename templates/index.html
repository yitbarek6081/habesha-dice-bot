<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BESH BINGO - PREMIUM</title>
    <style>
        :root { --gold: #ffcc00; --bg: #050a18; --red: #ff3e3e; --green: #00ff88; --orange: #ff8800; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 0; overflow-x: hidden; width: 100vw; }
        
        .header-banner { background: #1e293b; padding: 12px 0; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .header-banner h1 { margin: 0; font-size: 1.4rem; color: var(--gold); letter-spacing: 2px; }

        .stats { display: flex; justify-content: space-around; background: rgba(255,255,255,0.05); padding: 10px; margin: 8px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .stats div { font-size: 0.7rem; color: #ccc; }
        .stats b { display: block; font-size: 1rem; color: var(--gold); }

        .action-bar { display: flex; justify-content: center; gap: 8px; padding: 5px 10px; }
        .btn-main { flex: 1; padding: 12px 5px; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; }
        .btn-deposit { background: var(--green); color: #000; }
        .btn-withdraw { background: var(--orange); color: white; }

        #timer { font-size: 2.2rem; font-weight: 900; color: var(--gold); margin: 5px 0; }

        /* 500 Tickets Responsive Grid */
        .grid-500 { 
            display: grid; 
            grid-template-columns: repeat(10, 1fr); /* በረድፍ 10 ቁጥሮች */
            gap: 4px; padding: 10px; margin: 10px auto;
            background: #000; border-radius: 8px;
            max-height: 220px; overflow-y: auto; 
            width: 92%; border: 1px solid #333;
        }
        .t-box { background: #fff; color: #000; font-size: 0.75rem; padding: 8px 0; font-weight: bold; border-radius: 4px; }
        .t-box.mine { background: var(--gold); border: 1px solid white; box-shadow: 0 0 8px var(--gold); }
        .t-box.sold { background: #333; color: #666; pointer-events: none; }

        /* Modal Center Fix */
        .modal { 
            display: none; position: fixed; inset: 0; 
            background: rgba(0,0,0,0.9); z-index: 5000; 
            align-items: center; justify-content: center; 
        }
        .modal-content { 
            background: #1e293b; padding: 20px; border-radius: 15px; 
            width: 85%; max-width: 320px; border: 1px solid var(--gold); 
        }
        input { padding: 12px; margin: 10px 0; width: 100%; border-radius: 8px; border: none; background: #050a18; color: white; box-sizing: border-box; }

        /* Game UI */
        #ball-circle { width: 65px; height: 65px; background: radial-gradient(circle, #fff, var(--gold)); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; font-weight: 900; margin: 10px auto; border: 3px solid #1e293b; }
        .game-layout { display: flex; flex-direction: column; gap: 10px; padding: 10px; }
        .main-board { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; background: #000; padding: 5px; border-radius: 5px; }
        .ball-dot { font-size: 0.6rem; background: #111; padding: 4px 0; color: #444; }
        .ball-dot.active { background: var(--gold); color: #000; font-weight: bold; }
        
        .bingo-card { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; background: #444; padding: 2px; margin-top: 10px; }
        .cell { background: #fff; color: #000; height: 42px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.1rem; }
        .cell.selected { background: var(--gold) !important; border: 1px solid #000; }
        .cell.free { background: var(--red) !important; color: white; font-size: 0.6rem; }
        #bingo-btn { width: 100%; padding: 12px; background: var(--red); color: white; font-size: 1.3rem; font-weight: 900; border-radius: 10px; border: none; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="header-banner"><h1>BESH BINGO</h1></div>
    
    <div class="stats">
        <div>BALANCE<b id="balance">0 ETB</b></div>
        <div>PLAYERS<b id="p-count">0</b></div>
        <div>JACKPOT<b id="prize">0 ETB</b></div>
    </div>

    <div id="lobby-ui">
        <div class="action-bar">
            <button class="btn-main btn-deposit" onclick="openM('dep-m')">📥 DEPOSIT</button>
            <button class="btn-main btn-withdraw" onclick="openM('with-m')">📤 WITHDRAW</button>
        </div>
        <div id="timer">30</div>
        <p style="font-size: 0.8rem; color: #888;">ካርተላ ለመግዛት ቁጥሩን ይንኩ</p>
        <div class="grid-500" id="ticket-area"></div>
    </div>

    <div id="game-ui" style="display:none;">
        <div id="ball-circle">--</div>
        <div class="game-layout">
            <div class="main-board" id="main-board"></div>
            <div id="card-area"></div>
            <button id="bingo-btn" onclick="claim()">BINGO!</button>
        </div>
    </div>

    <div id="dep-m" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--green); margin-top:0;">DEPOSIT</h2>
            <p>Telebirr Send to: <br>
                <b onclick="copyNum('0945880474')" style="color:var(--gold); font-size:1.2rem; cursor:pointer;">0945880474 📋</b>
            </p>
            <input type="number" id="da" placeholder="Amount (ETB)">
            <input type="text" id="di" placeholder="Transaction ID">
            <button class="btn-main btn-deposit" style="width:100%" onclick="subD()">SUBMIT REQUEST</button>
            <button onclick="closeM('dep-m')" style="color:#94a3b8; background:none; border:none; margin-top:15px; cursor:pointer; font-weight:bold;">CLOSE</button>
        </div>
    </div>

    <div id="with-m" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--orange); margin-top:0;">WITHDRAW</h2>
            <input type="number" id="wa" placeholder="Amount (ETB)">
            <button class="btn-main btn-withdraw" style="width:100%" onclick="subW()">CONFIRM WITHDRAW</button>
            <button onclick="closeM('with-m')" style="color:#94a3b8; background:none; border:none; margin-top:15px; cursor:pointer; font-weight:bold;">CLOSE</button>
        </div>
    </div>

    <div id="result-ui" class="modal">
        <div class="modal-content" style="border:none; background:none;">
            <h1 style="color:var(--gold); font-size:3.5rem; margin:0;">BINGO!</h1>
            <div id="winner-info" style="font-size:1.8rem; color:white;"></div>
        </div>
    </div>

    <script>
        let phone = localStorage.getItem('phone') || prompt("ስልክ ቁጥር ያስገቡ:");
        let username = localStorage.getItem('username') || prompt("የተጫዋች ስም ያስገቡ:");
        if(!phone || !username) location.reload();
        localStorage.setItem('phone', phone); localStorage.setItem('username', username);

        function openM(id) { document.getElementById(id).style.display='flex'; }
        function closeM(id) { document.getElementById(id).style.display='none'; }
        function copyNum(n) { navigator.clipboard.writeText(n); alert("ቁጥሩ ተገልብጧል: " + n); }

        function update() {
            fetch(`/get_status?phone=${phone}`).then(r=>r.json()).then(d=>{
                document.getElementById('balance').innerText = d.balance.toFixed(0) + " ETB";
                document.getElementById('prize').innerText = Math.floor(d.pot * 0.8) + " ETB"; // 20% ኮሚሽን ተቀንሶ
                document.getElementById('p-count').innerText = d.active_players;
                document.getElementById('timer').innerText = (d.status === "playing") ? d.current_ball : d.timer;

                if(d.status === "lobby") {
                    document.getElementById('lobby-ui').style.display='block';
                    document.getElementById('game-ui').style.display='none';
                    document.getElementById('result-ui').style.display='none';
                    renderTickets(d.sold_tickets);
                } else if(d.status === "playing") {
                    document.getElementById('lobby-ui').style.display='none';
                    document.getElementById('game-ui').style.display='block';
                    document.getElementById('ball-circle').innerText = d.current_ball;
                    renderMainBoard(d.drawn_balls);
                    if(d.my_cards.length > 0 && !document.getElementById('card-area').innerHTML) {
                        d.my_cards.forEach((c) => renderCard(c));
                    }
                } else if(d.status === "result") {
                    openM('result-ui');
                    document.getElementById('winner-info').innerText = d.winner + " 🏆";
                }
            });
        }

        function renderTickets(sold) {
            const area = document.getElementById('ticket-area');
            if(area.children.length === 0) {
                for(let i=1; i<=500; i++) {
                    let div=document.createElement('div'); div.className='t-box';
                    div.innerText=i; div.id='t-'+i; area.appendChild(div);
                }
            }
            for(let i=1; i<=500; i++) {
                let box = document.getElementById('t-'+i);
                if(sold[i]) {
                    box.className = (sold[i] === phone) ? 't-box mine' : 't-box sold';
                    box.onclick = (sold[i] === phone) ? () => refund(i) : null;
                } else {
                    box.className='t-box'; box.onclick=()=>buy(i);
                }
            }
        }

        function buy(n) { fetch('/buy_specific_ticket', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, ticket_num:n, username})}).then(update); }
        function refund(n) { if(confirm("ይሰረዝ?")) fetch('/cancel_ticket', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, ticket_num:n})}).then(update); }

        function renderMainBoard(drawn) {
            const board = document.getElementById('main-board');
            if(board.children.length === 0) {
                for(let i=1; i<=75; i++) {
                    let d=document.createElement('div'); d.className='ball-dot'; d.id='b-'+i; d.innerText=i; board.appendChild(d);
                }
            }
            drawn.forEach(b => { 
                let num = b.substring(1); 
                let el = document.getElementById('b-'+num); 
                if(el) el.classList.add('active'); 
            });
        }

        function renderCard(card) {
            const wrap = document.createElement('div');
            wrap.innerHTML = `<div style="display:grid;grid-template-columns:repeat(5,1fr);background:var(--orange);font-weight:900;padding:5px;font-size:0.8rem;margin-top:10px;"><div>B</div><div>I</div><div>N</div><div>G</div><div>O</div></div>`;
            const grid = document.createElement('div'); grid.className='bingo-card';
            card.forEach((n, i) => {
                const cell=document.createElement('div');
                if(i === 12) { cell.className="cell free selected"; cell.innerText="FREE"; }
                else { cell.className="cell"; cell.innerText=n; cell.onclick = () => cell.classList.toggle('selected'); }
                grid.appendChild(cell);
            });
            wrap.appendChild(grid); document.getElementById('card-area').appendChild(wrap);
        }

        function claim() { fetch('/claim_bingo', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone})}).then(r=>r.json()).then(d=>{ if(!d.success) alert(d.msg); }); }
        
        function subD() {
            let amt=document.getElementById('da').value, tid=document.getElementById('di').value;
            if(!amt || !tid) return alert("ሁሉንም ያስገቡ!");
            fetch('/request_deposit', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, amount:amt, transaction_id:tid})});
            closeM('dep-m'); alert("ጥያቄው ተልኳል!");
        }

        function subW() {
            let amt=document.getElementById('wa').value;
            if(!amt || amt < 20) return alert("ቢያንስ 20 ብር!");
            fetch('/withdraw', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, amount:amt})}).then(() => { closeM('with-m'); alert("ጥያቄዎ ተልኳል!"); update(); });
        }

        setInterval(update, 2000); update();
    </script>
</body>
</html>
