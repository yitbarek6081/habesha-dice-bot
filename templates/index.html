<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BESH BINGO</title>
    <style>
        :root { --gold: #ffcc00; --bg: #050a18; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 0; }
        .stats { display: flex; justify-content: space-around; background: #111827; padding: 10px; margin: 5px; border-radius: 10px; border: 1px solid #333; }
        .stats b { display: block; color: var(--gold); }
        .grid-500 { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; max-height: 150px; overflow-y: auto; background: #000; padding: 10px; margin: 10px; border-radius: 10px; }
        .t-box { background: #fff; color: #000; font-size: 0.7rem; padding: 8px 0; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .t-box.mine { background: var(--gold); border: 2px solid white; box-shadow: 0 0 10px var(--gold); }
        .t-box.sold { background: #333; color: #666; cursor: default; }
        #ball-circle { width: 70px; height: 70px; background: radial-gradient(circle, #fff, var(--gold)); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: 900; margin: 10px auto; border: 3px solid #1e293b; box-shadow: 0 0 15px var(--gold); }
        .game-layout { display: grid; grid-template-columns: 1fr 2fr; gap: 8px; padding: 10px; align-items: start; }
        .main-board { border: 1px solid #444; height: 380px; overflow-y: auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; padding: 5px; background: rgba(0,0,0,0.6); border-radius: 10px; }
        .ball-dot { font-size: 0.6rem; background: #1f2937; padding: 4px; color: #444; border-radius: 2px; }
        .ball-dot.active { background: var(--gold); color: #000; font-weight: bold; }
        .bingo-card { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; background: #4b5563; padding: 4px; border-radius: 8px; }
        .cell { background: #fff; color: #000; height: 40px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.1rem; cursor: pointer; }
        .cell.selected { background: var(--gold) !important; border: 2px solid #b45309; }
        .cell.free { background: #ff3e3e !important; color: white; font-size: 0.55rem; }
        #bingo-btn { width: 90%; padding: 12px; background: linear-gradient(to right, #ff3e3e, #b91c1c); color: white; font-size: 1.2rem; font-weight: 900; border-radius: 12px; border: 2px solid white; margin: 10px auto; display: block; cursor: pointer; }
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:2000; flex-direction:column; align-items:center; justify-content:center; }
        input { padding: 12px; margin: 10px; width: 80%; border-radius: 8px; border: none; }
    </style>
</head>
<body>
    <audio id="win-horn" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" preload="auto"></audio>
    <div class="stats">
        <div>BALANCE <b id="balance">0 ETB</b></div>
        <div>PLAYERS <b id="p-count">0</b></div>
        <div>JACKPOT <b id="prize">0 ETB</b></div>
    </div>
    
    <div id="lobby-ui">
        <div id="timer" style="font-size: 2.5rem; font-weight: 900; color: var(--gold); margin: 10px;">30</div>
        <div class="grid-500" id="ticket-area"></div>
        <button onclick="openM('dep-m')" style="background:var(--gold); padding:10px 20px; border:none; border-radius:8px; font-weight:bold;">📥 DEPOSIT</button>
    </div>

    <div id="game-ui" style="display:none;">
        <div id="ball-circle">--</div>
        <div class="game-layout">
            <div class="main-board" id="main-board"></div>
            <div>
                <div id="card-area"></div>
                <button id="bingo-btn" onclick="claim()">BINGO!</button>
            </div>
        </div>
    </div>

    <div id="dep-m" class="modal">
        <div style="background:#1e293b; padding:20px; border-radius:15px; width:85%; border:1px solid var(--gold);">
            <h2 style="color:var(--gold);">DEPOSIT</h2>
            <p>ብር የሚልኩበት ቁጥር:</p>
            <div style="background:#000; padding:10px; border-radius:8px; font-size:1.3rem; font-weight:bold; color:var(--gold);">0945880474</div>
            <input type="number" id="da" placeholder="መጠን">
            <input type="text" id="di" placeholder="Transaction ID">
            <button onclick="subD()" style="background:var(--gold); padding:10px; width:100%; border:none; border-radius:8px; margin-top:10px; font-weight:bold;">ጥያቄ ላክ</button>
            <button onclick="closeM('dep-m')" style="background:none; border:none; color:#888; margin-top:15px;">ዝጋ</button>
        </div>
    </div>

    <div id="result-ui" class="modal">
        <h1 style="color:var(--gold); font-size:3.5rem;">BINGO!</h1>
        <div id="winner-info" style="font-size:2rem;"></div>
    </div>

    <script>
        let phone = localStorage.getItem('phone') || prompt("ስልክ ቁጥር:");
        let username = localStorage.getItem('username') || prompt("ስም:");
        localStorage.setItem('phone', phone); localStorage.setItem('username', username);
        let currentCard = null;

        function openM(id) { document.getElementById(id).style.display='flex'; }
        function closeM(id) { document.getElementById(id).style.display='none'; }

        function update() {
            fetch(`/get_status?phone=${phone}`).then(r => r.json()).then(d => {
                document.getElementById('balance').innerText = Math.floor(d.balance) + " ETB";
                document.getElementById('prize').innerText = Math.floor(d.pot * 0.8) + " ETB";
                document.getElementById('timer').innerText = d.timer;

                if(d.status === "lobby") {
                    document.getElementById('lobby-ui').style.display='block';
                    document.getElementById('game-ui').style.display='none';
                    document.getElementById('result-ui').style.display='none';
                    currentCard = null; renderTickets(d.sold_tickets);
                } else if(d.status === "playing") {
                    document.getElementById('lobby-ui').style.display='none';
                    document.getElementById('game-ui').style.display='block';
                    document.getElementById('ball-circle').innerText = d.current_ball;
                    if(!currentCard && d.my_cards.length > 0) { currentCard = d.my_cards; renderCards(d.my_cards); }
                    markBoard(d.drawn_balls);
                } else if(d.status === "result") {
                    document.getElementById('result-ui').style.display='flex';
                    document.getElementById('winner-info').innerText = d.winner + " 🎉";
                }
            });
        }

        function renderTickets(sold) {
            const area = document.getElementById('ticket-area');
            if(area.innerHTML === "") { for(let i=1; i<=500; i++) area.innerHTML += `<div class="t-box" id="t-${i}">${i}</div>`; }
            for(let i=1; i<=500; i++) {
                let el = document.getElementById('t-'+i);
                if(sold[i]) {
                    el.className = (sold[i] === phone) ? 't-box mine' : 't-box sold';
                    el.onclick = (sold[i] === phone) ? () => refund(i) : null;
                } else { el.className = 't-box'; el.onclick = () => buy(i); }
            }
        }

        function buy(n) { fetch('/buy_specific_ticket', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, ticket_num:n, username})}); }
        function refund(n) { if(confirm("ይህንን ካርቴላ መመለስ ትፈልጋለህ?")) fetch('/cancel_ticket', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, ticket_num:n})}); }

        function markBoard(drawn) {
            const board = document.getElementById('main-board');
            if(board.innerHTML === "") { for(let i=1; i<=75; i++) board.innerHTML += `<div class="ball-dot" id="b-${i}">${i}</div>`; }
            drawn.forEach(b => { let el = document.getElementById('b-'+b.substring(1)); if(el) el.classList.add('active'); });
        }

        function renderCards(cards) {
            const area = document.getElementById('card-area'); area.innerHTML = "";
            let selections = JSON.parse(localStorage.getItem('picks') || '{}');
            cards.forEach((card, idx) => {
                let html = `<div class="bingo-card">`;
                card.forEach((n, i) => {
                    let id = `c-${idx}-${i}`;
                    let sel = (i===12 || selections[id]) ? 'selected' : '';
                    html += `<div class="cell ${sel}" onclick="toggle(this,'${id}')">${n||'FREE'}</div>`;
                });
                area.innerHTML += html + `</div>`;
            });
        }

        function toggle(el, id) {
            el.classList.toggle('selected');
            let picks = JSON.parse(localStorage.getItem('picks') || '{}');
            picks[id] = el.classList.contains('selected');
            localStorage.setItem('picks', JSON.stringify(picks));
        }

        function subD() {
            let amt=document.getElementById('da').value, tid=document.getElementById('di').value;
            if(amt && tid) fetch('/request_deposit', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, amount:amt, transaction_id:tid})}).then(()=> {closeM('dep-m'); alert("ጥያቄው ተልኳል!");});
        }

        function claim() { fetch('/claim_bingo', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone})}).then(r=>r.json()).then(d=>{ if(!d.success) alert(d.msg); }); }

        setInterval(update, 1500);
    </script>
</body>
</html>
