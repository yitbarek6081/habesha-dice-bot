<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BESH BINGO - SECURE PREMIUM</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --gold: #ffcc00; --bg: #050a18; --red: #ff3e3e; --green: #00ff88; --orange: #ff8800; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; text-align: center; margin: 0; padding: 0; overflow-x: hidden; width: 100vw; }
        
        /* 📝 የምዝገባ ገጽ ስታይል */
        #auth-ui {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            background: radial-gradient(circle at center, #1e293b, #050a18);
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid var(--gold);
            border-radius: 20px;
            padding: 30px 20px;
            width: 100%;
            max-width: 360px;
            box-sizing: border-box;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .auth-card h2 { color: var(--gold); margin-top: 0; font-size: 1.6rem; letter-spacing: 1px; }
        .auth-card p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 20px; }
        .input-group { width: 100%; text-align: left; margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.85rem; color: var(--gold); margin-bottom: 5px; font-weight: bold; }
        .auth-input { padding: 14px; width: 100%; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); box-sizing: border-box; font-size: 1rem; background: #fff; color: #000; font-weight: bold; }
        .auth-input:focus { border-color: var(--gold); outline: none; }
        .btn-login { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--green), #00cc6a); color: #000; border: none; border-radius: 10px; font-weight: 900; font-size: 1.1rem; cursor: pointer; text-transform: uppercase; margin-top: 10px; box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3); transition: 0.2s; }
        .btn-login:disabled { background: #555; cursor: not-allowed; opacity: 0.6; box-shadow: none; }
        .btn-login:active { transform: scale(0.98); }

        .header-banner { background: linear-gradient(145deg, #1e293b, #050a18); padding: 15px 0; border-bottom: 3px solid var(--gold); position: sticky; top: 0; z-index: 100; }
        .header-banner h1 { margin: 0; font-size: 1.8rem; color: var(--gold); letter-spacing: 3px; }
        
        .stats { display: flex; justify-content: space-around; background: rgba(255,255,255,0.05); padding: 10px; margin: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .stats b { display: block; font-size: 1.1rem; color: var(--gold); }
        
        .action-bar { display: flex; justify-content: center; gap: 6px; padding: 5px 10px; }
        .btn-main { flex: 1; padding: 12px 5px; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; transition: 0.3s; }
        .btn-deposit { background: var(--green); color: #000; }
        .btn-withdraw { background: var(--orange); color: white; }
        .btn-how-to { background: #3b82f6; color: white; border: 1px solid #60a5fa; }

        .timer-container { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 15px auto; width: 90%; max-width: 400px; background: rgba(255, 255, 255, 0.02); padding: 8px 15px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.05); }
        #timer { font-size: 2.5rem; font-weight: 900; color: var(--gold); text-align: center; line-height: 1; min-width: 50px; }
        .buy-notice { font-size: 1.1rem; font-weight: 900; color: var(--green); background: rgba(0, 255, 136, 0.1); padding: 10px 15px; border-radius: 10px; border: 2px dashed var(--green); text-align: center; min-width: 160px; box-sizing: border-box; letter-spacing: 0.5px; }

        .grid-500 { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; height: 160px; overflow-y: auto; background: #000; padding: 10px; margin: 10px; border-radius: 10px; box-sizing: border-box; }
        .t-box { background: #fff; color: #000; font-size: 0.75rem; padding: 8px 0; font-weight: bold; border-radius: 4px; cursor: pointer; box-sizing: border-box; border: 1px solid transparent; }
        .t-box.mine { background: var(--gold) !important; color: #000 !important; box-shadow: inset 0 0 0 2px #ffffff; }
        .t-box.sold { background: #333; color: #666; cursor: not-allowed; }

        .game-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 5px; box-sizing: border-box; }
        .board-container { border: 1px solid #333; background: rgba(0,0,0,0.8); border-radius: 10px; padding: 4px; display: flex; flex-direction: column; }
        .board-header { display: grid; grid-template-columns: repeat(5, 1fr); background: var(--gold); color: #000; font-weight: 900; font-size: 0.85rem; padding: 4px 0; border-radius: 5px; margin-bottom: 4px; }
        .main-board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; flex: 1; }
        .board-column { display: flex; flex-direction: column; gap: 2px; }
        .ball-dot { font-size: 0.65rem; background: #111; padding: 3px 0; color: #444; border-radius: 2px; text-align: center; font-weight: bold; }
        .ball-dot.active { background: var(--gold); color: #000; font-weight: bold; box-shadow: 0 0 3px var(--gold); }
        
        .bingo-card { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; background: #444; padding: 4px; border-radius: 0 0 5px 5px; max-width: 300px; margin: 0 auto; }
        .cell { background: #fff; color: #000; height: 30px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.8rem; cursor: pointer; }
        .cell.selected { background: var(--gold) !important; }
        .cell.free { background: var(--red) !important; color: white; font-size: 0.6rem; }
        
        #bingo-btn { width: 90%; padding: 12px; background: var(--red); color: white; font-size: 1.2rem; font-weight: 900; border-radius: 15px; border: 2px solid white; margin: 10px auto; display: block; cursor: pointer; }
        #bingo-btn:disabled { background: #555 !important; border-color: #888 !important; color: #aaa !important; cursor: not-allowed; }
        
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:2000; flex-direction:column; align-items:center; justify-content:center; padding: 20px; }
        .modal-content { background: #1e293b; padding: 20px; border-radius: 15px; width: 92%; max-width: 360px; text-align: left; max-height: 85vh; overflow-y: auto; }
        input { padding: 12px; margin: 10px 0; width: 100%; border-radius: 8px; border: none; box-sizing: border-box; font-size: 1rem; color: #000; }
    </style>
</head>
<body>

    <div id="auth-ui">
        <div class="auth-card">
            <h2>ተመዝገብ</h2>
            <p>ወደ ጨዋታው ለመግባት መረጃዎን ያስገቡ</p>
            <div class="input-group">
                <label>የተጫዋች ስም</label>
                <input type="text" id="reg-username" class="auth-input" placeholder="ስምዎን ያስገቡ...">
            </div>
            <div class="input-group">
                <label>የስልክ ቁጥር</label>
                <input type="tel" id="reg-phone" class="auth-input" placeholder="09... ወይም 07...">
            </div>
            <button id="auth-submit-btn" class="btn-login" onclick="registerUser()">🚀 ወደ ጨዋታው ግባ</button>
        </div>
    </div>

    <div id="main-app-content" style="display: none;">
        <div class="header-banner"><h1>BESH BINGO</h1></div>
        
        <div class="stats">
            <div>BALANCE<b id="balance">0 ETB</b></div>
            <div>PLAYERS<b id="p-count">0</b></div>
            <div>በሽ-ደራሽ<b id="prize">0 ETB</b></div>
        </div>

        <div id="lobby-ui">
            <div class="action-bar">
                <button class="btn-main btn-deposit" onclick="openM('dep-m')">📥 DEPOSIT</button>
                <button class="btn-main btn-how-to" onclick="openM('guide-m')">📖 HOW TO PLAY</button>
                <button class="btn-main btn-withdraw" onclick="openM('with-m')">📤 WITHDRAW</button>
            </div>
            
            <div class="timer-container">
                <div id="timer">30</div>
                <div class="buy-notice">🎟️ ካርቴላ ይግዙ (10 ETB)</div>
            </div>

            <div class="grid-500" id="ticket-area"></div>
        </div>
    </div>

    <div id="guide-m" class="modal"><div class="modal-content"><h2>📖 መመሪያ</h2><p>ካርቴላ ለመግዛት ቁጥሮቹን ይጫኑ። ፈጥነው BINGO ይበሉ!</p><button class="btn-main" onclick="closeM('guide-m')">እሺ</button></div></div>
    <div id="with-m" class="modal"><div class="modal-content"><input type="number" id="wa" placeholder="Amount"><button class="btn-main" onclick="subW()">CONFIRM</button><button onclick="closeM('with-m')">CLOSE</button></div></div>
    <div id="dep-m" class="modal"><div class="modal-content"><input type="number" id="da" placeholder="Amount"><input type="text" id="di" placeholder="Transaction ID"><button class="btn-main" onclick="subD()">SUBMIT</button><button onclick="closeM('dep-m')">CLOSE</button></div></div>

    <script>
        let phone = localStorage.getItem('phone');
        let username = localStorage.getItem('username');
        let isProcessingBuy = false;
        let localTimerInterval = null;
        let currentTimerValue = 30;

        let socket = io(); 

        window.onload = function() {
            // ገጹ ሲከፈት ወዲያው 500 ካርቴላዎችን ያዘጋጅ (ባዶ ጥቁር እንዳይሆን)
            initTicketsOnce();
            
            // የቆየ ባላንስ ካለ ከዜሮ ይልቅ እሱን አስቀድሞ ያሳይ
            let savedBalance = localStorage.getItem('cached_balance');
            if(savedBalance) {
                document.getElementById('balance').innerText = parseFloat(savedBalance).toFixed(0) + " ETB";
            }

            if (phone && username) {
                showGameUI();
            } else {
                document.getElementById('auth-ui').style.display = 'flex';
                document.getElementById('main-app-content').style.display = 'none';
            }
        }

        function registerUser() {
            let inputName = document.getElementById('reg-username').value.trim();
            let inputPhone = document.getElementById('reg-phone').value.trim();
            if (inputName.length < 2 || inputPhone.length < 9) return alert("ትክክለኛ መረጃ ያስገቡ!");

            localStorage.setItem('phone', inputPhone);
            localStorage.setItem('username', inputName);
            phone = inputPhone;
            username = inputName;
            showGameUI();
        }

        function showGameUI() {
            document.getElementById('auth-ui').style.display = 'none';
            document.getElementById('main-app-content').style.display = 'block';
            
            initTicketsOnce();

            socket.on('game_update', function(data) {
                handleStateUpdate(data);
            });

            socket.on('user_data_response', function(data) {
                handleStateUpdate(data);
            });

            socket.emit('request_user_data', { phone: phone });
            startLocalTimer(); // የሰዓት መቁጠሪያውን አስነሳ
        }

        function initTicketsOnce() {
            const area = document.getElementById('ticket-area');
            if(area && area.children.length === 0) { 
                const fragment = document.createDocumentFragment();
                for(let i=1; i<=500; i++) { 
                    let div=document.createElement('div'); 
                    div.className='t-box'; 
                    div.innerText=i; 
                    div.id='t-'+i; 
                    div.onclick = () => buy(i);
                    fragment.appendChild(div); 
                } 
                area.appendChild(fragment);
            }
        }

        // ⏱️ ሰዓቱ በየሰከንዱ እንዲቀንስ የሚያደርግ ፈንክሽን
        function startLocalTimer() {
            if(localTimerInterval) clearInterval(localTimerInterval);
            localTimerInterval = setInterval(() => {
                if(currentTimerValue > 0) {
                    currentTimerValue--;
                    document.getElementById('timer').innerText = currentTimerValue;
                }
            }, 1000);
        }

        function handleStateUpdate(d) {
            if (!phone || !d) return;
            
            // ባላንስን ሴቭ አድርግና አሳይ (ወደ 0 እንዳይመለስ)
            if(d.balance !== undefined && d.balance !== null) {
                let clientBalance = parseFloat(d.balance) || 0;
                localStorage.setItem('cached_balance', clientBalance);
                document.getElementById('balance').innerText = clientBalance.toFixed(0) + " ETB";
            }
            
            if(d.pot) document.getElementById('prize').innerText = Math.floor(parseFloat(d.pot) * 0.8) + " ETB";
            if(d.active_players) document.getElementById('p-count').innerText = d.active_players;
            
            // የሰዓት አቆጣጠር ማመሳሰል
            if(d.timer !== undefined) {
                let serverTimer = parseInt(d.timer);
                if(!isNaN(serverTimer)) {
                    currentTimerValue = serverTimer;
                    document.getElementById('timer').innerText = currentTimerValue;
                }
            }
            
            if(d.status === "lobby" || !d.status) {
                initTicketsOnce(); 
                if (!isProcessingBuy) { renderTickets(d.sold_tickets || {}); }
            }
        }

        function renderTickets(sold) {
            const cleanPhone = String(phone);
            for(let i=1; i<=500; i++) {
                let box = document.getElementById('t-'+i); if(!box) continue;
                if(sold[i]) { 
                    const isMine = (String(sold[i]) === cleanPhone);
                    box.className = isMine ? 't-box mine' : 't-box sold'; 
                } else { 
                    box.className='t-box'; 
                }
            }
        }

        function buy(n) { 
            if (isProcessingBuy) return;
            isProcessingBuy = true;
            fetch('/buy_specific_ticket', {
                method:'POST', headers:{'Content-Type':'application/json'}, 
                body:JSON.stringify({phone: phone, ticket_num: n, username: username})
            }).then(() => { isProcessingBuy = false; socket.emit('request_user_data', { phone: phone }); })
            .catch(() => { isProcessingBuy = false; }); 
        }

        function openM(id) { document.getElementById(id).style.display='flex'; }
        function closeM(id) { document.getElementById(id).style.display='none'; }
        function sanitizeText(str) { return String(str).replace(/[&<>"']/g, ''); }

        function subD() {
            let amt = parseInt(document.getElementById('da').value);
            let tid = sanitizeText(document.getElementById('di').value);
            if(!amt || !tid) return alert("መረጃ ያስገቡ!");
            fetch('/request_deposit', { 
                method:'POST', headers:{'Content-Type':'application/json'}, 
                body:JSON.stringify({phone: phone, amount: amt, transaction_id: tid}) 
            }).then(() => { closeM('dep-m'); alert("ተልኳል!"); socket.emit('request_user_data', { phone: phone }); });
        }

        function subW() {
            let amt = parseInt(document.getElementById('wa').value);
            if(!amt || amt < 20) return alert("ሚኒመም 20 ብር!");
            fetch('/withdraw', {
                method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone: phone, amount: amt})
            }).then(r => r.json()).then(d => { closeM('with-m'); alert("የውዝድሮው ጥያቄ ተልኳል!"); socket.emit('request_user_data', { phone: phone }); });
        }
    </script>
</body>
</html>
