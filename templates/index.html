<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HABA BINGO</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1e272e; color: #fff; text-align: center; margin: 0; padding: 10px; }
        .container { max-width: 480px; margin: 0 auto; background: #2f3640; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .header { display: flex; justify-content: space-between; background: #00a8ff; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-weight: bold; }
        .ball-display { background: #000; padding: 20px; border-radius: 50%; width: 80px; height: 80px; line-height: 80px; font-size: 32px; color: #fbc531; font-weight: bold; margin: 15px auto; border: 4px solid #fbc531; box-shadow: 0 0 15px #fbc531; }
        .ticket-box { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; background: #dcdde1; padding: 8px; border-radius: 6px; color: #000; margin-top: 15px; }
        .cell { font-size: 16px; font-weight: bold; padding: 12px 0; background: #f5f6fa; border-radius: 4px; border: 1px solid #b2bec3; }
        .cell.drawn { background: #e84118; color: #fff; animation: pulse 0.5s; }
        .cell.free { background: #4cd137; color: #fff; }
        input, button { padding: 12px; font-size: 16px; border-radius: 6px; border: none; width: 100%; box-sizing: border-box; margin-top: 8px; font-weight: bold; }
        input { background: #f5f6fa; color: #000; }
        button { background: #4cd137; color: #fff; cursor: pointer; text-transform: uppercase; }
        .btn-bingo { background: #e84118; display: none; font-size: 20px; box-shadow: 0 4px 10px rgba(232,65,24,0.4); }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: #fbc531; margin-top:0;">🎯 HABA BINGO</h2>
    
    <!-- ሎግ-ኢን ፎርም -->
    <div id="login-form">
        <input type="text" id="username" placeholder="የመጫወቻ ስም ያስገቡ">
        <input type="text" id="phone" placeholder="የስልክ ቁጥር (ምሳሌ፡ 09...)">
        <button onclick="login()">ወደ ጨዋታው ግባ</button>
    </div>

    <!-- ዋናው የጨዋታ ቦርድ -->
    <div id="game-board" style="display: none;">
        <div class="header">
            <div>👤 <span id="lbl-name">--</span></div>
            <div>💰 <span id="lbl-balance">0</span> ETB</div>
        </div>

        <div style="background:#353b48; padding:8px; border-radius:6px; font-size:14px; margin-bottom:10px;">
            ሁኔታ፦ <span id="lbl-status" style="color:#fbc531;">Lobby</span> | ገንዳ (POT)፦ <span id="lbl-pot" style="color:#4cd137;">0</span> ETB
        </div>

        <div class="ball-display" id="lbl-ball">--</div>
        <div style="font-size:14px; color:#aaa; margin-bottom:10px;">የቀረው ጊዜ፦ <span id="lbl-timer">0</span> ሰከንድ</div>

        <!-- ካርቴላ መግዣ -->
        <div id="shop-area">
            <input type="number" id="ticket-num" placeholder="የካርቴላ ቁጥር ይምረጡ (1-100)" min="1" max="100" value="1">
            <button onclick="buyTicket()" style="background:#00a8ff;">🎫 ካርቴላ ግዛ (10 ETB)</button>
        </div>

        <!-- ካርቴላዎች የሚታዩበት ቦታ -->
        <div id="my-cards-container"></div>
        
        <!-- ቢንጎ ማለቂያ ቁልፍ -->
        <button id="btn-bingo-action" class="btn-bingo" onclick="claimBingo()">🏆 BINGO!</button>
    </div>
</div>

<script>
    let myPhone = "";
    let myName = "";
    let pollingInterval = null;

    function login() {
        myPhone = document.getElementById('phone').value.trim();
        myName = document.getElementById('username').value.trim();
        if(!myPhone || !myName) return alert("እባክዎ ስም እና ስልክ በትክክል ያስገቡ!");

        fetch('/register_or_login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ phone: myPhone, username: myName })
        })
        .then(res => res.json())
        .then(data => {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('game-board').style.display = 'block';
            document.getElementById('lbl-name').innerText = myName;
            
            // የ 3 ሰከንድ ፖሊንግ መጀመር (ለ 500 ሰው ሰርቨሩን ቀለል ለማድረግ)
            updateStatus();
            pollingInterval = setInterval(updateStatus, 3000);
        });
    }

    function updateStatus() {
        fetch(`/get_status?phone=${myPhone}`)
        .then(res => res.json())
        .then(data => {
            document.getElementById('lbl-balance').innerText = data.balance;
            document.getElementById('lbl-pot').innerText = data.pot;
            document.getElementById('lbl-ball').innerText = data.current_ball;

            if(data.status === "lobby") {
                document.getElementById('lbl-status').innerText = `ሎቢ (ተጫዋቾች: ${data.active_players})`;
                document.getElementById('lbl-timer').innerText = data.timer;
                document.getElementById('shop-area').style.display = 'block';
                document.getElementById('btn-bingo-action').style.display = 'none';
            } else if(data.status === "playing") {
                document.getElementById('lbl-status').innerText = "ጨዋታ ተጀምሯል!";
                document.getElementById('lbl-timer').innerText = data.ball_timer > 0 ? `ኳስ ለመውጣት ${data.ball_timer}` : "ሂደት ላይ";
                document.getElementById('shop-area').style.display = 'none';
                document.getElementById('btn-bingo-action').style.display = 'block';
            } else if(data.status === "result") {
                document.getElementById('lbl-status').innerText = `🎉 አሸናፊ: ${data.winner}! (ካርቴላ #${data.winning_ticket_num})`;
                document.getElementById('lbl-timer').innerText = "ቀጣይ ዙር በቅርቡ...";
                document.getElementById('btn-bingo-action').style.display = 'none';
            }

            renderCards(data.my_cards, data.drawn_balls);
        }).catch(err => console.log("ኔትወርክ ተቆራርጧል..."));
    }

    function renderCards(cards, drawnBalls) {
        const container = document.getElementById('my-cards-container');
        container.innerHTML = "";
        if(!cards || cards.length === 0) return;

        // የወጡትን ኳሶች ወደ ቁጥር (Set) መቀየር
        let drawnSet = new Set(drawnBalls.map(b => parseInt(b.substring(1))));
        drawnSet.add(0); // FREE Space

        cards.forEach(card => {
            let box = document.createElement('div');
            box.className = "ticket-box";
            card.forEach(val => {
                let cell = document.createElement('div');
                cell.className = "cell";
                if(val === 0) {
                    cell.innerText = "FREE";
                    cell.className += " free";
                } else {
                    cell.innerText = val;
                    if(drawnSet.has(val)) cell.className += " drawn";
                }
                box.appendChild(cell);
            });
            container.appendChild(box);
        });
    }

    function buyTicket() {
        let tNum = document.getElementById('ticket-num').value;
        if(!tNum || tNum < 1 || tNum > 100) return alert("ከ 1 እስከ 100 ቁጥር ይምረጡ!");

        fetch('/buy_specific_ticket', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ phone: myPhone, username: myName, ticket_num: tNum })
        })
        .then(res => res.json())
        .then(data => {
            alert(data.message);
            updateStatus();
        });
    }

    function claimBingo() {
        fetch('/claim_bingo', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ phone: myPhone })
        })
        .then(res => res.json())
        .then(data => {
            alert(data.message);
            updateStatus();
        });
    }
</script>
</body>
</html>
