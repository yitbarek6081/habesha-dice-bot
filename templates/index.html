<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BESH BINGO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #f1c40f; --bg: #0f172a; --red: #e74c3c; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 10px; }
        
        /* Animation */
        @keyframes welcomeSlide { 0% { transform: translateY(-30px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        .welcome-msg { animation: welcomeSlide 0.8s ease-out; color: var(--gold); text-align: center; font-weight: bold; font-size: 1.2rem; margin-bottom: 15px; text-shadow: 0 0 10px rgba(241,196,15,0.5); }

        .ticket-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; max-height: 250px; overflow-y: auto; background: #1e293b; padding: 10px; border-radius: 10px; }
        .t-num { background: #334155; padding: 10px 0; text-align: center; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }
        .t-num.selected { background: var(--gold); color: black; font-weight: bold; }
        .t-num.bought { background: #000; color: #444; text-decoration: line-through; cursor: not-allowed; }
        
        .draw-circle { width: 70px; height: 70px; border: 4px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: 900; margin: 10px auto; background: #1e293b; color: var(--gold); }
        .bingo-card { background: #E0E5B6; padding: 4px; border-radius: 5px; margin-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1px; background: #333; }
        .cell { background: white; height: 38px; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; font-weight: bold; color: #333; cursor: pointer; }
        .cell.marked { background: var(--red) !important; color: white; position: relative; }
        .cell.marked::after { content: '●'; position: absolute; opacity: 0.3; font-size: 2rem; }
        
        .b-cell { font-size: 0.6rem; padding: 2px; background: #334155; text-align: center; }
        .b-cell.drawn { background: var(--gold); color: black; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="lobby">
        <div class="welcome-msg">✨ እንኳን ወደ በሽ ቢንጎ በሰላም መጣችሁ! ✨</div>
        <div id="timer-ui" style="text-align:center; font-size:3rem; font-weight:900; color:white;">30</div>
        <div class="ticket-grid" id="picker"></div>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button onclick="deposit()" style="background:#3498db" class="btn">Deposit</button>
            <button id="buy-btn" onclick="buyTicket()" disabled style="background:var(--gold); color:black;" class="btn">ካርቴላ ምረጥ</button>
            <button onclick="withdraw()" style="background:var(--red)" class="btn">Withdraw</button>
        </div>
    </div>

    <div id="game" style="display:none;">
        <div id="active-num" class="draw-circle">?</div>
        <div style="display:grid; grid-template-columns: 1fr 1.3fr; gap:8px;">
            <div style="background:#1e293b; padding:8px; border-radius:8px;">
                <div id="brd" style="display:grid; grid-template-columns:repeat(5,1fr); gap:2px;"></div>
            </div>
            <div id="my-cards-container"></div>
        </div>
        <button id="win-btn" onclick="claimWin()" style="display:none; background:var(--gold); color:black; margin-top:15px;" class="btn">🎊 BINGO! 🎊</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let phone = localStorage.getItem('u_phone'), selectedNum = null, myMarked = new Set([0]), tickets = [];

        // 500 Ticket Picker
        const picker = document.getElementById('picker');
        for(let i=1; i<=500; i++) picker.innerHTML += `<div class="t-num" id="tn-${i}" onclick="selectNum(${i})">${i}</div>`;

        function selectNum(n) {
            if(document.getElementById(`tn-${n}`).classList.contains('bought')) return;
            if(selectedNum) document.getElementById(`tn-${selectedNum}`).classList.remove('selected');
            selectedNum = n; document.getElementById(`tn-${n}`).classList.add('selected');
            document.getElementById('buy-btn').disabled = false;
            document.getElementById('buy-btn').innerText = "ቁጥር #"+n+" ግዛ";
        }

        function buyTicket() {
            fetch('/join_game', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, ticket_num: selectedNum})})
            .then(r=>r.json()).then(d=> { if(d.success) { tg.showAlert("ተገዝቷል!"); selectedNum=null; } else alert(d.msg); });
        }

        function toggleMark(n) {
            const el = document.getElementById(`cell-${n}`);
            if(!el) return;
            if(myMarked.has(n)) { myMarked.delete(n); el.classList.remove('marked'); }
            else { myMarked.add(n); el.classList.add('marked'); tg.HapticFeedback.impactOccurred('light'); }
            document.getElementById('win-btn').style.display = myMarked.size >= 5 ? 'block' : 'none';
        }

        function update() {
            fetch('/get_status').then(r=>r.json()).then(d=>{
                document.getElementById('timer-ui').innerText = d.timer;
                if(d.status === "lobby") {
                    document.getElementById('lobby').style.display='block';
                    document.getElementById('game').style.display='none';
                    d.bought_numbers.forEach(n => document.getElementById(`tn-${n}`).classList.add('bought'));
                    document.getElementById('buy-btn').disabled = (d.sub_status === "closed");
                } else {
                    document.getElementById('lobby').style.display='none';
                    document.getElementById('game').style.display='block';
                    if(d.drawn_numbers.length > 0) {
                        let last = d.drawn_numbers[d.drawn_numbers.length-1];
                        document.getElementById('active-num').innerText = last;
                        document.getElementById(`b-${last}`).classList.add('drawn');
                    }
                }
            });

            if(phone) fetch('/user_data/'+phone).then(r=>r.json()).then(d=>{
                if(JSON.stringify(tickets) !== JSON.stringify(d.tickets)) {
                    tickets = d.tickets;
                    let h = '';
                    tickets.forEach(t => {
                        h += `<div class="bingo-card"><div class="grid">`;
                        t.forEach(row => row.forEach(n => {
                            h += `<div id="cell-${n}" class="cell ${n===0||myMarked.has(n)?'marked':''}" onclick="${n!==0?`toggleMark(${n})`:''}">${n===0?'FREE':n}</div>`;
                        }));
                        h += `</div></div>`;
                    });
                    document.getElementById('my-cards-container').innerHTML = h;
                }
            });
        }

        const brd = document.getElementById('brd');
        for(let i=1; i<=75; i++) brd.innerHTML += `<div class="b-cell" id="b-${i}">${i}</div>`;
        setInterval(update, 1000);

        function claimWin() {
            fetch('/claim_win', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, marked_numbers: Array.from(myMarked)})})
            .then(r=>r.json()).then(d=> { if(d.success) tg.showAlert("እንኳን ደስ አለዎት! አሸንፈዋል!"); else alert(d.msg); });
        }
        function deposit() { let r = prompt("ባንክ SMS እዚህ ይለጥፉ:"); if(r) fetch('/request_action', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({type:'Deposit', phone, receipt:r})}); }
        function withdraw() { let a = prompt("መጠን:"); if(a) fetch('/request_action', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({type:'Withdraw', phone, amount:a})}); }
    </script>
</body>
</html>
