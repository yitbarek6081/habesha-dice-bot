<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BESH BINGO</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        :root { --gold: #ffcc00; --bg: #050a18; --red: #ff3e3e; --green: #00ff88; --orange: #ff8800; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 0; overflow: hidden; width: 100vw; height: 100vh; }
        #auth-ui { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: radial-gradient(circle, #1e293b, #050a18); }
        .auth-card { background: rgba(255,255,255,0.03); border: 2px solid var(--gold); border-radius: 20px; padding: 30px 20px; width: 90%; max-width: 360px; box-sizing: border-box; }
        .auth-input { padding: 14px; width: 100%; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); box-sizing: border-box; font-size: 1rem; margin-bottom: 15px; font-weight: bold; }
        .btn-login { width: 100%; padding: 14px; background: var(--green); color: #000; border: none; border-radius: 10px; font-weight: 900; font-size: 1.1rem; cursor: pointer; }
        #main-app-content { display: flex; flex-direction: column; height: 100vh; width: 100vw; overflow: hidden; }
        .header-banner { background: #1e293b; padding: 8px 0; border-bottom: 2px solid var(--gold); }
        .stats { display: flex; justify-content: space-around; background: rgba(255,255,255,0.05); padding: 6px; margin: 5px; border-radius: 8px; }
        .stats b { display: block; color: var(--gold); }
        #lobby-ui { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
        .action-bar { display: flex; gap: 6px; padding: 4px 8px; }
        .btn-main { flex: 1; padding: 10px 5px; border: none; border-radius: 8px; font-weight: 900; font-size: 0.75rem; cursor: pointer; }
        .timer-container { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 10px auto; }
        #timer { font-size: 2rem; font-weight: 900; color: var(--gold); }
        .grid-500 { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; flex: 1; overflow-y: auto; background: #000; padding: 10px; margin: 5px 10px; border-radius: 10px; }
        .t-box { background: #fff; color: #000; font-size: 0.75rem; padding: 8px 0; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .t-box.mine { background: var(--gold) !important; box-shadow: inset 0 0 0 2px #fff; }
        .t-box.sold { background: #333; color: #666; cursor: not-allowed; }
        #game-ui { flex: 1; display: flex; flex-direction: column; padding: 5px; }
        .ball-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 5px; }
        #ball-circle { width: 55px; height: 55px; background: radial-gradient(circle, #fff, var(--gold)); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; font-weight: 900; }
        .game-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; flex: 1; overflow: hidden; }
        .board-container { border: 1px solid #333; background: #000; border-radius: 8px; padding: 3px; display: flex; flex-direction: column; }
        .main-board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1px; flex: 1; }
        .board-column { display: flex; flex-direction: column; gap: 1px; justify-content: space-between; }
        .ball-dot { font-size: 0.65rem; background: #111; color: #444; text-align: center; font-weight: bold; flex: 1; display: flex; align-items: center; justify-content: center; }
        .ball-dot.active { background: var(--gold); color: #000; }
        .card-area-wrapper { flex: 1; display: flex; flex-direction: column; gap: 6px; overflow-y: auto; }
        .bingo-card { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; background: #444; padding: 4px; border-radius: 5px; }
        .cell { background: #fff; color: #000; height: 35px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.85rem; cursor: pointer; border-radius: 3px; }
        .cell.selected { background: var(--gold) !important; }
        .cell.free { background: var(--red) !important; color: white; font-size: 0.65rem; }
        #bingo-btn { width: 100%; padding: 12px 0; background: var(--red); color: white; font-size: 1.1rem; font-weight: 900; border-radius: 10px; border: none; cursor: pointer; margin-top: 5px; }
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:2000; align-items:center; justify-content:center; }
        .modal-content { background: #1e293b; padding: 20px; border-radius: 15px; width: 90%; max-width: 340px; }
        .winner-modal { display: none; position: fixed; inset: 0; background: rgba(5,10,24,0.98); z-index: 3000; flex-direction: column; align-items: center; justify-content: center; }
        .winner-box { background: #fff; color: #1e293b; width: 90%; max-width: 340px; border-radius: 20px; padding: 20px; border: 4px solid var(--gold); }
        .winner-grid-modern { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; background: #f8fafc; padding: 6px; border-radius: 12px; }
        .w-cell-modern { background: #fff; color: #cbd5e1; height: 30px; display: flex; align-items: center; justify-content: center; font-weight: 800; border-radius: 6px; }
        .w-cell-modern.drawn { background: #cbd5e1; color: #475569; }
        .w-cell-modern.hit { background: #ef4444 !important; color: #fff !important; font-weight: 900; }
        .w-cell-modern.free { background: var(--gold); color: #1e293b; }
    </style>
</head>
<body>

    <div id="auth-ui">
        <div class="auth-card">
            <h2 style="color:var(--gold); margin:0 0 20px 0;">BESH BINGO</h2>
            <input type="text" id="reg-username" class="auth-input" placeholder="የተጫዋች ስም...">
            <input type="tel" id="reg-phone" class="auth-input" placeholder="ስልክ ቁጥር...">
            <button id="auth-submit-btn" class="btn-login" onclick="registerUser()">🚀 ግባ</button>
        </div>
    </div>

    <div id="main-app-content" style="display: none;">
        <audio id="win-horn" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" preload="auto"></audio>
        <div class="header-banner"><h1>BESH BINGO</h1></div>
        
        <div class="stats">
            <div>BALANCE<b id="balance">0 ETB</b></div>
            <div>PLAYERS<b id="p-count">0</b></div>
            <div>በሽ-ደራሽ<b id="prize">0 ETB</b></div>
        </div>

        <div id="lobby-ui">
            <div class="action-bar">
                <button class="btn-main" style="background:var(--green);" onclick="openM('dep-m')">📥 DEPOSIT</button>
                <button class="btn-main" style="background:var(--orange); color:white;" onclick="openM('with-m')">📤 WITHDRAW</button>
            </div>
            <div class="timer-container">
                <div id="timer">30</div>
                <div style="color:var(--green); font-weight:900;">🎟️ ካርቴላ (10 ETB)</div>
            </div>
            <div class="grid-500" id="ticket-area"></div>
        </div>

        <div id="game-ui" style="display:none;">
            <div class="ball-row">
                <div id="ball-circle">--</div>
                <div id="ball-prep-countdown" style="color:var(--orange); font-weight:900; display:none;"></div>
            </div>
            <div class="game-layout">
                <div class="board-container">
                    <div class="main-board" id="main-board"></div>
                </div>
                <div style="display:flex; flex-direction:column; justify-content:space-between; overflow:hidden;">
                    <div class="card-area-wrapper" id="card-area"></div>
                    <button id="bingo-btn" onclick="claim()">BINGO!</button>
                </div>
            </div>
        </div>
    </div>

    <div id="dep-m" class="modal"><div class="modal-content"><h3>DEPOSIT</h3><p>Send to: <b>0945880474</b></p><input type="number" id="da" placeholder="Amount"><input type="text" id="di" placeholder="Tx ID"><button class="btn-main" style="background:var(--green); width:100%;" onclick="subD()">SUBMIT</button><button onclick="closeM('dep-m')" style="background:none; color:white; border:none; margin-top:10px; width:100%;">CLOSE</button></div></div>
    <div id="with-m" class="modal"><div class="modal-content"><h3>WITHDRAW</h3><input type="number" id="wa" placeholder="Amount"><button class="btn-main" style="background:var(--orange); width:100%; color:white;" onclick="subW()">REQUEST</button><button onclick="closeM('with-m')" style="background:none; color:white; border:none; margin-top:10px; width:100%;">CLOSE</button></div></div>

    <div id="result-ui" class="winner-modal">
        <div class="winner-box">
            <h3 style="margin:0; color:#10b981;" id="w-player-name">Player Won!</h3>
            <p>Prize: <b id="w-prize-pool" style="color:#10b981;">0 ETB</b></p>
            <div style="font-weight:bold; margin-bottom:5px;" id="w-card-number">CARD #0</div>
            <div id="w-pattern-name" style="color:red; font-weight:900; margin-bottom:5px;"></div>
            <div class="winner-grid-modern" id="w-grid-cells"></div>
        </div>
        <div style="color:var(--gold); font-weight:900; margin-top:15px;">Next: <span id="w-next-timer">10s</span></div>
    </div>

    <script>
        let phone = localStorage.getItem('phone'), username = localStorage.getItem('username');
        let announced = false, clientBalance = 0, isProcessingBuy = false, socket = null, latestDrawn = [];

        window.onload = function() {
            if (phone && username) { showGameUI(); }
        }

        function registerUser() {
            let u = document.getElementById('reg-username').value.trim();
            let p = document.getElementById('reg-phone').value.trim().replace(/[^0-9]/g, '');
            if(u.length < 2 || p.length < 9) return alert("መረጃ በትክክል ያስገቡ!");
            localStorage.setItem('phone', p); localStorage.setItem('username', u);
            phone = p; username = u; showGameUI();
        }

        function showGameUI() {
            document.getElementById('auth-ui').style.display = 'none';
            document.getElementById('main-app-content').style.display = 'flex';
            initWebSocket();
        }

        function initWebSocket() {
            socket = io("https://habesha-dice-bot.onrender.com");
            socket.on('game_update', function(d) {
                document.getElementById('prize').innerText = Math.floor(d.pot * 0.8) + " ETB";
                document.getElementById('p-count').innerText = d.active_players;
                document.getElementById('timer').innerText = d.timer;

                if(d.status === "lobby") {
                    document.getElementById('lobby-ui').style.display='flex'; document.getElementById('game-ui').style.display='none'; document.getElementById('result-ui').style.display='none';
                    document.getElementById('main-board').innerHTML=""; document.getElementById('card-area').innerHTML="";
                    document.getElementById('w-grid-cells').innerHTML = ""; // DOM ሜሞሪ እንዳይሞላ ጽዳት[cite: 10]
                    document.getElementById('ball-prep-countdown').style.display='none';
                    if(announced) { localStorage.removeItem('marked_0'); localStorage.removeItem('marked_1'); announced = false; }
                    initTicketsOnce(); if(!isProcessingBuy) renderTickets(d.sold_tickets || {});
                } 
                else if(d.status === "playing") {
                    document.getElementById('lobby-ui').style.display='none'; document.getElementById('game-ui').style.display='flex'; document.getElementById('result-ui').style.display='none';
                    if(d.ball_timer > 0) {
                        document.getElementById('ball-prep-countdown').style.display='block';
                        document.getElementById('ball-prep-countdown').innerText = `⏳ ዝግጅት፦ ${d.ball_timer}`;
                    } else { document.getElementById('ball-prep-countdown').style.display='none'; }
                    
                    document.getElementById('ball-circle').innerText = d.current_ball;
                    latestDrawn = d.drawn_balls || [];
                    renderMainBoard(latestDrawn);

                    // የተጫዋቹ ካርቴላ ከሌለ ብቻ አንድ ጊዜ እንዲሳል ማድረግ (የሰርቨር ሎድ ይቀንሳል)
                    let myCards = [];
                    for(let k in d.sold_tickets) { if(d.sold_tickets[k] === phone && d.all_cards[k]) myCards.push({id:k, matrix:d.all_cards[k]}); }
                    const area = document.getElementById('card-area');
                    if(area && area.children.length === 0 && myCards.length > 0) {
                        myCards.forEach((c, idx) => renderCard(c.matrix, idx));
                    }
                } 
                else if(d.status === "result") {
                    document.getElementById('result-ui').style.display='flex';
                    document.getElementById('w-player-name').innerText = d.winner + " አሸንፏል!";
                    document.getElementById('w-prize-pool').innerText = Math.floor(d.pot * 0.8) + " ETB";
                    document.getElementById('w-card-number').innerText = `CARD #${d.winning_ticket_num}`;
                    document.getElementById('w-next-timer').innerText = d.timer + "s";
                    document.getElementById('w-pattern-name').innerText = d.winning_line_name || "BINGO!";
                    
                    const grid = document.getElementById('w-grid-cells');
                    if(grid.children.length === 0 && d.winning_card) {
                        let drawnSet = new Set(latestDrawn.map(b => parseInt(b.replace(/[^0-9]/g, ''))));
                        let winIdxs = new Set(d.winning_indices || []);
                        
                        d.winning_card.forEach((n, idx) => {
                            let cell = document.createElement('div'); cell.className = "w-cell-modern";
                            if(idx === 12 || n === 0) { cell.className += " free"; cell.innerText = "★"; }
                            else {
                                cell.innerText = n;
                                if(winIdxs.has(idx)) cell.className += " hit";
                                else if(drawnSet.has(n)) cell.className += " drawn";
                            }
                            grid.appendChild(cell);
                        });
                    }
                    if(!announced) { try { document.getElementById('win-horn').play(); } catch(e){} announced = true; }
                }
            });
        }

        function initTicketsOnce() {
            const area = document.getElementById('ticket-area');
            if(area.children.length === 0) {
                for(let i=1; i<=500; i++) {
                    let div = document.createElement('div'); div.className='t-box'; div.innerText=i; div.id='t-'+i;
                    area.appendChild(div);
                }
            }
        }

        function renderTickets(sold) {
            for(let i=1; i<=500; i++) {
                let box = document.getElementById('t-'+i); if(!box) continue;
                if(sold[i]) {
                    let isMine = (sold[i] === phone);
                    box.className = isMine ? 't-box mine' : 't-box sold';
                    box.onclick = isMine ? () => refund(i) : null;
                } else { box.className = 't-box'; box.onclick = () => buy(i); }
            }
        }

        function buy(n) {
            if(isProcessingBuy || document.querySelectorAll('.t-box.mine').length >= 2) return;
            isProcessingBuy = true; document.getElementById('t-'+n).className = 't-box mine';
            fetch('/buy_specific_ticket', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone:phone, ticket_num:n, username:username}) }).then(() => isProcessingBuy = false);
        }

        function refund(n) {
            if(confirm("ካርቴላውን ለመሰረዝ እርግጠኛ ነዎት?")) {
                fetch('/cancel_ticket', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone:phone, ticket_num:n}) });
            }
        }

        function renderMainBoard(drawn) {
            const board = document.getElementById('main-board');
            if(board.children.length === 0) {
                for(let col=0; col<5; col++) {
                    let colDiv = document.createElement('div'); colDiv.className='board-column';
                    for(let i=(col*15+1); i<=(col*15+15); i++) {
                        let d = document.createElement('div'); d.className='ball-dot'; d.id='b-'+i; d.innerText=i;
                        colDiv.appendChild(d);
                    }
                    board.appendChild(colDiv);
                }
            }
            drawn.forEach(b => { let num = parseInt(b.replace(/[^0-9]/g, '')); if(num) { let el=document.getElementById('b-'+num); if(el) el.className='ball-dot active'; } });
        }

        function renderCard(card, cardIdx) {
            const wrap = document.createElement('div');
            wrap.innerHTML = `<div style="background:var(--orange); font-size:0.7rem; font-weight:bold; padding:2px;">BINGO CARD</div>`;
            const grid = document.createElement('div'); grid.className = 'bingo-card';
            let saved = JSON.parse(localStorage.getItem(`marked_${cardIdx}`) || "[]");

            card.forEach((n, i) => {
                let cell = document.createElement('div');
                if(i === 12 || n === 0) { cell.className = "cell free selected"; cell.innerText = "FREE"; }
                else {
                    cell.className = saved.includes(n) ? "cell selected" : "cell"; cell.innerText = n;
                    cell.onclick = () => {
                        let idxInDrawn = latestDrawn.findIndex(b => parseInt(b.replace(/[^0-9]/g, '')) === n);
                        if(idxInDrawn !== -1 && (latestDrawn.length - 1 - idxInDrawn) >= 3) return alert("⚠️ ቁጥሩ አልፎታል!");
                        
                        cell.classList.toggle('selected');
                        let list = JSON.parse(localStorage.getItem(`marked_${cardIdx}`) || "[]");
                        let pos = list.indexOf(n);
                        if(pos > -1) list.splice(pos, 1); else list.push(n);
                        localStorage.setItem(`marked_${cardIdx}`, JSON.stringify(list));
                    }
                }
                grid.appendChild(cell);
            });
            wrap.appendChild(grid); document.getElementById('card-area').appendChild(wrap);
        }

        function claim() {
            fetch('/claim_bingo', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ phone: phone, marked_0: JSON.parse(localStorage.getItem('marked_0')||"[]"), marked_1: JSON.parse(localStorage.getItem('marked_1')||"[]") })
            }).then(r => r.json()).then(d => { if(!d.success) alert(d.msg); });
        }

        function openM(id) { document.getElementById(id).style.display='flex'; }
        function closeM(id) { document.getElementById(id).style.display='none'; }
        function subD() { fetch('/request_deposit', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone:phone, amount:document.getElementById('da').value, transaction_id:document.getElementById('di').value}) }).then(() => { closeM('dep-m'); alert("ተልኳል!"); }); }
        function subW() { fetch('/request_withdrawal', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone:phone, amount:document.getElementById('wa').value}) }).then(() => { closeM('with-m'); alert("ጥያቄው ቀርቧል!"); }); }
    </script>
</body>
</html>
