<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BESH BINGO - PREMIUM</title>
    <style>
        :root { --gold: #ffcc00; --bg: #050a18; --red: #ff3e3e; --green: #00ff88; --orange: #ff8800; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 0; overflow: hidden; }

        /* Header */
        .header-section { position: sticky; top: 0; z-index: 1000; background: var(--bg); border-bottom: 2px solid var(--gold); padding-bottom: 5px; }
        .stats { display: flex; justify-content: space-around; background: rgba(255,255,255,0.05); padding: 5px; margin: 5px; border-radius: 8px; font-size: 0.7rem; }
        .stats b { display: block; color: var(--gold); font-size: 0.85rem; }
        .action-bar { display: flex; gap: 5px; padding: 0 10px; }
        .btn-main { flex: 1; padding: 10px 0; border: none; border-radius: 6px; font-weight: 900; cursor: pointer; font-size: 0.7rem; }
        .btn-deposit { background: var(--green); color: #000; }
        .btn-withdraw { background: var(--orange); color: white; }

        /* Game Layout */
        .game-layout { display: grid; grid-template-columns: 0.9fr 2.1fr; gap: 8px; padding: 10px; height: calc(100vh - 130px); }
        
        /* Main Board with Auto-Scroll */
        .main-board { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; 
            background: #000; padding: 5px; border-radius: 8px; border: 1px solid #333;
            overflow-y: auto; scroll-behavior: smooth; height: 100%;
        }
        .ball-dot { 
            font-size: 0.7rem; background: #111; color: #444; padding: 6px 0; 
            border-radius: 4px; border: 1px solid #222; transition: all 0.3s;
        }
        .ball-dot.active { background: var(--gold); color: #000; font-weight: bold; border-color: #fff; transform: scale(1.05); }
        .ball-dot.last-called { animation: pulse-border 1s infinite; background: #fff !important; }

        @keyframes pulse-border { 
            0% { box-shadow: 0 0 0px var(--gold); } 
            50% { box-shadow: 0 0 10px var(--gold); } 
            100% { box-shadow: 0 0 0px var(--gold); } 
        }

        /* Bingo Card (Height 25px) */
        .card-container { width: 100%; max-width: 250px; margin: 0 auto; }
        .card-header-letters { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; margin-bottom: 2px; }
        .letter { background: var(--gold); color: #000; font-weight: 900; padding: 2px 0; border-radius: 2px; font-size: 0.8rem; }
        .bingo-card { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; background: #444; padding: 2px; border-radius: 4px; }
        .cell { 
            background: #fff; color: #000; height: 25px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: 0.9rem; border-radius: 2px;
        }
        .cell.selected { background: var(--gold) !important; border: 1px solid #000; }
        .cell.free { background: var(--red) !important; color: white; font-size: 0.5rem; }

        /* Modals */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; align-items: center; justify-content: center; }
        .modal-content { background: #1e293b; padding: 20px; border-radius: 20px; width: 85%; max-width: 320px; border: 1px solid var(--gold); }
        .modal-content input { padding: 15px; margin-bottom: 20px; width: 100%; border-radius: 10px; border: none; font-size: 16px; background: #000; color: white; }
        
        .copy-box { background: rgba(255,204,0,0.1); border: 1px dashed var(--gold); padding: 10px; margin-bottom: 20px; border-radius: 10px; cursor: pointer; }

        #toast { visibility: hidden; background: var(--green); color: #000; padding: 10px 20px; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); border-radius: 50px; font-weight: bold; z-index: 10000; }
        #toast.show { visibility: visible; }
    </style>
</head>
<body>
    <div id="toast">ቁጥሩ ተገልብጧል!</div>

    <div class="header-section">
        <h3 style="color:var(--gold); margin:5px 0;">BESH BINGO</h3>
        <div class="stats">
            <div>ቀሪ ሂሳብ<b id="balance">0 ETB</b></div>
            <div>ተጫዋቾች<b id="p-count">0</b></div>
            <div>ሽልማት<b id="prize">0 ETB</b></div>
        </div>
        <div class="action-bar">
            <button class="btn-main btn-deposit" onclick="openM('dep-m')">📥 DEPOSIT</button>
            <button class="btn-main btn-withdraw" onclick="openM('with-m')">📤 WITHDRAW</button>
        </div>
    </div>

    <div id="lobby-ui" style="padding-top: 20px;">
        <div style="font-size:3rem; color:var(--gold); font-weight:900;" id="timer">--</div>
        <div id="ticket-area" style="display:flex; flex-wrap:wrap; justify-content:center; gap:5px; padding:15px; height:60vh; overflow-y:auto;"></div>
    </div>

    <div id="game-ui" style="display:none;">
        <div id="ball-circle" style="width:55px; height:55px; background:white; color:#000; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.8rem; font-weight:900; margin:10px auto; border:3px solid var(--gold); box-shadow: 0 0 15px rgba(255,204,0,0.4);">--</div>
        
        <div class="game-layout">
            <div class="main-board" id="main-board"></div>
            <div>
                <div id="card-area"></div>
                <button onclick="claim()" style="width:100%; max-width:250px; padding:15px; background:var(--red); color:white; font-weight:900; border:none; border-radius:10px; font-size:1.3rem; margin-top:15px; box-shadow: 0 5px 0 #b32a2a;">BINGO!</button>
            </div>
        </div>
    </div>

    <div id="dep-m" class="modal"><div class="modal-content">
        <h2 style="color:var(--green); margin:0 0 10px 0;">DEPOSIT</h2>
        <div class="copy-box" onclick="copyToClipboard('0945880474')">
            <div style="font-size:0.7rem; color:var(--gold);">ለመገልበጥ ይጫኑ (Click to Copy)</div>
            <div style="font-size:1.3rem; font-weight:bold; letter-spacing:1px;">0945880474</div>
        </div>
        <input type="number" id="da" placeholder="መጠን (Amount)">
        <input type="text" id="di" placeholder="ትራንዛክሽን ቁጥር (Transaction ID)">
        <button class="btn-main btn-deposit" style="width:100%; font-size:1rem; padding:15px;" onclick="subD()">ጥያቄ ላክ</button>
        <button onclick="closeM('dep-m')" style="color:#888; background:none; border:none; margin-top:20px; display:block; width:100%;">ዝጋ</button>
    </div></div>

    <div id="with-m" class="modal"><div class="modal-content">
        <h2 style="color:var(--orange); margin:0 0 20px 0;">WITHDRAW</h2>
        <input type="number" id="wa" placeholder="መጠን (Amount)">
        <button class="btn-main btn-withdraw" style="width:100%; font-size:1rem; padding:15px;" onclick="subW()">ብር አውጣ</button>
        <button onclick="closeM('with-m')" style="color:#888; background:none; border:none; margin-top:20px; display:block; width:100%;">ዝጋ</button>
    </div></div>

    <script>
        let phone = localStorage.getItem('phone') || prompt("ስልክ ያስገቡ:");
        let username = localStorage.getItem('username') || prompt("ስም ያስገቡ:");
        localStorage.setItem('phone', phone); localStorage.setItem('username', username);

        function openM(id) { document.getElementById(id).style.display='flex'; }
        function closeM(id) { document.getElementById(id).style.display='none'; }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                let t = document.getElementById("toast");
                t.className = "show"; setTimeout(() => t.className = "", 2000);
            });
        }

        function update() {
            fetch(`/get_status?phone=${phone}`).then(r=>r.json()).then(d=>{
                document.getElementById('balance').innerText = d.balance + " ETB";
                document.getElementById('prize').innerText = Math.floor(d.pot * 0.8) + " ETB";
                document.getElementById('p-count').innerText = d.active_players;
                document.getElementById('timer').innerText = d.timer;

                if(d.status === "lobby") {
                    document.getElementById('lobby-ui').style.display='block';
                    document.getElementById('game-ui').style.display='none';
                    renderTickets(d.sold_tickets);
                } else if(d.status === "playing") {
                    document.getElementById('lobby-ui').style.display='none';
                    document.getElementById('game-ui').style.display='block';
                    document.getElementById('ball-circle').innerText = d.current_ball;
                    renderMainBoard(d.drawn_balls, d.current_ball);
                    if(d.my_cards.length > 0 && document.getElementById('card-area').children.length === 0) {
                        d.my_cards.forEach((c, i) => renderCard(c, i));
                    }
                }
            });
        }

        function renderMainBoard(drawn, current) {
            const board = document.getElementById('main-board');
            if(board.children.length === 0) {
                for(let i=1; i<=75; i++) {
                    let d = document.createElement('div'); d.className = 'ball-dot'; d.id = 'b-'+i; d.innerText = i; board.appendChild(d);
                }
            }
            
            // Remove previous last-called highlight
            document.querySelectorAll('.last-called').forEach(el => el.classList.remove('last-called'));

            drawn.forEach(b => { 
                let num = b.toString().replace(/\D/g,'');
                let el = document.getElementById('b-'+num); 
                if(el) {
                    el.classList.add('active');
                    // Highlight and scroll to the CURRENT ball
                    if(num == current.toString().replace(/\D/g,'')) {
                        el.classList.add('last-called');
                        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }
            });
        }

        function renderTickets(sold) {
            const area = document.getElementById('ticket-area');
            if(area.children.length === 0) {
                for(let i=1; i<=500; i++) {
                    let div = document.createElement('div');
                    div.style = "flex:0 0 18%; background:#fff; color:#000; font-size:0.8rem; padding:10px 0; font-weight:bold; border-radius:5px; text-align:center; margin-bottom:5px;";
                    div.innerText = i; div.id = 't-'+i; area.appendChild(div);
                }
            }
            for(let i=1; i<=500; i++) {
                let box = document.getElementById('t-'+i);
                let owner = sold[String(i)];
                if(owner) {
                    box.style.background = (owner === phone) ? "var(--gold)" : "#222";
                    box.style.color = (owner === phone) ? "#000" : "#555";
                    box.onclick = null;
                } else {
                    box.style.background = "#fff"; box.style.color = "#000"; box.onclick = () => buy(i);
                }
            }
        }

        function renderCard(card, cardIdx) {
            const container = document.createElement('div');
            container.className = 'card-container';
            const grid = document.createElement('div'); 
            grid.className = 'bingo-card';
            
            const header = document.createElement('div');
            header.className = 'card-header-letters';
            ['B','I','N','G','O'].forEach(l => {
                let d = document.createElement('div'); d.className = 'letter'; d.innerText = l; header.appendChild(d);
            });
            container.appendChild(header);

            card.forEach((n, i) => {
                const cell = document.createElement('div');
                cell.className = (i === 12) ? "cell free" : "cell";
                cell.innerText = (i === 12) ? "FREE" : n;
                cell.onclick = () => { if(i!==12) cell.classList.toggle('selected'); };
                grid.appendChild(cell);
            });
            container.appendChild(grid);
            document.getElementById('card-area').appendChild(container);
        }

        function buy(n) { fetch('/buy_specific_ticket', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, ticket_num:String(n), username})}).then(update); }
        function claim() { fetch('/claim_bingo', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone})}).then(r=>r.json()).then(d=> { if(!d.success) alert("ቢንጎ አልሞላም!"); }); }
        function subD() { fetch('/request_deposit', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, amount:document.getElementById('da').value, transaction_id:document.getElementById('di').value})}).then(()=> { closeM('dep-m'); alert("ጥያቄው ተልኳል!"); }); }
        function subW() { fetch('/withdraw', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, amount:document.getElementById('wa').value})}).then(r=>r.json()).then(d => { if(d.success){ closeM('with-m'); alert("ጥያቄ ተልኳል!"); } else { alert("በቂ ብር የለዎትም!"); } }); }

        setInterval(update, 2000); update();
    </script>
</body>
</html>
